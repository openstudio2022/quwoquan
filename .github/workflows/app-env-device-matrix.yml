# App Environment Device Matrix — alpha / beta 自托管验证（self-hosted）
# dev1.0 / main 的 push 必须命中本地或仓库注册的 self-hosted 模拟器 / 设备。
# 统一复用 05b app-env-device-matrix-self-hosted，禁止回退到 GitHub hosted 模拟器。
name: 05. App Env Device Matrix

on:
  workflow_dispatch:
  push:
    branches:
      - dev1.0
      - main
    paths:
      - '.github/workflows/app-env-device-matrix.yml'
      - '.github/workflows/app-env-device-matrix-self-hosted.yml'
      - 'quwoquan_app/**'
      - 'quwoquan_service/services/assistant-service/**'
      - 'quwoquan_service/contracts/metadata/assistant/**'
      - 'scripts/run_assistant_device_matrix.py'
      - 'scripts/run_assistant_device_matrix_ci.py'
      - 'scripts/dev_assistant_beta_gateway.py'

jobs:
  assistant_matrix_self_hosted:
    name: Self-hosted — alpha/beta assistant 矩阵
    secrets: inherit
    uses: ./.github/workflows/app-env-device-matrix-self-hosted.yml
    with:
      env_json: '["alpha","beta"]'
