# App Environment Device Matrix — alpha / beta / gamma on hosted devices
# Android runs on GitHub hosted Ubuntu emulator; iOS runs on GitHub hosted macOS simulator.
name: 05. App Env Device Matrix

on:
  workflow_dispatch:
  push:
    branches:
      - dev1.0
      - main
    paths:
      - '.github/workflows/app-env-device-matrix.yml'
      - 'quwoquan_app/**'
      - 'quwoquan_service/services/assistant-service/**'
      - 'quwoquan_service/contracts/metadata/assistant/**'
      - 'scripts/run_assistant_device_matrix.py'
      - 'scripts/dev_assistant_beta_gateway.py'

jobs:
  android:
    name: ${{ matrix.env }} / Android hosted emulator
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        env: [alpha, beta, gamma]
    env:
      API_CONTRACT_ENV: ${{ matrix.env }}
      GAMMA_BASE_URL: ${{ secrets.GAMMA_BASE_URL }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      ASSISTANT_MODEL_PROVIDER: deterministic
      ALLOW_DETERMINISTIC_BETA: "1"
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: 安装 Flutter 依赖
        working-directory: quwoquan_app
        run: flutter pub get
      - name: Enable Android emulator KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run ${{ matrix.env }} on Android hosted emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          script: |
            set -eu
            if [ "${API_CONTRACT_ENV}" = "gamma" ] && [ -z "${GAMMA_BASE_URL:-}" ]; then
              echo "::error::缺少 GAMMA_BASE_URL，无法执行 gamma Android 端侧矩阵"
              exit 1
            fi
            args="--env ${API_CONTRACT_ENV} --device-id emulator-5554 --report artifacts/device-matrix/${API_CONTRACT_ENV}-android.json"
            if [ "${API_CONTRACT_ENV}" = "gamma" ]; then
              args="${args} --skip-beta-services --gateway-base-url ${GAMMA_BASE_URL}"
            fi
            if [ "${API_CONTRACT_ENV}" = "beta" ]; then
              args="${args} --service-start-timeout-seconds 180"
            fi
            python3 scripts/run_assistant_device_matrix.py ${args}
      - name: Upload Android matrix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-env-device-matrix-${{ matrix.env }}-android
          path: |
            artifacts/device-matrix/${{ matrix.env }}-android.json
            artifacts/device-matrix/assistant_device_matrix_logs/**
          if-no-files-found: ignore

  ios:
    name: ${{ matrix.env }} / iOS hosted simulator
    runs-on: macos-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        env: [alpha, beta, gamma]
    env:
      API_CONTRACT_ENV: ${{ matrix.env }}
      GAMMA_BASE_URL: ${{ secrets.GAMMA_BASE_URL }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      ASSISTANT_MODEL_PROVIDER: deterministic
      ALLOW_DETERMINISTIC_BETA: "1"
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: 安装 Flutter 依赖
        working-directory: quwoquan_app
        run: flutter pub get
      - name: Boot iOS simulator
        run: |
          xcodebuild -version
          xcrun simctl list > /dev/null
          xcrun simctl list devices available --json > "$RUNNER_TEMP/ios-devices.json"
          IOS_DEVICE_ID="$(python3 - "$RUNNER_TEMP/ios-devices.json" <<'PY'
          import json
          import re
          import sys

          data = json.load(open(sys.argv[1], encoding="utf-8")).get("devices", {})
          devices = []
          for runtime, runtime_devices in data.items():
              match = re.search(r"iOS-(\d+(?:-\d+)*)$", runtime)
              if not match:
                  continue
              version = tuple(int(part) for part in match.group(1).split("-"))
              for index, device in enumerate(runtime_devices):
                  if not device.get("isAvailable") or not device.get("udid"):
                      continue
                  name = device.get("name", "")
                  prefer_phone = 1 if name.startswith("iPhone") else 0
                  prefer_current = 1 if name in {"iPhone 17 Pro", "iPhone 16 Pro", "iPhone 15 Pro"} else 0
                  devices.append((version, prefer_current, prefer_phone, -index, device["udid"]))
          if not devices:
              raise SystemExit("no available iOS simulator")
          devices.sort(reverse=True)
          print(devices[0][-1])
          PY
          )"
          xcrun simctl boot "$IOS_DEVICE_ID" || true
          xcrun simctl bootstatus "$IOS_DEVICE_ID" -b
          echo "IOS_DEVICE_ID=$IOS_DEVICE_ID" >> "$GITHUB_ENV"
          flutter devices
      - name: Run ${{ matrix.env }} on iOS hosted simulator
        run: |
          set -euo pipefail
          if [ "${API_CONTRACT_ENV}" = "gamma" ] && [ -z "${GAMMA_BASE_URL:-}" ]; then
            echo "::error::缺少 GAMMA_BASE_URL，无法执行 gamma iOS 端侧矩阵"
            exit 1
          fi
          args=(--env "${API_CONTRACT_ENV}" --device-id "${IOS_DEVICE_ID}" --report "artifacts/device-matrix/${API_CONTRACT_ENV}-ios.json")
          if [ "${API_CONTRACT_ENV}" = "gamma" ]; then
            args+=(--skip-beta-services --gateway-base-url "${GAMMA_BASE_URL}")
          fi
          if [ "${API_CONTRACT_ENV}" = "beta" ]; then
            args+=(--service-start-timeout-seconds 180)
          fi
          python3 scripts/run_assistant_device_matrix.py "${args[@]}"
      - name: Upload iOS matrix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-env-device-matrix-${{ matrix.env }}-ios
          path: |
            artifacts/device-matrix/${{ matrix.env }}-ios.json
            artifacts/device-matrix/assistant_device_matrix_logs/**
          if-no-files-found: ignore
