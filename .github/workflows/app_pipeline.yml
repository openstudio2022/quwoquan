# =============================================================================
# App Pipeline — quwoquan_app CI/CD
# =============================================================================
# 触发条件：v* tag 发布 / 手动
# 职责：端侧发布构建产物；L1/L2 门禁统一由 03 Delivery Gate 承担
#
# 【可选 Secrets】（macOS 签名等）
#   CODESIGN_IDENTITY   — macOS 签名身份
#   MATCH_PASSWORD      — fastlane match 证书密码
# =============================================================================

name: 01. App Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    name: Flutter Build macOS
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - name: 准备 personal_assistant/.env（CI 无 .gitignore 的 .env）
        run: |
          if [ -d quwoquan_app/personal_assistant ]; then
            mkdir -p quwoquan_app/personal_assistant
            if [ -f quwoquan_app/personal_assistant/.env.example ]; then
              cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
            else
              : > quwoquan_app/personal_assistant/.env
            fi
          fi

      - name: 缓存 Flutter 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            quwoquan_app/.dart_tool
          key: "flutter-macos-${{ runner.os }}-${{ hashFiles('quwoquan_app/pubspec.lock') }}"
          restore-keys: |
            flutter-macos-${{ runner.os }}-

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 安装依赖
        working-directory: quwoquan_app
        run: flutter pub get

      - name: Flutter Build macOS
        working-directory: quwoquan_app
        run: flutter build macos -t lib/main_prod.dart --dart-define=APP_DATA_SOURCE=remote

      - name: 上传 macOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ github.ref_name }}
          path: quwoquan_app/build/macos/Build/Products/Release/

      - name: 上传构建失败日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-fail-logs
          path: quwoquan_app/build/
