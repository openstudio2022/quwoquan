name: L4 Patrol E2E (Firebase Test Lab)

# 触发时机：
#   - pre-release tag（vX.Y.Z-rcN）：失败 → 阻塞发布
#   - 手动触发：调试用
on:
  push:
    tags:
      - 'v*-rc*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.x'
  # FTL 设备矩阵（iOS 15/17 + Android 12/14）
  FTL_DEVICES_ANDROID: |
    model=oriole,version=33    # Pixel 6（Android 13 / API 33）
    model=redfin,version=30    # Pixel 5（Android 11 / API 30，最低支持）
  FTL_TIMEOUT: '10m'

jobs:
  # ── Android FTL ─────────────────────────────────────────────────────────
  patrol-android:
    name: Patrol E2E — Android (FTL)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: quwoquan_app
        run: flutter pub get

      - name: Install Patrol CLI
        run: dart pub global activate patrol_cli

      - name: Build Android test APK
        working-directory: quwoquan_app
        run: |
          patrol build android \
            --dart-define=ENV=staging \
            --dart-define=STAGING_BASE_URL=${{ secrets.STAGING_BASE_URL }} \
            --dart-define=TEST_AUTH_TOKEN=${{ secrets.STAGING_TEST_AUTH_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run on Firebase Test Lab (Android)
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app quwoquan_app/build/app/outputs/flutter-apk/app-debug.apk \
            --test quwoquan_app/build/app/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=oriole,version=33,locale=zh_CN,orientation=portrait \
            --device model=redfin,version=30,locale=zh_CN,orientation=portrait \
            --timeout ${{ env.FTL_TIMEOUT }} \
            --results-bucket=gs://${{ secrets.FTL_RESULTS_BUCKET }} \
            --results-dir=patrol-android-${{ github.run_id }} \
            --no-record-video

      - name: Download FTL results
        if: always()
        run: |
          gsutil -m cp -r \
            gs://${{ secrets.FTL_RESULTS_BUCKET }}/patrol-android-${{ github.run_id }} \
            ./ftl-results-android || true

      - name: Upload FTL results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ftl-android-results
          path: ftl-results-android/
          retention-days: 14

  # ── iOS FTL ─────────────────────────────────────────────────────────────
  patrol-ios:
    name: Patrol E2E — iOS (FTL)
    runs-on: macos-latest        # iOS 构建需要 macOS runner
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: quwoquan_app
        run: flutter pub get

      - name: Install Patrol CLI
        run: dart pub global activate patrol_cli

      - name: Build iOS test IPA
        working-directory: quwoquan_app
        env:
          # iOS 签名证书需在 Secrets 中配置（通配符证书或 Ad Hoc）
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          patrol build ios \
            --dart-define=ENV=staging \
            --dart-define=STAGING_BASE_URL=${{ secrets.STAGING_BASE_URL }} \
            --dart-define=TEST_AUTH_TOKEN=${{ secrets.STAGING_TEST_AUTH_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run on Firebase Test Lab (iOS)
        run: |
          gcloud firebase test ios run \
            --test quwoquan_app/build/ios_integ/Runner_iphoneos.app \
            --device model=iphone15,version=17,locale=zh_CN,orientation=portrait \
            --device model=iphone12,version=15,locale=zh_CN,orientation=portrait \
            --timeout ${{ env.FTL_TIMEOUT }} \
            --results-bucket=gs://${{ secrets.FTL_RESULTS_BUCKET }} \
            --results-dir=patrol-ios-${{ github.run_id }}

      - name: Download FTL results
        if: always()
        run: |
          gsutil -m cp -r \
            gs://${{ secrets.FTL_RESULTS_BUCKET }}/patrol-ios-${{ github.run_id }} \
            ./ftl-results-ios || true

      - name: Upload FTL results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ftl-ios-results
          path: ftl-results-ios/
          retention-days: 14
