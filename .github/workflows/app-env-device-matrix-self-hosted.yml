# Self-hosted：alpha/beta/gamma 端侧矩阵（发布准入；gamma 依赖稳定网关，建议在 ECS onebox 部署后触发）。
# 需在仓库注册带 self-hosted 标签的 Runner（macOS 跑 iOS；Linux/mac 均可跑 Android，视本机 adb/flutter devices）。
name: 05b. App Env Device Matrix (self-hosted)

on:
  workflow_dispatch:
    inputs:
      env_json:
        description: '矩阵环境 JSON 数组，例如 ["alpha","beta","gamma"] 或 ["gamma"]'
        required: true
        default: '["alpha","beta","gamma"]'
      gamma_base_url:
        description: 可选覆盖 gamma 网关（默认 secrets.GAMMA_BASE_URL）
        required: false
        default: ''
      media_base_url:
        description: 可选覆盖媒体 CDN base（chat-avatar 矩阵使用）
        required: false
        default: ''
      matrix_kind:
        description: assistant 或 chat-avatar
        required: false
        default: assistant
  workflow_call:
    inputs:
      env_json:
        description: 'JSON array of environments'
        required: true
        type: string
      gamma_base_url:
        description: '可选覆盖 gamma 网关（默认走 secrets.GAMMA_BASE_URL）'
        required: false
        type: string
        default: ''
      media_base_url:
        description: '可选覆盖媒体 CDN base'
        required: false
        type: string
        default: ''
      matrix_kind:
        description: 'assistant or chat-avatar'
        required: false
        type: string
        default: assistant

jobs:
  android:
    name: ${{ matrix.env }} / Android (self-hosted)
    runs-on: self-hosted
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(inputs.env_json) }}
    env:
      API_CONTRACT_ENV: ${{ matrix.env }}
      GAMMA_BASE_URL: ${{ inputs.gamma_base_url || secrets.GAMMA_BASE_URL }}
      MEDIA_AVATAR_CDN_BASE_URL: ${{ inputs.media_base_url || vars.MEDIA_AVATAR_CDN_BASE_URL }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      ASSISTANT_MODEL_PROVIDER: deterministic
      ALLOW_DETERMINISTIC_BETA: "1"
      ASSISTANT_MATRIX_ALL_DEVICES: "1"
      CHAT_AVATAR_MATRIX_ALL_DEVICES: "1"
      ANDROID_DEVICE_ID: ${{ vars.ANDROID_DEVICE_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - name: Install Flutter (PATH)
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 flutter 并在 PATH 中"; exit 2; }
          flutter --version
      - name: 安装 Flutter 依赖
        working-directory: quwoquan_app
        run: flutter pub get
      - name: Run ${{ matrix.env }} on Android (self-hosted)
        run: |
          if [ "${{ inputs.matrix_kind }}" = "chat-avatar" ]; then
            python3 scripts/run_chat_avatar_device_matrix_ci.py --platform android
          else
            python3 scripts/run_assistant_device_matrix_ci.py --platform android
          fi
      - name: Upload Android matrix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-env-device-matrix-selfhosted-${{ inputs.matrix_kind }}-${{ matrix.env }}-android
          path: |
            artifacts/device-matrix/${{ matrix.env }}-android.json
            artifacts/device-matrix/assistant_device_matrix_logs/**
            artifacts/device-matrix/chat-avatar/**
          if-no-files-found: ignore

  ios:
    name: ${{ matrix.env }} / iOS (self-hosted)
    runs-on: self-hosted
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(inputs.env_json) }}
    env:
      API_CONTRACT_ENV: ${{ matrix.env }}
      GAMMA_BASE_URL: ${{ inputs.gamma_base_url || secrets.GAMMA_BASE_URL }}
      MEDIA_AVATAR_CDN_BASE_URL: ${{ inputs.media_base_url || vars.MEDIA_AVATAR_CDN_BASE_URL }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      ASSISTANT_MODEL_PROVIDER: deterministic
      ALLOW_DETERMINISTIC_BETA: "1"
      ASSISTANT_MATRIX_ALL_DEVICES: "1"
      CHAT_AVATAR_MATRIX_ALL_DEVICES: "1"
      IOS_DEVICE_ID: ${{ vars.IOS_DEVICE_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - name: Install Flutter (PATH)
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 flutter 并在 PATH 中"; exit 2; }
          flutter --version
      - name: 安装 Flutter 依赖
        working-directory: quwoquan_app
        run: flutter pub get
      - name: 选用已配置的 iOS 设备 / 模拟器 UDID
        if: runner.os == 'macOS' && vars.IOS_DEVICE_ID != ''
        run: echo "IOS_DEVICE_ID=${{ vars.IOS_DEVICE_ID }}" >> "$GITHUB_ENV"
      - name: Boot iOS simulator（未配置 vars.IOS_DEVICE_ID 时）
        if: runner.os == 'macOS' && vars.IOS_DEVICE_ID == ''
        run: |
          xcodebuild -version
          xcrun simctl list > /dev/null
          xcrun simctl list devices available --json > "$RUNNER_TEMP/ios-devices.json"
          IOS_DEVICE_ID="$(python3 - "$RUNNER_TEMP/ios-devices.json" <<'PY'
          import json
          import re
          import sys

          data = json.load(open(sys.argv[1], encoding="utf-8")).get("devices", {})
          devices = []
          for runtime, runtime_devices in data.items():
              match = re.search(r"iOS-(\d+(?:-\d+)*)$", runtime)
              if not match:
                  continue
              version = tuple(int(part) for part in match.group(1).split("-"))
              for index, device in enumerate(runtime_devices):
                  if not device.get("isAvailable") or not device.get("udid"):
                      continue
                  name = device.get("name", "")
                  prefer_phone = 1 if name.startswith("iPhone") else 0
                  prefer_current = 1 if name in {"iPhone 17 Pro", "iPhone 16 Pro", "iPhone 15 Pro"} else 0
                  devices.append((version, prefer_current, prefer_phone, -index, device["udid"]))
          if not devices:
              raise SystemExit("no available iOS simulator")
          devices.sort(reverse=True)
          print(devices[0][-1])
          PY
          )"
          xcrun simctl boot "$IOS_DEVICE_ID" || true
          xcrun simctl bootstatus "$IOS_DEVICE_ID" -b
          echo "IOS_DEVICE_ID=$IOS_DEVICE_ID" >> "$GITHUB_ENV"
          flutter devices
      - name: Run ${{ matrix.env }} on iOS (self-hosted)
        run: |
          if [ "${{ inputs.matrix_kind }}" = "chat-avatar" ]; then
            python3 scripts/run_chat_avatar_device_matrix_ci.py --platform ios
          else
            python3 scripts/run_assistant_device_matrix_ci.py --platform ios
          fi
      - name: Upload iOS matrix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-env-device-matrix-selfhosted-${{ inputs.matrix_kind }}-${{ matrix.env }}-ios
          path: |
            artifacts/device-matrix/${{ matrix.env }}-ios.json
            artifacts/device-matrix/assistant_device_matrix_logs/**
            artifacts/device-matrix/chat-avatar/**
          if-no-files-found: ignore
