# Self-hosted：统一设备矩阵入口（PR 主门禁 / workflow_call 复用 / 手动调试）。
# 固定到本机 macOS self-hosted runner，并通过 flutter devices --machine 动态发现当前可见的 Android/iOS 模拟器与真机。
# 发现到的每台设备都会执行；只要总设备数 >= 1 即可进入矩阵，不再依赖固定 device id。
name: 05. App Env Device Matrix

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      env_json:
        description: '矩阵环境 JSON 数组，例如 ["alpha","beta","gamma"] 或 ["gamma"]'
        required: true
        default: '["alpha","beta","gamma"]'
      allow_missing_platforms:
        description: '缺席平台是否允许跳过（已发现的平台仍必须成功）'
        required: false
        default: false
        type: boolean
      gamma_base_url:
        description: 可选覆盖 gamma 网关（默认 secrets.GAMMA_BASE_URL）
        required: false
        default: ''
      media_base_url:
        description: 可选覆盖媒体 CDN base（chat-avatar 矩阵使用）
        required: false
        default: ''
      matrix_kind:
        description: assistant 或 chat-avatar
        required: false
        default: assistant
  workflow_call:
    inputs:
      env_json:
        description: 'JSON array of environments'
        required: true
        type: string
      allow_missing_platforms:
        description: '是否允许缺席平台跳过'
        required: false
        type: boolean
        default: false
      gamma_base_url:
        description: '可选覆盖 gamma 网关（默认走 secrets.GAMMA_BASE_URL）'
        required: false
        type: string
        default: ''
      media_base_url:
        description: '可选覆盖媒体 CDN base'
        required: false
        type: string
        default: ''
      matrix_kind:
        description: 'assistant or chat-avatar'
        required: false
        type: string
        default: assistant

concurrency:
  group: app-env-device-matrix-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  discover_devices:
    name: Discover mobile devices (self-hosted)
    if: ${{ github.event_name != 'pull_request' || vars.ENABLE_SELF_HOSTED_MOBILE_MATRIX == 'true' }}
    runs-on: [self-hosted, macOS]
    outputs:
      duration_seconds: ${{ steps.finish.outputs.duration_seconds }}
      env_json: ${{ steps.discover.outputs.env_json }}
      allow_missing_platforms: ${{ steps.discover.outputs.allow_missing_platforms }}
      matrix_kind: ${{ steps.discover.outputs.matrix_kind }}
      gamma_base_url: ${{ steps.discover.outputs.gamma_base_url }}
      media_base_url: ${{ steps.discover.outputs.media_base_url }}
      has_android: ${{ steps.discover.outputs.has_android }}
      has_ios: ${{ steps.discover.outputs.has_ios }}
      android_count: ${{ steps.discover.outputs.android_count }}
      ios_count: ${{ steps.discover.outputs.ios_count }}
      device_summary: ${{ steps.discover.outputs.device_summary }}
    steps:
      - id: start
        name: Start timer
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
      - name: 解析当前触发下的矩阵默认值
        id: defaults
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ENV_JSON: ${{ inputs.env_json }}
          INPUT_ALLOW_MISSING_PLATFORMS: ${{ inputs.allow_missing_platforms }}
          INPUT_MATRIX_KIND: ${{ inputs.matrix_kind }}
          INPUT_GAMMA_BASE_URL: ${{ inputs.gamma_base_url }}
          INPUT_MEDIA_BASE_URL: ${{ inputs.media_base_url }}
        run: |
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            echo 'env_json=["alpha","beta"]' >> "$GITHUB_OUTPUT"
            echo 'allow_missing_platforms=true' >> "$GITHUB_OUTPUT"
            echo 'matrix_kind=assistant' >> "$GITHUB_OUTPUT"
            echo 'gamma_base_url=' >> "$GITHUB_OUTPUT"
            echo 'media_base_url=' >> "$GITHUB_OUTPUT"
          else
            echo "env_json=${INPUT_ENV_JSON}" >> "$GITHUB_OUTPUT"
            echo "allow_missing_platforms=${INPUT_ALLOW_MISSING_PLATFORMS:-false}" >> "$GITHUB_OUTPUT"
            echo "matrix_kind=${INPUT_MATRIX_KIND:-assistant}" >> "$GITHUB_OUTPUT"
            echo "gamma_base_url=${INPUT_GAMMA_BASE_URL}" >> "$GITHUB_OUTPUT"
            echo "media_base_url=${INPUT_MEDIA_BASE_URL}" >> "$GITHUB_OUTPUT"
          fi
      - name: 校验 self-hosted macOS runner
        run: |
          if [ "${{ runner.os }}" != "macOS" ]; then
            echo "::error::05 已统一要求运行在本机 macOS self-hosted runner，当前为 ${{ runner.os }}"
            exit 2
          fi
      - name: Install Flutter (PATH)
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 flutter 并在 PATH 中"; exit 2; }
          flutter --version
      - name: 发现当前 Mac 可见移动设备
        id: discover
        run: |
          python3 - "$RUNNER_TEMP/mobile-devices.json" "$GITHUB_OUTPUT" <<'PY'
          import json
          import subprocess
          import sys
          from pathlib import Path

          output_json, output_path = sys.argv[1], sys.argv[2]
          result = subprocess.run(
              ["flutter", "devices", "--machine"],
              cwd=str(Path.home()),
              text=True,
              capture_output=True,
              check=False,
          )
          if result.returncode != 0:
              sys.stderr.write("flutter devices --machine failed:\n")
              sys.stderr.write((result.stdout or "") + (result.stderr or ""))
              raise SystemExit(result.returncode)
          raw = result.stdout or ""
          start = raw.find("[")
          end = raw.rfind("]")
          if start < 0 or end < start:
              sys.stderr.write("flutter devices output missing JSON array\n")
              raise SystemExit(2)
          devices = json.loads(raw[start : end + 1])
          filtered = []
          for device in devices:
              target = str(device.get("targetPlatform", "")).lower()
              if target != "ios" and not target.startswith("android"):
                  continue
              device_id = str(device.get("id", "")).strip()
              if not device_id:
                  continue
              filtered.append(
                  {
                      "id": device_id,
                      "name": str(device.get("name", "")),
                      "targetPlatform": str(device.get("targetPlatform", "")),
                      "sdk": str(device.get("sdk", "")),
                      "emulator": bool(device.get("emulator", False)),
                      "ephemeral": bool(device.get("ephemeral", False)),
                  }
              )
          data = {
              "deviceCount": len(filtered),
              "android": [
                  item
                  for item in filtered
                  if str(item.get("targetPlatform", "")).lower().startswith("android")
              ],
              "ios": [
                  item
                  for item in filtered
                  if str(item.get("targetPlatform", "")).lower() == "ios"
              ],
              "devices": filtered,
          }
          Path(output_json).write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          android = data.get("android") or []
          ios = data.get("ios") or []
          env_json = """${{ steps.defaults.outputs.env_json }}"""
          matrix_kind = """${{ steps.defaults.outputs.matrix_kind }}"""
          gamma_base_url = """${{ steps.defaults.outputs.gamma_base_url }}"""
          media_base_url = """${{ steps.defaults.outputs.media_base_url }}"""

          def fmt(items):
              return ", ".join(f'{item["name"]}({item["id"]})' for item in items)

          summary_parts = []
          if android:
              summary_parts.append(f'android[{len(android)}]: {fmt(android)}')
          if ios:
              summary_parts.append(f'ios[{len(ios)}]: {fmt(ios)}')
          summary = "；".join(summary_parts) if summary_parts else "未发现 iOS/Android 设备"

          with open(output_path, "a", encoding="utf-8") as fh:
              print(f'env_json={env_json}', file=fh)
              print(
                  'allow_missing_platforms=${{ steps.defaults.outputs.allow_missing_platforms }}',
                  file=fh,
              )
              print(f'matrix_kind={matrix_kind}', file=fh)
              print(f'gamma_base_url={gamma_base_url}', file=fh)
              print(f'media_base_url={media_base_url}', file=fh)
              print(f'has_android={"true" if android else "false"}', file=fh)
              print(f'has_ios={"true" if ios else "false"}', file=fh)
              print(f'android_count={len(android)}', file=fh)
              print(f'ios_count={len(ios)}', file=fh)
              print("device_summary<<EOF", file=fh)
              print(summary, file=fh)
              print("EOF", file=fh)

          print(f"::notice::self-hosted mobile devices => {summary}")
          PY
          python3 - "$RUNNER_TEMP/mobile-devices.json" <<'PY'
          import json
          import sys
          data = json.load(open(sys.argv[1], encoding="utf-8"))
          if int(data.get("deviceCount", 0)) == 0:
              raise SystemExit(2)
          PY
      - id: finish
        if: always()
        name: Finish timer
        run: |
          started_at="${{ steps.start.outputs.started_at }}"
          if [ -n "${started_at}" ]; then
            echo "duration_seconds=$(( $(date +%s) - started_at ))" >> "$GITHUB_OUTPUT"
          else
            echo "duration_seconds=0" >> "$GITHUB_OUTPUT"
          fi

  mobile_matrix:
    name: Mobile matrix (self-hosted)
    needs: [discover_devices]
    if: ${{ needs.discover_devices.outputs.has_android == 'true' || needs.discover_devices.outputs.has_ios == 'true' }}
    runs-on: [self-hosted, macOS]
    timeout-minutes: 120
    outputs:
      duration_seconds: ${{ steps.finish.outputs.duration_seconds }}
      android_result: ${{ steps.run_matrix.outputs.android_result }}
      ios_result: ${{ steps.run_matrix.outputs.ios_result }}
    env:
      GAMMA_BASE_URL: ${{ needs.discover_devices.outputs.gamma_base_url || secrets.GAMMA_BASE_URL }}
      MEDIA_AVATAR_CDN_BASE_URL: ${{ needs.discover_devices.outputs.media_base_url || vars.MEDIA_AVATAR_CDN_BASE_URL }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      ASSISTANT_MODEL_PROVIDER: deterministic
      ALLOW_DETERMINISTIC_BETA: "1"
      ASSISTANT_MATRIX_ALL_DEVICES: "1"
      CHAT_AVATAR_MATRIX_ALL_DEVICES: "1"
    steps:
      - id: start
        name: Start timer
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
      - name: 准备缓存工作树
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CACHE_ROOT="${HOME}/.cache/quwoquan-mobile-matrix"
          REPO_DIR="${CACHE_ROOT}/repo"
          AUTH_HEADER="$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64)"
          sync_repo() {
            mkdir -p "${REPO_DIR}"
            if [ ! -d "${REPO_DIR}/.git" ]; then
              rm -rf "${REPO_DIR}"
              git init "${REPO_DIR}"
              git -C "${REPO_DIR}" remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
            fi
            git -C "${REPO_DIR}" remote set-url origin "https://github.com/${GITHUB_REPOSITORY}.git"
            git -C "${REPO_DIR}" config --local gc.auto 0
            git -C "${REPO_DIR}" sparse-checkout init --cone
            git -C "${REPO_DIR}" sparse-checkout set .gitmodules scripts packages quwoquan_app quwoquan_service
            git -C "${REPO_DIR}" -c http.https://github.com/.extraheader="AUTHORIZATION: basic ${AUTH_HEADER}" fetch --depth=1 --filter=blob:none origin "${GITHUB_SHA}"
            git -C "${REPO_DIR}" checkout --force --detach FETCH_HEAD
            git -C "${REPO_DIR}" clean -ffd
          }
          mkdir -p "${CACHE_ROOT}"
          if ! sync_repo; then
            echo "::warning::cached repo sync failed, rebuilding local repo cache"
            rm -rf "${REPO_DIR}"
            sync_repo
          fi
          rm -rf "${GITHUB_WORKSPACE}/repo"
          ln -s "${REPO_DIR}" "${GITHUB_WORKSPACE}/repo"
      - name: 记录发现结果
        run: |
          echo "Android devices: ${{ needs.discover_devices.outputs.android_count }}"
          echo "iOS devices: ${{ needs.discover_devices.outputs.ios_count }}"
          echo "${{ needs.discover_devices.outputs.device_summary }}"
      - name: 校验 self-hosted macOS runner
        run: |
          if [ "${{ runner.os }}" != "macOS" ]; then
            echo "::error::05 已统一要求运行在本机 macOS self-hosted runner，当前为 ${{ runner.os }}"
            exit 2
          fi
      - name: 准备 personal_assistant/.env
        working-directory: ${{ github.workspace }}/repo
        run: |
          if [ -d quwoquan_app/personal_assistant ]; then
            mkdir -p quwoquan_app/personal_assistant
            if [ -f quwoquan_app/personal_assistant/.env.example ]; then
              cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
            else
              : > quwoquan_app/personal_assistant/.env
            fi
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - name: Install Flutter (PATH)
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 flutter 并在 PATH 中"; exit 2; }
          command -v adb >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 adb 并在 PATH 中"; exit 2; }
          command -v xcrun >/dev/null 2>&1 || { echo "::error::self-hosted runner 需具备 Xcode / xcrun"; exit 2; }
          flutter --version
      - name: 安装 Flutter 依赖
        working-directory: ${{ github.workspace }}/repo/quwoquan_app
        run: flutter pub get
      - id: run_matrix
        name: Run mobile matrix environments
        working-directory: ${{ github.workspace }}/repo
        run: |
          ENV_NAMES="$(python3 - <<'PY'
          import json
          print("\n".join(json.loads("""${{ needs.discover_devices.outputs.env_json }}""")))
          PY
          )"
          failures=0
          android_result="skipped"
          ios_result="skipped"
          run_platform_envs() {
            local platform="$1"
            local result_var="$2"
            local step_failures=0
            while IFS= read -r env_name; do
              [ -n "${env_name}" ] || continue
              echo "::group::Run ${env_name} on ${platform} (self-hosted)"
              export API_CONTRACT_ENV="${env_name}"
              if [ "${{ needs.discover_devices.outputs.matrix_kind }}" = "chat-avatar" ]; then
                python3 scripts/run_chat_avatar_device_matrix_ci.py --platform "${platform}" || step_failures=$((step_failures + 1))
              else
                python3 scripts/run_assistant_device_matrix_ci.py --platform "${platform}" || step_failures=$((step_failures + 1))
              fi
              echo "::endgroup::"
            done <<EOF
          ${ENV_NAMES}
          EOF
            if [ "${step_failures}" -ne 0 ]; then
              printf -v "${result_var}" '%s' "failure"
              failures=$((failures + step_failures))
            else
              printf -v "${result_var}" '%s' "success"
            fi
          }
          if [ "${{ needs.discover_devices.outputs.has_android }}" = "true" ]; then
            run_platform_envs android android_result
          else
            echo "::notice::No Android device discovered for this run; Android matrix skipped."
          fi
          if [ "${{ needs.discover_devices.outputs.has_ios }}" = "true" ]; then
            run_platform_envs ios ios_result
          else
            echo "::notice::No iOS device discovered for this run; iOS matrix skipped."
          fi
          echo "android_result=${android_result}" >> "$GITHUB_OUTPUT"
          echo "ios_result=${ios_result}" >> "$GITHUB_OUTPUT"
          if [ "${failures}" -ne 0 ]; then
            echo "::error::Mobile matrix encountered ${failures} failing environment(s)"
            exit 1
          fi
      - name: Upload mobile matrix report
        id: upload_mobile_matrix_report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: app-env-device-matrix-${{ needs.discover_devices.outputs.matrix_kind }}-mobile
          path: |
            ${{ github.workspace }}/repo/artifacts/device-matrix/*-android.json
            ${{ github.workspace }}/repo/artifacts/device-matrix/*-ios.json
            ${{ github.workspace }}/repo/artifacts/device-matrix/assistant_device_matrix_logs/**
            ${{ github.workspace }}/repo/artifacts/device-matrix/chat-avatar/**
          if-no-files-found: ignore
          compression-level: 0
      - name: Retry mobile matrix report upload
        if: always() && steps.upload_mobile_matrix_report.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: app-env-device-matrix-${{ needs.discover_devices.outputs.matrix_kind }}-mobile
          path: |
            ${{ github.workspace }}/repo/artifacts/device-matrix/*-android.json
            ${{ github.workspace }}/repo/artifacts/device-matrix/*-ios.json
            ${{ github.workspace }}/repo/artifacts/device-matrix/assistant_device_matrix_logs/**
            ${{ github.workspace }}/repo/artifacts/device-matrix/chat-avatar/**
          if-no-files-found: ignore
          compression-level: 0
          overwrite: true
      - id: finish
        if: always()
        name: Finish timer
        run: |
          started_at="${{ steps.start.outputs.started_at }}"
          if [ -n "${started_at}" ]; then
            echo "duration_seconds=$(( $(date +%s) - started_at ))" >> "$GITHUB_OUTPUT"
          else
            echo "duration_seconds=0" >> "$GITHUB_OUTPUT"
          fi

  app_env_device_matrix_summary:
    name: 05. App Env Device Matrix
    needs:
      - discover_devices
      - mobile_matrix
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 输出 App Env Device Matrix 耗时摘要
        env:
          SELF_HOSTED_ENABLED: ${{ github.event_name != 'pull_request' || vars.ENABLE_SELF_HOSTED_MOBILE_MATRIX == 'true' }}
          DISCOVER_SECONDS: ${{ needs.discover_devices.outputs.duration_seconds }}
          MOBILE_SECONDS: ${{ needs.mobile_matrix.outputs.duration_seconds }}
        run: |
          if [ "${SELF_HOSTED_ENABLED}" != "true" ]; then
            python3 scripts/render_ci_timing_summary.py \
              --gate-key 05.app_env_device_matrix_pr \
              --title "05. App Env Device Matrix" \
              --critical-path-seconds 0 \
              --phase "pr_default_skip=0" \
              --note "PR 默认跳过 self-hosted mobile matrix；启用后以 discover + 设备矩阵 artifacts 为准。" \
              --write-step-summary
          else
            CRITICAL_PATH_SECONDS=$(( ${DISCOVER_SECONDS:-0} + ${MOBILE_SECONDS:-0} ))
            python3 scripts/render_ci_timing_summary.py \
              --gate-key 05.app_env_device_matrix_pr \
              --title "05. App Env Device Matrix" \
              --critical-path-seconds "${CRITICAL_PATH_SECONDS:-0}" \
              --phase "discover_devices=${DISCOVER_SECONDS:-0}" \
              --phase "mobile_matrix=${MOBILE_SECONDS:-0}" \
              --note "self-hosted matrix 已统一为单 runner 单 checkout 的 mobile job；PR 默认允许缺席平台跳过，已发现的平台必须成功，详细耗时保存在 device-matrix artifacts。" \
              --write-step-summary
          fi
      - name: 汇总并阻断失败项
        env:
          SELF_HOSTED_ENABLED: ${{ github.event_name != 'pull_request' || vars.ENABLE_SELF_HOSTED_MOBILE_MATRIX == 'true' }}
          DISCOVER: ${{ needs.discover_devices.result }}
          ANDROID: ${{ needs.mobile_matrix.outputs.android_result }}
          IOS: ${{ needs.mobile_matrix.outputs.ios_result }}
          HAS_ANDROID: ${{ needs.discover_devices.outputs.has_android }}
          HAS_IOS: ${{ needs.discover_devices.outputs.has_ios }}
          ALLOW_MISSING_PLATFORMS: ${{ needs.discover_devices.outputs.allow_missing_platforms }}
        run: |
          set -euo pipefail
          args=()
          if [ "${ALLOW_MISSING_PLATFORMS}" = "true" ]; then
            args+=(--allow-missing-platforms)
          fi
          python3 scripts/check_device_matrix_gate.py \
            --discover-result "${DISCOVER}" \
            --android-result "${ANDROID}" \
            --ios-result "${IOS}" \
            --has-android "${HAS_ANDROID}" \
            --has-ios "${HAS_IOS}" \
            "${args[@]}"
      - name: 下载设备矩阵 artifacts
        if: ${{ always() && (github.event_name != 'pull_request' || vars.ENABLE_SELF_HOSTED_MOBILE_MATRIX == 'true') }}
        uses: actions/download-artifact@v4
        with:
          pattern: app-env-device-matrix-*
          path: ${{ runner.temp }}/app-env-device-matrix-artifacts
      - name: 校验设备矩阵证据产物
        if: ${{ always() && (github.event_name != 'pull_request' || vars.ENABLE_SELF_HOSTED_MOBILE_MATRIX == 'true') }}
        run: |
          python3 scripts/verify_device_matrix_evidence.py \
            --artifact-root "${RUNNER_TEMP}/app-env-device-matrix-artifacts" \
            --report-glob "**/*-android.json" \
            --report-glob "**/*-ios.json"
