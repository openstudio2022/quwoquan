# Self-hosted：统一设备矩阵入口（merge queue 阻断 / workflow_call 复用 / 手动调试）。
# 固定到本机 macOS self-hosted runner，并通过 flutter devices --machine 动态发现当前可见的 Android/iOS 模拟器与真机。
# 发现到的每台设备都会执行；只要总设备数 >= 1 即可进入矩阵，不再依赖固定 device id。
name: 05. App Env Device Matrix

on:
  merge_group:
    types:
      - checks_requested
  workflow_dispatch:
    inputs:
      env_json:
        description: '矩阵环境 JSON 数组，例如 ["alpha","beta","gamma"] 或 ["gamma"]'
        required: true
        default: '["alpha","beta","gamma"]'
      gamma_base_url:
        description: 可选覆盖 gamma 网关（默认 secrets.GAMMA_BASE_URL）
        required: false
        default: ''
      media_base_url:
        description: 可选覆盖媒体 CDN base（chat-avatar 矩阵使用）
        required: false
        default: ''
      matrix_kind:
        description: assistant 或 chat-avatar
        required: false
        default: assistant
  workflow_call:
    inputs:
      env_json:
        description: 'JSON array of environments'
        required: true
        type: string
      gamma_base_url:
        description: '可选覆盖 gamma 网关（默认走 secrets.GAMMA_BASE_URL）'
        required: false
        type: string
        default: ''
      media_base_url:
        description: '可选覆盖媒体 CDN base'
        required: false
        type: string
        default: ''
      matrix_kind:
        description: 'assistant or chat-avatar'
        required: false
        type: string
        default: assistant

jobs:
  discover_devices:
    name: Discover mobile devices (self-hosted)
    runs-on: [self-hosted, macOS]
    outputs:
      env_json: ${{ steps.discover.outputs.env_json }}
      matrix_kind: ${{ steps.discover.outputs.matrix_kind }}
      gamma_base_url: ${{ steps.discover.outputs.gamma_base_url }}
      media_base_url: ${{ steps.discover.outputs.media_base_url }}
      has_android: ${{ steps.discover.outputs.has_android }}
      has_ios: ${{ steps.discover.outputs.has_ios }}
      android_count: ${{ steps.discover.outputs.android_count }}
      ios_count: ${{ steps.discover.outputs.ios_count }}
      device_summary: ${{ steps.discover.outputs.device_summary }}
    steps:
      - uses: actions/checkout@v4
      - name: 校验 self-hosted macOS runner
        run: |
          if [ "${{ runner.os }}" != "macOS" ]; then
            echo "::error::05 已统一要求运行在本机 macOS self-hosted runner，当前为 ${{ runner.os }}"
            exit 2
          fi
      - name: Install Flutter (PATH)
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 flutter 并在 PATH 中"; exit 2; }
          flutter --version
      - name: 发现当前 Mac 可见移动设备
        id: discover
        run: |
          python3 scripts/discover_flutter_mobile_devices.py \
            --output "$RUNNER_TEMP/mobile-devices.json" \
            --require-mobile
          python3 - "$RUNNER_TEMP/mobile-devices.json" "$GITHUB_OUTPUT" <<'PY'
          import json
          import sys

          path, output_path = sys.argv[1], sys.argv[2]
          data = json.load(open(path, encoding="utf-8"))
          android = data.get("android") or []
          ios = data.get("ios") or []
          env_json = """${{ github.event_name == 'merge_group' && '["alpha","beta"]' || inputs.env_json }}"""
          matrix_kind = """${{ github.event_name == 'merge_group' && 'assistant' || inputs.matrix_kind }}"""
          gamma_base_url = """${{ inputs.gamma_base_url }}"""
          media_base_url = """${{ inputs.media_base_url }}"""

          def fmt(items):
              return ", ".join(f'{item["name"]}({item["id"]})' for item in items)

          summary_parts = []
          if android:
              summary_parts.append(f'android[{len(android)}]: {fmt(android)}')
          if ios:
              summary_parts.append(f'ios[{len(ios)}]: {fmt(ios)}')
          summary = "；".join(summary_parts) if summary_parts else "未发现 iOS/Android 设备"

          with open(output_path, "a", encoding="utf-8") as fh:
              print(f'env_json={env_json}', file=fh)
              print(f'matrix_kind={matrix_kind}', file=fh)
              print(f'gamma_base_url={gamma_base_url}', file=fh)
              print(f'media_base_url={media_base_url}', file=fh)
              print(f'has_android={"true" if android else "false"}', file=fh)
              print(f'has_ios={"true" if ios else "false"}', file=fh)
              print(f'android_count={len(android)}', file=fh)
              print(f'ios_count={len(ios)}', file=fh)
              print("device_summary<<EOF", file=fh)
              print(summary, file=fh)
              print("EOF", file=fh)

          print(f"::notice::self-hosted mobile devices => {summary}")
          PY

  android:
    name: ${{ matrix.env }} / Android (self-hosted)
    needs: [discover_devices]
    if: ${{ needs.discover_devices.outputs.has_android == 'true' }}
    runs-on: [self-hosted, macOS]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.discover_devices.outputs.env_json) }}
    env:
      API_CONTRACT_ENV: ${{ matrix.env }}
      GAMMA_BASE_URL: ${{ needs.discover_devices.outputs.gamma_base_url || secrets.GAMMA_BASE_URL }}
      MEDIA_AVATAR_CDN_BASE_URL: ${{ needs.discover_devices.outputs.media_base_url || vars.MEDIA_AVATAR_CDN_BASE_URL }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      ASSISTANT_MODEL_PROVIDER: deterministic
      ALLOW_DETERMINISTIC_BETA: "1"
      ASSISTANT_MATRIX_ALL_DEVICES: "1"
      CHAT_AVATAR_MATRIX_ALL_DEVICES: "1"
    steps:
      - uses: actions/checkout@v4
      - name: 记录发现结果
        run: |
          echo "Android devices: ${{ needs.discover_devices.outputs.android_count }}"
          echo "${{ needs.discover_devices.outputs.device_summary }}"
      - name: 校验 self-hosted macOS runner
        run: |
          if [ "${{ runner.os }}" != "macOS" ]; then
            echo "::error::Android 端侧矩阵已统一到本机 macOS self-hosted runner，当前为 ${{ runner.os }}"
            exit 2
          fi
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - name: Install Flutter (PATH)
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 flutter 并在 PATH 中"; exit 2; }
          command -v adb >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 adb 并在 PATH 中"; exit 2; }
          flutter --version
      - name: 安装 Flutter 依赖
        working-directory: quwoquan_app
        run: flutter pub get
      - name: Run ${{ matrix.env }} on Android (self-hosted)
        run: |
          if [ "${{ needs.discover_devices.outputs.matrix_kind }}" = "chat-avatar" ]; then
            python3 scripts/run_chat_avatar_device_matrix_ci.py --platform android
          else
            python3 scripts/run_assistant_device_matrix_ci.py --platform android
          fi
      - name: Upload Android matrix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-env-device-matrix-${{ needs.discover_devices.outputs.matrix_kind }}-${{ matrix.env }}-android
          path: |
            artifacts/device-matrix/${{ matrix.env }}-android.json
            artifacts/device-matrix/assistant_device_matrix_logs/**
            artifacts/device-matrix/chat-avatar/**
          if-no-files-found: ignore

  ios:
    name: ${{ matrix.env }} / iOS (self-hosted)
    needs: [discover_devices]
    if: ${{ needs.discover_devices.outputs.has_ios == 'true' }}
    runs-on: [self-hosted, macOS]
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        env: ${{ fromJson(needs.discover_devices.outputs.env_json) }}
    env:
      API_CONTRACT_ENV: ${{ matrix.env }}
      GAMMA_BASE_URL: ${{ needs.discover_devices.outputs.gamma_base_url || secrets.GAMMA_BASE_URL }}
      MEDIA_AVATAR_CDN_BASE_URL: ${{ needs.discover_devices.outputs.media_base_url || vars.MEDIA_AVATAR_CDN_BASE_URL }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      ASSISTANT_MODEL_PROVIDER: deterministic
      ALLOW_DETERMINISTIC_BETA: "1"
      ASSISTANT_MATRIX_ALL_DEVICES: "1"
      CHAT_AVATAR_MATRIX_ALL_DEVICES: "1"
    steps:
      - uses: actions/checkout@v4
      - name: 记录发现结果
        run: |
          echo "iOS devices: ${{ needs.discover_devices.outputs.ios_count }}"
          echo "${{ needs.discover_devices.outputs.device_summary }}"
      - name: 校验 self-hosted macOS runner
        run: |
          if [ "${{ runner.os }}" != "macOS" ]; then
            echo "::error::iOS 端侧矩阵已统一到本机 macOS self-hosted runner，当前为 ${{ runner.os }}"
            exit 2
          fi
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - name: Install Flutter (PATH)
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 flutter 并在 PATH 中"; exit 2; }
          command -v xcrun >/dev/null 2>&1 || { echo "::error::self-hosted runner 需具备 Xcode / xcrun"; exit 2; }
          flutter --version
      - name: 安装 Flutter 依赖
        working-directory: quwoquan_app
        run: flutter pub get
      - name: Run ${{ matrix.env }} on iOS (self-hosted)
        run: |
          if [ "${{ needs.discover_devices.outputs.matrix_kind }}" = "chat-avatar" ]; then
            python3 scripts/run_chat_avatar_device_matrix_ci.py --platform ios
          else
            python3 scripts/run_assistant_device_matrix_ci.py --platform ios
          fi
      - name: Upload iOS matrix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-env-device-matrix-${{ needs.discover_devices.outputs.matrix_kind }}-${{ matrix.env }}-ios
          path: |
            artifacts/device-matrix/${{ matrix.env }}-ios.json
            artifacts/device-matrix/assistant_device_matrix_logs/**
            artifacts/device-matrix/chat-avatar/**
          if-no-files-found: ignore
