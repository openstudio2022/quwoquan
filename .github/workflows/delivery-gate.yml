# Delivery Gate — PR/合并入库阶段质量门（L1+L2）
# 触发：PR、push → dev1.0/main
# 职责：拓扑校验 + metadata + L1(Flutter) + L2(Go contract)
# 端到端闭环见 deploy/shared/ci_cd_end_to_end_design.md
name: 03. Delivery Gate

on:
  pull_request:
  push:
    branches:
      - dev1.0
      - main

jobs:
  topology_regression:
    name: Delivery Gate — Topology
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Environment Topology Regression
        run: |
          bash scripts/verify_deployment_domain_mapping.sh
          bash scripts/verify_topology_contract_regression.sh
          bash scripts/report_deployment_mapping_impact.sh

  quwoquan_service:
    name: Delivery Gate — Service (L2)
    runs-on: ubuntu-latest
    needs: topology_regression
    steps:
      - uses: actions/checkout@v4
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - name: 设置 Dart
        uses: dart-lang/setup-dart@v1
      - name: 安装 kustomize
        uses: syntaqx/setup-kustomize@v1
      - name: 安装 Python 依赖 (rec-model-service)
        run: |
          pip install -r quwoquan_service/services/rec-model-service/requirements.txt
      - name: Gate (quwoquan_service)
        run: |
          bash scripts/gate_repo.sh --scope service

  quwoquan_app:
    name: Delivery Gate — App (L1)
    runs-on: ubuntu-latest
    needs: topology_regression
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env（CI 无 .gitignore 的 .env）
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Gate (quwoquan_app)
        run: |
          bash scripts/gate_repo.sh --scope app

  ops_portal:
    name: Delivery Gate — Ops Portal
    runs-on: ubuntu-latest
    needs: topology_regression
    steps:
      - uses: actions/checkout@v4
      - name: 设置 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
      - name: Gate (ops-portal)
        run: |
          bash scripts/gate_repo.sh --scope portal
