# Delivery Gate — PR 合入主门禁（L1+L2）
# 触发：pull_request(main) + workflow_dispatch
# 职责：拓扑校验 + metadata + L1(Flutter) + L2(Go contract) + portal
# 端到端闭环见 deploy/shared/ci_cd_end_to_end_design.md
name: 03. Delivery Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  topology_regression:
    name: Delivery Gate — Topology
    runs-on: ubuntu-latest
    outputs:
      duration_seconds: ${{ steps.finish.outputs.duration_seconds }}
      service: ${{ steps.detect.outputs.service }}
      app: ${{ steps.detect.outputs.app }}
      portal: ${{ steps.detect.outputs.portal }}
      topology: ${{ steps.detect.outputs.topology }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: start
        name: Start timer
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
      - id: detect
        name: Detect impacted scopes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python3 agent_ops/ci/detect_ci_impacted_scopes.py \
            --base-sha "${BASE_SHA}" \
            --head-sha "${HEAD_SHA}" \
            --github-output "$GITHUB_OUTPUT"
      - name: Environment Topology Regression
        if: ${{ steps.detect.outputs.topology == 'true' }}
        run: |
          bash quwoquan_service/scripts/deploy/verify_deployment_domain_mapping.sh
          bash quwoquan_service/scripts/deploy/verify_topology_contract_regression.sh
          bash quwoquan_service/scripts/deploy/report_deployment_mapping_impact.sh
      - id: finish
        if: always()
        name: Finish timer
        run: |
          echo "duration_seconds=$(( $(date +%s) - ${{ steps.start.outputs.started_at }} ))" >> "$GITHUB_OUTPUT"

  quwoquan_service:
    name: Delivery Gate — Service (L2)
    runs-on: ubuntu-latest
    needs: topology_regression
    if: ${{ needs.topology_regression.outputs.service == 'true' }}
    outputs:
      duration_seconds: ${{ steps.finish.outputs.duration_seconds }}
    steps:
      - uses: actions/checkout@v4
      - id: start
        name: Start timer
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - name: 设置 Dart
        uses: dart-lang/setup-dart@v1
      - name: 安装 kustomize
        run: bash agent_ops/deploy/shared/install_kustomize.sh
      - name: 安装 Python 依赖 (rec-model-service)
        run: |
          pip install -r quwoquan_service/services/rec-model-service/requirements.txt
      - name: Gate (quwoquan_service)
        run: |
          bash agent_ops/gate/gate_repo.sh --scope service
      - id: finish
        if: always()
        name: Finish timer
        run: |
          echo "duration_seconds=$(( $(date +%s) - ${{ steps.start.outputs.started_at }} ))" >> "$GITHUB_OUTPUT"

  quwoquan_app:
    name: Delivery Gate — App (L1)
    runs-on: ubuntu-latest
    needs: topology_regression
    if: ${{ needs.topology_regression.outputs.app == 'true' }}
    outputs:
      duration_seconds: ${{ steps.finish.outputs.duration_seconds }}
    steps:
      - uses: actions/checkout@v4
      - id: start
        name: Start timer
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
      - name: 准备 personal_assistant/.env（CI 无 .gitignore 的 .env）
        run: |
          if [ -d quwoquan_app/personal_assistant ]; then
            mkdir -p quwoquan_app/personal_assistant
            if [ -f quwoquan_app/personal_assistant/.env.example ]; then
              cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
            else
              : > quwoquan_app/personal_assistant/.env
            fi
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Gate (quwoquan_app)
        run: |
          bash agent_ops/gate/gate_repo.sh --scope app
      - id: finish
        if: always()
        name: Finish timer
        run: |
          echo "duration_seconds=$(( $(date +%s) - ${{ steps.start.outputs.started_at }} ))" >> "$GITHUB_OUTPUT"

  ops_portal:
    name: Delivery Gate — Ops Portal
    runs-on: ubuntu-latest
    needs: topology_regression
    if: ${{ needs.topology_regression.outputs.portal == 'true' }}
    outputs:
      duration_seconds: ${{ steps.finish.outputs.duration_seconds }}
    steps:
      - uses: actions/checkout@v4
      - id: start
        name: Start timer
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
      - name: 设置 Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"
          cache: npm
      - name: Gate (ops-portal)
        run: |
          bash agent_ops/gate/gate_repo.sh --scope portal
      - id: finish
        if: always()
        name: Finish timer
        run: |
          echo "duration_seconds=$(( $(date +%s) - ${{ steps.start.outputs.started_at }} ))" >> "$GITHUB_OUTPUT"

  delivery_gate_summary:
    name: 03. Delivery Gate
    needs:
      - topology_regression
      - quwoquan_service
      - quwoquan_app
      - ops_portal
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 输出 Delivery Gate 耗时摘要
        env:
          TOPOLOGY_SECONDS: ${{ needs.topology_regression.outputs.duration_seconds }}
          SERVICE_SECONDS: ${{ needs.quwoquan_service.outputs.duration_seconds }}
          APP_SECONDS: ${{ needs.quwoquan_app.outputs.duration_seconds }}
          PORTAL_SECONDS: ${{ needs.ops_portal.outputs.duration_seconds }}
        run: |
          TOPOLOGY_SECONDS="${TOPOLOGY_SECONDS:-0}"
          SERVICE_SECONDS="${SERVICE_SECONDS:-0}"
          APP_SECONDS="${APP_SECONDS:-0}"
          PORTAL_SECONDS="${PORTAL_SECONDS:-0}"
          FANOUT_SECONDS="${SERVICE_SECONDS}"
          if [ "${APP_SECONDS}" -gt "${FANOUT_SECONDS}" ]; then FANOUT_SECONDS="${APP_SECONDS}"; fi
          if [ "${PORTAL_SECONDS}" -gt "${FANOUT_SECONDS}" ]; then FANOUT_SECONDS="${PORTAL_SECONDS}"; fi
          CRITICAL_PATH_SECONDS=$(( TOPOLOGY_SECONDS + FANOUT_SECONDS ))
          python3 agent_ops/ci/render_ci_timing_summary.py \
            --gate-key 03.delivery_gate \
            --title "03. Delivery Gate" \
            --critical-path-seconds "${CRITICAL_PATH_SECONDS}" \
            --phase "topology_regression=${TOPOLOGY_SECONDS}" \
            --phase "quwoquan_service=${SERVICE_SECONDS}" \
            --phase "quwoquan_app=${APP_SECONDS}" \
            --phase "ops_portal=${PORTAL_SECONDS}" \
            --write-step-summary
      - name: 汇总并阻断失败项
        env:
          TOPOLOGY: ${{ needs.topology_regression.result }}
          SERVICE: ${{ needs.quwoquan_service.result }}
          APP: ${{ needs.quwoquan_app.result }}
          PORTAL: ${{ needs.ops_portal.result }}
        run: |
          set -euo pipefail
          fail=0
          expect_success() {
            local name="$1" val="$2" hint="$3"
            if [ "${val}" != "success" ]; then
              echo "::error::${name} expected success, got ${val}. ${hint}"
              fail=1
            fi
          }
          expect_success_or_skipped() {
            local name="$1" val="$2" hint="$3"
            if [ "${val}" != "success" ] && [ "${val}" != "skipped" ]; then
              echo "::error::${name} expected success/skipped, got ${val}. ${hint}"
              fail=1
            fi
          }
          expect_success "topology_regression" "${TOPOLOGY}" "检查部署拓扑 / metadata 回归脚本"
          expect_success_or_skipped "quwoquan_service" "${SERVICE}" "检查 service scope gate 输出"
          expect_success_or_skipped "quwoquan_app" "${APP}" "检查 app scope gate 输出"
          expect_success_or_skipped "ops_portal" "${PORTAL}" "检查 portal scope gate 输出"
          if [ "${fail}" -ne 0 ]; then
            echo "::error::Delivery Gate 未全部成功；请按上列分项修复后重跑。"
            exit 1
          fi
