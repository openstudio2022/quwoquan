name: Gamma PR Hosted Core

on:
  workflow_call:
    outputs:
      base_url:
        description: Gamma gateway base URL
        value: ${{ jobs.resolve_gamma_urls.outputs.base_url }}
      product_ops_base_url:
        description: Gamma product ops base URL
        value: ${{ jobs.resolve_gamma_urls.outputs.product_ops_base_url }}
      media_base_url:
        description: Gamma media base URL
        value: ${{ jobs.resolve_gamma_urls.outputs.media_base_url }}
      readiness_duration_seconds:
        description: Gamma readiness duration
        value: ${{ jobs.gamma_environment_ready.outputs.duration_seconds }}
      assistant_protocol_smoke_duration_seconds:
        description: Assistant protocol smoke duration
        value: ${{ jobs.assistant_runtime_protocol_smoke.outputs.duration_seconds }}
      chat_avatar_probe_duration_seconds:
        description: Chat avatar probe duration
        value: ${{ jobs.gamma_chat_avatar_api_probe_pre.outputs.duration_seconds }}
      critical_path_seconds:
        description: PR hosted critical path seconds
        value: ${{ jobs.pr_hosted_summary.outputs.critical_path_seconds }}

jobs:
  resolve_gamma_urls:
    name: Resolve gamma URLs
    runs-on: ubuntu-latest
    outputs:
      base_url: ${{ steps.urls.outputs.base_url }}
      product_ops_base_url: ${{ steps.urls.outputs.product_ops_base_url }}
      media_base_url: ${{ steps.urls.outputs.media_base_url }}
    steps:
      - name: Resolve gamma URLs
        id: urls
        run: |
          PUBLIC_HOST="${GAMMA_ECS_PUBLIC_HOST:-118.31.239.122}"
          BASE_URL="${GAMMA_BASE_URL:-http://${PUBLIC_HOST}:18000}"
          PRODUCT_OPS_BASE_URL="${GAMMA_PRODUCT_OPS_BASE_URL:-http://${PUBLIC_HOST}:18086}"
          MEDIA_BASE_URL="${MEDIA_AVATAR_CDN_BASE_URL:-${BASE_URL}}"
          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "product_ops_base_url=${PRODUCT_OPS_BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "media_base_url=${MEDIA_BASE_URL}" >> "$GITHUB_OUTPUT"
        env:
          GAMMA_ECS_PUBLIC_HOST: ${{ vars.GAMMA_ECS_PUBLIC_HOST || vars.GAMMA_ECS_HOST }}
          GAMMA_BASE_URL: ${{ vars.GAMMA_BASE_URL }}
          GAMMA_PRODUCT_OPS_BASE_URL: ${{ vars.GAMMA_PRODUCT_OPS_BASE_URL }}
          MEDIA_AVATAR_CDN_BASE_URL: ${{ vars.MEDIA_AVATAR_CDN_BASE_URL }}

  gamma_environment_ready:
    name: Gamma environment readiness
    needs: [resolve_gamma_urls]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      duration_seconds: ${{ steps.finish.outputs.duration_seconds }}
    steps:
      - uses: actions/checkout@v4
      - id: start
        name: Start timer
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
      - id: readiness_probe
        name: Verify gamma environment readiness
        continue-on-error: true
        run: |
          python3 quwoquan_service/scripts/gamma/verify_gamma_environment_ready.py \
            --base-url "${GAMMA_BASE_URL}" \
            --product-ops-base-url "${GAMMA_PRODUCT_OPS_BASE_URL}" \
            --report artifacts/gamma-readiness/pr/report.json \
            --wait-seconds 90 \
            --poll-interval-seconds 5
        env:
          GAMMA_BASE_URL: ${{ needs.resolve_gamma_urls.outputs.base_url }}
          GAMMA_PRODUCT_OPS_BASE_URL: ${{ needs.resolve_gamma_urls.outputs.product_ops_base_url }}
      - name: Report gamma readiness drift
        if: always() && steps.readiness_probe.outcome != 'success'
        run: |
          echo "::warning::gamma environment readiness probe failed; shared gamma infrastructure drift is recorded but does not block PR merge. Authoritative gamma validation remains in 08/09."
      - name: Upload gamma readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gamma-readiness-pr
          path: artifacts/gamma-readiness/pr/**
          if-no-files-found: ignore
      - id: finish
        if: always()
        name: Finish timer
        run: |
          echo "duration_seconds=$(( $(date +%s) - ${{ steps.start.outputs.started_at }} ))" >> "$GITHUB_OUTPUT"

  assistant_runtime_protocol_smoke:
    name: Assistant protocol smoke (gamma PR)
    needs: [resolve_gamma_urls, gamma_environment_ready]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      duration_seconds: ${{ steps.finish.outputs.duration_seconds }}
      probe_outcome: ${{ steps.assistant_smoke.outcome }}
    steps:
      - uses: actions/checkout@v4
      - id: start
        name: Start timer
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
      - id: assistant_smoke
        name: Assistant runtime protocol smoke
        continue-on-error: true
        run: |
          python3 agent_ops/assistant/run_assistant_runtime_smoke.py \
            --env gamma-pr \
            --base-url "${GAMMA_BASE_URL}" \
            --test-auth-token "${GAMMA_TEST_AUTH_TOKEN}" \
            --scenario-id travel_journey_basic \
            --report artifacts/assistant-runtime-smoke/gamma-pr/report.json \
            --timeout-seconds 75 \
            --stall-timeout-seconds 12
        env:
          GAMMA_BASE_URL: ${{ needs.resolve_gamma_urls.outputs.base_url }}
          GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      - name: Upload assistant protocol smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assistant-runtime-smoke-gamma-pr
          path: artifacts/assistant-runtime-smoke/gamma-pr/**
          if-no-files-found: ignore
      - name: Report assistant protocol smoke drift
        if: always() && steps.assistant_smoke.outcome != 'success'
        run: |
          echo "::warning::gamma assistant protocol smoke observed shared-environment drift; non-blocking in 04, authoritative validation remains in 08/09."
      - id: finish
        if: always()
        name: Finish timer
        run: |
          echo "duration_seconds=$(( $(date +%s) - ${{ steps.start.outputs.started_at }} ))" >> "$GITHUB_OUTPUT"

  gamma_chat_avatar_api_probe_pre:
    name: Chat avatar API probe (gamma PR)
    needs: [resolve_gamma_urls, gamma_environment_ready]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      duration_seconds: ${{ steps.finish.outputs.duration_seconds }}
      probe_outcome: ${{ steps.chat_avatar_probe.outcome }}
    steps:
      - uses: actions/checkout@v4
      - id: start
        name: Start timer
        run: echo "started_at=$(date +%s)" >> "$GITHUB_OUTPUT"
      - id: chat_avatar_probe
        name: Chat avatar API probe
        continue-on-error: true
        run: |
          python3 agent_ops/avatar/run_chat_avatar_e2e_probe.py \
            --env cloud-gamma-pr \
            --base-url "${GAMMA_BASE_URL}" \
            --media-base-url "${MEDIA_AVATAR_CDN_BASE_URL}" \
            --test-auth-token "${GAMMA_TEST_AUTH_TOKEN}" \
            --report artifacts/avatar-e2e/cloud-gamma-pr/avatar_e2e_report.json
        env:
          GAMMA_BASE_URL: ${{ needs.resolve_gamma_urls.outputs.base_url }}
          MEDIA_AVATAR_CDN_BASE_URL: ${{ needs.resolve_gamma_urls.outputs.media_base_url }}
          GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      - name: Upload chat avatar API probe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-avatar-api-probe-gamma-pr
          path: artifacts/avatar-e2e/cloud-gamma-pr/**
          if-no-files-found: ignore
      - name: Report chat avatar drift
        if: always() && steps.chat_avatar_probe.outcome != 'success'
        run: |
          echo "::warning::gamma chat avatar hosted probe observed shared-environment drift; non-blocking in 04, authoritative validation remains in 08/09."
      - id: finish
        if: always()
        name: Finish timer
        run: |
          echo "duration_seconds=$(( $(date +%s) - ${{ steps.start.outputs.started_at }} ))" >> "$GITHUB_OUTPUT"

  pr_hosted_summary:
    name: Gamma PR hosted summary
    needs:
      - resolve_gamma_urls
      - gamma_environment_ready
      - assistant_runtime_protocol_smoke
      - gamma_chat_avatar_api_probe_pre
    if: always()
    runs-on: ubuntu-latest
    outputs:
      critical_path_seconds: ${{ steps.critical_path.outputs.critical_path_seconds }}
    steps:
      - id: critical_path
        name: Compute critical path
        env:
          READY: ${{ needs.gamma_environment_ready.outputs.duration_seconds }}
          ASSISTANT: ${{ needs.assistant_runtime_protocol_smoke.outputs.duration_seconds }}
          CHAT: ${{ needs.gamma_chat_avatar_api_probe_pre.outputs.duration_seconds }}
        run: |
          READY_SECONDS="${READY:-0}"
          ASSISTANT_SECONDS="${ASSISTANT:-0}"
          CHAT_SECONDS="${CHAT:-0}"
          FANOUT_SECONDS=$(( ASSISTANT_SECONDS > CHAT_SECONDS ? ASSISTANT_SECONDS : CHAT_SECONDS ))
          echo "critical_path_seconds=$(( READY_SECONDS + FANOUT_SECONDS ))" >> "$GITHUB_OUTPUT"
      - name: Assert hosted jobs
        env:
          READY_RESULT: ${{ needs.gamma_environment_ready.result }}
          ASSISTANT_RESULT: ${{ needs.assistant_runtime_protocol_smoke.outputs.probe_outcome }}
          CHAT_RESULT: ${{ needs.gamma_chat_avatar_api_probe_pre.outputs.probe_outcome }}
        run: |
          set -euo pipefail
          if [ "${READY_RESULT}" != "success" ]; then
            echo "::warning::gamma_environment_ready observed ${READY_RESULT}; shared gamma infrastructure drift is recorded but does not block PR merge. Authoritative gamma validation remains in 08/09."
          fi
          if [ "${ASSISTANT_RESULT}" != "success" ]; then
            echo "::warning::assistant_runtime_protocol_smoke observed ${ASSISTANT_RESULT}; shared gamma drift is recorded but does not block 04. 08/09 still enforce assistant hosted validation."
          fi
          if [ "${CHAT_RESULT}" != "success" ]; then
            echo "::warning::gamma_chat_avatar_api_probe_pre observed ${CHAT_RESULT}; shared gamma drift is recorded but does not block 04. 08/09 still enforce chat avatar hosted validation."
          fi
          echo "::notice::Gamma PR hosted summary completed — all probes are advisory in pr_light profile."
