# 04 PR 轻量 gamma preflight：探针已运行的共享 gamma（不部署）。
# readiness 阻断；assistant/chat-avatar smoke 仅记录漂移告警、不阻断 PR。
# Full gamma 验证改走 08（手动 ECS）/ 09（nightly full）。
# 触发：pull_request(main) + workflow_dispatch
# 端到端闭环见 deploy/shared/ci_cd_end_to_end_design.md
name: 04. Pre-Release Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      validation_profile:
        description: '验证 profile：pr_light（默认）或 manual_full'
        required: false
        default: pr_light
        type: choice
        options:
          - pr_light
          - manual_full

concurrency:
  group: pre-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  resolve_profile:
    name: Resolve validation profile
    runs-on: ubuntu-latest
    outputs:
      profile: ${{ steps.resolve.outputs.profile }}
      use_ecs_deploy: ${{ steps.resolve.outputs.use_ecs_deploy }}
    steps:
      - id: resolve
        name: Determine profile
        run: |
          PROFILE="${{ inputs.validation_profile || 'pr_light' }}"
          echo "profile=${PROFILE}" >> "$GITHUB_OUTPUT"
          if [ "${PROFILE}" = "manual_full" ]; then
            echo "use_ecs_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_ecs_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  gamma_pr_light:
    name: Gamma PR light preflight
    needs: [resolve_profile]
    if: ${{ needs.resolve_profile.outputs.use_ecs_deploy == 'false' }}
    uses: ./.github/workflows/gamma-pr-hosted-core.yml
    secrets: inherit

  gamma_full_deploy:
    name: Gamma ECS full deploy (explicit)
    needs: [resolve_profile]
    if: ${{ needs.resolve_profile.outputs.use_ecs_deploy == 'true' }}
    uses: ./.github/workflows/gamma-ecs-pre-hosted-core.yml
    secrets: inherit

  release-evidence-summary:
    name: 04. Pre-Release Gate
    needs:
      - resolve_profile
      - gamma_pr_light
      - gamma_full_deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 输出 PR hosted 耗时摘要
        env:
          PROFILE: ${{ needs.resolve_profile.outputs.profile }}
          USE_ECS: ${{ needs.resolve_profile.outputs.use_ecs_deploy }}
          LIGHT_READY_SECONDS: ${{ needs.gamma_pr_light.outputs.readiness_duration_seconds }}
          LIGHT_ASSISTANT_SECONDS: ${{ needs.gamma_pr_light.outputs.assistant_protocol_smoke_duration_seconds }}
          LIGHT_CHAT_SECONDS: ${{ needs.gamma_pr_light.outputs.chat_avatar_probe_duration_seconds }}
          LIGHT_CRITICAL_SECONDS: ${{ needs.gamma_pr_light.outputs.critical_path_seconds }}
          FULL_PACKAGE_SECONDS: ${{ needs.gamma_full_deploy.outputs.package_duration_seconds }}
          FULL_DEPLOY_SECONDS: ${{ needs.gamma_full_deploy.outputs.deploy_duration_seconds }}
          FULL_READY_SECONDS: ${{ needs.gamma_full_deploy.outputs.readiness_duration_seconds }}
          FULL_API_SECONDS: ${{ needs.gamma_full_deploy.outputs.api_contract_duration_seconds }}
          FULL_ASSISTANT_SECONDS: ${{ needs.gamma_full_deploy.outputs.assistant_smoke_duration_seconds }}
          FULL_CHAT_SECONDS: ${{ needs.gamma_full_deploy.outputs.chat_avatar_probe_duration_seconds }}
          FULL_CRITICAL_SECONDS: ${{ needs.gamma_full_deploy.outputs.critical_path_seconds }}
        run: |
          if [ "${USE_ECS}" = "true" ]; then
            python3 agent_ops/ci/render_ci_timing_summary.py \
              --gate-key 04.pre_release_gate_full \
              --title "04. Pre-Release Gate (manual_full)" \
              --critical-path-seconds "${FULL_CRITICAL_SECONDS:-0}" \
              --phase gamma_package_bundle="${FULL_PACKAGE_SECONDS:-0}" \
              --phase gamma_deploy_ecs_pre="${FULL_DEPLOY_SECONDS:-0}" \
              --phase gamma_environment_ready="${FULL_READY_SECONDS:-0}" \
              --phase gamma_api_contract="${FULL_API_SECONDS:-0}" \
              --phase assistant_runtime_smoke="${FULL_ASSISTANT_SECONDS:-0}" \
              --phase chat_avatar_api_probe="${FULL_CHAT_SECONDS:-0}" \
              --note "04 显式 manual_full profile：完整 ECS 部署 + 全链路验证。" \
              --write-step-summary
          else
            python3 agent_ops/ci/render_ci_timing_summary.py \
              --gate-key 04.pre_release_gate_pr \
              --title "04. Pre-Release Gate (pr_light)" \
              --critical-path-seconds "${LIGHT_CRITICAL_SECONDS:-0}" \
              --phase gamma_environment_ready="${LIGHT_READY_SECONDS:-0}" \
              --phase assistant_protocol_smoke="${LIGHT_ASSISTANT_SECONDS:-0}" \
              --phase chat_avatar_api_probe="${LIGHT_CHAT_SECONDS:-0}" \
              --note "04 PR 轻量 preflight：探针共享 gamma readiness（阻断）+ assistant/chat-avatar smoke（漂移告警，不阻断）。Full 验证走 08/09。" \
              --write-step-summary
          fi
      - name: 汇总并阻断失败项
        env:
          PROFILE: ${{ needs.resolve_profile.outputs.profile }}
          USE_ECS: ${{ needs.resolve_profile.outputs.use_ecs_deploy }}
          LIGHT_RESULT: ${{ needs.gamma_pr_light.result }}
          FULL_RESULT: ${{ needs.gamma_full_deploy.result }}
        run: |
          set -euo pipefail
          if [ "${USE_ECS}" = "true" ]; then
            if [ "${FULL_RESULT}" != "success" ]; then
              echo "::error::gamma-ecs-full-deploy expected success, got ${FULL_RESULT}. 检查 ECS 部署、readiness、API contract、assistant smoke、chat avatar probe"
              exit 1
            fi
          else
            if [ "${LIGHT_RESULT}" != "success" ]; then
              echo "::error::gamma-pr-light-preflight expected success, got ${LIGHT_RESULT}. 检查共享 gamma readiness（healthz + product-ops + 公网路由）。assistant/chat-avatar smoke 漂移不阻断 04，权威验证在 08/09。"
              exit 1
            fi
          fi
          echo "::notice::04. Pre-Release Gate passed with profile=${PROFILE}"
