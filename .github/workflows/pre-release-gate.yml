# Pre-release 串联：gate(L1+L2) → deploy integration → L3 → L4
# 触发：v*-rc* tag、push to main（日节奏 merge 后）、workflow_dispatch
# 端到端闭环见 deploy/shared/ci_cd_end_to_end_design.md
# 当前部署目标：阿里云 ACK
name: 04. Pre-Release Gate

on:
  push:
    tags:
      - 'v*-rc*'
    branches:
      - main
  workflow_dispatch:

env:
  CLOUD_PROVIDER: aliyun

jobs:
  gate:
    name: Pre-release Gate — L1+L2 (pre-deploy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - name: 安装 kustomize
        uses: syntaqx/setup-kustomize@v1
      - name: 安装 Python 依赖 (rec-model-service)
        run: pip install -r quwoquan_service/services/rec-model-service/requirements.txt
      - name: 准备 personal_assistant/.env（CI 无 .gitignore 的 .env）
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Gate (L1+L2)
        run: make gate
      - uses: syntaqx/setup-kustomize@v1
      - name: Deploy kustomization build (G5a 构建验证)
        run: make deploy-integration CLOUD_PROVIDER=${{ env.CLOUD_PROVIDER }} | tail -5

  # main / v*-rc* tag：助手端 runtime 环境冒烟（alpha=mock，gamma=remote+网关；与业务 alpha/gamma 命名对齐）
  app-assistant-runtime-alpha:
    name: Pre-release — Assistant runtime smoke (alpha)
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'))
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: cd quwoquan_app && flutter pub get
      - name: Assistant alpha smoke (contract-seeded mock)
        working-directory: quwoquan_app
        run: |
          flutter test test/common/assistant/assistant_environment_smoke_test.dart \
            --dart-define=APP_RUNTIME_ENV=alpha \
            --dart-define=APP_DATA_SOURCE=mock

  app-assistant-runtime-gamma:
    name: Pre-release — Assistant runtime smoke (gamma)
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'))
    env:
      GAMMA_BASE_URL: ${{ secrets.GAMMA_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: cd quwoquan_app && flutter pub get
      - name: Assistant gamma smoke (remote；网关同集成环境)
        working-directory: quwoquan_app
        run: |
          if [ -z "${GAMMA_BASE_URL:-}" ]; then
            echo "::error::缺少 repository secret GAMMA_BASE_URL，无法执行 gamma 端云冒烟（需配置 gamma 网关基址）"
            exit 1
          fi
          flutter test test/common/assistant/assistant_environment_smoke_test.dart \
            --dart-define=APP_RUNTIME_ENV=gamma \
            --dart-define=APP_DATA_SOURCE=remote \
            --dart-define=CLOUD_GATEWAY_BASE_URL="${GAMMA_BASE_URL}"

  deploy-integration:
    name: G5a Deploy to integration
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'))
    env:
      GAMMA_KUBECONFIG: ${{ secrets.GAMMA_KUBECONFIG }}
    steps:
      - uses: actions/checkout@v4
      - uses: syntaqx/setup-kustomize@v1
      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
      - name: Deploy to integration (kubectl apply)
        run: |
          if [ -z "$GAMMA_KUBECONFIG" ]; then
            echo "::warning::GAMMA_KUBECONFIG not set — skipping apply (configure secret for end-to-end)"
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$GAMMA_KUBECONFIG" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kustomize build deploy/kustomization/${{ env.CLOUD_PROVIDER }}-integration | kubectl apply -f - --server-side
          touch .deploy-applied
      - name: Wait for rollout
        run: |
          if [ -f .deploy-applied ]; then
            kubectl rollout status deployment/seed-box -n seed-box-integration --timeout=5m
          else
            echo "Deploy skipped — no rollout wait"
          fi

  l3-api-contract:
    name: Pre-release Gate — L3 (post-deploy)
    needs: [gate, deploy-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'))
    env:
      API_CONTRACT_ENV: gamma
      GAMMA_BASE_URL: ${{ secrets.GAMMA_BASE_URL }}
      GAMMA_PRODUCT_OPS_BASE_URL: ${{ secrets.GAMMA_PRODUCT_OPS_BASE_URL }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: cd quwoquan_app && flutter pub get
      - name: L3 API Contract
        run: make test-api-contract

  l4-android:
    name: Pre-release Gate — L4 Android (GitHub hosted emulator)
    needs: [gate, deploy-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')) }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: cd quwoquan_app && flutter pub get
      - name: Install Patrol CLI
        run: |
          dart pub global activate patrol_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
      - name: Enable Android emulator KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Android gamma Patrol on GitHub hosted emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          API_CONTRACT_ENV: gamma
          GAMMA_BASE_URL: ${{ secrets.GAMMA_BASE_URL }}
          GAMMA_PRODUCT_OPS_BASE_URL: ${{ secrets.GAMMA_PRODUCT_OPS_BASE_URL }}
          GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          script: |
            if [ -z "${GAMMA_BASE_URL:-}" ] || [ -z "${GAMMA_PRODUCT_OPS_BASE_URL:-}" ] || [ -z "${GAMMA_TEST_AUTH_TOKEN:-}" ]; then
              echo "::error::缺少 GAMMA_BASE_URL / GAMMA_PRODUCT_OPS_BASE_URL / GAMMA_TEST_AUTH_TOKEN，无法执行 Android gamma Patrol"
              exit 1
            fi
            cd quwoquan_app
            patrol test -t test/patrol/discovery/feed_load_test.dart \
              -d emulator-5554 \
              --dart-define=RUN_T4_PATROL=true \
              --dart-define=APP_RUNTIME_ENV=gamma \
              --dart-define=APP_DATA_SOURCE=remote \
              --dart-define=API_CONTRACT_ENV="$API_CONTRACT_ENV" \
              --dart-define=CLOUD_GATEWAY_BASE_URL="$GAMMA_BASE_URL" \
              --dart-define=API_CONTRACT_BASE_URL="$GAMMA_BASE_URL" \
              --dart-define=API_CONTRACT_PRODUCT_OPS_BASE_URL="$GAMMA_PRODUCT_OPS_BASE_URL" \
              --dart-define=TEST_AUTH_TOKEN="$GAMMA_TEST_AUTH_TOKEN"

  l4-ios:
    name: Pre-release Gate — L4 iOS (GitHub hosted simulator)
    needs: [gate, deploy-integration]
    runs-on: macos-latest
    timeout-minutes: 45
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')) }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: cd quwoquan_app && flutter pub get
      - name: Install Patrol CLI
        run: |
          dart pub global activate patrol_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
      - name: Boot iOS simulator
        run: |
          xcodebuild -version
          xcrun simctl list > /dev/null
          xcrun simctl list devices available --json > "$RUNNER_TEMP/ios-devices.json"
          IOS_DEVICE_ID="$(python3 - "$RUNNER_TEMP/ios-devices.json" <<'PY'
          import json
          import re
          import sys

          data = json.load(open(sys.argv[1], encoding="utf-8")).get("devices", {})
          devices = []
          for runtime, runtime_devices in data.items():
              match = re.search(r"iOS-(\d+(?:-\d+)*)$", runtime)
              if not match:
                  continue
              version = tuple(int(part) for part in match.group(1).split("-"))
              for index, device in enumerate(runtime_devices):
                  if not device.get("isAvailable") or not device.get("udid"):
                      continue
                  name = device.get("name", "")
                  prefer_phone = 1 if name.startswith("iPhone") else 0
                  prefer_current = 1 if name in {"iPhone 17 Pro", "iPhone 16 Pro", "iPhone 15 Pro"} else 0
                  devices.append((version, prefer_current, prefer_phone, -index, device["udid"]))
          if not devices:
              raise SystemExit("no available iOS simulator")
          devices.sort(reverse=True)
          print(devices[0][-1])
          PY
          )"
          xcrun simctl boot "$IOS_DEVICE_ID" || true
          xcrun simctl bootstatus "$IOS_DEVICE_ID" -b
          echo "IOS_DEVICE_ID=$IOS_DEVICE_ID" >> "$GITHUB_ENV"
          flutter devices
      - name: iOS gamma Patrol on GitHub hosted simulator
        working-directory: quwoquan_app
        env:
          API_CONTRACT_ENV: gamma
          GAMMA_BASE_URL: ${{ secrets.GAMMA_BASE_URL }}
          GAMMA_PRODUCT_OPS_BASE_URL: ${{ secrets.GAMMA_PRODUCT_OPS_BASE_URL }}
          GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
        run: |
          if [ -z "${GAMMA_BASE_URL:-}" ] || [ -z "${GAMMA_PRODUCT_OPS_BASE_URL:-}" ] || [ -z "${GAMMA_TEST_AUTH_TOKEN:-}" ]; then
            echo "::error::缺少 GAMMA_BASE_URL / GAMMA_PRODUCT_OPS_BASE_URL / GAMMA_TEST_AUTH_TOKEN，无法执行 iOS gamma Patrol"
            exit 1
          fi
          patrol test -t test/patrol/discovery/feed_load_test.dart \
            -d "$IOS_DEVICE_ID" \
            --dart-define=RUN_T4_PATROL=true \
            --dart-define=APP_RUNTIME_ENV=gamma \
            --dart-define=APP_DATA_SOURCE=remote \
            --dart-define=API_CONTRACT_ENV="$API_CONTRACT_ENV" \
            --dart-define=CLOUD_GATEWAY_BASE_URL="$GAMMA_BASE_URL" \
            --dart-define=API_CONTRACT_BASE_URL="$GAMMA_BASE_URL" \
            --dart-define=API_CONTRACT_PRODUCT_OPS_BASE_URL="$GAMMA_PRODUCT_OPS_BASE_URL" \
            --dart-define=TEST_AUTH_TOKEN="$GAMMA_TEST_AUTH_TOKEN"

  # 可选：注册 self-hosted runner 且设置 vars.QWQ_SELF_HOSTED_PRE_RELEASE_MATRIX=true 时执行（发布准入矩阵）
  l4-self-hosted-assistant-matrix:
    name: Pre-release — L4 self-hosted assistant matrix（可选）
    needs: [l3-api-contract]
    if: ${{ vars.QWQ_SELF_HOSTED_PRE_RELEASE_MATRIX == 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'))) }}
    secrets: inherit
    uses: ./.github/workflows/app-env-device-matrix-self-hosted.yml
    with:
      env_json: '["alpha","beta","gamma"]'
      gamma_base_url: ''

  release-evidence-summary:
    name: Pre-release — 证据汇总（T3 / hosted-L4 / Assistant）
    needs:
      - l3-api-contract
      - l4-android
      - l4-ios
      - app-assistant-runtime-alpha
      - app-assistant-runtime-gamma
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 汇总并阻断失败项
        env:
          L3: ${{ needs.l3-api-contract.result }}
          L4A: ${{ needs.l4-android.result }}
          L4I: ${{ needs.l4-ios.result }}
          AA: ${{ needs.app-assistant-runtime-alpha.result }}
          AG: ${{ needs.app-assistant-runtime-gamma.result }}
        run: |
          echo "l3-api-contract=${L3}"
          echo "l4-android=${L4A}"
          echo "l4-ios=${L4I}"
          echo "assistant-runtime-alpha=${AA}"
          echo "assistant-runtime-gamma=${AG}"
          test "${L3}" = "success"
          test "${L4A}" = "success"
          test "${L4I}" = "success"
          test "${AA}" = "success"
          test "${AG}" = "success"
