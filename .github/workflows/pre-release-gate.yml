# Pre-release 串联：PR 使用 hosted gamma readiness + 协议级 smoke；full deploy / full gamma 验证改走独立 workflow
# 触发：pull_request(main) + workflow_dispatch
# 端到端闭环见 deploy/shared/ci_cd_end_to_end_design.md
name: 04. Pre-Release Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pre-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gamma_pre_hosted:
    name: Gamma hosted PR chain
    uses: ./.github/workflows/gamma-pr-hosted-core.yml
    secrets: inherit

  discover_gamma_devices:
    name: Discover gamma mobile devices (self-hosted)
    if: ${{ github.event_name != 'pull_request' || vars.ENABLE_SELF_HOSTED_MOBILE_MATRIX == 'true' }}
    runs-on: [self-hosted, macOS]
    outputs:
      has_android: ${{ steps.discover.outputs.has_android }}
      has_ios: ${{ steps.discover.outputs.has_ios }}
      android_count: ${{ steps.discover.outputs.android_count }}
      ios_count: ${{ steps.discover.outputs.ios_count }}
      device_summary: ${{ steps.discover.outputs.device_summary }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts
      - name: 校验 self-hosted macOS runner
        run: |
          if [ "${{ runner.os }}" != "macOS" ]; then
            echo "::error::04 gamma 端侧矩阵要求运行在本机 macOS self-hosted runner，当前为 ${{ runner.os }}"
            exit 2
          fi
      - name: Install Flutter (PATH)
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 flutter 并在 PATH 中"; exit 2; }
          flutter --version
      - name: 发现当前 Mac 可见移动设备
        id: discover
        run: |
          python3 scripts/discover_flutter_mobile_devices.py \
            --app-dir "$GITHUB_WORKSPACE" \
            --output "$RUNNER_TEMP/mobile-devices.json" \
            --require-mobile
          python3 - "$RUNNER_TEMP/mobile-devices.json" "$GITHUB_OUTPUT" <<'PY'
          import json
          import sys

          path, output_path = sys.argv[1], sys.argv[2]
          data = json.load(open(path, encoding="utf-8"))
          android = data.get("android") or []
          ios = data.get("ios") or []

          def fmt(items):
              return ", ".join(f'{item["name"]}({item["id"]})' for item in items)

          summary_parts = []
          if android:
              summary_parts.append(f'android[{len(android)}]: {fmt(android)}')
          if ios:
              summary_parts.append(f'ios[{len(ios)}]: {fmt(ios)}')
          summary = "；".join(summary_parts) if summary_parts else "未发现 iOS/Android 设备"

          with open(output_path, "a", encoding="utf-8") as fh:
              print(f'has_android={"true" if android else "false"}', file=fh)
              print(f'has_ios={"true" if ios else "false"}', file=fh)
              print(f'android_count={len(android)}', file=fh)
              print(f'ios_count={len(ios)}', file=fh)
              print("device_summary<<EOF", file=fh)
              print(summary, file=fh)
              print("EOF", file=fh)

          print(f"::notice::gamma self-hosted devices => {summary}")
          PY

  gamma_assistant_android:
    name: Gamma assistant / Android (self-hosted)
    needs: [gamma_pre_hosted, discover_gamma_devices]
    if: ${{ needs.discover_gamma_devices.outputs.has_android == 'true' }}
    runs-on: [self-hosted, macOS]
    timeout-minutes: 120
    env:
      API_CONTRACT_ENV: gamma
      GAMMA_BASE_URL: ${{ needs.gamma_pre_hosted.outputs.base_url }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      ASSISTANT_MODEL_PROVIDER: deterministic
      ALLOW_DETERMINISTIC_BETA: "1"
      ASSISTANT_MATRIX_ALL_DEVICES: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts
            packages
            quwoquan_app
            quwoquan_service
      - name: 记录发现结果
        run: |
          echo "Android devices: ${{ needs.discover_gamma_devices.outputs.android_count }}"
          echo "${{ needs.discover_gamma_devices.outputs.device_summary }}"
      - name: 校验 self-hosted macOS runner
        run: |
          if [ "${{ runner.os }}" != "macOS" ]; then
            echo "::error::Gamma Android 端侧矩阵已统一到本机 macOS self-hosted runner，当前为 ${{ runner.os }}"
            exit 2
          fi
      - name: 准备 personal_assistant/.env
        run: |
          if [ -d quwoquan_app/personal_assistant ]; then
            mkdir -p quwoquan_app/personal_assistant
            if [ -f quwoquan_app/personal_assistant/.env.example ]; then
              cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
            else
              : > quwoquan_app/personal_assistant/.env
            fi
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - name: Install Flutter (PATH)
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 flutter 并在 PATH 中"; exit 2; }
          command -v adb >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 adb 并在 PATH 中"; exit 2; }
          flutter --version
      - name: 安装 Flutter 依赖
        working-directory: quwoquan_app
        run: flutter pub get
      - name: Run gamma assistant on Android (self-hosted)
        run: python3 scripts/run_assistant_device_matrix_ci.py --platform android
      - name: Upload gamma assistant Android report
        id: upload_gamma_assistant_android_report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: gamma-assistant-selfhosted-android
          path: |
            artifacts/device-matrix/gamma-android.json
            artifacts/device-matrix/assistant_device_matrix_logs/**
          if-no-files-found: ignore
          compression-level: 0
      - name: Retry gamma assistant Android report upload
        if: always() && steps.upload_gamma_assistant_android_report.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: gamma-assistant-selfhosted-android
          path: |
            artifacts/device-matrix/gamma-android.json
            artifacts/device-matrix/assistant_device_matrix_logs/**
          if-no-files-found: ignore
          compression-level: 0
          overwrite: true

  gamma_assistant_ios:
    name: Gamma assistant / iOS (self-hosted)
    needs: [gamma_pre_hosted, discover_gamma_devices]
    if: ${{ needs.discover_gamma_devices.outputs.has_ios == 'true' }}
    runs-on: [self-hosted, macOS]
    timeout-minutes: 120
    env:
      API_CONTRACT_ENV: gamma
      GAMMA_BASE_URL: ${{ needs.gamma_pre_hosted.outputs.base_url }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      ASSISTANT_MODEL_PROVIDER: deterministic
      ALLOW_DETERMINISTIC_BETA: "1"
      ASSISTANT_MATRIX_ALL_DEVICES: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts
            packages
            quwoquan_app
            quwoquan_service
      - name: 记录发现结果
        run: |
          echo "iOS devices: ${{ needs.discover_gamma_devices.outputs.ios_count }}"
          echo "${{ needs.discover_gamma_devices.outputs.device_summary }}"
      - name: 校验 self-hosted macOS runner
        run: |
          if [ "${{ runner.os }}" != "macOS" ]; then
            echo "::error::Gamma iOS 端侧矩阵已统一到本机 macOS self-hosted runner，当前为 ${{ runner.os }}"
            exit 2
          fi
      - name: 准备 personal_assistant/.env
        run: |
          if [ -d quwoquan_app/personal_assistant ]; then
            mkdir -p quwoquan_app/personal_assistant
            if [ -f quwoquan_app/personal_assistant/.env.example ]; then
              cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
            else
              : > quwoquan_app/personal_assistant/.env
            fi
          fi
      - uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - name: Install Flutter (PATH)
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 flutter 并在 PATH 中"; exit 2; }
          command -v xcrun >/dev/null 2>&1 || { echo "::error::self-hosted runner 需具备 Xcode / xcrun"; exit 2; }
          flutter --version
      - name: 安装 Flutter 依赖
        working-directory: quwoquan_app
        run: flutter pub get
      - name: Run gamma assistant on iOS (self-hosted)
        run: python3 scripts/run_assistant_device_matrix_ci.py --platform ios
      - name: Upload gamma assistant iOS report
        id: upload_gamma_assistant_ios_report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: gamma-assistant-selfhosted-ios
          path: |
            artifacts/device-matrix/gamma-ios.json
            artifacts/device-matrix/assistant_device_matrix_logs/**
          if-no-files-found: ignore
          compression-level: 0
      - name: Retry gamma assistant iOS report upload
        if: always() && steps.upload_gamma_assistant_ios_report.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: gamma-assistant-selfhosted-ios
          path: |
            artifacts/device-matrix/gamma-ios.json
            artifacts/device-matrix/assistant_device_matrix_logs/**
          if-no-files-found: ignore
          compression-level: 0
          overwrite: true

  gamma_chat_avatar_android:
    name: Gamma chat avatar / Android (self-hosted)
    needs: [gamma_pre_hosted, discover_gamma_devices]
    if: ${{ needs.discover_gamma_devices.outputs.has_android == 'true' }}
    runs-on: [self-hosted, macOS]
    timeout-minutes: 120
    env:
      API_CONTRACT_ENV: gamma
      GAMMA_BASE_URL: ${{ needs.gamma_pre_hosted.outputs.base_url }}
      MEDIA_AVATAR_CDN_BASE_URL: ${{ needs.gamma_pre_hosted.outputs.media_base_url }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      CHAT_AVATAR_MATRIX_ALL_DEVICES: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts
            packages
            quwoquan_app
            quwoquan_service
      - name: 记录发现结果
        run: |
          echo "Android devices: ${{ needs.discover_gamma_devices.outputs.android_count }}"
          echo "${{ needs.discover_gamma_devices.outputs.device_summary }}"
      - name: 校验 self-hosted macOS runner
        run: |
          if [ "${{ runner.os }}" != "macOS" ]; then
            echo "::error::Gamma chat avatar Android 端侧矩阵要求本机 macOS self-hosted runner，当前为 ${{ runner.os }}"
            exit 2
          fi
      - name: 准备 personal_assistant/.env
        run: |
          if [ -d quwoquan_app/personal_assistant ]; then
            mkdir -p quwoquan_app/personal_assistant
            if [ -f quwoquan_app/personal_assistant/.env.example ]; then
              cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
            else
              : > quwoquan_app/personal_assistant/.env
            fi
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - name: Install Flutter (PATH)
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 flutter 并在 PATH 中"; exit 2; }
          command -v adb >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 adb 并在 PATH 中"; exit 2; }
          flutter --version
      - name: 安装 Flutter 依赖
        working-directory: quwoquan_app
        run: flutter pub get
      - name: Run gamma chat avatar on Android (self-hosted)
        run: python3 scripts/run_chat_avatar_device_matrix_ci.py --platform android
      - name: Upload gamma chat avatar Android report
        id: upload_gamma_chat_avatar_android_report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: gamma-chat-avatar-selfhosted-android
          path: artifacts/device-matrix/chat-avatar/**
          if-no-files-found: ignore
          compression-level: 0
      - name: Retry gamma chat avatar Android report upload
        if: always() && steps.upload_gamma_chat_avatar_android_report.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: gamma-chat-avatar-selfhosted-android
          path: artifacts/device-matrix/chat-avatar/**
          if-no-files-found: ignore
          compression-level: 0
          overwrite: true

  gamma_chat_avatar_ios:
    name: Gamma chat avatar / iOS (self-hosted)
    needs: [gamma_pre_hosted, discover_gamma_devices]
    if: ${{ needs.discover_gamma_devices.outputs.has_ios == 'true' }}
    runs-on: [self-hosted, macOS]
    timeout-minutes: 120
    env:
      API_CONTRACT_ENV: gamma
      GAMMA_BASE_URL: ${{ needs.gamma_pre_hosted.outputs.base_url }}
      MEDIA_AVATAR_CDN_BASE_URL: ${{ needs.gamma_pre_hosted.outputs.media_base_url }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      CHAT_AVATAR_MATRIX_ALL_DEVICES: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            scripts
            packages
            quwoquan_app
            quwoquan_service
      - name: 记录发现结果
        run: |
          echo "iOS devices: ${{ needs.discover_gamma_devices.outputs.ios_count }}"
          echo "${{ needs.discover_gamma_devices.outputs.device_summary }}"
      - name: 校验 self-hosted macOS runner
        run: |
          if [ "${{ runner.os }}" != "macOS" ]; then
            echo "::error::Gamma chat avatar iOS 端侧矩阵要求本机 macOS self-hosted runner，当前为 ${{ runner.os }}"
            exit 2
          fi
      - name: 准备 personal_assistant/.env
        run: |
          if [ -d quwoquan_app/personal_assistant ]; then
            mkdir -p quwoquan_app/personal_assistant
            if [ -f quwoquan_app/personal_assistant/.env.example ]; then
              cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
            else
              : > quwoquan_app/personal_assistant/.env
            fi
          fi
      - uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - name: Install Flutter (PATH)
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 flutter 并在 PATH 中"; exit 2; }
          command -v xcrun >/dev/null 2>&1 || { echo "::error::self-hosted runner 需具备 Xcode / xcrun"; exit 2; }
          flutter --version
      - name: 安装 Flutter 依赖
        working-directory: quwoquan_app
        run: flutter pub get
      - name: Run gamma chat avatar on iOS (self-hosted)
        run: python3 scripts/run_chat_avatar_device_matrix_ci.py --platform ios
      - name: Upload gamma chat avatar iOS report
        id: upload_gamma_chat_avatar_ios_report
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: gamma-chat-avatar-selfhosted-ios
          path: artifacts/device-matrix/chat-avatar/**
          if-no-files-found: ignore
          compression-level: 0
      - name: Retry gamma chat avatar iOS report upload
        if: always() && steps.upload_gamma_chat_avatar_ios_report.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: gamma-chat-avatar-selfhosted-ios
          path: artifacts/device-matrix/chat-avatar/**
          if-no-files-found: ignore
          compression-level: 0
          overwrite: true

  release-evidence-summary:
    name: 04. Pre-Release Gate
    needs:
      - gamma_pre_hosted
      - discover_gamma_devices
      - gamma_assistant_android
      - gamma_assistant_ios
      - gamma_chat_avatar_android
      - gamma_chat_avatar_ios
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 输出 PR hosted 耗时摘要
        env:
          READY_SECONDS: ${{ needs.gamma_pre_hosted.outputs.readiness_duration_seconds }}
          ASSISTANT_SECONDS: ${{ needs.gamma_pre_hosted.outputs.assistant_protocol_smoke_duration_seconds }}
          CHAT_SECONDS: ${{ needs.gamma_pre_hosted.outputs.chat_avatar_probe_duration_seconds }}
          CRITICAL_SECONDS: ${{ needs.gamma_pre_hosted.outputs.critical_path_seconds }}
        run: |
          python3 scripts/render_ci_timing_summary.py \
            --gate-key 04.pre_release_gate_pr \
            --title "04. Pre-Release Gate" \
            --critical-path-seconds "${CRITICAL_SECONDS:-0}" \
            --phase gamma_environment_ready="${READY_SECONDS:-0}" \
            --phase assistant_api_protocol_smoke="${ASSISTANT_SECONDS:-0}" \
            --phase chat_avatar_api_probe="${CHAT_SECONDS:-0}" \
            --note "PR 已移除 gamma ECS full deploy；full gamma 验证改走独立 workflow/命令。" \
            --write-step-summary
      - name: 汇总并阻断失败项
        env:
          SELF_HOSTED_ENABLED: ${{ github.event_name != 'pull_request' || vars.ENABLE_SELF_HOSTED_MOBILE_MATRIX == 'true' }}
          HOSTED: ${{ needs.gamma_pre_hosted.result }}
          DISCOVER: ${{ needs.discover_gamma_devices.result }}
          HAS_ANDROID: ${{ needs.discover_gamma_devices.outputs.has_android }}
          HAS_IOS: ${{ needs.discover_gamma_devices.outputs.has_ios }}
          ASSISTANT_ANDROID: ${{ needs.gamma_assistant_android.result }}
          ASSISTANT_IOS: ${{ needs.gamma_assistant_ios.result }}
          CHAT_ANDROID: ${{ needs.gamma_chat_avatar_android.result }}
          CHAT_IOS: ${{ needs.gamma_chat_avatar_ios.result }}
        run: |
          set -euo pipefail
          if [ "${SELF_HOSTED_ENABLED}" != "true" ]; then
            if [ "${HOSTED}" != "success" ]; then
              echo "::error::gamma-hosted-pr-chain expected success, got ${HOSTED}. 检查 gamma readiness、assistant protocol smoke、chat avatar API probe"
              exit 1
            fi
            echo "::notice::gamma self-hosted matrix is disabled for this run; skip device evidence enforcement."
            exit 0
          fi
          fail=0
          expect_success() {
            local name="$1" val="$2" hint="$3"
            if [ "${val}" != "success" ]; then
              echo "::error::${name} expected success, got ${val}. ${hint}"
              fail=1
            fi
          }
          expect_success "gamma-hosted-pr-chain" "${HOSTED}" "检查 gamma readiness、assistant protocol smoke、chat avatar API probe"
          expect_success "discover-gamma-devices" "${DISCOVER}" "检查 self-hosted runner 与 flutter devices --machine"
          if [ "${HAS_ANDROID}" != "true" ]; then
            echo "::error::gamma android device environment is required before merge, but no Android device was discovered"
            fail=1
          else
            expect_success "gamma-assistant-android" "${ASSISTANT_ANDROID}" "检查 gamma Android assistant 设备矩阵"
            expect_success "gamma-chat-avatar-android" "${CHAT_ANDROID}" "检查 gamma Android chat avatar 设备矩阵"
          fi
          if [ "${HAS_IOS}" != "true" ]; then
            echo "::error::gamma ios device environment is required before merge, but no iOS device was discovered"
            fail=1
          else
            expect_success "gamma-assistant-ios" "${ASSISTANT_IOS}" "检查 gamma iOS assistant 设备矩阵"
            expect_success "gamma-chat-avatar-ios" "${CHAT_IOS}" "检查 gamma iOS chat avatar 设备矩阵"
          fi
          if [ "${fail}" -ne 0 ]; then
            echo "::error::Pre-release 未全部成功；请按上列分项修复后重跑 workflow。"
            exit 1
          fi
      - name: 下载 gamma self-hosted artifacts
        if: ${{ always() && (github.event_name != 'pull_request' || vars.ENABLE_SELF_HOSTED_MOBILE_MATRIX == 'true') }}
        uses: actions/download-artifact@v4
        with:
          pattern: gamma-*-selfhosted-*
          path: ${{ runner.temp }}/gamma-selfhosted-artifacts
      - name: 校验 gamma self-hosted 证据产物
        if: ${{ always() && (github.event_name != 'pull_request' || vars.ENABLE_SELF_HOSTED_MOBILE_MATRIX == 'true') }}
        run: |
          python3 scripts/verify_device_matrix_evidence.py \
            --artifact-root "${RUNNER_TEMP}/gamma-selfhosted-artifacts" \
            --report-glob "**/*-android.json" \
            --report-glob "**/*-ios.json"
