# Pre-release 串联：deploy integration → L3 → L4 → gamma runtime smoke
# 触发：pull_request(main) + workflow_dispatch
# 端到端闭环见 deploy/shared/ci_cd_end_to_end_design.md
# 当前部署目标：阿里云 ACK
name: 04. Pre-Release Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  CLOUD_PROVIDER: aliyun

concurrency:
  group: pre-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  app-assistant-runtime-gamma:
    name: Pre-release — Assistant runtime smoke (gamma)
    needs: [deploy-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      GAMMA_BASE_URL: ${{ secrets.GAMMA_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: cd quwoquan_app && flutter pub get
      - name: Assistant gamma smoke (remote；网关同集成环境)
        working-directory: quwoquan_app
        run: |
          if [ -z "${GAMMA_BASE_URL:-}" ]; then
            echo "::error::缺少 repository secret GAMMA_BASE_URL，无法执行 gamma 端云冒烟（需配置 gamma 网关基址）"
            exit 1
          fi
          flutter test test/common/assistant/assistant_environment_smoke_test.dart \
            --dart-define=APP_RUNTIME_ENV=gamma \
            --dart-define=APP_DATA_SOURCE=remote \
            --dart-define=CLOUD_GATEWAY_BASE_URL="${GAMMA_BASE_URL}"

  deploy-integration:
    name: G5a Deploy to integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GAMMA_KUBECONFIG: ${{ secrets.GAMMA_KUBECONFIG }}
    steps:
      - uses: actions/checkout@v4
      - uses: syntaqx/setup-kustomize@v1
      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
      - name: Deploy to integration (kubectl apply)
        run: |
          if [ -z "$GAMMA_KUBECONFIG" ]; then
            echo "::warning::GAMMA_KUBECONFIG not set — skipping apply (configure secret for end-to-end)"
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$GAMMA_KUBECONFIG" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kustomize build deploy/kustomization/${{ env.CLOUD_PROVIDER }}-integration | kubectl apply -f - --server-side
          touch .deploy-applied
      - name: Wait for rollout
        run: |
          if [ -f .deploy-applied ]; then
            kubectl rollout status deployment/seed-box -n seed-box-integration --timeout=5m
          else
            echo "Deploy skipped — no rollout wait"
          fi

  l3-api-contract:
    name: Pre-release Gate — L3 (post-deploy)
    needs: [deploy-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      API_CONTRACT_ENV: gamma
      GAMMA_BASE_URL: ${{ secrets.GAMMA_BASE_URL }}
      GAMMA_PRODUCT_OPS_BASE_URL: ${{ secrets.GAMMA_PRODUCT_OPS_BASE_URL }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: cd quwoquan_app && flutter pub get
      - name: L3 API Contract
        run: make test-api-contract

  l4-mobile-self-hosted:
    name: Pre-release Gate — L4 mobile (self-hosted)
    needs: [deploy-integration]
    runs-on: [self-hosted, macOS]
    timeout-minutes: 180
    env:
      API_CONTRACT_ENV: gamma
      GAMMA_BASE_URL: ${{ secrets.GAMMA_BASE_URL }}
      GAMMA_PRODUCT_OPS_BASE_URL: ${{ secrets.GAMMA_PRODUCT_OPS_BASE_URL }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
      MEDIA_AVATAR_CDN_BASE_URL: ${{ vars.MEDIA_AVATAR_CDN_BASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: |
          mkdir -p quwoquan_app/assistant quwoquan_app/personal_assistant
          if [ -f quwoquan_app/assistant/.env.example ]; then
            cp quwoquan_app/assistant/.env.example quwoquan_app/assistant/.env
          else
            : > quwoquan_app/assistant/.env
          fi
          if [ -f quwoquan_app/personal_assistant/.env.example ]; then
            cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
          else
            cp quwoquan_app/assistant/.env quwoquan_app/personal_assistant/.env
          fi
      - name: 校验 self-hosted macOS runner
        run: |
          if [ "${{ runner.os }}" != "macOS" ]; then
            echo "::error::Pre-release L4 已统一到本机 macOS self-hosted runner，当前为 ${{ runner.os }}"
            exit 2
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Flutter (PATH)
        run: |
          command -v flutter >/dev/null 2>&1 || { echo "::error::self-hosted runner 需预装 flutter 并在 PATH 中"; exit 2; }
          flutter --version
      - run: cd quwoquan_app && flutter pub get
      - name: Install Patrol CLI
        run: |
          if ! command -v patrol >/dev/null 2>&1; then
            dart pub global activate patrol_cli
            echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.pub-cache/bin:$PATH"
          fi
          command -v patrol >/dev/null 2>&1 || { echo "::error::patrol CLI 未安装成功"; exit 2; }
          patrol --version
      - name: Gamma Patrol on every discovered device
        run: |
          python3 scripts/run_gamma_patrol_matrix_ci.py \
            --report artifacts/device-matrix/gamma-patrol/report.json
      - name: Upload gamma Patrol matrix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-release-gamma-patrol-selfhosted
          path: artifacts/device-matrix/gamma-patrol/**
          if-no-files-found: ignore

  release-evidence-summary:
    name: 04. Pre-Release Gate
    needs:
      - deploy-integration
      - l3-api-contract
      - l4-mobile-self-hosted
      - app-assistant-runtime-gamma
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 汇总并阻断失败项
        env:
          DEPLOY: ${{ needs.deploy-integration.result }}
          L3: ${{ needs.l3-api-contract.result }}
          L4: ${{ needs.l4-mobile-self-hosted.result }}
          AG: ${{ needs.app-assistant-runtime-gamma.result }}
        run: |
          set -euo pipefail
          echo "=== Pre-release evidence summary (needs.*.result) ==="
          echo "deploy-integration=${DEPLOY}"
          echo "l3-api-contract=${L3}"
          echo "l4-mobile-self-hosted=${L4}"
          echo "assistant-runtime-gamma=${AG}"
          fail=0
          expect_success() {
            local name="$1" val="$2" hint="$3"
            if [ "${val}" != "success" ]; then
              echo "::error::${name} expected success, got ${val}. ${hint}"
              fail=1
            fi
          }
          expect_success "deploy-integration" "${DEPLOY}" "检查 integration kustomize / kubectl / GAMMA_KUBECONFIG"
          expect_success "l3-api-contract" "${L3}" "检查 make test-api-contract、网关路由与 secrets: GAMMA_BASE_URL, GAMMA_PRODUCT_OPS_BASE_URL, GAMMA_TEST_AUTH_TOKEN"
          expect_success "l4-mobile-self-hosted" "${L4}" "检查本机 self-hosted runner、flutter devices --machine 可见设备、Patrol CLI 与同上 GAMMA_* 配置"
          expect_success "assistant-runtime-gamma" "${AG}" "检查 gamma remote 与 secrets.GAMMA_BASE_URL（及网关可达性）"
          if [ "${fail}" -ne 0 ]; then
            echo "::error::Pre-release 未全部成功；请按上列分项修复后重跑 workflow。"
            exit 1
          fi
