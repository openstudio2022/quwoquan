# Pre-release 串联：gate(L1+L2) → deploy integration → L3 → L4
# 触发：v*-rc* tag、push to main（日节奏 merge 后）、workflow_dispatch
# 端到端闭环见 deploy/shared/ci_cd_end_to_end_design.md
# 当前部署目标：阿里云 ACK
name: 04. Pre-Release Gate

on:
  push:
    tags:
      - 'v*-rc*'
    branches:
      - main
  workflow_dispatch:

env:
  CLOUD_PROVIDER: aliyun

jobs:
  gate:
    name: Pre-release Gate — L1+L2 (pre-deploy)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod
      - name: 安装 kustomize
        uses: syntaqx/setup-kustomize@v1
      - name: 安装 Python 依赖 (rec-model-service)
        run: pip install -r quwoquan_service/services/rec-model-service/requirements.txt
      - name: 准备 personal_assistant/.env（CI 无 .gitignore 的 .env）
        run: cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Gate (L1+L2)
        run: make gate
      - uses: syntaqx/setup-kustomize@v1
      - name: Deploy kustomization build (G5a 构建验证)
        run: make deploy-integration CLOUD_PROVIDER=${{ env.CLOUD_PROVIDER }} | tail -5

  deploy-integration:
    name: G5a Deploy to integration
    needs: [gate]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    env:
      INTEGRATION_KUBECONFIG: ${{ secrets.INTEGRATION_KUBECONFIG }}
    steps:
      - uses: actions/checkout@v4
      - uses: syntaqx/setup-kustomize@v1
      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
      - name: Deploy to integration (kubectl apply)
        run: |
          if [ -z "$INTEGRATION_KUBECONFIG" ]; then
            echo "::warning::INTEGRATION_KUBECONFIG not set — skipping apply (configure secret for end-to-end)"
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$INTEGRATION_KUBECONFIG" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kustomize build deploy/kustomization/${{ env.CLOUD_PROVIDER }}-integration | kubectl apply -f - --server-side
          touch .deploy-applied
      - name: Wait for rollout
        run: |
          if [ -f .deploy-applied ]; then
            kubectl rollout status deployment/seed-box -n seed-box-integration --timeout=5m
          else
            echo "Deploy skipped — no rollout wait"
          fi

  l3-api-contract:
    name: Pre-release Gate — L3 (post-deploy)
    needs: [gate, deploy-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main')
    env:
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
      STAGING_PRODUCT_OPS_BASE_URL: ${{ secrets.STAGING_PRODUCT_OPS_BASE_URL }}
      TEST_AUTH_TOKEN: ${{ secrets.STAGING_TEST_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: cd quwoquan_app && flutter pub get
      - name: L3 API Contract
        run: make test-api-contract

  l4-android:
    name: Pre-release Gate — L4 Android (FTL)
    needs: [gate, deploy-integration]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: cd quwoquan_app && flutter pub get
      - run: dart pub global activate patrol_cli
      - name: Build Android
        working-directory: quwoquan_app
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          TEST_AUTH_TOKEN: ${{ secrets.STAGING_TEST_AUTH_TOKEN }}
        run: |
          patrol build android \
            --dart-define=ENV=staging \
            --dart-define=STAGING_BASE_URL="$STAGING_BASE_URL" \
            --dart-define=TEST_AUTH_TOKEN="$TEST_AUTH_TOKEN"
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Firebase Test Lab (Android)
        run: |
          gcloud firebase test android run \
            --type instrumentation \
            --app quwoquan_app/build/app/outputs/flutter-apk/app-debug.apk \
            --test quwoquan_app/build/app/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=oriole,version=33,locale=zh_CN,orientation=portrait \
            --timeout 10m \
            --results-bucket=gs://${{ secrets.FTL_RESULTS_BUCKET }} \
            --results-dir=patrol-android-${{ github.run_id }} \
            --no-record-video

  l4-ios:
    name: Pre-release Gate — L4 iOS (FTL)
    needs: [gate, deploy-integration]
    runs-on: macos-latest
    timeout-minutes: 45
    if: ${{ github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main') }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: cd quwoquan_app && flutter pub get
      - run: dart pub global activate patrol_cli
      - name: Build iOS
        working-directory: quwoquan_app
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          TEST_AUTH_TOKEN: ${{ secrets.STAGING_TEST_AUTH_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          patrol build ios \
            --dart-define=ENV=staging \
            --dart-define=STAGING_BASE_URL="$STAGING_BASE_URL" \
            --dart-define=TEST_AUTH_TOKEN="$TEST_AUTH_TOKEN"
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Firebase Test Lab (iOS)
        run: |
          gcloud firebase test ios run \
            --test quwoquan_app/build/ios_integ/Runner_iphoneos.app \
            --device model=iphone15,version=17,locale=zh_CN,orientation=portrait \
            --timeout 10m \
            --results-bucket=gs://${{ secrets.FTL_RESULTS_BUCKET }} \
            --results-dir=patrol-ios-${{ github.run_id }}
