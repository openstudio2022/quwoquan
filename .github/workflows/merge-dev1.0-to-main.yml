# 定时 merge dev1.0 → main；merge 后 push 触发 pre-release-gate
# 设计见 deploy/shared/branch_strategy.md
name: 07. Merge dev1.0 To Main

on:
  schedule:
    # UTC 22:00 ≈ Asia/Shanghai 06:00
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  merge:
    name: Merge dev1.0 into main
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge dev1.0 into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin dev1.0 main
          git checkout main
          git merge origin/dev1.0 --no-edit -m "chore: merge dev1.0 into main (scheduled)"
          git push origin main
