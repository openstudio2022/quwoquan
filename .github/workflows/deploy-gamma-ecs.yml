# ECS Onebox：手动触发的 gamma / onebox 演练链路
# main 合入前的阻断验证已前移到 03 / 04(ECS gamma) / 05；此处保留显式手动发布与 prod 复验
name: 08. Deploy Gamma ECS

on:
  workflow_dispatch:
    inputs:
      promote_to_prod:
        description: 是否在 pre 门禁通过后执行 prod 就地升级（skip_upload + 新版本标签）
        type: boolean
        default: true

concurrency:
  group: gamma-ecs-${{ github.ref }}
  cancel-in-progress: false

env:
  GAMMA_ECS_HOST: ${{ vars.GAMMA_ECS_HOST || secrets.GAMMA_ECS_HOST || '118.31.239.122' }}
  GAMMA_ECS_USER: ${{ vars.GAMMA_ECS_USER || 'root' }}
  GAMMA_ECS_PORT: ${{ vars.GAMMA_ECS_PORT || '22' }}
  GAMMA_ECS_REMOTE_DIR: ${{ vars.GAMMA_ECS_REMOTE_DIR || '/opt/quwoquan/gamma' }}
  ASSISTANT_MODEL_PROVIDER: deterministic
  ALLOW_DETERMINISTIC_BETA: "1"

jobs:
  required_checks_preflight:
    name: Preflight — required PR checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      checks: read
      contents: read
    steps:
      - name: Verify required checks on current SHA
        uses: actions/github-script@v7
        with:
          script: |
            const required = [
              '03. Delivery Gate',
              '04. Pre-Release Gate',
              '05. App Env Device Matrix',
            ];
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = context.sha;
            const { data } = await github.rest.checks.listForRef({
              owner,
              repo,
              ref,
              per_page: 100,
            });
            const runs = data.check_runs || [];
            const failures = [];
            for (const name of required) {
              const matches = runs
                .filter((run) => run.name === name)
                .sort((left, right) => {
                  const l = new Date(left.completed_at || left.started_at || 0).getTime();
                  const r = new Date(right.completed_at || right.started_at || 0).getTime();
                  return r - l;
                });
              if (matches.length === 0) {
                failures.push(`${name}: missing on ${ref}`);
                continue;
              }
              const latest = matches[0];
              if (latest.status !== 'completed' || latest.conclusion !== 'success') {
                failures.push(
                  `${name}: expected completed/success, got ${latest.status}/${latest.conclusion}`
                );
              } else {
                core.notice(`${name} already green on ${ref}`);
              }
            }
            if (failures.length > 0) {
              core.setFailed(
                [
                  '08 requires the same SHA to have green required PR checks before deploy.',
                  ...failures,
                ].join('\n')
              );
            }

  gamma_pre_validation:
    name: Gamma ECS — pre hosted validation
    needs: [required_checks_preflight]
    uses: ./.github/workflows/gamma-ecs-pre-hosted-core.yml
    secrets: inherit

  deploy_gamma_ecs_prod:
    name: Deploy ECS — prod（就地升级，跳过上传）
    needs: [gamma_pre_validation, ecs_onebox_pre_summary]
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.promote_to_prod }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - name: Resolve gamma URLs
        id: urls
        run: |
          PUBLIC_HOST="${GAMMA_ECS_PUBLIC_HOST:-118.31.239.122}"
          # 与 compose 中 gamma-proxy 默认映射一致（ECS onebox 常用 18000→Caddy:80；勿用 content 直出端口充当网关）
          BASE_URL="${GAMMA_BASE_URL:-http://${PUBLIC_HOST}:18000}"
          PRODUCT_OPS_BASE_URL="${GAMMA_PRODUCT_OPS_BASE_URL:-http://${PUBLIC_HOST}:18086}"
          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "product_ops_base_url=${PRODUCT_OPS_BASE_URL}" >> "$GITHUB_OUTPUT"
        env:
          GAMMA_ECS_PUBLIC_HOST: ${{ vars.GAMMA_ECS_PUBLIC_HOST || vars.GAMMA_ECS_HOST }}
          GAMMA_BASE_URL: ${{ vars.GAMMA_BASE_URL }}
          GAMMA_PRODUCT_OPS_BASE_URL: ${{ vars.GAMMA_PRODUCT_OPS_BASE_URL }}
      - name: Validate ECS credentials
        env:
          GAMMA_ECS_PASSWORD: ${{ secrets.GAMMA_ECS_PASSWORD }}
          GAMMA_ECS_SSH_KEY: ${{ secrets.GAMMA_ECS_SSH_KEY }}
        run: |
          if [ -z "${GAMMA_ECS_PASSWORD:-}" ] && [ -z "${GAMMA_ECS_SSH_KEY:-}" ]; then
            echo "::error::需要配置 secrets.GAMMA_ECS_PASSWORD 或 secrets.GAMMA_ECS_SSH_KEY"
            exit 2
          fi
      - name: Install sshpass（密码登录可选）
        env:
          GAMMA_ECS_PASSWORD: ${{ secrets.GAMMA_ECS_PASSWORD }}
          GAMMA_ECS_SSH_KEY: ${{ secrets.GAMMA_ECS_SSH_KEY }}
        run: |
          if [ -n "${GAMMA_ECS_SSH_KEY:-}" ] || [ -z "${GAMMA_ECS_PASSWORD:-}" ]; then
            echo "skip sshpass install"
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y sshpass
      - name: Deploy to ECS (prod)
        run: bash agent_ops/deploy/gamma/deploy_gamma_ecs.sh
        env:
          GAMMA_ECS_STAGE: prod
          GAMMA_ECS_SKIP_UPLOAD: "1"
          GAMMA_DEPLOY_IMAGE_VERSION: 0.0.${{ github.run_number }}
          GAMMA_ECS_PASSWORD: ${{ secrets.GAMMA_ECS_PASSWORD }}
          GAMMA_ECS_SSH_KEY: ${{ secrets.GAMMA_ECS_SSH_KEY }}
          GAMMA_BASE_URL: ${{ steps.urls.outputs.base_url }}
          GAMMA_PRODUCT_OPS_BASE_URL: ${{ steps.urls.outputs.product_ops_base_url }}
          GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
          GAMMA_ECS_CONTAINER_REGISTRY_MIRROR: ${{ vars.GAMMA_ECS_CONTAINER_REGISTRY_MIRROR }}
          GAMMA_ECS_IMAGE_PULL_TIMEOUT_SECONDS: ${{ vars.GAMMA_ECS_IMAGE_PULL_TIMEOUT_SECONDS }}
          GAMMA_ECS_SKIP_IMAGE_PREPULL: "1"
          GAMMA_ECS_COMPOSE_TIMEOUT_SECONDS: ${{ vars.GAMMA_ECS_COMPOSE_TIMEOUT_SECONDS }}
      - name: Upload ECS deploy report（prod）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ecs-onebox-deploy-report-prod
          path: artifacts/ecs-onebox/deploy-report.json
          if-no-files-found: ignore

  gamma_api_contract_prod:
    name: Gamma ECS — T3 API contract（prod 后）
    needs: [deploy_gamma_ecs_prod, gamma_pre_validation]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      API_CONTRACT_ENV: gamma
      GAMMA_BASE_URL: ${{ needs.gamma_pre_validation.outputs.base_url }}
      GAMMA_PRODUCT_OPS_BASE_URL: ${{ needs.gamma_pre_validation.outputs.product_ops_base_url }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: 准备 personal_assistant/.env
        run: |
          if [ -d quwoquan_app/personal_assistant ]; then
            mkdir -p quwoquan_app/personal_assistant
            if [ -f quwoquan_app/personal_assistant/.env.example ]; then
              cp quwoquan_app/personal_assistant/.env.example quwoquan_app/personal_assistant/.env
            else
              : > quwoquan_app/personal_assistant/.env
            fi
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: 安装 Flutter 依赖
        working-directory: quwoquan_app
        run: flutter pub get
      - name: T3 API Contract
        run: cd "$GITHUB_WORKSPACE" && make test-api-contract

  gamma_chat_avatar_api_probe_prod:
    name: Gamma ECS — chat avatar API probe（prod 后）
    needs: [deploy_gamma_ecs_prod, gamma_api_contract_prod, gamma_pre_validation]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GAMMA_BASE_URL: ${{ needs.gamma_pre_validation.outputs.base_url }}
      MEDIA_AVATAR_CDN_BASE_URL: ${{ needs.gamma_pre_validation.outputs.media_base_url }}
      GAMMA_TEST_AUTH_TOKEN: ${{ secrets.GAMMA_TEST_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Chat avatar API probe
        run: |
          python3 agent_ops/avatar/run_chat_avatar_e2e_probe.py \
            --env cloud-gamma-prod-smoke \
            --base-url "${GAMMA_BASE_URL}" \
            --media-base-url "${MEDIA_AVATAR_CDN_BASE_URL}" \
            --test-auth-token "${GAMMA_TEST_AUTH_TOKEN}" \
            --report artifacts/avatar-e2e/cloud-gamma-prod-smoke/avatar_e2e_report.json
      - name: Upload chat avatar API probe report（prod）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chat-avatar-api-probe-prod
          path: artifacts/avatar-e2e/cloud-gamma-prod-smoke/**
          if-no-files-found: ignore

  device_matrix_self_hosted_prod:
    name: Self-hosted — gamma 烟测（prod 后）
    needs: [deploy_gamma_ecs_prod, gamma_api_contract_prod, gamma_pre_validation]
    secrets: inherit
    uses: ./.github/workflows/app-env-device-matrix-self-hosted.yml
    with:
      validation_profile: manual_full
      env_json: '["gamma"]'
      gamma_base_url: ${{ needs.gamma_pre_validation.outputs.base_url }}
      matrix_kind: assistant

  device_matrix_chat_avatar_self_hosted_prod:
    name: Self-hosted — chat avatar gamma 烟测（prod 后）
    needs: [deploy_gamma_ecs_prod, gamma_chat_avatar_api_probe_prod, gamma_pre_validation]
    secrets: inherit
    uses: ./.github/workflows/app-env-device-matrix-self-hosted.yml
    with:
      validation_profile: manual_full
      env_json: '["gamma"]'
      gamma_base_url: ${{ needs.gamma_pre_validation.outputs.base_url }}
      media_base_url: ${{ needs.gamma_pre_validation.outputs.media_base_url }}
      matrix_kind: chat-avatar

  ecs_onebox_pre_summary:
    name: ECS Onebox — pre 门禁汇总
    needs: [required_checks_preflight, gamma_pre_validation]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 汇总 pre 阶段结果
        env:
          REQUIRED_CHECKS: ${{ needs.required_checks_preflight.result }}
          GAMMA_PRE: ${{ needs.gamma_pre_validation.result }}
        run: |
          echo "required_checks_preflight=${REQUIRED_CHECKS}"
          echo "gamma_pre_validation=${GAMMA_PRE}"
          test "${REQUIRED_CHECKS}" = "success"
          test "${GAMMA_PRE}" = "success"
