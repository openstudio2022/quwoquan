name: L3 API Contract (staging)

# 触发时机：
#   - daily cron 02:00 UTC（advisory，失败通知不阻塞 PR）
#   - 手动触发（调试用）
# 说明：v*-rc* 的 L3 由 pre-release-gate.yml 负责，此处不重复触发
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      fail_on_error:
        description: 'Fail job on test error (true = blocking)'
        required: false
        default: 'false'

env:
  FLUTTER_VERSION: '3.x'

jobs:
  api-contract:
    name: L3 API Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: quwoquan_app
        run: flutter pub get

      - name: Run L3 API Contract Tests
        working-directory: quwoquan_app
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          TEST_AUTH_TOKEN: ${{ secrets.STAGING_TEST_AUTH_TOKEN }}
        # staging 不可用时 markTestSkipped → 不 fail；手动 fail_on_error=true 时阻塞
        run: |
          set +e
          flutter test test/cloud/content/api_contract_runner.dart \
            --dart-define=STAGING_BASE_URL=$STAGING_BASE_URL \
            --dart-define=TEST_AUTH_TOKEN=$TEST_AUTH_TOKEN \
            --reporter expanded
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -ne 0 ]; then
            if [ "${{ github.event.inputs.fail_on_error }}" == "true" ]; then
              echo "::error::L3 API Contract tests FAILED (blocking mode)"
              exit $EXIT_CODE
            else
              echo "::warning::L3 API Contract tests failed (advisory — not blocking PR)"
              exit 0
            fi
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: l3-api-contract-results
          path: quwoquan_app/test-results/
          retention-days: 7
