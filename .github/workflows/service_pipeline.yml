# =============================================================================
# Service Pipeline — quwoquan_service CI/CD
# =============================================================================
# 触发条件：quwoquan_service/**、deploy/** 路径变动
# 流程：Go 构建与测试 + Python (rec-model-service) Docker 镜像 → kustomize 校验
# 当前部署目标：阿里云 ACK（deploy/kustomization/aliyun-prod）
#
# 【必须配置的 GitHub Secrets】（部署时）
#   DOCKER_REGISTRY     — Docker 镜像仓库地址，如 ghcr.io
#   DOCKER_TOKEN        — 镜像仓库推送凭证
#   KUBECONFIG          — 目标 K8s 集群 kubeconfig（base64 编码）
# =============================================================================

name: 02. Service Pipeline

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'quwoquan_service/**'
      - 'deploy/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'quwoquan_service/**'
      - 'deploy/**'
  workflow_dispatch:

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY || 'ghcr.io' }}
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-go:
    name: Go 构建与测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quwoquan_service
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod

      - name: 缓存 Go 模块
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            quwoquan_service/.cache
          key: go-mod-${{ runner.os }}-${{ hashFiles('quwoquan_service/go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      - name: Go 构建
        run: make build

      # L2 由 delivery-gate 负责，此处仅 build

  test-chat-service:
    name: chat-service 构建与测试
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'quwoquan_service/services/chat-service/') ||
      contains(github.event.head_commit.added, 'quwoquan_service/services/chat-service/') ||
      github.event_name == 'workflow_dispatch'
    services:
      mongodb:
        image: mongo:7-jammy
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: quwoquan_service
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod

      - name: 缓存 Go 模块
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            quwoquan_service/.cache
          key: go-mod-${{ runner.os }}-${{ hashFiles('quwoquan_service/go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      - name: 构建 chat-service
        run: go build ./services/chat-service/...

      - name: 测试 chat-service
        run: go test ./services/chat-service/... -v -count=1
        env:
          MONGO_URI: mongodb://localhost:27017

  test-user-service:
    name: user-service 构建与测试
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'quwoquan_service/services/user-service/') ||
      contains(github.event.head_commit.added, 'quwoquan_service/services/user-service/') ||
      github.event_name == 'workflow_dispatch'
    services:
      mongodb:
        image: mongo:7-jammy
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: quwoquan_service
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod

      - name: 缓存 Go 模块
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            quwoquan_service/.cache
          key: go-mod-${{ runner.os }}-${{ hashFiles('quwoquan_service/go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      - name: 构建 user-service
        run: go build ./services/user-service/...

      - name: 测试 user-service (L2)
        run: go test ./services/user-service/... -v -count=1 -timeout=120s
        env:
          TEST_MONGO_URI: mongodb://localhost:27017
          CI: "true"

  build-python:
    name: 构建 rec-model-service 镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 提取短 commit SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_TOKEN || secrets.GITHUB_TOKEN }}

      - name: 构建并推送 recommendation-service 镜像
        uses: docker/build-push-action@v5
        with:
          context: quwoquan_service/services/rec-model-service
          file: quwoquan_service/services/rec-model-service/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/recommendation-service:${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/recommendation-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-content-service:
    name: content-service 构建与测试
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'quwoquan_service/services/content-service/') ||
      contains(github.event.head_commit.added, 'quwoquan_service/services/content-service/') ||
      github.event_name == 'workflow_dispatch'
    services:
      mongodb:
        image: mongo:7-jammy
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: quwoquan_service
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod

      - name: 缓存 Go 模块
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            quwoquan_service/.cache
          key: go-mod-${{ runner.os }}-${{ hashFiles('quwoquan_service/go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      - name: 构建 content-service
        run: go build ./services/content-service/...

      - name: 测试 content-service
        run: go test ./services/content-service/... -v -count=1
        env:
          MONGO_URI: mongodb://localhost:27017

  test-rtc-service:
    name: rtc-service 构建与测试
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'quwoquan_service/services/rtc-service/') ||
      contains(github.event.head_commit.added, 'quwoquan_service/services/rtc-service/') ||
      github.event_name == 'workflow_dispatch'
    services:
      mongodb:
        image: mongo:7-jammy
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: quwoquan_service
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Go
        uses: actions/setup-go@v5
        with:
          go-version-file: quwoquan_service/go.mod

      - name: 缓存 Go 模块
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            quwoquan_service/.cache
          key: go-mod-${{ runner.os }}-${{ hashFiles('quwoquan_service/go.sum') }}
          restore-keys: |
            go-mod-${{ runner.os }}-

      - name: 构建 rtc-service
        run: go build ./services/rtc-service/...

      - name: 测试 rtc-service (L2)
        run: go test ./services/rtc-service/... -v -count=1 -timeout=120s
        env:
          TEST_MONGO_URI: mongodb://localhost:27017
          CI: "true"

  validate-deploy:
    name: 校验 Kustomize 部署
    needs:
      - build-go
      - build-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 kustomize
        uses: syntaqx/setup-kustomize@v1

      - name: Kustomize build 校验
        run: |
          kustomize build deploy/kustomization/aliyun-prod > /dev/null
          echo "Kustomize build (aliyun-prod) OK"

      - name: Kustomize build 校验 (chat-service overlays)
        run: |
          for env in dev integration prod; do
            kustomize build deploy/service/chat-service/kustomize/overlays/$env > /dev/null
            echo "chat-service overlay $env OK"
          done

      - name: Kustomize build 校验 (content-service overlays)
        run: |
          for env in dev integration prod; do
            kustomize build deploy/service/content-service/kustomize/overlays/$env > /dev/null
            echo "content-service overlay $env OK"
          done

      - name: Kustomize build 校验 (rtc-service overlays)
        run: |
          for env in dev integration prod; do
            kustomize build deploy/service/rtc-service/kustomize/overlays/$env > /dev/null
            echo "rtc-service overlay $env OK"
          done

      - name: Kustomize build 校验 (livekit-sfu overlays)
        run: |
          for env in dev integration prod; do
            kustomize build deploy/service/livekit-sfu/kustomize/overlays/$env > /dev/null
            echo "livekit-sfu overlay $env OK"
          done

      - name: Kustomize build 校验 (coturn overlays)
        run: |
          for env in dev integration prod; do
            kustomize build deploy/service/coturn/kustomize/overlays/$env > /dev/null
            echo "coturn overlay $env OK"
          done
