name: social_content_app
description: "一个支持Android、iOS、Web和WAP的社交及内容创造综合应用"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI & 导航
  cupertino_icons: ^1.0.8
  go_router: ^14.6.2
  flutter_screenutil: ^5.9.3
  
  # 状态管理
  provider: ^6.1.2
  riverpod: ^2.6.1
  flutter_riverpod: ^2.6.1
  
  # 网络请求
  http: ^1.2.2
  dio: ^5.7.0
  
  # 本地存储
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 认证
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  google_sign_in: ^6.2.1
  
  # 媒体处理
  image_picker: ^1.1.2
  video_player: ^2.9.2
  camera: ^0.11.0+2
  image: ^4.2.0
  
  # 社交功能
  url_launcher: ^6.3.1
  share_plus: ^10.0.2
  connectivity_plus: ^6.1.0
  
  # UI组件
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_staggered_grid_view: ^0.7.0
  
  # 工具类
  intl: ^0.20.2
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  
  # 代码生成
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: PingFang
      fonts:
        - asset: assets/fonts/PingFang-Regular.ttf
        - asset: assets/fonts/PingFang-Medium.ttf
          weight: 500
        - asset: assets/fonts/PingFang-Semibold.ttf
          weight: 600
        - asset: assets/fonts/PingFang-Bold.ttf
          weight: 700
