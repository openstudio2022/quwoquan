tasks:
  chat.group_avatar.recompute:
    ownerDomain: chat
    dispatcherModule: chat.task_outbox_dispatcher
    workerModule: chat.group_avatar_worker
    queue: reliabletask.chat.avatar
    partitionKey: conversationId
    payloadAllowlist: [rosterRevision, triggers, actorID]
    mergePolicy:
      delayFromNow: 2s
      maxDelay: 30s
      fields:
        rosterRevision: max
        triggers: union
    retryPolicy:
      maxAttempts: 8
      backoff: exponential
    retentionPolicyRef: reliabletask.retention.standard.v1
    rateLimitPolicyRef: reliabletask.rate.chat_avatar.v1
    runtimeFailureModule: CHAT.GROUP_AVATAR
  chat.roster_projection.rebuild:
    ownerDomain: chat
    dispatcherModule: chat.task_outbox_dispatcher
    workerModule: chat.roster_projection_worker
    queue: reliabletask.chat.projection
    partitionKey: conversationId
    payloadAllowlist: [rosterRevision]
    mergePolicy:
      delayFromNow: 10s
      maxDelay: 2m
      fields:
        rosterRevision: max
    retryPolicy:
      maxAttempts: 8
      backoff: exponential
    retentionPolicyRef: reliabletask.retention.standard.v1
    rateLimitPolicyRef: reliabletask.rate.projection.v1
    runtimeFailureModule: CHAT.ROSTER_PROJECTION
  chat.inbox_projection.update:
    ownerDomain: chat
    dispatcherModule: chat.task_outbox_dispatcher
    workerModule: chat.inbox_projection_worker
    queue: reliabletask.chat.projection
    partitionKey: conversationId
    payloadAllowlist: [maxSeq]
    mergePolicy:
      delayFromNow: 5s
      maxDelay: 1m
      fields:
        maxSeq: max
    retryPolicy:
      maxAttempts: 8
      backoff: exponential
    retentionPolicyRef: reliabletask.retention.standard.v1
    rateLimitPolicyRef: reliabletask.rate.projection.v1
    runtimeFailureModule: CHAT.INBOX_PROJECTION
  user.avatar.propagate:
    ownerDomain: user
    dispatcherModule: user.task_outbox_dispatcher
    workerModule: user.avatar_propagation_worker
    queue: reliabletask.user.avatar
    partitionKey: userId
    payloadAllowlist: [avatarVersion]
    mergePolicy:
      delayFromNow: 30s
      maxDelay: 5m
      fields:
        avatarVersion: max
    retryPolicy:
      maxAttempts: 8
      backoff: exponential
    retentionPolicyRef: reliabletask.retention.standard.v1
    rateLimitPolicyRef: reliabletask.rate.projection.v1
    runtimeFailureModule: USER.AVATAR_PROPAGATION
  content.search_index.refresh:
    ownerDomain: content
    dispatcherModule: content.task_outbox_dispatcher
    workerModule: content.search_index_worker
    queue: reliabletask.content.projection
    partitionKey: postId
    payloadAllowlist: [fromSeq, toSeq]
    mergePolicy:
      delayFromNow: 5s
      maxDelay: 1m
      fields:
        fromSeq: min
        toSeq: max
    retryPolicy:
      maxAttempts: 8
      backoff: exponential
    retentionPolicyRef: reliabletask.retention.standard.v1
    rateLimitPolicyRef: reliabletask.rate.projection.v1
    runtimeFailureModule: CONTENT.SEARCH_INDEX
  notification.patch.fanout:
    ownerDomain: notification
    dispatcherModule: notification.notification_outbox_dispatcher
    workerModule: notification.fanout_worker
    queue: reliabletask.notification.fanout
    partitionKey: recipientShard
    payloadAllowlist: [notificationId, recipientShard, patchType]
    mergePolicy:
      delayFromNow: 0s
      maxDelay: 0s
      fields:
        notificationId: identity
    retryPolicy:
      maxAttempts: 10
      backoff: exponential
    retentionPolicyRef: reliabletask.retention.notification.v1
    rateLimitPolicyRef: reliabletask.rate.notification_fanout.v1
    runtimeFailureModule: NOTIFICATION.FANOUT
