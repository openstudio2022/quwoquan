# prod-gray overrides (production gray release)
service:
  http:
    addr: ":18081"

mongodb:
  uri: "${MONGO_URI}"
  database: "quwoquan_chat"

redis:
  realtime:
    addr: "${REDIS_ADDR}"
  general:
    addr: "${REDIS_ADDR}"

runtime:
  media:
    group_avatar_cdn_base_url: "${CHAT_GROUP_AVATAR_CDN_BASE_URL}"
    group_avatar_local_media_root: "${CHAT_GROUP_AVATAR_LOCAL_MEDIA_ROOT}"
  sync:
    patch_ttl_hours: 720
  observability:
    runtime_media:
      group_avatar_recompute_duration_ms_p95: 500
      group_avatar_fallback_ratio: 0.05
      hint_to_pull_delay_ms_p95: 500
      patch_fanout_failure_ratio: 0.01
