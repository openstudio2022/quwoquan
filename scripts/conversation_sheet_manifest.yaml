  - path: quwoquan_app/lib/core/widgets/global_surface_actions.dart
    kind: uses_bottom_modal_custom
  - path: quwoquan_app/lib/ui/content/share/content_share_sheet.dart
    kind: uses_bottom_modal_custom
  - path: quwoquan_app/lib/components/comment_system/comment_viewer_modal.dart
    kind: uses_bottom_modal_custom
  - path: quwoquan_app/lib/ui/search/pages/global_search_page.dart
    kind: uses_bottom_modal_custom
  - path: quwoquan_app/lib/components/media/image/editor/image_editor_page.dart
    kind: uses_bottom_modal_custom
  - path: quwoquan_app/lib/ui/content/entry/pages/create_page.dart
    kind: uses_bottom_modal_custom
