# 贴底对话态 Sheet：`showCupertinoModalPopup` 允许清单（见 specs/ux/page-layout-semantics.md §4.4）。
# 新增调用方须登记，否则 verify_conversation_sheet_canonical.py 失败。
allowed_modal_popup:
  - path: quwoquan_app/lib/core/widgets/app_action_sheet.dart
