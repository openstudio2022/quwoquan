  - path: quwoquan_app/lib/components/media/video/viewer/immersive_video_viewer.dart
    kind: sheet_exception
    reason: 沉浸式视频控件栈上的控制浮层
  - path: quwoquan_app/lib/ui/rtc/pages/video_call_page.dart
    kind: sheet_exception
    reason: 通话中 RTC 控制条/列表面板
  - path: quwoquan_app/lib/ui/rtc/pages/voice_call_page.dart
    kind: sheet_exception
    reason: 语音通话内控制面板
