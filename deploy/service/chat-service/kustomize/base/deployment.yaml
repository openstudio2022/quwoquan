apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  labels:
    app.kubernetes.io/name: chat-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: chat-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chat-service
    spec:
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: chat-service
      containers:
        - name: chat-service
          image: chat-service/chat-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 18082
          env:
            - name: APP_ENV
              value: integration
            - name: SERVICE_NAME
              value: chat-service
            - name: CONFIG_ROOT
              value: /etc/chat-service
            - name: CONFIG_VERSION
              value: v0.0.0
            - name: IMAGE_VERSION
              value: v0.0.0
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /startupz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
