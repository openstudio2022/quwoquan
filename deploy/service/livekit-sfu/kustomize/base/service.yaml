apiVersion: v1
kind: Service
metadata:
  name: livekit-sfu
  labels:
    app.kubernetes.io/name: livekit-sfu
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: livekit-sfu
  ports:
    - name: http
      protocol: TCP
      port: 7880
      targetPort: http
    - name: rtc-tcp
      protocol: TCP
      port: 7881
      targetPort: rtc-tcp
    - name: rtc-udp
      protocol: UDP
      port: 7882
      targetPort: rtc-udp
