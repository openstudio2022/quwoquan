apiVersion: apps/v1
kind: Deployment
metadata:
  name: seed-box
  labels:
    app.kubernetes.io/name: seed-box
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: seed-box
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seed-box
    spec:
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: seed-box
      initContainers:
        - name: recommendation-service-config-bootstrap
          image: seed-box/recommendation-service:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -eu
              mkdir -p \
                /work/configs/recommendation-service/default \
                /work/configs/recommendation-service/alpha \
                /work/configs/recommendation-service/beta \
                /work/configs/recommendation-service/gamma \
                /work/configs/recommendation-service/prod-gray \
                /work/configs/recommendation-service/prod \
                /work/releases/config/recommendation-service
              cp /app/configs/default/config.yaml /work/configs/recommendation-service/default/config.yaml
              cp /app/configs/alpha/config.yaml /work/configs/recommendation-service/alpha/config.yaml
              cp /app/configs/beta/config.yaml /work/configs/recommendation-service/beta/config.yaml
              cp /app/configs/gamma/config.yaml /work/configs/recommendation-service/gamma/config.yaml
              cp /app/configs/prod-gray/config.yaml /work/configs/recommendation-service/prod-gray/config.yaml
              cp /app/configs/prod/config.yaml /work/configs/recommendation-service/prod/config.yaml
              if [ -d /app/releases/config/recommendation-service ]; then
                cp -R /app/releases/config/recommendation-service/. /work/releases/config/recommendation-service/
              fi
          volumeMounts:
            - name: recommendation-service-config-root
              mountPath: /work
      containers:
        - name: seed-box
          image: seed-box/seed-box:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_ENV
              value: gamma
            - name: SERVICE_NAME
              value: seed-box
            - name: CONFIG_ROOT
              value: /etc/seed-box-config
            - name: CONFIG_VERSION
              value: v0.0.0
            - name: IMAGE_VERSION
              value: v0.0.0
            - name: REC_MODEL_SERVICE_URL
              value: http://127.0.0.1:8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /startupz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
        - name: recommendation-service
          image: seed-box/recommendation-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: rec-http
              containerPort: 8000
          env:
            - name: APP_ENV
              value: gamma
            - name: SERVICE_NAME
              value: recommendation-service
            - name: CONFIG_ROOT
              value: /etc/seed-box-config
            - name: CONFIG_VERSION
              value: v0.0.0
            - name: IMAGE_VERSION
              value: v0.0.0
            - name: MONGODB_URI
              value: ""
            - name: MONGODB_DATABASE
              value: quwoquan_content
            - name: MODEL_ARTIFACT_ENDPOINT
              value: ""
            - name: MODEL_ARTIFACT_BUCKET
              value: quwoquan-models
            - name: MODEL_ARTIFACT_ACCESS_KEY
              value: ""
            - name: MODEL_ARTIFACT_SECRET_KEY
              value: ""
            - name: MODEL_CACHE_DIR
              value: /app/cache
          volumeMounts:
            - name: recommendation-service-config-root
              mountPath: /etc/seed-box-config
            - name: recommendation-service-cache
              mountPath: /app/cache
          readinessProbe:
            httpGet:
              path: /health
              port: rec-http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: rec-http
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /health
              port: rec-http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
        - name: user-service
          image: seed-box/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: user-http
              containerPort: 18081
          env:
            - name: APP_ENV
              value: gamma
            - name: SERVICE_NAME
              value: user-service
            - name: CONFIG_ROOT
              value: /etc/seed-box-config
            - name: CONFIG_VERSION
              value: v0.0.0
            - name: IMAGE_VERSION
              value: v0.0.0
          readinessProbe:
            httpGet:
              path: /healthz
              port: user-http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: user-http
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /startupz
              port: user-http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: recommendation-service-config-root
          emptyDir: {}
        - name: recommendation-service-cache
          emptyDir: {}
