apiVersion: apps/v1
kind: Deployment
metadata:
  name: seed-box
  labels:
    app.kubernetes.io/name: seed-box
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: seed-box
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seed-box
    spec:
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: seed-box
      containers:
        - name: seed-box
          image: seed-box/seed-box:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_ENV
              value: integration
            - name: SERVICE_NAME
              value: seed-box
            - name: CONFIG_ROOT
              value: /etc/seed-box-config
            - name: CONFIG_VERSION
              value: v0.0.0
            - name: IMAGE_VERSION
              value: v0.0.0
            - name: REC_MODEL_URL
              value: http://127.0.0.1:18090
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /startupz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
        - name: recommendation-service
          image: seed-box/recommendation-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: rec-http
              containerPort: 18090
          env:
            - name: APP_ENV
              value: integration
            - name: SERVICE_NAME
              value: recommendation-service
            - name: CONFIG_ROOT
              value: /etc/seed-box-config
            - name: CONFIG_VERSION
              value: v0.0.0
            - name: IMAGE_VERSION
              value: v0.0.0
          readinessProbe:
            httpGet:
              path: /health
              port: rec-http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: rec-http
            initialDelaySeconds: 15
            periodSeconds: 20
          startupProbe:
            httpGet:
              path: /health
              port: rec-http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
