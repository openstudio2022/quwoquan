apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: seed-box-integration
images:
  - name: seed-box/seed-box
    newTag: v2026.02.28.0
  - name: seed-box/recommendation-service
    newTag: v2026.02.28.0
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: deploy-params
    literals:
      - APP_ENV=gamma
      - CONFIG_VERSION=v2026.02.28.0
      - IMAGE_VERSION=v2026.02.28.0
      - REPLICAS=2
      - HPA_MIN_REPLICAS=2
      - HPA_MAX_REPLICAS=6
      - HPA_CPU_AVG=70
      - HPA_MEM_AVG=75
replacements:
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.APP_ENV
    targets:
      - select:
          kind: Deployment
          name: seed-box
        fieldPaths:
          - spec.template.spec.containers.[name=seed-box].env.[name=APP_ENV].value
          - spec.template.spec.containers.[name=recommendation-service].env.[name=APP_ENV].value
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.CONFIG_VERSION
    targets:
      - select:
          kind: Deployment
          name: seed-box
        fieldPaths:
          - spec.template.spec.containers.[name=seed-box].env.[name=CONFIG_VERSION].value
          - spec.template.spec.containers.[name=recommendation-service].env.[name=CONFIG_VERSION].value
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.IMAGE_VERSION
    targets:
      - select:
          kind: Deployment
          name: seed-box
        fieldPaths:
          - spec.template.spec.containers.[name=seed-box].env.[name=IMAGE_VERSION].value
          - spec.template.spec.containers.[name=recommendation-service].env.[name=IMAGE_VERSION].value
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.REPLICAS
    targets:
      - select:
          kind: Deployment
          name: seed-box
        fieldPaths:
          - spec.replicas
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.HPA_MIN_REPLICAS
    targets:
      - select:
          kind: HorizontalPodAutoscaler
          name: seed-box
        fieldPaths:
          - spec.minReplicas
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.HPA_MAX_REPLICAS
    targets:
      - select:
          kind: HorizontalPodAutoscaler
          name: seed-box
        fieldPaths:
          - spec.maxReplicas
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.HPA_CPU_AVG
    targets:
      - select:
          kind: HorizontalPodAutoscaler
          name: seed-box
        fieldPaths:
          - spec.metrics.0.resource.target.averageUtilization
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.HPA_MEM_AVG
    targets:
      - select:
          kind: HorizontalPodAutoscaler
          name: seed-box
        fieldPaths:
          - spec.metrics.1.resource.target.averageUtilization
