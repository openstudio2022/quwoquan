apiVersion: v1
kind: Service
metadata:
  name: coturn
  labels:
    app.kubernetes.io/name: coturn
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: coturn
  ports:
    - name: turn-tcp
      protocol: TCP
      port: 3478
      targetPort: turn-tcp
    - name: turn-udp
      protocol: UDP
      port: 3478
      targetPort: turn-udp
    - name: turn-tls
      protocol: TCP
      port: 5349
      targetPort: turn-tls
