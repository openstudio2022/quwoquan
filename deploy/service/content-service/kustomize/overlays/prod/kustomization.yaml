apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namespace: content-service-prod
images:
  - name: content-service/content-service
    newTag: v2026.03.08.0
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: deploy-params
    literals:
      - APP_ENV=prod
      - CONFIG_VERSION=v2026.03.08.0
      - IMAGE_VERSION=v2026.03.08.0
      - REPLICAS=3
      - HPA_MIN_REPLICAS=3
      - HPA_MAX_REPLICAS=12
      - HPA_CPU_AVG=65
      - HPA_MEM_AVG=70
replacements:
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.APP_ENV
    targets:
      - select:
          kind: Deployment
          name: content-service
        fieldPaths:
          - spec.template.spec.containers.[name=content-service].env.[name=APP_ENV].value
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.CONFIG_VERSION
    targets:
      - select:
          kind: Deployment
          name: content-service
        fieldPaths:
          - spec.template.spec.containers.[name=content-service].env.[name=CONFIG_VERSION].value
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.IMAGE_VERSION
    targets:
      - select:
          kind: Deployment
          name: content-service
        fieldPaths:
          - spec.template.spec.containers.[name=content-service].env.[name=IMAGE_VERSION].value
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.REPLICAS
    targets:
      - select:
          kind: Deployment
          name: content-service
        fieldPaths:
          - spec.replicas
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.HPA_MIN_REPLICAS
    targets:
      - select:
          kind: HorizontalPodAutoscaler
          name: content-service
        fieldPaths:
          - spec.minReplicas
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.HPA_MAX_REPLICAS
    targets:
      - select:
          kind: HorizontalPodAutoscaler
          name: content-service
        fieldPaths:
          - spec.maxReplicas
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.HPA_CPU_AVG
    targets:
      - select:
          kind: HorizontalPodAutoscaler
          name: content-service
        fieldPaths:
          - spec.metrics.0.resource.target.averageUtilization
  - source:
      kind: ConfigMap
      name: deploy-params
      fieldPath: data.HPA_MEM_AVG
    targets:
      - select:
          kind: HorizontalPodAutoscaler
          name: content-service
        fieldPaths:
          - spec.metrics.1.resource.target.averageUtilization
