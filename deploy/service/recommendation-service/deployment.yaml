apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recommendation-service
  template:
    metadata:
      labels:
        app: recommendation-service
    spec:
      containers:
        - name: recommendation-service
          image: quwoquan/recommendation-service:1.0.0
          env:
            - name: APP_ENV
              value: prod
            - name: SERVICE_NAME
              value: recommendation-service
            - name: CONFIG_VERSION
              value: v2026.02.28.0
            - name: IMAGE_VERSION
              value: "1.0.0"
            - name: CONFIG_ROOT
              value: /etc/qwq-config
