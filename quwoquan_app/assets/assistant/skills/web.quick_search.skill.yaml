id: web.quick_search
name: 快速搜索
description: 知识问答主入口，支持财经/出行/天气/情感/健康/易经场景
version: 1.0.0
executionTarget: tool_chain
visibility: both
category: knowledge
toolChainProfile: knowledge_qa
tier: free
defaultEnabled: true
channelScopes:
  - app
  - feishu
  - openclaw
deviceScopes:
  - mobile
  - tablet
  - pc
versionPolicy: semver
permissions:
  - network
permissionScopes:
  - search
  - web_search
allowedTools:
  - search
  - web_search
parametersSchema:
  type: object
  properties:
    query:
      type: string
    provider:
      type: string
    backupProviders:
      type: array
    maxEvidence:
      type: number
