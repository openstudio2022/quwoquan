id: reminder.intent
name: 系统提醒
description: 通过系统 Intent/原生 API 创建提醒
version: 1.0.0
executionTarget: native_api
visibility: app_only
category: productivity
tier: pro
channelScopes:
  - app
deviceScopes:
  - mobile
  - tablet
versionPolicy: semver
permissions:
  - notification
permissionScopes:
  - intent_bridge
parametersSchema:
  type: object
  properties:
    title:
      type: string
    time:
      type: string
