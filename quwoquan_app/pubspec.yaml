    - assets/personal_assistant/prompts/domains/calendar_task/
    - assets/personal_assistant/prompts/domains/calendar_task/dialogue/
    - assets/personal_assistant/prompts/domains/knowledge_general/
    - assets/personal_assistant/prompts/domains/knowledge_general/dialogue/
