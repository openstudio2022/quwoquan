    - assets/personal_assistant/prompts/domains/work_productivity/
    - assets/personal_assistant/prompts/domains/work_productivity/dialogue/
    - assets/personal_assistant/prompts/domains/shopping_decision/
    - assets/personal_assistant/prompts/domains/shopping_decision/dialogue/
    - assets/personal_assistant/prompts/domains/policy_public_service/
    - assets/personal_assistant/prompts/domains/policy_public_service/dialogue/
    - assets/personal_assistant/prompts/domains/emotion_companion/
    - assets/personal_assistant/prompts/domains/emotion_companion/dialogue/
    - assets/personal_assistant/prompts/domains/social_companion_chat/
    - assets/personal_assistant/prompts/domains/social_companion_chat/dialogue/
    - assets/personal_assistant/prompts/domains/relationship_matchmaking/
