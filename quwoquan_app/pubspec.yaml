name: quwoquan_app
description: 趣我圈 - 跨多设备社交媒体应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.41.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1
  
  # UI相关
  cupertino_icons: ^1.0.9
  flutter_screenutil: ^5.9.3
  flutter_localizations:
    sdk: flutter
  
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 网络请求
  http: ^1.6.0
  dio: ^5.9.2
  
  # 工具类
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  
  # 图片处理
  cached_network_image: ^3.4.1
  image_picker: ^1.2.2
  photo_manager: ^3.9.0
  camera: ^0.12.0+1
  
  # 视频播放
  video_player: ^2.11.1
  chewie: ^1.13.1
  video_thumbnail: ^0.5.6
  
  # 其他
  intl: ^0.20.2
  uuid: ^4.5.3
  go_router: ^17.2.3
  photo_view: ^0.15.0
  flutter_staggered_grid_view: ^0.7.0
  yaml: ^3.1.3
  crypto: ^3.0.7
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  geolocator: ^14.0.2
  google_fonts: ^8.1.0
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.3.1
  file_picker: ^11.0.2
  permission_handler: ^12.0.1
  speech_to_text: ^7.3.0
  
  # 语音消息
  record: ^6.2.0
  just_audio: ^0.10.5
  audio_session: ^0.2.3
  connectivity_plus: ^7.1.1

  # 实时音视频通话
  livekit_client: ^2.7.0
  flutter_callkit_incoming: ^3.0.0
  web_socket_channel: ^3.0.3
  webview_flutter: ^4.13.1
  sqflite: ^2.4.2+1
  sqflite_common_ffi: ^2.4.0+3

  # Repository 抽象（Mock/Remote 共用）；见 packages/quwoquan_cloud_contracts
  quwoquan_cloud_contracts:
    path: ../packages/quwoquan_cloud_contracts
  quwoquan_runtime_errors:
    path: ../packages/quwoquan_runtime_errors

dev_dependencies:
  flutter_test:
    sdk: flutter
  webview_flutter_platform_interface: ^2.15.1
  flutter_lints: ^6.0.0
  # L4 Patrol E2E（真实设备 / Firebase Test Lab）
  patrol: ^4.5.0
  integration_test:
    sdk: flutter
  build_runner: ^2.15.0
  test: ^1.31.1

dependency_overrides:
  # 暂时锁定到不依赖 objective_c native asset 的版本，规避 iOS 启动白屏
  path_provider_foundation: 2.5.1
  # livekit 传递依赖；升到 1.4.1 以对齐上游修复
  flutter_webrtc: ^1.4.1
  characters: ^1.4.1
  matcher: ^0.12.20
  meta: ^1.18.2
  test: ^1.31.1
  test_api: ^0.7.12
  test_core: ^0.6.18
  dart_style: ^3.1.9
  material_color_utilities: ^0.13.0
  # record_linux 0.7.2 缺少 record_platform_interface 1.5.0 新增的 startStream/hasPermission 签名
  record_linux: ^1.3.0

flutter:
  generate: true
  uses-material-design: true
  
  assets:
    - assets/filters/filter_presets.json
    - ../quwoquan_service/contracts/metadata/social/circle/ui_category_tabs.yaml
    - assets/assistant/config/

  shaders:
    - shaders/article_page_curl_lighting.frag
    - shaders/article_page_curl_backface.frag
  
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf

patrol:
  test_directory: test/patrol
