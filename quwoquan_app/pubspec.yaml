name: quwoquan_app
description: 趣我圈 - 跨多设备社交媒体应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: ">=3.38.0"

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^3.2.1
  riverpod: ^3.2.1
  
  # UI相关
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.0
  flutter_localizations:
    sdk: flutter
  
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 网络请求
  http: ^1.2.0
  dio: ^5.9.0
  
  # 工具类
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # 图片处理
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  photo_manager: ^3.7.1
  camera: ^0.11.1
  
  # 视频播放
  video_player: ^2.8.2
  chewie: ^1.7.4
  video_thumbnail: ^0.5.6
  
  # 其他
  intl: ^0.20.2
  uuid: ^4.2.1
  go_router: ^17.1.0
  photo_view: ^0.15.0
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.0
  test: ^1.29.0

dependency_overrides:
  # 强制升级传递依赖到最新版本
  analyzer: ^10.0.0
  _fe_analyzer_shared: ^94.0.0
  characters: ^1.4.1
  matcher: ^0.12.18
  meta: ^1.18.0
  test: ^1.29.0
  test_api: ^0.7.9
  test_core: ^0.6.15
  dart_style: ^3.1.4
  material_color_utilities: ^0.13.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/filters/filter_presets.json
  
  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
