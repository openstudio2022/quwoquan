template_id: content_template_article_post
label: 文章帖
summary: 面向攻略、游记与结构化长文的文章帖模板，生成 article/work 类型的 Post payload。
content_type: article
content_identity: work
required_post_fields:
  - contentType
  - contentIdentity
  - title
  - summary
  - coverUrl
  - articleMarkdown
  - articleMarkdownVersion
  - articleAssetManifest
  - articleRenderProfile
  - tags
optional_post_fields:
  - locationName
  - visibility
  - assistantUsePolicy
  - authorDisplayNameSnapshot
  - authorAvatarUrlSnapshot
semantic_fields:
  - entity_refs
  - tag_refs
  - source_urls
