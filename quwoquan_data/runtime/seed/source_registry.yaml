    discoveryMode: search_entry
    verticals: [general, travel, auto, image]
    mediaTypes: [article, image]
    searchTemplate: "https://www.xiaohongshu.com/search_result?keyword={query_enc}"
  - sourceId: weibo
    domain: s.weibo.com
