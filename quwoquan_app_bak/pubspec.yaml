name: quwoquan_app
description: 趣我圈 - 跨多设备社交媒体应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  
  # 状态管理
  flutter_riverpod: ^3.0.0
  riverpod: ^3.0.0
  
  # UI相关
  flutter_screenutil: ^5.9.0
  flutter_localizations:
    sdk: flutter
  
  # 本地存储
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # 网络请求
  http: ^1.2.0
  dio: ^5.4.0
  
  # 工具类
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  
  # 图片处理
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  
  # 视频播放
  video_player: ^2.8.2
  chewie: ^1.7.4
  
  # 其他
  intl: ^0.20.2
  uuid: ^4.2.1
  go_router: ^14.0.0
  photo_view: ^0.14.0
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
