version: 1
policy:
  single_source_of_truth:
    feature_catalog: "changes/feature_catalog.yaml"
    changelog: "specs/changelog/"
    global_specs: "specs/"
    root_rules: ".cursor/rules/"
    root_commands: ".cursor/commands/"

verification_rules:
  feature_traceability: { script: "scripts/verify_feature_traceability.sh" }
  contract_metadata: { script: "scripts/verify_contract_metadata.sh" }
  specs_l1: { script: "scripts/verify_specs_l1_hierarchy.sh" }
  feature_tree: { script: "scripts/verify_feature_tree_refactor.sh" }
  engineering: { script: "scripts/verify_engineering_directory.sh" }
  opsx_8services: { script: "scripts/verify_opsx_ff_8services_consistency.sh" }
  opsx_8services_scope:
    services: [gateway-service, orchestrator-service, content-service, circle-service, user-service, chat-service, assistant-service, product-ops]
    required: [design.md, tasks.md, specs/*/spec.md, services/*/]

required_directories:
  - "changes"
  - "specs"
  - "specs/changelog"
  - "specs/feature-tree"
  - "scripts"
  - ".cursor/rules"
  - ".cursor/commands"
  - "quwoquan_app"
  - "quwoquan_service/contracts"
  - "quwoquan_service/platform/observability"
  - "quwoquan_service/platform/config"

required_files:
  - "README.md"
  - "Makefile"
  - "scripts/gate_repo.sh"
  - "scripts/new_feature_fullstack.sh"
  - "scripts/new_service_fullstack.sh"
  - "scripts/bootstrap_service_config_layout.sh"
  - "scripts/verify_feature_traceability.sh"
  - "scripts/verify_contract_metadata.sh"
  - "scripts/verify_acceptance_standard.sh"
  - "scripts/verify_specs_l1_hierarchy.sh"
  - "scripts/verify_feature_tree_refactor.sh"
  - "scripts/verify_service_config_layout.sh"
  - "scripts/verify_service_env_contract.sh"
  - "scripts/verify_config_release_version_mapping.sh"
  - "scripts/verify_config_image_compat.sh"
  - "scripts/scaffold_feature_tree_from_yaml.sh"
  - "changes/README.md"
  - "changes/feature_catalog.yaml"
  - "specs/00_AGENT_MASTER_SPEC.md"
  - "specs/l1_index.yaml"
  - "specs/feature-tree/README.md"
  - "specs/feature-tree/tree_index.yaml"
  - "specs/changelog/README.md"
  - "specs/README.md"
  - ".cursor/rules/06-doc-authority-hierarchy.mdc"

compatibility_files_must_be_pointer:
  - "quwoquan_service/.cursor/rules/00-quwoquan-service-core.mdc"
  - "quwoquan_service/.cursor/rules/01-contracts-openapi.mdc"
  - "quwoquan_service/.cursor/rules/02-specs-tasks-docs.mdc"
  - "quwoquan_service/.cursor/rules/03-feature-delivery-workflow.mdc"
  - "quwoquan_service/.cursor/rules/04-fullstack-metadata-consistency.mdc"
pointer_required_keywords:
  - "兼容指引"
  - "已迁移"
