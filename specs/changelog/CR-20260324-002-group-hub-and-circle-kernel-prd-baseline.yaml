    summary: >
      完成群组主线 `/design` 基线：冻结 CircleGroup 子单元模型、双模板详情页、
      组织节点内容聚合、公共群/自建群治理边界，以及搜索侧“群组”用户词与统一
      Search 接口口径，并补齐对应 `plan.yaml`。
    reason: >
      `/prd` 已解决命名和边界问题，但在真正进入 `/dev` 前，仍缺少可实施的设计层真相源：
      其一，群仍可能被误当成 Conversation；其二，圈子详情和组织主页还没有共享壳层与
      模板分流设计；其三，搜索侧虽已改名为“群组”，但尚未冻结统一 Search 接口与内部
      provider 的关系。为确保后续开发切片可执行、测试证据可映射、metadata/codegen
      路径可落地，本次补齐 `/design` 与 `plan.yaml`，并完成 G1 校验。
