  - timestamp: "2026-03-24T18:30:00+08:00"
    summary: >
      重新冻结群组主线 PRD：把首页与搜索中的统一入口词从“圈子”收口为“群组”，
      并将 circle-community 基线升级为“群组入口 + 圈子内核 + 组织主页模板”，
      同时明确内容、成员、群与具体事物的边界。
    reason: >
      继续推进圈子开发前，现有规格在三个层面已经出现认知断裂：其一，学校、院系、班级、
      公司、部门并不适合作为“圈子”总称，却又需要和兴趣圈共享一个全局入口；
      其二，详情页仍只有单一兴趣圈模板，无法承接组织型关系主页；其三，内容发布、
      成员层级、公共群/自建群、以及具体事物关联边界仍未冻结。为了后续拆出“具体事物”
      独立会话，同时保证当前圈子主线可以继续进入设计与实现，必须先完成一次新的 `/prd`
      基线重写。
    change_type:
      - refine
      - rename
      - expand
