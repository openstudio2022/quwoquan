  - timestamp: "2026-03-27T16:30:00+08:00"
    summary: >
      基于最新搜索澄清结果，完成 `global-search-experience` 的 unified search topology baseline：
      将聊天搜索收口为本地搜索 contract，新增治理型 L2 承接 canonical search contract、
      object taxonomy、execution routing、`circle.group` fallback，以及云侧搜索读模型弹性拓扑。
    reason: >
      既有 `global-search-experience` 基线已经冻结了统一旅程，但新的业务前提进一步明确：
      聊天相关对象必须端侧搜索、`circle.group` 需云优先再本地 fallback、搜索建议只能有一个接口、
      云侧搜索读路径必须具备读写分离、多读切片与未来统一高性能读库的替换边界。若继续仅靠 Journey 文档承接，
      将再次出现页面体验统一、接口语义分裂、provider routing 分散与存储拓扑缺失的问题，因此必须完成一次新的
      baseline 增量，把体验与架构分别冻结为两个 L2。
    change_type:
      - refine
      - expand
      - split
      - design
      - plan
