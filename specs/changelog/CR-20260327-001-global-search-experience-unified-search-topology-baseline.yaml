      - `social-relationship-search-contract` 已退出主特性树引用，聊天搜索主语义由 `local-chat-search-contract` 承接。
      - 云侧搜索方案冻结为“按域写入、读模型查询、多读切片弹性、未来统一读库可替换”。
  - timestamp: "2026-03-27T16:55:00+08:00"
    summary: >
      进一步补强 unified search baseline：明确 canonical `search(request)` 必须可直接生成
      AI agent 检索 tool schema，查询条件允许由模型生成但必须受 typed schema / allowlist /
      资源边界约束；同时删除旧的 `social-relationship-search-contract` 目录文件，避免保留旧真相源。
    reason: >
      用户进一步要求后续端云开发按高规格推进，统一搜索接口除了服务页面与云端之外，还必须稳定复用于
      AI agent tool 调用场景；这要求 contract 在设计阶段就具备 tool-facing、typed、可审计、可限流的边界。
      同时，旧 `social-relationship-search-contract` 目录若继续保留，会与新的 `local-chat-search-contract`
      主语义形成干扰，因此需要在 baseline 阶段直接清理。
    change_type:
      - refine
      - expand
      - cleanup
