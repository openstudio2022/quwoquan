  - timestamp: "2026-03-27T17:10:00+08:00"
    summary: >
      进一步把 unified search contract 冻结为 web-search-like 的 query-first 接口：
      AI 在私人助理回答中可基于同一 tool 做“主题拆分 -> 关键词检索”，并统一召回
      `web.document` 与趣我圈内内容、关系、群组、实体对象。
    reason: >
      用户进一步强调，搜索接口不仅要可被 AI agent 调用，还必须像网页检索一样简单，
      让模型稳定生成关键词而不是被复杂 DSL 绕住。为避免后续 `/dev` 回到重表达式、深嵌套结构、
      或把网页检索与站内检索拆成两套接口，本次将“query-first、web-like、统一召回源”正式写入
      spec / acceptance / plan / topology 设计。
    change_type:
      - refine
      - simplify
      - expand
