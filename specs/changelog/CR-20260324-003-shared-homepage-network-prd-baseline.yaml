  - timestamp: "2026-03-24T19:20:00+08:00"
    summary: >
      将 `shared-homepage-network/spec.md` 进一步细化为正式 PRD 正文结构，
      并正式拆出首个 L2 Journey `homepage-discovery-and-attach-journey`，
      冻结主页搜索、主页补充与发布挂载的端到端旅程。
    reason: >
      L1 baseline 已完成能力边界冻结，但若不继续把“发现主页并挂载主页”拆成正式 Journey，
      后续 `/prd` 与 `/design` 仍会停留在 L1 抽象层，无法直接继续细化发布、搜索和主页选择器的端到端链路。
      该 Journey 是共享主页主线里最先落地、最直接连接内容系统的主路径，必须优先下钻。
