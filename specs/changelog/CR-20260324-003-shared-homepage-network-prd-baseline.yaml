    summary: >
      新建独立 L1 `shared-homepage-network`，冻结共享主页的 baseline：
      包含主页定义、四类主页范围、口碑模板、认领与下线合同、内容挂载契约、
      对群组的集成边界，以及前台/PRD/服务三层命名分层。
    reason: >
      当前产品缺少围绕具体事物的长期主页能力，导致内容挂载、口碑沉淀、
      搜索发现、认领维护和下线治理都没有统一落点；同时“实体/对象/directory”
      等内部词不适合作为用户语言。进入后续 `/prd` 与 `/design` 前，
      必须先冻结共享主页能力域、服务边界、baseline 类目范围和端云一体化契约。
