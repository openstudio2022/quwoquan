version: 1
feature: propagation-completeness-check
level: L5_leaf
status: specified
archived: false
feature_path: gateway-orchestrator-foundation.request-context-propagation.client-context-propagation.page-session-device-propagation.propagation-completeness-check
parent_path: gateway-orchestrator-foundation.request-context-propagation.client-context-propagation.page-session-device-propagation

non_functional_acceptance:
  realtime:
    enabled: false
    slo: []
  weak_network:
    enabled: true
    scenarios:
      - 重试后 operation / surface 不漂移
      - 页面回退后再次进入同一入口时 header 口径一致
  performance:
    budgets:
      - gateway 消费上游常量，不新增热路径查表
  elasticity:
    assumptions:
      - 支持分域逐步迁移；旧 header 与新 metadata 口径可双写一段时间
  gray_release:
    enabled: true
    steps: [5, 25, 50, 100]
    slo_gates:
      - 请求头中 surface / operation 口径缺失率为 0
      - Router 使用生成常量后的关键路由打开成功率不低于迁移前
    rollback_on:
      - 出现业务路由断链
      - 出现 request header / decoder context 漂移

level_acceptance:
  A1:
    criteria: gateway / downstream 传播链路完整接收来自上游 codegen 的 operation_id / surface_id，不依赖业务字符串推断
    status: pending
    linked_tasks: [T1, T2]
    test_layers:
      T1: required
      T2: required
      T3: required
      T4: optional
    tests:
      - propagation contract tests
      - gateway integration checks

  A2:
    criteria: 兼容期旧 `X-Client-Page-Id` 与新 operation/surface 口径双写一致
    status: pending
    linked_tasks: [T1, T2]
    test_layers:
      T1: required
      T2: required
      T3: required
      T4: optional
    tests:
      - header propagation assertions

  A3:
    criteria: 弱网重试、页面重入、回退后 operation / surface / decoder context 口径稳定
    status: pending
    linked_tasks: [T2, T3]
    test_layers:
      T1: optional
      T2: required
      T3: required
      T4: required
    tests:
      - retry / re-entry integration tests

focus_groups:
  - gateway
  - platform

execution:
  local_gate: make gate
  full_gate: make gate-full
