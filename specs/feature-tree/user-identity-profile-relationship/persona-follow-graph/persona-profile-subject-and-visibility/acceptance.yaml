version: 2
feature: persona-profile-subject-and-visibility
level: L3_scenario
source_path: user-identity-profile-relationship/persona-follow-graph/persona-profile-subject-and-visibility
parent_journey: persona-follow-graph
archived: false

execution:
  local_gate: make gate
  full_gate: make gate-full

scope:
  summary: >
    冻结分身公开身份 `ProfileSubject`、owner 基线与分身覆写、可见性与停用后的记录归因规则。
  journey_bindings:
    - J1
    - J3
  in_scope:
    - "`ProfileSubjectView / ProfileSubjectMutation`"
    - owner 基线、分身覆写与同步范围
    - strict isolation 与公开读取规则
    - 停用分身后的记录归因与作者快照合同
  out_of_scope:
    - 主页壳层视觉与滚动
    - 分身管理台入口与列表
    - 下游透传与动作主体切换

scenario_acceptance:
  A1:
    title: "`ProfileSubject` 成为唯一公开身份真相源"
    scenario: "主页、内容卡、评论、聊天等公开作者展示统一消费 `ProfileSubject`"
    journey_step: resolve public persona identity
    done_when:
      - "公开读取统一返回 `ProfileSubject`"
      - "`userHandle` 成为公开句柄真相源，`username` 不再承担跨域内部主键语义"
      - 公开接口不暴露可反推同一用户多分身关系的内部字段与映射关系
    edge_cases:
      - 同一个 owner 拥有多个分身
      - username 变更后内部引用仍稳定
    linked_plan_items:
      - P1
      - P2
    evidence:
      primary:
        - T1_schema
        - T3_cross_service_integration
      supporting:
        - T2_module_interaction
    tests:
      planned:
        - profile subject contract test
        - public read model regression test
      recorded:
        - "T1: `make -C quwoquan_service verify-metadata && make codegen && make codegen-app`"
        - "T3: `go test ./services/user-service/...`"
        - "T2: `flutter test test/cloud/user/contract/user_profile_wire_dto_contract_test.dart test/cloud/integration/remote_api_path_contract_test.dart test/ui/user/providers/profile_state_provider_test.dart`"
    notes:
      - "公开 `ProfileSubject` 已收口到 `userHandle + profileSubjectId` 双轨语义：公开句柄走 `userHandle`，内部稳定主键走 `profileSubjectId`。"
      - "公开读不再返回 `ownerUserId`，strict/retired persona 均返回 404。"
    status: implemented
  A2:
    title: owner 基线、分身覆写与同步范围显式可控
    scenario: owner 编辑 owner 或分身资料，并选择同步目标
    journey_step: edit public persona profile
    done_when:
      - 新分身默认继承 owner 公开资料基线
      - 分身只保存覆写字段
      - 写入契约显式支持 apply scope 与 sync targets
      - UI 可以消费该契约做同步提示，但不自建第二真相源
    edge_cases:
      - 同时编辑 owner 与某个分身
      - 只同步部分字段到选定分身
    linked_plan_items:
      - P2
      - P3
    evidence:
      primary:
        - T1_schema
        - T2_module_interaction
      supporting:
        - T3_cross_service_integration
    tests:
      planned:
        - profile subject mutation schema test
        - sync prompt widget test
        - owner to persona sync contract test
      recorded:
        - "T1/T3: `go test ./services/user-service/...`"
        - "T2: `flutter test test/cloud/user/contract/user_repository_contract_test.dart test/ui/user/journeys/edit_profile_journey_test.dart`"
        - "T2: `flutter test test/cloud/user/contract/user_profile_wire_dto_contract_test.dart`"
    notes:
      - "`ProfileSubjectMutation` 已显式承载 `applyScope / syncTargetIds / fieldsMask`，资料同步不再依赖 UI 私有状态。"
      - "A2 首批真实支持字段已收口为 `displayName / userHandle / phone / email / avatarUrl`；`isolationLevel / purposeHint` 为当前分身局部管理字段。"
      - "`backgroundUrl / bio` 继续作为 owner 基线公开读字段返回，`profileVisibility` 继续由 `isolationLevel` 派生，不再伪装成 persona 可写字段。"
    status: implemented
  A3:
    title: 可见性与停用后的记录归因稳定
    scenario: 分身进入 strict isolation 或停用后，公开读取与记录对象作者渲染仍符合预期
    journey_step: read retired or hidden persona
    done_when:
      - strict isolation 的公开读取返回不可见语义
      - 停用分身不再作为新动作主体
      - 记录内容、评论、聊天消息与通知继续使用不可变作者快照
      - 记录归因不被重绑到 owner 或其它分身
    edge_cases:
      - 停用分身仍有公开内容
      - 分身停用后再次激活
    linked_plan_items:
      - P3
      - P4
    evidence:
      primary:
        - T1_schema
        - T3_cross_service_integration
      supporting:
        - T2_module_interaction
    tests:
      planned:
        - strict isolation not found contract test
        - retired persona attribution regression test
      recorded:
        - "T3: `go test ./services/user-service/...`"
        - "T2: `flutter test test/ui/content/post_read_projection_facade_test.dart test/cloud/chat/chat_message_snapshot_contract_test.dart`"
    notes:
      - "`HasAttributedHistory` 已扩展为 `invite/greeting + posts/comments/messages/notifications` 四类记录来源联合判断。"
      - "retired persona 公开页关闭，但内容/评论/聊天的记录快照读取已被契约测试覆盖。"
    status: implemented

story_readiness:
  S1:
    title: 公开身份契约可被主页与内容域安全消费
    done_when:
      - profile-homepage-redesign 只消费本场景冻结的 user 域模型
      - content/chat/circle/assistant 不再复制 persona 公开身份规则
      - visibility 与 retired attribution 指标可观测
    evidence:
      primary:
        - T1_schema
        - T2_module_interaction
      supporting:
        - T4_user_journey
    tests:
      planned:
        - profile consumer contract verification
        - visibility telemetry verification
      recorded:
        - "T1: `make -C quwoquan_service verify-metadata && make codegen && make codegen-app`"
        - "T2: `flutter test test/cloud/integration/remote_api_path_contract_test.dart test/ui/content/post_read_projection_facade_test.dart test/ui/user/providers/profile_state_provider_test.dart`"
        - "T2: `flutter test test/cloud/user/contract/user_repository_contract_test.dart test/cloud/chat/chat_message_snapshot_contract_test.dart test/cloud/content/post/contract/post_feed_dto_contract_test.dart`"
        - "T3: `go test ./services/user-service/tests -run 'Test(ProfileSubjectView_|UpdatePersona_|ApplyPersonaProfileSync_|GetPersonaLifecycleGuard_)'`"
        - "T3: `go test ./services/content-service/tests -run 'TestDiscoveryProjectionPersistsProfileSubjectID'`"
    notes:
      - "主页、内容、聊天消费入口已统一切到 `ProfileSubject` / snapshot contract，旧 `authorId` fallback 已退出主链路。"
      - "`ops.user.profile_subject_v1` 已在 user-service 落地；flag-off 时公开读取退回 `personaId` 兼容路径，但不回退 `profileSubjectId / userHandle / 记录快照` 真相源。"
      - "`profile_subject_public_read_latency_ms / profile_subject_visibility_not_found_count / retired_subject_attribution_fallback_count / profile_subject_sync_scope_submit_count` 已有运行时埋点与 T3 断言。"
      - "discovery read model 已显式投影 `profileSubjectId`，`FeedItemDto` 不再假设 `authorId == authorProfileSubjectId`。"
    status: implemented
