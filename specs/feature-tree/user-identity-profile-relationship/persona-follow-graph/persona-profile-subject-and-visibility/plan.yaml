version: 1
node: user-identity-profile-relationship/persona-follow-graph/persona-profile-subject-and-visibility

derived_from:
  spec: spec.md
  design: design.md
  acceptance: acceptance.yaml
  changelog:
    - specs/changelog/CR-20260321-001-persona-follow-graph-prd-baseline-expansion.yaml

slices:
  - id: P1
    title: freeze sub-account public profile and visibility metadata
    goal: 收口 `SubAccountProfileView`、`ProfileInheritanceStateView`、`userHandle` 与 visibility contract
    depends_on: []
    acceptance_refs:
      - A1
      - A3
    planned_evidence:
      - T1_schema
    done_when:
      - "`SubAccountProfileView / InheritanceStateView`、`userHandle` 与 visibility 语义冻结"
      - 公开读取与 retired persona 记录归因语义可由 metadata 表达
      - `userHandle` 公开句柄语义与 `profileSubjectId` 内部主键语义分离
    status: implemented
    notes:
      - "`SubAccountProfileView` 已新增 `userHandle / isolationLevel`，`ProfileSubjectType` 已统一为 `user | persona`。"
      - "公开接口 response fields 已去除 `ownerUserId` 暴露，`userHandle` 成为公开路由/展示主语义。"

  - id: P2
    title: establish codegen and public identity compatibility baseline
    goal: 建立 App / service / cloud client 对 `ProfileSubject` 生成物的稳定消费，并退出公开消费面的旧 DTO / 旧主键 fallback
    depends_on:
      - P1
    acceptance_refs:
      - A1
      - A2
    planned_evidence:
      - T1_schema
      - T3_cross_service_integration
    done_when:
      - "`verify-metadata / codegen / codegen-app` 通过"
      - 主页、内容、聊天存在消费 `ProfileSubject` 的统一接入口
      - 旧 `PersonaDto` 不再直接用于公开首屏，内容作者不再回退 `authorId`
    status: implemented
    notes:
      - "`verify-metadata / codegen / codegen-app` 已通过，App 生成 DTO 已对齐新的 `ProfileSubject` 契约。"
      - "主页、内容、聊天消费入口已改为消费 canonical `profileSubjectId` / snapshot 字段。"

  - id: P3
    title: implement mutation, sync scope, and retired attribution
    goal: 落地 owner 基线、persona override、apply scope 与记录快照稳定渲染
    depends_on:
      - P2
    acceptance_refs:
      - A2
      - A3
    planned_evidence:
      - T2_module_interaction
      - T3_cross_service_integration
    done_when:
      - `SubAccountProfileMutation` 显式支持 apply scope、sync targets 与 fields mask
      - 新分身默认继承 owner 基线，persona 只保存 override 字段
      - retired persona 记录对象继续稳定渲染，不重绑到 owner
    status: implemented
    notes:
      - "公开读已按 `strict/retired` 做不可见返回；`buildSubAccountProfileView()` 已改为 `userHandle` 主导。"
      - "`HasAttributedHistory` 已扩展到 `posts/comments/messages/notifications`，retired persona 不再重绑记录归因。"

  - id: P4
    title: validate consumers, telemetry, and rollback
    goal: 验证主页与内容域消费者、visibility telemetry 与回滚路径，确保可安全灰度
    depends_on:
      - P3
    acceptance_refs:
      - A1
      - A3
      - S1
    planned_evidence:
      - T2_module_interaction
      - T4_user_journey
    done_when:
      - 主页、内容、聊天只消费 user 域冻结的公开身份 contract
      - visibility / retired attribution 指标可观测
      - 开关关闭后可退回旧公开读取路径而不破坏 `profileSubjectId` 与记录快照
    status: implemented
    notes:
      - "user-service 已接入 `ops.user.profile_subject_v1` 与四个 `profile_subject_*` 运行时指标，并补齐 flag-off 回退断言。"
      - "discovery read model 已显式投影 canonical `profileSubjectId`，App 发现流 DTO 不再把 `authorId` 误当作作者主体主键。"
