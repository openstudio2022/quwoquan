version: 1
node: user-identity-profile-relationship/persona-follow-graph

derived_from:
  spec: spec.md
  design: design.md
  acceptance: acceptance.yaml
  changelog:
    - specs/changelog/CR-20260321-001-persona-follow-graph-prd-baseline-expansion.yaml

slices:
  - id: P1
    title: freeze identity, graph, and context metadata topology
    goal: 收口 `ProfileSubject`、active persona、follow graph、block gate 与跨域 request context 的 metadata 真相源
    depends_on: []
    acceptance_refs:
      - J1
      - J2
      - J3
    planned_evidence:
      - T1_schema
    done_when:
      - "`user_profile / follow_edge / block_edge / content/post / messages/conversation / assistant/*` 的字段、request_context、errors 与路由边界冻结"
      - "`ProfileSubjectView`、`ActivePersonaContextView`、`RelationshipCapabilityView` 与 graph list item 可由 metadata 表达"
      - feature flag 与 telemetry schema 有正式落点
    status: planned

  - id: P2
    title: establish codegen baseline
    goal: 让 service、App、cloud client 与 assistant/session contract 都能消费 persona-aware 生成物
    depends_on:
      - P1
    acceptance_refs:
      - J1
      - J2
      - J3
    planned_evidence:
      - T1_schema
      - T3_cross_service_integration
    done_when:
      - "`make -C quwoquan_service verify-metadata` 通过"
      - "`make codegen` 与 `make codegen-app` 产出可被 App 与 service 消费的生成物"
      - App / cloud / assistant 不再维护第二套 path、operation 或 request context override
    status: planned

  - id: P3
    title: land owner plane and public identity contracts
    goal: 打通分身管理台、公开身份、继承/覆写与 retired attribution 的主链路
    depends_on:
      - P2
    acceptance_refs:
      - J1
      - J3
    planned_evidence:
      - T2_module_interaction
      - T3_cross_service_integration
    done_when:
      - owner 只看到一个统一的分身管理台入口与列表
      - "`ProfileSubjectView / Mutation / InheritanceState` 成为公开身份唯一真相源"
      - strict isolation 与 retired attribution 规则可被主页和内容域稳定消费
    status: planned

  - id: P4
    title: propagate active persona across domains
    goal: 让 content/chat/circle/assistant/notification 统一消费 active persona 上下文，并在缺失时 fail closed
    depends_on:
      - P3
    acceptance_refs:
      - J2
      - J3
    planned_evidence:
      - T2_module_interaction
      - T3_cross_service_integration
      - T4_user_journey
    done_when:
      - 发帖、评论、聊天、圈子、通知和助手会话默认都基于 active persona
      - persona context 缺失时系统阻断、恢复或要求确认，不静默回退到 owner
      - assistant 与 notification 的 drift / mismatch 有明确 telemetry
    status: planned

  - id: P5
    title: separate graph command and read paths
    goal: 以 `FollowEdge` command side 和 `social graph` read side 取代混杂的关系逻辑
    depends_on:
      - P4
    acceptance_refs:
      - J2
      - J3
    planned_evidence:
      - T1_schema
      - T3_cross_service_integration
    done_when:
      - follow / unfollow 命令改为 persona-aware `FollowEdge` 写入
      - follower / following 与 `RelationshipCapabilityView` 以 `ProfileSubject` 为主键稳定读取
      - block gate、计数修正与列表过滤在弱网和重试下不串号
    status: planned

  - id: P6
    title: validate rollout, migration, and journey evidence
    goal: 建立 backfill、灰度、监控、回滚与 Journey 级证据闭环，确保可以安全进入 `/dev`
    depends_on:
      - P5
    acceptance_refs:
      - R1
      - J1
      - J2
      - J3
    planned_evidence:
      - T2_module_interaction
      - T3_cross_service_integration
      - T4_user_journey
      - T4_release_rehearsal
    done_when:
      - owner-level legacy identity 到 `profileSubjectId` 的回填路径明确并完成演练
      - 四类开关、关键指标和回滚动作可执行
      - Journey 级主路径回归清单、灰度门槛与失败处置手册明确
    status: planned
