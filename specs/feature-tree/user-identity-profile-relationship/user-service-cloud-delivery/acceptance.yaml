feature: user-service-cloud-delivery
level: L2_feature
archived: false

execution:
  local_gate: make gate
  full_gate: make gate-full

level_acceptance:

  # ─────────────── 端云链路 ───────────────

  A1:
    criteria: >
      getUserProfile 端云完整链路可用：
      端侧 RemoteUserProfileRepository.getUserProfile(userId) → HTTP GET /v1/user/profile/{userId}
      → user-service ProfileService.GetProfile → PostgreSQL user_profiles JOIN personas(isActive=true)
      JOIN user_settings → Redis cache:user_profile:{userId} (TTL=600s) → JSON 响应。
      首次请求 cache miss 走 DB，二次请求 cache hit 走 Redis（可通过 X-Cache-Hit header 或日志验证）。
      响应包含 fields.yaml 定义的全部字段：userId, nickname, avatarUrl, bio, gender, birthDate,
      region, status, profileVersion, followerCount, followingCount, postCount, circleCount, likeCount,
      activePersna, settings, createdAt, updatedAt。
    status: pending
    linked_tasks: []
    test_layers:
      T1: required    # 端侧 DTO 字段契约 × fields.yaml
      T2: required    # 云侧 ProfileService + PG + Redis 契约测试
      T3: required    # 端侧 Remote 实际调通
      T4: optional
    tests: []

  A2:
    criteria: >
      followUser/unfollowUser 幂等操作且计数实时更新：
      POST /v1/user/follow/{targetUserId} 创建 follow_edge（MongoDB unique index 幂等），
      同时更新 UserProfile 的 followerCount(+1) 和 followingCount(+1)（跨 MongoDB→PostgreSQL）。
      重复 POST 不报错、不重复计数。
      DELETE /v1/user/follow/{targetUserId} 删除 follow_edge，计数 -1。
      GET /v1/user/{userId}/relationship 返回 { isFollowing, isFollowedBy, isMutual }。
      listFollowing/listFollowers 支持游标分页（cursor + limit），按 createdAt 降序。
    status: pending
    linked_tasks: []
    test_layers:
      T1: required    # 端侧 follow/unfollow 契约
      T2: required    # 云侧 FollowService + MongoDB + 计数更新契约
      T3: required    # 端侧 Remote 调通
      T4: required    # 关注/取关用户旅程
    tests: []

  A3:
    criteria: >
      blockUser/unblockUser 幂等且 O(1) 检查：
      POST /v1/user/block/{targetUserId} 创建 block_edge（PostgreSQL unique 约束幂等），
      同步写入 Redis blocked_set:{userId} (SET ADD, TTL=3600s)。
      DELETE /v1/user/block/{targetUserId} 删除 block_edge，Redis SREM。
      CheckBlocked(blockerId, blockedId) 通过 Redis SISMEMBER 实现 O(1) 查询。
      blocked_set cache miss 时从 PostgreSQL 回填。
      跨域消费方（chat-service、content-service、recommendation-engine）可通过
      runtime/observability/NewUserClient() 调用 CheckBlocked。
    status: pending
    linked_tasks: []
    test_layers:
      T1: required    # 端侧 block/unblock 契约
      T2: required    # 云侧 BlockService + PG + Redis set 契约
      T3: optional    # 跨域调用属于集成验证
      T4: required    # 屏蔽用户旅程
    tests: []

  A4:
    criteria: >
      Persona CRUD + Activate 事务一致性：
      同一 userId 同时只有一个 isPrimary=true 的 persona 和一个 isActive=true 的 persona。
      POST /v1/user/personas/{personaId}/activate 在事务内执行：
      (1) 旧 active persona isActive=false (2) 新 persona isActive=true。
      并发 activate 不违反唯一约束（PostgreSQL uq_personas_active）。
      listPersonas 返回包含 isPrimary 和 isActive 标记。
      deletePersona 不允许删除 isPrimary=true 的 persona。
    status: pending
    linked_tasks: []
    test_layers:
      T1: required    # 端侧 persona 契约
      T2: required    # 云侧 PersonaService + PG 事务 + 唯一约束契约
      T3: optional
      T4: required    # 分身管理用户旅程
    tests: []

  # ─────────────── 存储与缓存 ───────────────

  A5:
    criteria: >
      缓存策略严格按 storage.yaml 生效：
      - cache:user_profile:{userId} TTL=600s，GetProfile 首次 DB→缓存→后续 Redis 命中
      - UserProfileUpdated 事件触发缓存失效（DEL cache:user_profile:{userId}），下次请求重新回填
      - cache:user_setting:{userId} TTL=600s，UserSettingUpdated 事件失效
      - blocked_set:{userId} TTL=3600s（SET 类型），UserBlocked 事件 SADD，UserUnblocked 事件 SREM
      - UserAuth 不缓存（cache_excluded=true）
      - device_tokens:{userId} TTL=3600s（SET 类型）
      Redis key pattern 和 TTL 与 storage.yaml 定义完全一致。
    status: pending
    linked_tasks: []
    test_layers:
      T1: optional
      T2: required    # 云侧 cache 命中/失效/TTL 契约（miniredis）
      T3: optional
      T4: optional
    tests: []

  A6:
    criteria: >
      PostgreSQL Migration DDL 与 storage.yaml 一致：
      - user_profiles 表：PK(user_id)，索引 idx_nickname, idx_phone, idx_status，GIN trigram (nickname, bio)
      - personas 表：索引 idx_user_id，唯一约束 uq_primary(userId,isPrimary), uq_active(userId,isActive)
      - user_settings 表：PK(user_id)
      - block_edges 表：索引 idx_blocker, idx_blocked，唯一约束 uq_block_edge(blocker_id,blocked_id)
      - user_works 表：索引 idx_user_id
      - user_life_items 表：索引 idx_user_id + category
      所有 DDL 可在干净数据库上执行成功，embedded-postgres 契约测试验证。
    status: pending
    linked_tasks: []
    test_layers:
      T1: optional
      T2: required    # 云侧 migration + schema 契约（embedded-postgres）
      T3: optional
      T4: optional
    tests: []

  A7:
    criteria: >
      MongoDB follow_edges 集合索引与 storage.yaml 一致：
      - idx_follow_follower: { followerId: 1, createdAt: -1 }
      - idx_follow_followee: { followeeId: 1, createdAt: -1 }
      - idx_follow_unique: { followerId: 1, followeeId: 1 } unique
      - idx_follow_source: { source: 1 } sparse
      索引在 testcontainers-mongodb 契约测试中验证。
    status: pending
    linked_tasks: []
    test_layers:
      T1: optional
      T2: required    # 云侧 MongoDB 索引契约（testcontainers）
      T3: optional
      T4: optional
    tests: []

