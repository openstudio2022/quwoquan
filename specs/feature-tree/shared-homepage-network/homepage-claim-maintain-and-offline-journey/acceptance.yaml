version: 2
feature: homepage-claim-maintain-and-offline-journey
level: L2_journey
source_path: shared-homepage-network/homepage-claim-maintain-and-offline-journey
archived: false

execution:
  local_gate: make gate
  full_gate: make gate-full

scope:
  summary: >
    冻结共享主页从候选建档、认领审核、认领后基础维护到软下线记录保留的端到端旅程，
    建立主页生命周期和治理闭环。
  composed_scenarios:
    - homepage-candidate-intake-and-publish
    - homepage-claim-request-and-review
    - claimed-homepage-basic-maintenance
    - homepage-offline-report-and-history-retention
  out_of_scope:
    - 主页搜索与挂载
    - 主页口碑消费
    - 主页合并
    - 交易与商家后台

journey_acceptance:
  J1:
    title: 候选主页可进入正式发布
    journey: intake candidate homepage -> verify and enrich -> publish as official homepage
    scenario_refs:
      - homepage-candidate-intake-and-publish
    done_when:
      - 抓取、导入、用户补充、内容反抽都可进入统一候选主线
      - 候选主页在审核通过前不对普通浏览用户公开
      - 审核通过后可作为正式主页被搜索、被挂载、被浏览
    release_guardrails:
      - 不允许绕过审核直接发布候选主页
      - 候选和正式主页状态边界清晰
    evidence:
      primary:
        - T1_schema
        - T3_cross_service_integration
      supporting:
        - T2_module_interaction
        - T4_user_journey
    tests:
      planned:
        - candidate homepage intake review test
        - homepage publish eligibility test
      recorded: []
    status: pending

  J2:
    title: 认领方可提交材料并在审核通过后维护主页
    journey: submit claim request -> review materials -> claim approved -> maintain homepage basics
    scenario_refs:
      - homepage-claim-request-and-review
      - claimed-homepage-basic-maintenance
    done_when:
      - 认领申请支持分层材料与审核状态
      - 审核通过后主页显示认领标识并开放基础维护能力
      - 认领方不能直接修改用户口碑或记录用户内容
    release_guardrails:
      - 认领材料不足时必须可拒绝或补件
      - 维护边界不能越权到用户评价
    evidence:
      primary:
        - T2_module_interaction
        - T3_cross_service_integration
      supporting:
        - T1_schema
        - T4_user_journey
    tests:
      planned:
        - homepage claim request review test
        - claimed homepage basic maintenance permission test
      recorded: []
    status: pending

  J3:
    title: 已关闭或失效主页可软下线并保留记录
    journey: report homepage offline -> review reason -> mark as offline -> keep history and degrade exposure
    scenario_refs:
      - homepage-offline-report-and-history-retention
    done_when:
      - 用户或认领方可上报已关闭、已结束、信息错误或长期停更
      - 审核通过后主页进入已下线状态并带原因标签
      - 主页保留原 URL、记录内容、记录口碑和相关群组关系
    release_guardrails:
      - 不允许把已下线主页直接物理删除
      - 搜索和推荐降级不能影响记录访问
    evidence:
      primary:
        - T3_cross_service_integration
        - T4_user_journey
      supporting:
        - T1_schema
        - T2_module_interaction
    tests:
      planned:
        - homepage offline report workflow test
        - offline homepage history retention test
      recorded: []
    status: pending

release_acceptance:
  R1:
    title: 主页治理旅程可整体验收并整体回滚
    done_when:
      - 候选、认领、维护、下线四段生命周期契约全部冻结
      - 认领审核、下线处理 SLA 与记录保留合同可验证
      - 若治理链路出现严重问题，可隐藏治理入口，但不破坏已发布主页与已下线记录页
    evidence:
      primary:
        - T3_cross_service_integration
        - T4_release_rehearsal
      supporting:
        - T1_schema
        - T2_module_interaction
    tests:
      planned:
        - homepage governance rollback rehearsal
        - offline history retention regression test
      recorded: []
    status: pending
