    title: 主页搜索与选择器可稳定工作
    scenario: homepage search and picker
    journey_step: search homepage -> inspect result -> choose target homepage
    done_when:
      - 结果展示名称、类目、位置或品牌系列、评分摘要等关键区分信息
      - 用户可选择主页并把结果回填到当前上下文
      - 选择器返回不会破坏原页面状态
    edge_cases:
      - 同名主页可区分
      - 搜索为空时有明确空态
      - 弱网下先显示 skeleton
