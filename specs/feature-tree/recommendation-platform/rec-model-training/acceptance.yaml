version: 1
feature: rec-model-training
level: "L2_feature"
template: A1-A8
tree_context:
  feature_path: capability.recommendation-platform.component.rec-model-training
  parent_path: capability.recommendation-platform
  acceptance_inherits_from: capability.recommendation-platform
level_acceptance:
  focus_groups:
  - A1_functional
  - A7_contract_metadata_consistency
  - A8_test_automation
  notes: 训练集部署工程服务：样本→数据集→训练→注册；部署形态为任务/训练镜像。
global_acceptance:
  A1_functional:
    scenarios:
    - given: rec_learning_events 有数据
      when: 训练管线运行（SampleJoiner → 样本 → 训练 → 注册）
      then: rec_training_samples / rec_model_registry 或 OSS 有产出，可被 rec-model-service
        加载
  A7_contract_metadata_consistency:
  - feature_registry、ModelRegistry 与 rec-model-service 一致；_projections 字段与读写一致
  A8_test_automation:
  - 样本生成与训练可脚本化或文档化复现；见 L4/L5 acceptance
execution:
  local_gate: make gate
  full_gate: make gate-full
