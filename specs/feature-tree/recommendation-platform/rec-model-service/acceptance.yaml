version: 1
feature: "rec-model-service"
level: "L3_component"
template: "A1-A8"
tree_context:
  feature_level: "L3_component"
  feature_path: "capability.recommendation-platform.component.rec-model-service"
  parent_path: "capability.recommendation-platform"
  acceptance_inherits_from: "capability.recommendation-platform"
level_acceptance:
  focus_groups:
    - A1_functional
    - A2_experience
    - A7_contract_metadata_consistency
    - A8_test_automation
  notes: "模型推理服务：POST /v1/score、scenario 路由、与 Go 集成；部署形态为常驻推理服务。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "content_feed 模型已加载"
        when: "POST /v1/score scenario=content_feed，合法请求体"
        then: "返回 scores 与 candidates 一一对应"
  A2_experience:
    - "推理延迟满足 Go 侧预算（如 p99 < 50ms）；超时/失败时 Go CascadeScorer 回退 RuleScorer"
  A7_contract_metadata_consistency:
    - "请求/响应与 contracts/openapi/rec-model-service.v1.yaml、rec_model_service/fields 一致"
  A8_test_automation:
    - "推理 API 与 Go 集成有测试；就绪检查见 [readiness.md](readiness.md)；见 L4/L5 acceptance"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
