version: 1
feature: "inference-api"
level: "L4_detail"
template: "A1-A8"
tree_context:
  feature_level: "L4_detail"
  feature_path: "capability.recommendation-platform.component.rec-model-service.object.inference-api"
  parent_path: "capability.recommendation-platform.component.rec-model-service"
  acceptance_inherits_from: "capability.recommendation-platform"
level_acceptance:
  focus_groups:
    - A1_functional
    - A2_experience
    - A7_contract_metadata_consistency
    - A8_test_automation
  notes: "POST /v1/score 多场景推理，scenario 路由，与 Go 契约一致。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "content_feed 模型已加载"
        when: "POST /v1/score scenario=content_feed，合法请求体"
        then: "返回 scores 与 candidates 一一对应"
  A2_experience:
    - "推理延迟满足 Go 侧预算（如 p99 < 50ms）"
  A7_contract_metadata_consistency:
    - "请求/响应与 ModelPredictRequest/ModelPredictResponse 一致"
  A8_test_automation:
    - "推理 API 有接口测试"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
