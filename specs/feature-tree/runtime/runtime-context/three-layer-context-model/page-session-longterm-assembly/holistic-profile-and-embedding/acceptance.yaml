version: 1
feature: "holistic-profile-and-embedding"
level: "L5_cross_cutting"
template: "A1-A8"
tree_context:
  feature_level: "L5_cross_cutting"
  feature_path: "capability.runtime.feature.runtime-context.subfeature.three-layer-context-model.object.page-session-longterm-assembly.cross.holistic-profile-and-embedding"
  parent_path: "capability.runtime.feature.runtime-context.subfeature.three-layer-context-model.object.page-session-longterm-assembly"
  acceptance_inherits_from: "capability.runtime.feature.runtime-context"
level_acceptance:
  focus_groups:
    - A1_functional
    - A3_service_governance
    - A7_contract_metadata_consistency
    - A8_test_automation
  notes: "五维画像聚合 + Embedding 生成 + 向量存储。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "用户浏览 10 篇 Post、发送 5 条消息、加入 2 个圈子"
        when: "查询 user_holistic_profile"
        then: "五维画像（内容偏好/社交关系/圈子参与/聊天话题/助手交互）正确聚合"
      - given: "user_holistic_profile 已构建"
        when: "调用 Embedding API"
        then: "向量写入 _vectors/user_context_embedding.yaml 定义的结构"
  A2_experience:
    - "画像构建异步，不阻塞用户请求"
  A3_service_governance:
    - "全息画像异步构建，不阻塞主路径"
  A4_observability:
    - "画像构建延迟、Embedding 调用可监控"
  A5_product_ops:
    - "运营可查看用户画像摘要"
  A6_security_privacy:
    - "用户画像数据按 classification 策略保护"
  A7_contract_metadata_consistency:
    - "画像聚合消费 events.yaml 定义的事件"
    - "向量存储结构与 _vectors/*.yaml 一致"
  A8_test_automation:
    - "画像聚合契约测试"
    - "Embedding 生成单元测试"
tests:
  unit:
    - "quwoquan_service/runtime/context/tests/embedding_test.go"
  contract:
    - "quwoquan_service/runtime/context/tests/holistic_profile_test.go"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
