version: 1
feature: page-session-longterm-assembly
level: "L3_story"
template: A1-A8
tree_context:
  feature_path: capability.runtime.feature.runtime-context.subfeature.three-layer-context-model.object.page-session-longterm-assembly
  parent_path: capability.runtime.feature.runtime-context.subfeature.three-layer-context-model
  acceptance_inherits_from: capability.runtime.feature.runtime-context
level_acceptance:
  focus_groups:
  - A1_functional
  - A2_experience
  - A8_test_automation
  notes: 各层实现：PageContext 上报/存储、Session 读取、LongTerm 读取、ContextAssembler 组装。
global_acceptance:
  A1_functional:
    scenarios:
    - given: 用户正在浏览内容详情页
      when: 端侧上报 PageContext（content_detail 类型）
      then: Redis 中存储完整 PostSnapshot，TTL 生效
    - given: 用户浏览 10 篇 Post
      when: 查询 SessionContext
      then: 返回最近浏览、点击等实时兴趣信号
    - given: ContextAssembler 被调用
      when: 组装三层上下文
      then: 耗时 < 50ms，上下文完整
  A2_experience:
  - 页面切换时旧 PageContext 自动过期
  - 上下文组装对业务代码透明
  A3_service_governance:
  - PageContext Redis TTL 可配置
  A4_observability:
  - 上下文组装延迟和命中率可监控
  A5_product_ops:
  - N/A
  A6_security_privacy:
  - 上下文不跨用户泄露
  A7_contract_metadata_consistency:
  - PageContext 场景类型与 entity_catalog 一致
  A8_test_automation:
  - PageContext 上报/过期/并发 有单元测试
  - ContextAssembler 有端到端测试
tests:
  unit:
  - quwoquan_service/runtime/context/tests/page_context_test.go
  - quwoquan_service/runtime/context/tests/assembler_test.go
execution:
  local_gate: make gate
  full_gate: make gate-full
legacy_merged_acceptance:
- source_path: runtime/runtime-context/three-layer-context-model/page-session-longterm-assembly/holistic-profile-and-embedding
  task_bucket: holistic-profile-and-embedding
  migrated_as: L3_task
