design_readiness:
  status: ready_for_dev
  meaning: 该节点已冻结统一接入 schema、领域实例模板、gate 聚合、plane-aware 部署绑定和最终收口模型，可在单个统一 `/dev`
    会话中先接入模板域，再复制到所有领域。
notes:
  benchmark_inputs:
  - Backstage / Score：声明式服务接入、所有权与环境画像
  - Argo Rollouts：灰度、回滚与阶段 gate
  - LaunchDarkly / Statsig：策略/实验状态聚合与审批审计
  - Trust & Safety Console：跨域 case/workflow/evidence/dual-approval 收口
