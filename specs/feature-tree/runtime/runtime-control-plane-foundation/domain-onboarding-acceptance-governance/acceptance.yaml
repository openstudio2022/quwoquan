      `seed-box` 共 Pod 与长期独立 Deployment / Pod 的演进。
    status: implemented
    linked_tasks:
    - P7
    - D6
    test_layers:
      T1: required
      T2: optional
      T3: required
      T4: optional
    tests:
    - file: specs/feature-tree/runtime/runtime-control-plane-foundation/domain-onboarding-acceptance-governance/design.md
