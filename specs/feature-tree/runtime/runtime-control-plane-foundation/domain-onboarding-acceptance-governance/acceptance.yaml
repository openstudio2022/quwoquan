      binding 与 acceptance 状态。
    status: implemented
    linked_tasks:
    - P6
    - P8
    - D5
    - D6
    test_layers:
      T1: optional
      T2: optional
      T3: required
      T4: required
    tests:
    - file: specs/feature-tree/runtime/runtime-control-plane-foundation/domain-onboarding-acceptance-governance/spec.md
      functions:
      - R7：冻结最终集中验收口径
    - file: specs/feature-tree/runtime/runtime-control-plane-foundation/domain-onboarding-acceptance-governance/design.md
      functions:
      - 最终集中验收模型
  A8:
    criteria: 该规范可直接作为后续单个统一实施会话的共同输入，支持以 metadata-first 的方式先完成一个模板域，再复制到所有领域，并在最终回到本节点完成统一收口。
    status: implemented
    linked_tasks:
    - P1
    - P3
    - P4
    - P8
    test_layers:
      T1: required
      T2: optional
      T3: required
      T4: optional
    tests:
    - file: specs/feature-tree/runtime/runtime-control-plane-foundation/domain-onboarding-acceptance-governance/tasks.md
      functions:
