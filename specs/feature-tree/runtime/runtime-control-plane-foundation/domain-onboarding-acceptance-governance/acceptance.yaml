version: 1
feature: domain-onboarding-acceptance-governance
level: "L3_story"
template: A1-A8
archived: false
tree_context:
  feature_path: capability.runtime.feature.runtime-control-plane-foundation.subfeature.domain-onboarding-acceptance-governance
  parent_path: capability.runtime.feature.runtime-control-plane-foundation
  acceptance_inherits_from: capability.runtime.feature.runtime-control-plane-foundation
execution:
