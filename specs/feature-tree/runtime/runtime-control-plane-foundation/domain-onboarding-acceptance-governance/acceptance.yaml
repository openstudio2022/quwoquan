  full_gate: 实施阶段：make gate-full + 统一接入矩阵聚合校验 + 最终集中验收
level_acceptance:
  A1:
    criteria: '`domain_onboarding` 元数据 schema 与按领域拆分的实例真相源被明确冻结，后续各领域接入统一控制面必须首先补该元数据，而不是手写清单或临时接口。'
    status: implemented
    linked_tasks:
    - P2
    - P8
    - D1
    test_layers:
      T1: required
      T2: optional
      T3: optional
      T4: optional
    tests:
    - file: specs/feature-tree/runtime/runtime-control-plane-foundation/domain-onboarding-acceptance-governance/design.md
      functions:
      - '`domain_onboarding_schema.yaml` 设计'
      - '`domains/<domain>.yaml` 模板'
  A2:
    criteria: 领域最小接入包被明确冻结，能够统一定义一个领域何时可被认定为“已接入 `platform-ops` 与 `product-ops`”，并可在单会话实施中从模板域复制到所有领域，而不要求大量手写代码。
    status: implemented
    linked_tasks:
    - P3
    - P8
    - D7
    test_layers:
      T1: required
      T2: optional
      T3: required
      T4: optional
    tests:
    - file: specs/feature-tree/runtime/runtime-control-plane-foundation/domain-onboarding-acceptance-governance/spec.md
      functions:
      - R2：冻结领域最小接入包
    - file: specs/feature-tree/runtime/runtime-control-plane-foundation/domain-onboarding-acceptance-governance/design.md
      functions:
      - 所有领域现状分析
      - 并行实施策略
  A3:
    criteria: 本节点与后续统一实施会话的职责边界被明确冻结：本节点负责全局规范与最终集中验收，统一 `/dev` 会话负责先完成模板域，再复制到所有领域并回填证据。
    status: implemented
    linked_tasks:
    - P4
    - P8
    - D7
    test_layers:
      T1: required
      T2: optional
      T3: optional
      T4: optional
    tests:
    - file: specs/feature-tree/runtime/runtime-control-plane-foundation/domain-onboarding-acceptance-governance/spec.md
      functions:
      - R3：冻结全局节点与领域实施批次边界
    - file: specs/feature-tree/runtime/runtime-control-plane-foundation/domain-onboarding-acceptance-governance/design.md
