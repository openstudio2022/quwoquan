      - 统一实施策略
  A4:
    criteria: 命令、规则与流程增强边界被明确冻结，后续 `/explore`、`/prd`、`/design`、`/dev`、`/extend`、`/verify`、`/deploy`
      均可围绕统一接入矩阵做一致增强。
    status: implemented
    linked_tasks:
    - P5
    - D4
    test_layers:
      T1: required
      T2: required
      T3: optional
      T4: optional
    tests:
