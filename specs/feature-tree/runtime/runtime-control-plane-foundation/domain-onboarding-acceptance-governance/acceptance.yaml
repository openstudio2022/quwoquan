    criteria: 统一 gate 聚合口径被明确冻结，能够分层校验 onboarding metadata、codegen 消费、领域最低测试层与统一收口状态，并最终形成自动聚合而非人工对表。
    status: implemented
    linked_tasks:
    - P6
    - D4
    - D5
    test_layers:
      T1: required
      T2: optional
      T3: required
      T4: optional
    tests:
    - file: specs/feature-tree/runtime/runtime-control-plane-foundation/domain-onboarding-acceptance-governance/design.md
