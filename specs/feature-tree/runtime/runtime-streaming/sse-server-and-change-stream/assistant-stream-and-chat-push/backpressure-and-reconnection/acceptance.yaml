version: 1
feature: "backpressure-and-reconnection"
level: "L5_cross_cutting"
template: "A1-A8"
tree_context:
  feature_level: "L5_cross_cutting"
  feature_path: "capability.runtime.feature.runtime-streaming.subfeature.sse-server-and-change-stream.object.assistant-stream-and-chat-push.cross.backpressure-and-reconnection"
  parent_path: "capability.runtime.feature.runtime-streaming.subfeature.sse-server-and-change-stream.object.assistant-stream-and-chat-push"
  acceptance_inherits_from: "capability.runtime.feature.runtime-streaming"
level_acceptance:
  focus_groups:
    - A3_service_governance
    - A2_experience
    - A8_test_automation
  notes: "背压机制 + 断线重连，保证实时推送可靠性。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "客户端消费慢于服务端推送"
        when: "缓冲区达到上限"
        then: "背压触发：暂停推送或断开慢客户端"
      - given: "SSE 连接意外断开"
        when: "客户端携带 Last-Event-ID 重连"
        then: "服务端从该 ID 续传，不丢失消息"
  A2_experience:
    - "断线自动重连，不丢失消息"
    - "慢客户端不阻塞其他用户"
  A3_service_governance:
    - "SSE 连接数上限可配置"
    - "背压机制防止慢客户端阻塞服务端"
    - "慢客户端缓冲区上限 + 超时断开"
  A4_observability:
    - "SSE 连接数、推送延迟、断连率可监控"
  A5_product_ops:
    - "N/A"
  A6_security_privacy:
    - "SSE 连接需认证"
  A7_contract_metadata_consistency:
    - "Last-Event-ID 与事件 ID 一致"
  A8_test_automation:
    - "背压机制单元测试"
    - "重连续传集成测试"
tests:
  unit:
    - "quwoquan_service/runtime/streaming/tests/backpressure_test.go"
  integration:
    - "quwoquan_service/runtime/streaming/tests/reconnection_test.go"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
