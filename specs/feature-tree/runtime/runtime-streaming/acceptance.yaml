version: 1
feature: "runtime-streaming"
level: "L2_feature"
template: "A1-A8"
tree_context:
  feature_level: "L2_feature"
  feature_path: "capability.runtime.feature.runtime-streaming"
  parent_path: "capability.runtime"
  acceptance_inherits_from: "capability.runtime"
level_acceptance:
  focus_groups:
    - A1_functional
    - A3_service_governance
    - A8_test_automation
  notes: "SSE + Change Stream 支撑实时推送（助手流式输出、聊天消息、动态更新）。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "用户与小趣助手对话"
        when: "助手生成回复"
        then: "SSE 连接逐 chunk 推送，用户实时看到文字生成"
      - given: "用户 A 发送消息给用户 B"
        when: "message.sent 事件产生"
        then: "用户 B 的 SSE 连接收到新消息推送"
  A2_experience:
    - "SSE 推送延迟 < 100ms（本地环境）"
    - "断线自动重连，不丢失消息"
  A3_service_governance:
    - "SSE 连接数上限可配置"
    - "背压机制防止慢客户端阻塞服务端"
  A4_observability:
    - "SSE 连接数、推送延迟、断连率可监控"
  A5_product_ops:
    - "N/A"
  A6_security_privacy:
    - "SSE 连接需认证，按 userId 隔离"
  A7_contract_metadata_consistency:
    - "推送事件类型与 events.yaml 定义一致"
  A8_test_automation:
    - "SSE server + Change Stream watcher 有集成测试"
tests:
  integration:
    - "quwoquan_service/runtime/streaming/tests/sse_server_test.go"
    - "quwoquan_service/runtime/streaming/tests/change_stream_test.go"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
