version: 1
feature: "ml-model-integration-and-ab-test"
level: "L5_cross_cutting"
template: "A1-A8"
tree_context:
  feature_level: "L5_cross_cutting"
  feature_path: "capability.runtime.feature.runtime-recommendation.subfeature.dual-channel-recommendation-engine.object.redis-hot-path-and-rule-engine.cross.ml-model-integration-and-ab-test"
  parent_path: "capability.runtime.feature.runtime-recommendation.subfeature.dual-channel-recommendation-engine.object.redis-hot-path-and-rule-engine"
  acceptance_inherits_from: "capability.runtime.feature.runtime-recommendation"
level_acceptance:
  focus_groups:
    - A3_service_governance
    - A4_observability
  notes: "ML 模型集成（排序/重排）+ A/B 灰度；推荐策略可实验。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "ML 排序模型已部署"
        when: "Engine 调用 ColdPath 获取模型分数"
        then: "排序结果反映模型预测"
      - given: "A/B 实验配置：50% 用户规则引擎，50% ML 模型"
        when: "用户请求信息流"
        then: "按实验分组路由到对应策略"
      - given: "ML 模型 fallback"
        when: "模型服务不可用"
        then: "降级到规则引擎"
  A2_experience:
    - "策略切换对用户透明"
  A3_service_governance:
    - "推荐策略支持 A/B 灰度"
    - "ML 模型 fallback 到规则引擎"
  A4_observability:
    - "推荐 CTR/曝光/留存可监控"
    - "A/B 实验各组指标可对比"
  A5_product_ops:
    - "运营可配置 A/B 实验"
    - "运营可配置 ML 模型参数"
  A6_security_privacy:
    - "用户行为数据不泄露"
  A7_contract_metadata_consistency:
    - "实验配置与 experiments 元数据一致"
  A8_test_automation:
    - "ML 模型集成测试"
    - "A/B 路由单元测试"
tests:
  unit:
    - "quwoquan_service/runtime/recommendation/tests/ab_routing_test.go"
  contract:
    - "quwoquan_service/runtime/recommendation/tests/ml_integration_contract_test.go"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
