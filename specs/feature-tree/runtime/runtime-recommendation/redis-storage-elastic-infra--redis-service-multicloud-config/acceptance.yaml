global_acceptance:
  A1_functional:
    scenarios:
    - given: config.yaml redis.rec.mode=cluster + addrs=[n1,n2,n3]
      when: buildRecRedisClient(cfg)
      then: 返回 RedisClusterAdapter
    - given: config.yaml redis.rec.mode=standalone + addr=localhost:6379
      when: buildRecRedisClient(cfg)
      then: 返回 RedisClientAdapter
    - given: config.yaml addr 和 addrs 均为空
      when: buildRecRedisClient(cfg)
      then: 返回 MemoryRedis（fallback）
    - given: CONTENT_REDIS_REC_MODE=cluster 环境变量
      when: applyEnvOverrides(&cfg)
      then: cfg.Redis.Rec.Mode = "cluster"，覆盖 yaml 中 standalone
    - given: 过往版本 CONTENT_REDIS_ADDR=localhost:6379
      when: applyEnvOverrides(&cfg)，且 cfg.Redis.Rec.Addr 为空
      then: cfg.Redis.Rec.Addr = "localhost:6379"（向后兼容）
    - given: config pool.size=0, mode=cluster
      when: resolvePoolConfig(rcfg)
      then: PoolSize = CPU×30（DefaultClusterPoolConfig）
  A3_service_governance:
  - 阿里云 Tair 和火山引擎 VeCache 可通过相同 env 变量集部署
  - TLS 通过 CONTENT_REDIS_REC_TLS=true 启用
  - db 字段在 cluster 模式下被忽略，不影响启动
  A7_contract_metadata_consistency:
  - redis_keyspace.yaml 每条 key 模式有 redis_scene 和 hash_tag 字段
  - rec:* key 的 hash_tag 均为 userId
execution:
  local_gate: make gate
  full_gate: make gate-full
