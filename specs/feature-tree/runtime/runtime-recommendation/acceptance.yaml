version: 1
feature: runtime-recommendation
level: "L2_feature"
template: A1-A8
tree_context:
  feature_path: capability.runtime.feature.runtime-recommendation
  parent_path: capability.runtime
  acceptance_inherits_from: capability.runtime
level_acceptance:
  focus_groups:
  - A1_functional
  - A3_service_governance
  - A7_contract_metadata_consistency
  - A8_test_automation
  notes: 实时推荐是核心业务能力，类 TikTok 双通道架构。
global_acceptance:
  A1_functional:
    scenarios:
    - given: 用户首次请求信息流
      when: 调用 GET /v1/content/feed
      then: 返回按规则排序的内容列表（混合图片/视频/微趣/文章）
    - given: 用户上报 3 条 view + 1 条 like 信号
      when: 再次请求信息流
      then: 下一批内容反映偏好变化（同类内容比例提升）
    - given: 用户上报 dislike 信号
      when: 再次请求信息流
      then: 过滤同类/同作者内容
  A2_experience:
  - 信号上报到偏好反映 < 200ms
  - 已曝光内容不再出现
  A3_service_governance:
  - 推荐策略支持 A/B 灰度
  A4_observability:
  - 推荐 CTR/曝光/留存可监控
  A5_product_ops:
  - 运营可配置推荐策略参数
  A6_security_privacy:
  - 用户行为数据不泄露给第三方
  A7_contract_metadata_consistency:
  - 推荐消费 recommend_impact 标记的事件
  - 推荐特征来自 recommend_feature 标记的字段
  A8_test_automation:
  - 热路径 + 冷路径 + 召回排序 均有自动化测试
tests:
  contract:
  - quwoquan_service/runtime/recommendation/tests/hotpath_contract_test.go
  - quwoquan_service/runtime/recommendation/tests/engine_contract_test.go
execution:
  local_gate: make gate
  full_gate: make gate-full
