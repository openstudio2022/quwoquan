version: 1
feature: redis-cluster-protocol
level: "L3_story"
archived: true
archived_at: '2026-03-01T00:00:00Z'
template: A1-A8
tree_context:
  feature_path: capability.runtime.feature.runtime-recommendation.component.redis-storage-elastic-infra.object.redis-cluster-protocol
  parent_path: capability.runtime.feature.runtime-recommendation.component.redis-storage-elastic-infra
  acceptance_inherits_from: capability.runtime.feature.runtime-recommendation.component.redis-storage-elastic-infra
level_acceptance:
  A1:
    criteria: sessionKey() 返回含 {userId} hash tag 的 key
    status: implemented
    linked_tasks:
    - R1
    - T1
    - T2
    - T3
    tests:
    - file: quwoquan_service/runtime/recommendation/engine_test.go
      functions:
      - TestSessionKey
      - TestSessionKey_HashTagPresence
      - TestHotPath_HashTagKeys
  A2:
    criteria: RedisClusterAdapter 实现 RedisClient 接口全部方法
    status: implemented
    linked_tasks:
    - R2
    - T4
    tests:
    - file: quwoquan_service/services/content-service/internal/infrastructure/recommendation/cluster_adapter_test.go
      functions:
      - compile-time var _ rtrec.RedisClient = (*RedisClusterAdapter)(nil)
  A3:
    criteria: PipelineRead 在 cluster 模式下同 slot 保证（hash tag 协议）
    status: implemented
    linked_tasks:
    - R3
    tests:
    - note: 依赖 hash tag 协议（R1/T1-T3 验证）；live cluster 测试搁置（miniredis cluster 支持未稳定）
  A8:
    criteria: 所有 runtime/recommendation 测试通过 + ClusterAdapter 接口合规
    status: implemented
    linked_tasks:
    - V3
    - T4
    - T5
    tests:
    - file: quwoquan_service/runtime/recommendation/engine_test.go
    - file: quwoquan_service/runtime/recommendation/bench_test.go
    - file: quwoquan_service/services/content-service/internal/infrastructure/recommendation/cluster_adapter_test.go
global_acceptance:
  A1_functional:
    scenarios:
    - given: sessionKey("u1", "s1")
      when: 调用 hotpath.go sessionKey()
      then: 返回 "{u1}:s1"（含花括号 hash tag）
    - given: sessionKey("u1", "")
      when: 调用 sessionKey()
      then: 返回 "{u1}:default"
    - given: RedisClusterAdapter.Get(ctx, key)
      when: key 存在
      then: 返回正确 value
    - given: RedisClusterAdapter.PipelineRead(ctx, [HGetAll, SMembers, SMembers])
      when: 所有 key 含相同 hash tag
      then: 3 个结果均正确填充到 ops
    - given: NewRedisClusterAdapter(addrs, password, enableTLS=true, pool)
      when: 创建 client
      then: TLSConfig.MinVersion = VersionTLS12
  A3_service_governance:
  - ClusterAdapter 和 standalone Adapter 实现相同 RedisClient 接口，上层无感知切换
  - standalone 模式下 {userId} hash tag 透明兼容，行为与原版一致
  A8_test_automation:
  - runtime/recommendation 所有测试通过（含 hash tag 格式验证）
  - go vet quwoquan_service/services/content-service/cmd/api PASS
execution:
  local_gate: make gate
  full_gate: make gate-full
