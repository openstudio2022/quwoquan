version: 1
feature: "template-engine-and-metadata-reader"
level: "L3_subfeature"
template: "A1-A8"
tree_context:
  feature_level: "L3_subfeature"
  feature_path: "capability.runtime.feature.runtime-codegen.subfeature.template-engine-and-metadata-reader"
  parent_path: "capability.runtime.feature.runtime-codegen"
  acceptance_inherits_from: "capability.runtime.feature.runtime-codegen"
level_acceptance:
  focus_groups:
    - A1_functional
    - A7_contract_metadata_consistency
  notes: "Go template engine 与 metadata reader 是 codegen 的基础设施。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "metadata v3 目录存在"
        when: "MetadataReader 执行 Read(target=post)"
        then: "返回 Post 聚合的完整元数据（entity/fields/events/storage/service）"
      - given: "Go template 文件存在"
        when: "TemplateEngine 执行 Render(template, data)"
        then: "输出符合预期的生成代码"
  A2_experience:
    - "metadata 读取失败时错误信息包含具体路径"
  A3_service_governance:
    - "template 渲染可配置超时"
  A4_observability:
    - "codegen 执行输出读取的 metadata 摘要"
  A5_product_ops:
    - "N/A"
  A6_security_privacy:
    - "metadata 中敏感字段策略正确传递"
  A7_contract_metadata_consistency:
    - "MetadataReader 输出与 contracts/metadata/ YAML 完全一致"
    - "Template 注册与 metadata schema 对齐"
  A8_test_automation:
    - "MetadataReader 单元测试（正常/异常/缺失文件）"
    - "TemplateEngine 单元测试（渲染正确性）"
tests:
  unit:
    - "tools/codegen/tests/metadata_reader_test.go"
    - "tools/codegen/tests/template_engine_test.go"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
