version: 1
feature: "openapi-dart-dto-test-scaffold-generation"
level: "L5_cross_cutting"
template: "A1-A8"
tree_context:
  feature_level: "L5_cross_cutting"
  feature_path: "capability.runtime.feature.runtime-codegen.subfeature.template-engine-and-metadata-reader.object.struct-repo-handler-migration-generation.cross.openapi-dart-dto-test-scaffold-generation"
  parent_path: "capability.runtime.feature.runtime-codegen.subfeature.template-engine-and-metadata-reader.object.struct-repo-handler-migration-generation"
  acceptance_inherits_from: "capability.runtime.feature.runtime-codegen"
level_acceptance:
  focus_groups:
    - A7_contract_metadata_consistency
    - A8_test_automation
  notes: "跨平台生成：OpenAPI、Dart DTO、测试骨架。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "Post 聚合 service.yaml 含 API 定义"
        when: "执行 openapi.yaml.tmpl 渲染"
        then: "生成 OpenAPI schema，与 service.yaml 一致"
      - given: "Post 聚合 metadata"
        when: "执行 dart_dto.dart.tmpl 渲染"
        then: "生成 Dart DTO 类，与 fields 一致"
      - given: "Post 聚合 metadata"
        when: "执行 testmain.go.tmpl + fixture.go.tmpl + contract_test.go.tmpl 渲染"
        then: "生成 TestMain、Fixture、contract_test 骨架，可编译运行"
  A2_experience:
    - "Dart DTO 符合 Dart 惯例，可被 Flutter 端直接使用"
  A3_service_governance:
    - "测试骨架不覆盖手写断言逻辑"
  A4_observability:
    - "codegen 输出生成文件清单"
  A5_product_ops:
    - "N/A"
  A6_security_privacy:
    - "OpenAPI 中 SECRET 字段不暴露"
  A7_contract_metadata_consistency:
    - "OpenAPI schema 与 service.yaml API 定义一致"
    - "Dart DTO 与 fields.yaml 一致"
  A8_test_automation:
    - "契约测试骨架可编译运行"
    - "make test-contract 可执行生成的契约测试"
tests:
  unit:
    - "tools/codegen/tests/openapi_template_test.go"
    - "tools/codegen/tests/dart_template_test.go"
    - "tools/codegen/tests/test_scaffold_template_test.go"
  contract:
    - "tools/codegen/tests/generated_contract_test_compile_test.go"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
