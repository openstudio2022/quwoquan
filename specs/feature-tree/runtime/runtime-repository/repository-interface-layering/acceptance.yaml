version: 1
feature: "repository-interface-layering"
level: "L3_subfeature"
template: "A1-A8"
tree_context:
  feature_level: "L3_subfeature"
  feature_path: "capability.runtime.feature.runtime-repository.subfeature.repository-interface-layering"
  parent_path: "capability.runtime.feature.runtime-repository"
  acceptance_inherits_from: "capability.runtime.feature.runtime-repository"
level_acceptance:
  focus_groups:
    - A1_functional
    - A7_contract_metadata_consistency
  notes: "Repository 接口分层设计，base → queryable → searchable → vector，支持不同存储能力的渐进式组合。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "Repository 接口定义完成"
        when: "业务服务依赖 Repository 接口"
        then: "可透明切换底层存储实现，API 一致"
      - given: "Queryable 接口"
        when: "调用 Find(filter) / Count(filter)"
        then: "返回符合过滤条件的实体列表和数量"
      - given: "Searchable 接口"
        when: "调用 Search(query)"
        then: "支持全文搜索语义"
      - given: "VectorSearchable 接口"
        when: "调用 VectorSearch(embedding, topK)"
        then: "支持向量相似度查询"
  A2_experience:
    - "接口设计符合 Go 惯用法，易扩展"
  A3_service_governance:
    - "接口与 metadata 能力声明对齐"
  A4_observability:
    - "接口层不引入额外观测负担"
  A5_product_ops:
    - "运营可识别实体使用的接口能力"
  A6_security_privacy:
    - "接口不暴露底层存储细节"
  A7_contract_metadata_consistency:
    - "接口能力由 metadata storage.yaml 声明驱动，禁止硬编码"
  A8_test_automation:
    - "接口 mock 与工厂设计有单元测试"
tests:
  unit:
    - "quwoquan_service/runtime/repository/tests/interface_test.go"
    - "quwoquan_service/runtime/repository/tests/factory_test.go"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
