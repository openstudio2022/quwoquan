version: 1
feature: mongo-pg-vector-cache-adapters
level: "L3_story"
template: A1-A8
tree_context:
  feature_path: capability.runtime.feature.runtime-repository.subfeature.repository-interface-layering.object.mongo-pg-vector-cache-adapters
  parent_path: capability.runtime.feature.runtime-repository.subfeature.repository-interface-layering
  acceptance_inherits_from: capability.runtime.feature.runtime-repository
level_acceptance:
  focus_groups:
  - A1_functional
  - A8_test_automation
  notes: MongoDB、PostgreSQL、Redis 缓存、向量搜索四种适配器实现，均从 EntityRegistry 获取配置。
global_acceptance:
  A1_functional:
    scenarios:
    - given: MongoDB 适配器 + Post 聚合
      when: Save/FindByID/Find/Search/Delete
      then: CRUD 与全文搜索正确，集合名和索引来自 EntityRegistry
    - given: PostgreSQL 适配器 + UserProfile 聚合
      when: Save/FindByID/Find/Count/Delete + 事务
      then: CRUD 正确，表名和列映射来自 EntityRegistry，支持乐观锁
    - given: Redis 缓存中间件
      when: FindByID 缓存未命中 → 回源 → 写缓存
      then: 第二次 FindByID 命中缓存，TTL 来自 metadata
    - given: 向量搜索适配器
      when: VectorSearch(embedding, topK)
      then: 返回相似度排序结果，Atlas Vector Search / pgvector
  A2_experience:
  - 适配器 API 与接口一致，无额外暴露
  A3_service_governance:
  - 连接池、超时可配置
  A4_observability:
  - 适配器操作产生 span 和 metric
  A5_product_ops:
  - 可识别实体使用的适配器类型
  A6_security_privacy:
  - 适配器不处理 PII/SECRET，由拦截链负责
  A7_contract_metadata_consistency:
  - 适配器配置完全来自 EntityRegistry
  A8_test_automation:
  - MongoDB 适配器契约测试（testcontainers）
  - PostgreSQL 适配器契约测试（embedded-postgres）
  - Redis 缓存中间件契约测试（miniredis）
  - 向量搜索适配器契约测试
tests:
  unit:
  - quwoquan_service/runtime/repository/tests/mongo_adapter_test.go
  - quwoquan_service/runtime/repository/tests/pg_adapter_test.go
  - quwoquan_service/runtime/repository/tests/cache_middleware_test.go
  contract:
  - quwoquan_service/runtime/repository/tests/mongo_adapter_contract_test.go
  - quwoquan_service/runtime/repository/tests/pg_adapter_contract_test.go
  - quwoquan_service/runtime/repository/tests/cache_middleware_contract_test.go
execution:
  local_gate: make gate
  full_gate: make gate-full
current_merged_acceptance:
- source_path: runtime/runtime-repository/repository-interface-layering/mongo-pg-vector-cache-adapters/storage-routing-and-interceptor-chain
  task_bucket: storage-routing-and-interceptor-chain
  migrated_as: L3_task
