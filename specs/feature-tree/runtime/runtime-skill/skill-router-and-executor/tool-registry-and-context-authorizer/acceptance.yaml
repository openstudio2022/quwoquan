version: 1
feature: "tool-registry-and-context-authorizer"
level: "L4_object_task"
template: "A1-A8"
tree_context:
  feature_level: "L4_object_task"
  feature_path: "capability.runtime.feature.runtime-skill.subfeature.skill-router-and-executor.object.tool-registry-and-context-authorizer"
  parent_path: "capability.runtime.feature.runtime-skill.subfeature.skill-router-and-executor"
  acceptance_inherits_from: "capability.runtime.feature.runtime-skill"
level_acceptance:
  focus_groups:
    - A1_functional
    - A6_security_privacy
    - A8_test_automation
  notes: "Tool 注册与上下文授权是 Skill 安全执行的关键。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "tool_catalog.yaml 定义了 content.search Tool"
        when: "ToolRegistry 启动加载"
        then: "content.search Tool 可被发现和调用"
      - given: "Skill(DataClassMax=PUBLIC) 调用 Tool(DataClassMax=SENSITIVE)"
        when: "ToolProxy 执行权限检查"
        then: "拒绝调用，返回权限不足"
  A6_security_privacy:
    - "首次 Skill 触发需用户授权（基于 skill_consent 实体）"
    - "DataClassMax 严格限制数据访问级别"
  A8_test_automation:
    - "ToolProxy 权限检查 + ContextAuthorizer 授权流程有单元测试"
tests:
  unit:
    - "quwoquan_service/runtime/skill/tests/tool_proxy_test.go"
    - "quwoquan_service/runtime/skill/tests/context_authorizer_test.go"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
