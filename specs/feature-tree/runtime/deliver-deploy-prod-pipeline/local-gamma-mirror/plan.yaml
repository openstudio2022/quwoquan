feature_path: runtime/deliver-deploy-prod-pipeline/local-gamma-mirror
order_note: 先冻结规格与提交门禁，再落本地镜像栈，随后补 T3/T4 runner 与报告。

slices:
  - id: LG-1-baseline-spec
    title: local-gamma mirror 四件套
    outputs:
      - specs/feature-tree/runtime/deliver-deploy-prod-pipeline/local-gamma-mirror/spec.md
      - specs/feature-tree/runtime/deliver-deploy-prod-pipeline/local-gamma-mirror/design.md
      - specs/feature-tree/runtime/deliver-deploy-prod-pipeline/local-gamma-mirror/acceptance.yaml
      - specs/feature-tree/runtime/deliver-deploy-prod-pipeline/local-gamma-mirror/plan.yaml
    acceptance_refs: [A1]
    tests:
      - python3 -c "import yaml; yaml.safe_load(open('specs/feature-tree/runtime/deliver-deploy-prod-pipeline/local-gamma-mirror/acceptance.yaml'))"

  - id: LG-2-env-docs-commit-policy
    title: 环境矩阵、部署 runbook、提交前 T1-T4 要求
    outputs:
      - deploy/shared/environment_matrix.md
      - deploy/shared/process_domain_mapping_runbook.md
      - deploy/shared/deliver_to_production_runbook.md
      - .cursor/commands/commit.md
    acceptance_refs: [A2, A6]
    tests:
      - make verify-app-env-package

  - id: LG-3-local-gamma-stack
    title: Docker gamma 本地镜像栈与 DNS/TLS 反代
    outputs:
      - quwoquan_service/docker-compose.gamma-local.yaml
      - deploy/local-gamma/README.md
      - deploy/local-gamma/Caddyfile
      - quwoquan_app/scripts/gamma/start_local_gamma_mirror.sh
      - scripts/print_app_env_dart_defines.py
    acceptance_refs: [A3]
    tests:
      - quwoquan_app/scripts/gamma/start_local_gamma_mirror.sh --skip-build --skip-up --print-env

  - id: LG-4-local-t3-runner
    title: 本地 T3 gamma API contract 与 manifest endpoint runner
    outputs:
      - quwoquan_app/scripts/gamma/run_local_gamma_t3.py
      - quwoquan_app/scripts/gamma/verify_local_gamma_mirror.py
    acceptance_refs: [A4]
    tests:
      - python3 quwoquan_app/scripts/gamma/run_local_gamma_t3.py --help
      - python3 quwoquan_app/scripts/gamma/verify_local_gamma_mirror.py --help

  - id: LG-5-local-t4-runner
    title: 本地 T4 Patrol/设备 runner
    outputs:
      - quwoquan_app/scripts/gamma/run_local_gamma_t4.sh
      - quwoquan_app/scripts/gamma/verify_local_gamma_mirror.py
    acceptance_refs: [A5]
    tests:
      - bash quwoquan_app/scripts/gamma/run_local_gamma_t4.sh --help

  - id: LG-6-gate-local-gamma
    title: 提交前 gate-local-gamma 串联与报告
    outputs:
      - Makefile
      - quwoquan_app/scripts/gamma/verify_local_gamma_mirror.py
      - artifacts/local-gamma/report.json
    acceptance_refs: [A6]
    tests:
      - make gate-local-gamma LOCAL_GAMMA_DRY_RUN=1

commit_policy:
  required_before_commit:
    - make gate-local-gamma
    - artifacts/local-gamma/report.json
  gate_block_when:
    - no local gamma DNS or TLS trust
    - no reachable local gamma mirror
    - no eligible simulator or device for touched T4 capability
    - gamma manifest endpoint or RemoteRepository smoke failed
