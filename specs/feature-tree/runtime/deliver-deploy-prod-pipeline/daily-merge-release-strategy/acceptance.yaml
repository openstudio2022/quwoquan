version: 1
feature: daily-merge-release-strategy
level: "L3_story"
archived: true
archived_at: '2026-03-01T00:00:00.000000Z'
template: A1-A5
focus_groups: []
tests:
  contract:
  - 场景：branch_strategy 明确 dev1.0/main 策略
  - 场景：merge-dev1.0-to-main workflow 存在且含 schedule
  - 场景：pre-release-gate 支持 push to main
execution:
  local_gate: make gate
  full_gate: make gate-full
level_acceptance:
  A1:
    criteria: 分支策略文档明确「日常 PR→dev1.0」「main 仅由定时 merge 更新」
    status: implemented
    linked_tasks:
    - T1
    tests:
    - file: deploy/shared/branch_strategy.md
      functions:
      - content
  A2:
    criteria: merge-dev1.0-to-main workflow 定时执行（cron）并可 workflow_dispatch
    status: implemented
    linked_tasks:
    - T2
    tests:
    - file: .github/workflows/merge-dev1.0-to-main.yml
      functions:
      - schedule
      - workflow_dispatch
  A3:
    criteria: merge 成功后触发 pre-release-gate（或等效 deploy integration）
    status: implemented
    linked_tasks:
    - T3
    tests:
    - file: .github/workflows/pre-release-gate.yml
      functions:
      - push branches main
  A4:
    criteria: pre-release-gate 通过后 deploy-prod-auto Stage 1 自动执行
    status: implemented
    linked_tasks: []
    tests:
    - file: .github/workflows/deploy-prod-auto.yml
      functions:
      - workflow_run
  A5:
    criteria: deliver_to_production_runbook、ci_cd_end_to_end_design 与 branch_strategy
      一致
    status: implemented
    linked_tasks:
    - T4
    tests:
    - file: scripts/gate.sh
