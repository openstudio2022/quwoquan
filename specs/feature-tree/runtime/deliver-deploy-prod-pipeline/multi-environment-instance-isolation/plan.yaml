feature_path: runtime/deliver-deploy-prod-pipeline/multi-environment-instance-isolation
order_note: 先冻结规格与环境口径，再落端侧多实例入口与 beta/gamma 单套生命周期，最后补验证脚本与报告字段。

slices:
  - id: MI-1-baseline-spec
    title: 多环境多实例四件套
    outputs:
      - specs/feature-tree/runtime/deliver-deploy-prod-pipeline/multi-environment-instance-isolation/spec.md
      - specs/feature-tree/runtime/deliver-deploy-prod-pipeline/multi-environment-instance-isolation/design.md
      - specs/feature-tree/runtime/deliver-deploy-prod-pipeline/multi-environment-instance-isolation/acceptance.yaml
      - specs/feature-tree/runtime/deliver-deploy-prod-pipeline/multi-environment-instance-isolation/plan.yaml
    acceptance_refs: [A1]
    tests:
      - python3 -c "import yaml; yaml.safe_load(open('specs/feature-tree/runtime/deliver-deploy-prod-pipeline/multi-environment-instance-isolation/acceptance.yaml'))"

  - id: MI-2-env-doc-sync
    title: 环境矩阵、业务数据清单与 runbook 口径同步
    outputs:
      - deploy/shared/environment_matrix.md
      - specs/gates/business_env_data_inventory.md
      - deploy/shared/deliver_to_production_runbook.md
    acceptance_refs: [A2, A5]
    tests:
      - make verify-app-env-package

  - id: MI-3-app-instance-entry
    title: 端侧多模拟器多实例启动入口
    outputs:
      - quwoquan_app/scripts/device/start_app_instance.sh
      - quwoquan_app/scripts/device/stop_app_instance.sh
      - quwoquan_app/scripts/device/list_app_instances.sh
      - quwoquan_app/lib/cloud/runtime/cloud_runtime_config.dart
    acceptance_refs: [A3]
    tests:
      - bash quwoquan_app/scripts/device/start_app_instance.sh --help
      - bash quwoquan_app/scripts/device/stop_app_instance.sh --help
      - bash quwoquan_app/scripts/device/list_app_instances.sh --help

  - id: MI-4-beta-single-stack
    title: beta 单套 stop then start 生命周期
    outputs:
      - quwoquan_app/scripts/device/start_app_beta_manual.sh
      - quwoquan_app/scripts/device/stop_app_beta_manual.sh
      - agent_ops/lib/beta_manual_lifecycle.sh
    acceptance_refs: [A4]
    tests:
      - bash quwoquan_app/scripts/device/start_app_beta_manual.sh --help
      - bash quwoquan_app/scripts/device/stop_app_beta_manual.sh --help

  - id: MI-5-gamma-single-stack
    title: gamma deploy 与 local-gamma mirror 单套切换语义
    outputs:
      - quwoquan_app/scripts/gamma/start_local_gamma_mirror.sh
      - deploy/shared/deliver_to_production_runbook.md
    acceptance_refs: [A5]
    tests:
      - bash quwoquan_app/scripts/gamma/start_local_gamma_mirror.sh --help

  - id: MI-6-verify-and-report
    title: 端侧多实例与单套切换验证脚本和报告字段
    outputs:
      - quwoquan_service/scripts/runtime/verify_env_instance_isolation.py
      - artifacts/app-env-packages
      - artifacts/service-env-packages
    acceptance_refs: [A6]
    tests:
      - python3 quwoquan_service/scripts/runtime/verify_env_instance_isolation.py --help

commit_policy:
  required_before_commit:
    - make verify-app-env-package
    - python3 quwoquan_service/scripts/runtime/verify_env_instance_isolation.py
  gate_block_when:
    - multiple beta service stacks listen on fixed beta ports
    - multiple gamma service stacks run in parallel
    - no explicit simulator device selected for app instance launch
    - app instance state files and actual processes drift
