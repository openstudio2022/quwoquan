  notes: 字段级操作：过滤、脱敏、校验。
global_acceptance:
  A1_functional:
    scenarios:
    - given: 字段 api_exposure=drop
      when: 读链执行
      then: 该字段从返回结果中移除
    - given: 字段 classification=PII
      when: 读链执行
      then: 该字段按 log_policy 执行 mask（如 phone → ***1234）
    - given: 字段 classification=SECRET
      when: 读链执行
      then: 该字段从返回结果中移除，不泄露
    - given: 字段 constraints NOT_NULL=true
      when: 写链执行，值为空
      then: 返回校验错误
  A2_experience:
  - 过滤/脱敏/校验对调用方透明
  A3_service_governance:
  - 单字段处理 < 1ms
  A4_observability:
  - 脱敏/校验可记录审计日志
  A5_product_ops:
  - ops_exposure 控制运营可见性
  A6_security_privacy:
  - SECRET 绝对不暴露；PII 按策略 mask
  A7_contract_metadata_consistency:
  - 规则与 fields.yaml constraints/classification/api_exposure 完全一致
  A8_test_automation:
  - 过滤/脱敏/校验单元测试（全分类、全约束）
tests:
  unit:
