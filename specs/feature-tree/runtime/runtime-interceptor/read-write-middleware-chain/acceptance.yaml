version: 1
feature: "read-write-middleware-chain"
level: "L3_subfeature"
template: "A1-A8"
tree_context:
  feature_level: "L3_subfeature"
  feature_path: "capability.runtime.feature.runtime-interceptor.subfeature.read-write-middleware-chain"
  parent_path: "capability.runtime.feature.runtime-interceptor"
  acceptance_inherits_from: "capability.runtime.feature.runtime-interceptor"
level_acceptance:
  focus_groups:
    - A1_functional
    - A6_security_privacy
    - A7_contract_metadata_consistency
  notes: "读链/写链中间件架构，Interceptor 模式。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "读链中间件链配置就绪"
        when: "Repository FindByID 返回实体"
        then: "读链按顺序执行：过滤 → 脱敏 → 日志"
      - given: "写链中间件链配置就绪"
        when: "Repository Save 写入实体"
        then: "写链按顺序执行：校验 → 事件 hook → 指标"
  A2_experience:
    - "中间件链对业务代码透明"
  A3_service_governance:
    - "链延迟 < 1ms per field"
  A4_observability:
    - "链执行可观测"
  A5_product_ops:
    - "ops_exposure 控制运营可见性"
  A6_security_privacy:
    - "SECRET 字段在读链中 drop"
  A7_contract_metadata_consistency:
    - "链规则由 fields.yaml 驱动"
  A8_test_automation:
    - "链架构单元测试"
tests:
  unit:
    - "quwoquan_service/runtime/interceptor/tests/chain_test.go"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
