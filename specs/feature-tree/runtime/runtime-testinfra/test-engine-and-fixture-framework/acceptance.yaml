version: 1
feature: "test-engine-and-fixture-framework"
level: "L3_subfeature"
template: "A1-A8"
tree_context:
  feature_level: "L3_subfeature"
  feature_path: "capability.runtime.feature.runtime-testinfra.subfeature.test-engine-and-fixture-framework"
  parent_path: "capability.runtime.feature.runtime-testinfra"
  acceptance_inherits_from: "capability.runtime.feature.runtime-testinfra"
level_acceptance:
  focus_groups:
    - A1_functional
    - A7_contract_metadata_consistency
  notes: "测试引擎抽象与 Fixture 框架设计。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "TestSuite 基类定义"
        when: "测试用例继承 TestSuite"
        then: "可调用 StartEngine/StopEngine，获取 DB 连接"
      - given: "Fixture 框架定义"
        when: "测试用例调用 Fixture.New(Post).WithTitle(...).Build()"
        then: "生成符合 fields.yaml 约束的 Post 实体"
  A2_experience:
    - "TestSuite 对业务测试透明"
  A3_service_governance:
    - "引擎启动 < 5s"
  A4_observability:
    - "Seed/Assert/Cleanup 阶段可观测"
  A5_product_ops:
    - "N/A"
  A6_security_privacy:
    - "Fixture 不包含真实用户数据"
  A7_contract_metadata_consistency:
    - "引擎选型与 test_infra.yaml 一致"
    - "Fixture 与 fields.yaml 约束一致"
  A8_test_automation:
    - "TestSuite 自测"
    - "Fixture 自测"
tests:
  unit:
    - "quwoquan_service/runtime/testutil/tests/suite_test.go"
    - "quwoquan_service/runtime/testutil/tests/fixture_test.go"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
