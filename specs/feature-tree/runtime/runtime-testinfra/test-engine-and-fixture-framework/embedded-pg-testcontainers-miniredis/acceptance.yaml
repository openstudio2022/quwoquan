        then: "embedded-postgres 启动，migration 执行，可 CRUD"
      - given: "mongo_suite.go 实现"
        when: "TestMain 调用 mongo_suite.Start()"
        then: "testcontainers MongoDB 启动，索引创建，可 CRUD"
      - given: "redis_suite.go 实现"
        when: "TestMain 调用 redis_suite.Start()"
        then: "miniredis 启动，可 SET/GET/TTL"
  A2_experience:
    - "各引擎对测试代码透明"
  A3_service_governance:
    - "PG 启动 < 2s，Mongo < 3s，Redis < 1s"
  A4_observability:
    - "启动/清理日志输出"
  A5_product_ops:
    - "N/A"
  A6_security_privacy:
    - "测试数据隔离，无真实数据"
  A7_contract_metadata_consistency:
    - "引擎选型与 test_infra.yaml 一致"
  A8_test_automation:
    - "各引擎启动/CRUD/清理自测"
tests:
  unit:
    - "quwoquan_service/runtime/testutil/tests/pg_suite_test.go"
    - "quwoquan_service/runtime/testutil/tests/mongo_suite_test.go"
    - "quwoquan_service/runtime/testutil/tests/redis_suite_test.go"
