# plan：ios-native-page-enforcement（metadata → codegen → 逻辑 → 测试 顺序在纯客户端治理场景的裁剪版）

feature_path: runtime/runtime-client-foundation/ios-native-page-enforcement
order_note: 本特性无 metadata；顺序为 门禁实现 → 接入 gate → 消债（可选）

slices:
  - id: slice-1-gate-script-allowlist
    title: 新增 verify_ios_native_surface_gate.py 与 ios_native_surface_allowlist.yaml
    outputs:
      - scripts/verify_ios_native_surface_gate.py
      - specs/gates/ios_native_surface_allowlist.yaml
    tests:
      - python3 scripts/verify_ios_native_surface_gate.py（干净树通过）

  - id: slice-2-wire-gate-repo
    title: 接入 scripts/gate_repo.sh run_app
    outputs:
      - scripts/gate_repo.sh
    tests:
      - make gate 中 quwoquan_app 段执行新脚本

  - id: slice-3-docs-tree-cr
    title: 特性树 spec/design/acceptance/plan + tree_index + CR
    outputs:
      - specs/feature-tree/runtime/runtime-client-foundation/ios-native-page-enforcement/*
      - specs/changelog/CR-*-ios-native-page-enforcement.yaml
      - specs/feature-tree/tree_index.yaml

  - id: slice-4-optional-migrate-allowlist
    title: 将 allowlist 内页面迁移为 AppScaffold/Cupertino 根壳并清空 allowlist
    outputs:
      - quwoquan_app/lib/ui/rtc/pages/*.dart
      - quwoquan_app/lib/components/media/camera/camera_capture_page.dart
    tests:
      - flutter analyze
      - make gate
    note: 可在后续独立 /dev 会话执行；不阻塞 slice 1~3 合入
