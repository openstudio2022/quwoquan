version: 1
feature: "environment-process-domain-mapping"
level: "L4_detail"
archived: true
archived_at: "2026-02-28T00:00:00+08:00"
template: "A1-A8"
tree_context:
  feature_level: "L4_detail"
  feature_path: "capability.runtime.feature.runtime-config.component.config-provider-layering.detail.environment-process-domain-mapping"
  parent_path: "capability.runtime.feature.runtime-config.component.config-provider-layering"
  acceptance_inherits_from: "capability.runtime.feature.runtime-config.component.config-provider-layering"
level_acceptance:
  focus_groups: [A1_functional, A3_service_governance, A7_contract_metadata_consistency, A8_test_automation]
  notes: "部署进程-领域映射三态约束与门禁。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "存在 deploy/shared/process_domain_mapping.yaml"
        when: "声明 dev/integration/prod 三个环境"
        then: "每个环境均可解析出 deploy process -> domains 映射"
      - given: "运行环境通过 APP_ENV=dev|integration|prod 选择拓扑"
        when: "服务启动读取环境映射"
        then: "仅加载 APP_ENV 对应映射，不跨环境混用"
      - given: "同一环境下同一 domain 被两个进程声明"
        when: "执行 verify_deployment_domain_mapping.sh"
        then: "门禁失败并输出冲突进程"
      - given: "integration 与 prod 映射不一致"
        when: "执行 verify_deployment_domain_mapping.sh"
        then: "门禁失败并阻断提交"
      - given: "integration/prod 拓扑需要绑定配置发布版本"
        when: "服务以 CONFIG_VERSION 发布配置"
        then: "拓扑一致性门禁与配置版本门禁可同时通过"
      - given: "recommendation domain"
        when: "检查 process-domain 映射"
        then: "仅允许 recommendation-service 独占 recommendation domain"
      - given: "Go 与 Python 部署拓扑"
        when: "integration/prod 环境发布"
        then: "seed-box 与 recommendation-service 以独立进程部署，不合并"
      - given: "all-in-one Sidecar 部署"
        when: "使用 deploy/service/seed-box/kustomize/overlays/{env} 渲染"
        then: "可得到 Go+Python 双容器同 Pod 的可部署清单"
      - given: "同一套 overlays 在 dev/integration/prod 复用"
        when: "按环境注入参数"
        then: "CONFIG_VERSION/IMAGE_VERSION/replicas/HPA 阈值均可被参数化替换"
  A2_experience:
    - "开发态保持独立服务调试体验，不引入额外目录分叉"
  A3_service_governance:
    - "拓扑映射作为显式配置受版本控制与审计"
    - "集成环境与生产环境拓扑强一致，降低发布漂移风险"
    - "支持后续将领域服务拆分为独立 Pod，且不破坏现有门禁"
  A4_observability:
    - "门禁失败日志可明确指向冲突 domain 与进程名"
  A5_product_ops:
    - "部署进程抽象不改变业务域接口，对产品能力无侵入"
  A6_security_privacy:
    - "映射文件不包含密钥类配置，仅声明拓扑归属"
  A7_contract_metadata_consistency:
    - "领域 API 仍按 service.yaml 对外暴露，不受进程组合影响"
  A8_test_automation:
    - "verify 脚本自动校验 domain 唯一归属"
    - "verify 脚本自动校验 integration/prod 拓扑一致"
    - "脚本接入 make verify 与 gate_repo"
    - "recommendation-service Python 配置契约测试接入并通过"
    - "make gate-full 将 recommendation-service Python 测试设为必过项"
    - "kustomize overlays 渲染结果可用于环境级回归检查"
execution:
  local_gate: "make verify"
  full_gate: "make gate-full"
