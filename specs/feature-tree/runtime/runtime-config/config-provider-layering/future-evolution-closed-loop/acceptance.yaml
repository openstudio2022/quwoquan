version: 1
feature: "future-evolution-closed-loop"
level: "L4_detail"
template: "A1-A8"
tree_context:
  feature_level: "L4_detail"
  feature_path: "capability.runtime.feature.runtime-config.component.config-provider-layering.detail.future-evolution-closed-loop"
  parent_path: "capability.runtime.feature.runtime-config.component.config-provider-layering"
  acceptance_inherits_from: "capability.runtime.feature.runtime-config.component.config-provider-layering"
level_acceptance:
  focus_groups: [A1_functional, A3_service_governance, A4_observability, A8_test_automation]
  notes: "C11~C13 未来演进闭环与门禁草案。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "C11 低风险热更新场景"
        when: "执行热更新门禁校验"
        then: "仅白名单字段允许热更新，高风险字段被阻断"
      - given: "C12 公共库抽象迁移"
        when: "执行接口契约门禁"
        then: "Load/Validate/Compat 接口保持向后兼容"
      - given: "C13 漂移检测"
        when: "对比 Git 期望与运行时快照"
        then: "输出分级漂移报告且不直接改写运行配置"
  A3_service_governance:
    - "演进任务具备独立节点、独立门禁、独立证据产出"
    - "演进项可在 verify/CI/gate-full 三层追踪执行"
  A4_observability:
    - "热更新/漂移检测均产生可追溯审计记录"
  A7_contract_metadata_consistency:
    - "演进实现不破坏现有配置契约与目录标准"
  A8_test_automation:
    - "存在 config-evolution-regression CI 回归入口"
    - "门禁草案脚本在 tasks 中定义并可转实现"
execution:
  local_gate: "make verify"
  full_gate: "make gate-full"
