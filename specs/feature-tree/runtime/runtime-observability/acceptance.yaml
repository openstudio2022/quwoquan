version: 1
feature: "runtime-observability"
level: "L2_feature"
template: "A1-A8"
tree_context:
  feature_level: "L2_feature"
  feature_path: "capability.runtime.feature.runtime-observability"
  parent_path: "capability.runtime"
  acceptance_inherits_from: "capability.runtime"
level_acceptance:
  focus_groups: [A1_functional, A4_observability, A7_contract_metadata_consistency, A8_test_automation]
  notes: "统一观测口径与链路可检索性为主。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "HTTP/MQ 链路发生成功与异常"
        when: "runtime-observability 写日志"
        then: "三类日志均符合结构并可按 traceId 串联"
  A2_experience:
    - "观测接入不引入明显请求时延回归"
  A3_service_governance:
    - "过程日志级别可配置，异常日志默认必打"
  A4_observability:
    - "日志+指标+追踪统一字段可检索"
  A5_product_ops:
    - "可输出运营分析所需最小维度"
  A6_security_privacy:
    - "KV 输出严格遵循 metadata 默认最小策略"
  A7_contract_metadata_consistency:
    - "日志基线与 metadata 配置一致"
  A8_test_automation:
    - "unit/contract/integration/uat 完整覆盖"
tests:
  mock:
    - "quwoquan_service/runtime/observability/tests/log_mock_test.go"
  unit:
    - "quwoquan_service/runtime/observability/tests/io_process_exception_unit_test.go"
  contract:
    - "quwoquan_service/contracts/tests/log_baseline_contract_test.go"
  integration:
    - "quwoquan_service/runtime/observability/tests/http_mq_link_integration_test.go"
  uat:
    - "UAT-RUNTIME-OBSERVABILITY-CORRELATION-001"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
