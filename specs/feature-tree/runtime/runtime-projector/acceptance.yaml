version: 1
feature: runtime-projector
level: "L2_feature"
archived: true
archived_at: '2026-03-01T00:00:00Z'
template: A1-A8
tree_context:
  feature_path: capability.runtime.feature.runtime-projector
  parent_path: capability.runtime
  acceptance_inherits_from: capability.runtime
level_acceptance:
  focus_groups:
  - A1_functional
  - A3_service_governance
  - A7_contract_metadata_consistency
  - A8_test_automation
  notes: Projector 是 CQRS 读侧核心，驱动信息流/收件箱/推荐特征等 ReadModel。
global_acceptance:
  A1_functional:
    scenarios:
    - given: PostCreated 事件发布到 MQ
      when: DiscoveryFeedProjector 消费该事件
      then: discovery_feed ReadModel 新增一条记录
    - given: MessageSent 事件发布
      when: ChatInboxProjector 消费
      then: chat_inbox ReadModel 更新，未读计数 +1
  A2_experience:
  - ReadModel 查询延迟 < 100ms
  A3_service_governance:
  - Projector 支持 at-least-once + 幂等消费
  - 事件积压时 Projector 能追赶
  A4_observability:
  - Projector 消费延迟和积压量可监控
  A5_product_ops:
  - 运营可查看 ReadModel 数据
  A6_security_privacy:
  - ReadModel 字段遵循 api_exposure 策略
  A7_contract_metadata_consistency:
  - Projector 消费的事件与 events.yaml 定义一致
  - ReadModel 结构与 _projections/*.yaml 定义一致
  A8_test_automation:
  - 每个 Projector 有事件消费 → ReadModel 验证的契约测试
tests:
  contract:
  - quwoquan_service/runtime/projector/tests/discovery_feed_test.go
  - quwoquan_service/runtime/projector/tests/chat_inbox_test.go
execution:
  local_gate: make gate
  full_gate: make gate-full
