version: 1
feature: projector-framework-and-readmodel
level: "L3_story"
template: A1-A8
tree_context:
  feature_path: capability.runtime.feature.runtime-projector.subfeature.projector-framework-and-readmodel
  parent_path: capability.runtime.feature.runtime-projector
  acceptance_inherits_from: capability.runtime.feature.runtime-projector
level_acceptance:
  focus_groups:
  - A1_functional
  - A7_contract_metadata_consistency
  notes: Projector 接口定义 + 事件消费框架 + ReadModel 设计（_projections/*.yaml）。
global_acceptance:
  A1_functional:
    scenarios:
    - given: Projector 接口定义完成
      when: 实现 Handle(event) → update ReadModel
      then: 消费框架可调用任意 Projector
    - given: MQ consumer 订阅 events topic
      when: 事件到达
      then: 按 event_type 路由到对应 Projector
    - given: _projections/*.yaml 定义 ReadModel 结构
      when: Projector 更新 ReadModel
      then: 结构与 _projections 定义一致
  A2_experience:
  - Projector 实现简单，仅 Handle 逻辑
  A3_service_governance:
  - 消费框架支持 at-least-once + 幂等
  A4_observability:
  - 消费框架产生 span 和 metric
  A5_product_ops:
  - 运营可查看 Projector 配置
  A6_security_privacy:
  - ReadModel 字段遵循 api_exposure 策略
  A7_contract_metadata_consistency:
  - ReadModel 结构与 _projections/*.yaml 一致
  - 消费事件与 events.yaml 一致
  A8_test_automation:
  - Projector 接口 mock 与框架单元测试
tests:
  unit:
  - quwoquan_service/runtime/projector/tests/framework_test.go
execution:
  local_gate: make gate
  full_gate: make gate-full
