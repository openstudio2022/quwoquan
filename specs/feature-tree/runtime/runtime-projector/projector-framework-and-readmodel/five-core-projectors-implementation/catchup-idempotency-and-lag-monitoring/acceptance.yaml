version: 1
feature: "catchup-idempotency-and-lag-monitoring"
level: "L5_cross_cutting"
template: "A1-A8"
tree_context:
  feature_level: "L5_cross_cutting"
  feature_path: "capability.runtime.feature.runtime-projector.subfeature.projector-framework-and-readmodel.object.five-core-projectors-implementation.cross.catchup-idempotency-and-lag-monitoring"
  parent_path: "capability.runtime.feature.runtime-projector.subfeature.projector-framework-and-readmodel.object.five-core-projectors-implementation"
  acceptance_inherits_from: "capability.runtime.feature.runtime-projector"
level_acceptance:
  focus_groups:
    - A3_service_governance
    - A4_observability
  notes: "Projector 追赶能力 + 幂等保证 + 消费延迟与积压监控。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "Projector 重启或长时间停机"
        when: "恢复消费"
        then: "能从 offset 追赶，不遗漏事件"
      - given: "同一事件重复消费"
        when: "Projector.Handle 执行"
        then: "幂等，ReadModel 不重复更新"
      - given: "事件积压 10000 条"
        when: "Projector 消费"
        then: "可追赶，不阻塞"
  A2_experience:
    - "追赶对业务透明"
  A3_service_governance:
    - "at-least-once + 幂等消费"
    - "事件积压时 Projector 能追赶"
  A4_observability:
    - "Projector 消费延迟可监控"
    - "消费积压量（lag）可监控"
  A5_product_ops:
    - "运营可查看 Projector 健康状态"
  A6_security_privacy:
    - "监控不暴露 PII"
  A7_contract_metadata_consistency:
    - "offset 与 event 元数据一致"
  A8_test_automation:
    - "幂等消费契约测试"
    - "追赶能力集成测试"
tests:
  unit:
    - "quwoquan_service/runtime/projector/tests/idempotency_test.go"
  contract:
    - "quwoquan_service/runtime/projector/tests/catchup_contract_test.go"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
