version: 1
feature: "five-core-projectors-implementation"
level: "L4_object_task"
template: "A1-A8"
tree_context:
  feature_level: "L4_object_task"
  feature_path: "capability.runtime.feature.runtime-projector.subfeature.projector-framework-and-readmodel.object.five-core-projectors-implementation"
  parent_path: "capability.runtime.feature.runtime-projector.subfeature.projector-framework-and-readmodel"
  acceptance_inherits_from: "capability.runtime.feature.runtime-projector"
level_acceptance:
  focus_groups:
    - A1_functional
    - A8_test_automation
  notes: "5 个核心 Projector 实现：DiscoveryFeed、CircleFeed、ChatInbox、UserProfileView、RecommendFeature。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "PostCreated 事件"
        when: "DiscoveryFeedProjector.Handle"
        then: "discovery_feed ReadModel 新增一条记录"
      - given: "PostCreated 事件（圈子内）"
        when: "CircleFeedProjector.Handle"
        then: "circle_feed ReadModel 新增一条记录"
      - given: "MessageSent 事件"
        when: "ChatInboxProjector.Handle"
        then: "chat_inbox ReadModel 更新，未读计数 +1"
      - given: "UserProfileUpdated 事件"
        when: "UserProfileViewProjector.Handle"
        then: "user_profile_view ReadModel 更新"
      - given: "行为信号事件（view/like/dislike）"
        when: "RecommendFeatureProjector.Handle"
        then: "recommend_feature ReadModel 更新"
  A2_experience:
    - "ReadModel 查询延迟 < 100ms"
  A3_service_governance:
    - "每个 Projector 幂等"
  A4_observability:
    - "每个 Projector 消费延迟可监控"
  A5_product_ops:
    - "运营可查看各 ReadModel 数据"
  A6_security_privacy:
    - "ReadModel 字段遵循 api_exposure 策略"
  A7_contract_metadata_consistency:
    - "ReadModel 结构与 _projections/*.yaml 一致"
  A8_test_automation:
    - "每个 Projector 有契约测试（event → ReadModel 验证）"
tests:
  contract:
    - "quwoquan_service/runtime/projector/tests/discovery_feed_test.go"
    - "quwoquan_service/runtime/projector/tests/circle_feed_test.go"
    - "quwoquan_service/runtime/projector/tests/chat_inbox_test.go"
    - "quwoquan_service/runtime/projector/tests/user_profile_view_test.go"
    - "quwoquan_service/runtime/projector/tests/recommend_feature_test.go"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
