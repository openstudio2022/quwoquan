version: 1
feature: v3-directory-parser-and-validator
level: "L3_story"
template: A1-A8
tree_context:
  feature_path: capability.runtime.feature.runtime-registry.subfeature.metadata-loader-and-entity-registry.object.v3-directory-parser-and-validator
  parent_path: capability.runtime.feature.runtime-registry.subfeature.metadata-loader-and-entity-registry
  acceptance_inherits_from: capability.runtime.feature.runtime-registry
level_acceptance:
  focus_groups:
  - A7_contract_metadata_consistency
  - A8_test_automation
  notes: Parser 负责 YAML 解析与 schema 校验，Validator 负责跨文件引用一致性检查。
global_acceptance:
  A1_functional:
    scenarios:
    - given: 合法 v3 YAML 文件
      when: Parser 解析
      then: 返回结构化 Go 对象，无 schema 错误
    - given: 字段引用指向不存在的 entity/field
      when: Validator 执行
      then: 返回明确错误，包含引用路径
  A2_experience:
  - 解析/校验错误信息包含文件路径、行号、字段名
  A3_service_governance:
  - 解析可配置超时，避免大文件阻塞
  A4_observability:
  - 解析/校验耗时可观测
  A5_product_ops:
  - 可输出校验报告
  A6_security_privacy:
  - schema 校验包含 classification 等安全字段
  A7_contract_metadata_consistency:
  - Parser 输出与 YAML 源文件完全一致
  - Validator 覆盖字段引用、事件引用、存储映射
  A8_test_automation:
  - Parser 单元测试（正常/非法 schema/缺失字段）
  - Validator 单元测试（引用正确/错误/循环引用）
tests:
  unit:
  - quwoquan_service/runtime/registry/tests/parser_test.go
  - quwoquan_service/runtime/registry/tests/validator_test.go
  contract:
  - quwoquan_service/runtime/registry/tests/metadata_consistency_test.go
execution:
  local_gate: make gate
  full_gate: make gate-full
legacy_merged_acceptance:
- source_path: runtime/runtime-registry/metadata-loader-and-entity-registry/v3-directory-parser-and-validator/runtime-query-api-and-hot-reload
  task_bucket: runtime-query-api-and-hot-reload
  migrated_as: L3_task
