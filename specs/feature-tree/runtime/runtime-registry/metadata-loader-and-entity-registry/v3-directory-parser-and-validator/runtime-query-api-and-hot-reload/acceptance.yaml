version: 1
feature: "runtime-query-api-and-hot-reload"
level: "L5_cross_cutting"
template: "A1-A8"
tree_context:
  feature_level: "L5_cross_cutting"
  feature_path: "capability.runtime.feature.runtime-registry.subfeature.metadata-loader-and-entity-registry.object.v3-directory-parser-and-validator.cross.runtime-query-api-and-hot-reload"
  parent_path: "capability.runtime.feature.runtime-registry.subfeature.metadata-loader-and-entity-registry.object.v3-directory-parser-and-validator"
  acceptance_inherits_from: "capability.runtime.feature.runtime-registry"
level_acceptance:
  focus_groups:
    - A3_service_governance
    - A4_observability
  notes: "Query API 提供运行时查询能力，Hot-reload 支持 metadata 变更后热更新。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "EntityRegistry 已加载"
        when: "调用 GetEntity/GetFieldPolicy/GetCapabilities/GetStorageBackend/GetCacheTTL/GetTagTaxonomy"
        then: "返回正确结果，未注册实体返回明确错误"
      - given: "metadata 目录文件变更"
        when: "Hot-reload 触发"
        then: "Registry 更新为新内容，查询 API 返回新结果"
  A2_experience:
    - "查询 API 响应延迟低，不阻塞业务"
  A3_service_governance:
    - "metadata 加载时间 < 500ms，不阻塞服务启动"
    - "Hot-reload 可配置开关，支持灰度"
  A4_observability:
    - "metadata 加载完成后输出 entity 总数、字段总数日志"
    - "Hot-reload 触发时输出变更摘要"
  A5_product_ops:
    - "运营可查看当前加载的 entity 及能力"
  A6_security_privacy:
    - "classification=SECRET 字段在查询时正确标记"
  A7_contract_metadata_consistency:
    - "Query API 返回与 contracts/metadata/ 一致"
  A8_test_automation:
    - "Query API 单元测试（全实体覆盖）"
    - "Hot-reload 单元测试（更新/回滚/并发）"
tests:
  unit:
    - "quwoquan_service/runtime/registry/tests/registry_query_test.go"
    - "quwoquan_service/runtime/registry/tests/hot_reload_test.go"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
