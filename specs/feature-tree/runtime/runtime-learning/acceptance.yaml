version: 1
feature: "runtime-learning"
level: "L2_feature"
template: "A1-A8"
tree_context:
  feature_level: "L2_feature"
  feature_path: "capability.runtime.feature.runtime-learning"
  parent_path: "capability.runtime"
  acceptance_inherits_from: "capability.runtime"
level_acceptance:
  focus_groups: [A1_functional, A5_product_ops, A7_contract_metadata_consistency, A8_test_automation]
  notes: "反馈闭环可执行与版本化追踪为重点。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "服务写入 feedback event"
        when: "runtime-learning 记录并关联评估"
        then: "可追踪到 artifactVersion 与 rollout 信息"
  A2_experience:
    - "优化策略变更不应造成关键旅程突发退化"
  A3_service_governance:
    - "闭环发布支持灰度和回滚"
  A4_observability:
    - "事件与评估链路可通过 traceId 检索"
  A5_product_ops:
    - "运营可查看优化闭环关键指标"
  A6_security_privacy:
    - "反馈事件敏感字段按策略脱敏"
  A7_contract_metadata_consistency:
    - "学习事件字段与 contract 一致"
  A8_test_automation:
    - "event/scorecard/version/rollout 自动化覆盖"
tests:
  mock:
    - "quwoquan_service/runtime/learning/tests/feedback_mock_test.go"
  unit:
    - "quwoquan_service/runtime/learning/tests/scorecard_version_unit_test.go"
  contract:
    - "quwoquan_service/contracts/tests/learning_event_contract_test.go"
  integration:
    - "quwoquan_service/runtime/learning/tests/optimization_loop_integration_test.go"
  uat:
    - "UAT-RUNTIME-LEARNING-CLOSURE-001"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
