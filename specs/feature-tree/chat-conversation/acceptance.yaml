execution:
  local_gate: '# T1 + T2 (L1a/b/c)

    cd quwoquan_app && flutter test test/cloud/chat/ test/ui/chat/

    # T3-L2 (Go contract)

    cd quwoquan_service && go test ./services/chat-service/... -v -count=1

    '
  full_gate: '# local_gate + T3-L3 (staging HTTP)

    make gate-full

    # STAGING_BASE_URL + TEST_AUTH_TOKEN required for L3

    '
  patrol: '# T4 (pre-release only)

    cd quwoquan_app && patrol test test/patrol/chat/

    '
