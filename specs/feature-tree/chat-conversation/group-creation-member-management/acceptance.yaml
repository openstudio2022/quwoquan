version: 2
feature: group-creation-member-management
level: L2_journey
source_path: chat-conversation/group-creation-member-management
archived: false

execution:
  local_gate: make gate
  full_gate: make gate-full

scope:
  summary: >
    冻结全局添加入口发起群聊、从真实群聊/圈子/互关同好选人、私建群原子创建、
    聊天信息页继续加人以及私建群/圈子群危险操作边界的完整 Journey。
  composed_scenarios:
    - group-create-flow
    - member-add-remove-policy
    - group-settings
    - group-member-roster-version-sync
  out_of_scope:
    - 企业联系人来源
    - 群二维码/分享邀请
    - 兼容双轨与运行时回滚

journey_acceptance:
  J1:
    title: 用户可从全局添加入口完成互关选人并发起私建群
    journey: global add entry -> start group chat page -> choose same-interest users / group source / circle source -> review selected users -> complete create
    scenario_refs:
      - group-create-flow
    done_when:
      - 用户可进入独立发起群聊页，而不是复用旧加成员语义页
      - 单独选同好、群聊来源、圈子来源三类入口都可用
      - 所有候选成员都已按“与当前用户互关”过滤
      - 已选成员跨来源去重，并在搜索框下方以最多三行头像区展示、可折叠、可删除
      - 点击“完成”后原子创建私建群
    release_guardrails:
      - 图一为正式页面，图二/图三为贴底非全屏 sheet
      - 浅色/深色双模式和蓝色主题保持 iOS 原画质一致性
      - route、surface、operation 真相源来自 metadata
    evidence:
      primary:
        - T2_module_interaction
        - T4_user_journey
      supporting:
        - T1_schema
        - T3_cross_service_integration
    tests:
      planned:
        - start group chat page widget test
        - candidate source sheet widget test
        - create private group journey test
      recorded: []
    status: specified

  J2:
    title: 建群成功后消息列表与聊天详情页保持一致
    journey: finish create -> return chat list -> see created group -> open chat detail -> open chat settings -> continue add members
    scenario_refs:
      - group-create-flow
      - member-add-remove-policy
      - group-settings
    done_when:
      - 私建群创建成功后，消息列表立即可见
      - 进入聊天详情页与聊天信息页后，成员数量、成员列表与创建结果一致
      - 后续加人复用同一互关准入规则，不会把非互关对象加入群
    release_guardrails:
      - 不允许消息列表、群详情页、聊天信息页维护三套独立 mock 群数据
      - 继续加人与初始建群使用同一成员资格语义
    evidence:
      primary:
        - T2_module_interaction
        - T3_cross_service_integration
      supporting:
        - T1_schema
        - T4_user_journey
    tests:
      planned:
        - chat list consistency journey test
        - add members policy integration test
      recorded: []
    status: specified

  J3:
    title: 私建群与圈子群的危险操作边界清晰可执行
    journey: open chat settings/manage -> inspect private group actions / circle group actions -> dissolve private group or hide circle destructive action
    scenario_refs:
      - member-add-remove-policy
      - group-settings
    done_when:
      - 私建群仅群主可见“解散群聊”
      - 圈子群不出现“解散群聊”入口
      - 私建群解散后从消息列表消失
    release_guardrails:
      - 圈子群生命周期绑定圈子，不允许单独解散
      - 私建群危险操作为不可逆路径，需有明确端云一致 contract
    evidence:
      primary:
        - T3_cross_service_integration
        - T4_user_journey
      supporting:
        - T1_schema
        - T2_module_interaction
    tests:
      planned:
        - private group dissolve contract test
        - circle group destructive action hidden test
      recorded: []
    status: specified

  J4:
    title: 群成员展示、排序与 revision 在端云及 Mock 上一致，且合并推送可驱动多端刷新
    journey: create or open group -> list members / chat settings -> concurrent adds -> other member receives merged roster signal -> pull by revision
    scenario_refs:
      - group-member-roster-version-sync
    done_when:
      - ListMembers 默认 joined_asc；可选 display_name_asc 且并列按 userId
      - 返回展示名为用户展示名，身份以 userId 为准；Mock 与 Remote 语义一致
      - Conversation 上 membersRosterRevision 与 updatedAt 仅服务端写入且成员变更时单调递增
      - 对外实时主事件为 ConversationRosterUpdated（合并窗口内多条变更一条推送）；客户端可据此定点拉取
      - CreateConversation 单事务完成建群与初始成员；AddMembers 等为独立并发事务
    release_guardrails:
      - 禁止客户端本地自增 revision
      - MemberJoined 不得作为唯一同步真相源（迁移期双发须在设计中声明终止条件）
    evidence:
      primary:
        - T1_schema
        - T3_cross_service_integration
      supporting:
        - T2_module_interaction
        - T4_user_journey
    tests:
      planned:
        - ListMembers sort contract test
        - roster revision monotonic contract test
        - mock remote display name parity test
        - dual client roster consistency journey
      recorded: []
    status: specified

release_acceptance:
  R1:
    title: 新群创建与成员生命周期 Journey 可按新模型一把升级
    done_when:
      - 不保留旧发起群聊页、旧路由语义和旧成员规则的双轨兼容
      - 500 人上限、互关准入、圈子群不可解散、私建群可解散等合同已冻结
      - "/dev 可按 metadata -> codegen -> 业务逻辑 -> 测试 顺序直接实施"
    evidence:
      primary:
        - T1_schema
        - T3_cross_service_integration
      supporting:
        - T2_module_interaction
        - T4_release_rehearsal
    tests:
      planned:
        - release checklist review
        - end-to-end main path rehearsal
      recorded: []
    status: specified
