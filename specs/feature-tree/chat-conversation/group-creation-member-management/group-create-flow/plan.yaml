      - 已选成员区可折叠、展开、删除
      - 深浅色与蓝色主题稳定
    status: planned

  - id: P3
    title: land source and member selection sheets
    goal: 落地图二来源 sheet 与图三成员选择 sheet
    depends_on:
      - P2
    acceptance_refs:
      - A4
      - A5
      - A6
      - A7
      - A10
    planned_evidence:
