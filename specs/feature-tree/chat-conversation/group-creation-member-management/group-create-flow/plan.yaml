      - 新群创建后消息列表立即可见
    status: planned

  - id: P5
    title: validate visual polish and journey completion
    goal: 校验微信级主路径已达成且视觉、交互、稳定性高于基线
    depends_on:
      - P4
    acceptance_refs:
