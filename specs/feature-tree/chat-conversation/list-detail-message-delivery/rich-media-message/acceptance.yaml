  A1:
    criteria: "视频消息端到端闭环：用户 A 从相册选择 15s 视频发送，视频自动压缩→上传→发送（type=video, media 含 url/thumbnailUrl/width/height/durationMs/mimeType/fileSizeBytes）→用户 B syncMessages 收到→用户 B 点击气泡全屏播放，画面和声音完整"
