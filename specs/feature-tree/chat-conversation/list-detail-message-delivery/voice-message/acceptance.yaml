        description: "Go 端 sendMessage audio 契约测试：发送+持久化+同步+混合类型"
      - file: quwoquan_app/test/cloud/chat/message/contract/message_dto_contract_test.dart
        layer: T1
        description: "Dart MessageDto audio 类型序列化/反序列化契约测试"

