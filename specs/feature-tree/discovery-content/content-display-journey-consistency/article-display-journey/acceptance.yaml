version: 2
feature: article-display-journey
level: "L3_story"
template: A1-A8
execution:
  local_gate: make gate
  full_gate: make gate-full
level_acceptance:
  A1: 关注流文章卡支持有封面/无封面两种正式样式；有封面为左封面+右标题+两行摘要，无封面为纯文字卡且不保留空白图片区
  A2: 圈子频道双列文章卡支持“上封面下标题摘要”与“高质感文字卡”两种变体，并根据圈子频道提供模板默认推荐
  A3: 文章进入后使用全侵入式阅读器；正文页不侵入顶部工具栏区域；顶部导航统一为“返回 + 当前页/总页数”；不显示 post 式配文区
  A4: 有封面时封面必须进入阅读器第一页，并以“扉页式第一页”展示：上部封面、下部标题与正文开头；无封面时直接从标题正文开始
  A5: 图片组页码与文章页码使用同一顶部导航位置语义；同一时刻只存在一个主页码源，不再混用右下角文章页码和顶部图片页码
  A6: 编辑态可配置封面、模板、字体，且分页、模板纸张、书页边缘与阅读态保持一致；模板切换后预览立即反映
  A7: 正式模板体系冻结为 gentle/ritual/diffuse/journal/tech 五套书本风格，且频道推荐与作者覆盖规则明确
  A8: 文章来源卡、阅读器、作者页使用同源文章与同源状态；Mock/Remote 切换后展示规则保持一致
