level_acceptance:

  # ═══════════════════════ 组 1：存储与运行时 ═══════════════════════

  A1:
    criteria: >
      content-service main.go 默认使用 MongoPostStore 持久存储；
      服务重启后 Post/Comment/Reaction 数据不丢失；
      APP_ENV=local 时自动降级到 InMemory PostStore。
    status: implemented
    linked_tasks: [C1, C5]
    test_layers:
      T1: required
      T2: not_applicable
      T3: required
      T4: optional
    tests:
      - file: services/content-service/tests/post_crud_contract_test.go
        func: TestCreatePostAggregate
      - file: services/content-service/tests/post_crud_contract_test.go
        func: TestGetPostSuccess

  A2:
    criteria: >
      Post 读取走 CacheableRepository Redis 装饰器
      （cache:post:{id}，TTL 300s）；
      Update/Delete 后缓存自动失效；
      Redis 不可用时降级到直读 MongoDB，不阻塞请求。
    status: implemented
    linked_tasks: [C2, C5]
    test_layers:
      T1: required
      T2: not_applicable
      T3: required
      T4: optional
    tests:
      - file: services/content-service/tests/post_cache_contract_test.go
        func: TestCacheFindByID_MissThenHit
      - file: services/content-service/tests/post_cache_contract_test.go
        func: TestCacheInvalidateOnUpdate

  A3:
    criteria: >
      EventPublisher 接入 Redis Pub/Sub 生产实现；
      CreatePost 成功后 ≤5s PostCreated 事件被
      DiscoveryFeedProjector 消费并写入 rm_discovery_feed；
      发现流 GET /v1/content/feed 可返回新创建的内容。
    status: implemented
    linked_tasks: [C3, C4, C5]
    test_layers:
      T1: required
      T2: not_applicable
      T3: required
      T4: required
    tests:
      - file: services/content-service/tests/post_event_contract_test.go
        func: TestPostCreatedEvent
      - file: services/content-service/tests/post_event_contract_test.go
        func: TestNoSpuriousEventsOnRead
      - file: services/content-service/tests/post_feed_contract_test.go
        func: TestGetFeedByType

  A4:
    criteria: >
      HTTP handler 接入 runtime/governance 限流中间件
      （超限返回 429）和 runtime/observability 中间件
      （access log、追踪 span、请求指标）；
      make build 通过；无硬编码中间件。
    status: implemented
    linked_tasks: [C6]
    test_layers:
      T1: required
      T2: not_applicable
      T3: optional
      T4: not_applicable
    tests:
      - file: services/content-service/cmd/api/main.go
        note: observability middleware integrated in main.go startup

