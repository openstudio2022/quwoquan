feature: circle-collaboration-tools
level: L2_feature
archived: false
level_acceptance:
  - id: A1
    description: >
      存储空间 CRUD 可用：成员可创建文件夹、上传文件（≤50MB）、下载文件、删除文件、
      重命名文件/文件夹。文件列表支持按时间/大小排序。
    status: pending
    tests: []

  - id: A2
    description: >
      存储空间权限控制生效：圈主可增删所有文件、管理员可管理本层级文件、
      成员可上传和下载、访客仅可浏览和下载公开文件。
      非授权操作返回 403 + 对应错误码。
    status: pending
    tests: []

  - id: A3
    description: >
      存储空间容量限制生效：超过配置上限时上传返回错误提示，
      圈子设置页显示已用/总容量。
    status: pending
    tests: []

  - id: A4
    description: >
      群聊入口可用：圈子详情页显示群聊卡片（最近 1 条消息预览 + 未读计数），
      点击跳转到 IM 会话页。
    status: pending
    tests: []

  - id: A5
    description: >
      群聊成员自动同步：加入圈子后 3 秒内自动进入群聊（CircleMemberJoined → chat-service），
      退出圈子后自动退出群聊（CircleMemberLeft → chat-service）。
      圈主可在圈子设置中关闭自动同步。
    status: pending
    tests: []

  - id: A6
    description: >
      作品发布区可用：圈子详情页展示圈内内容 feed，
      支持瀑布流/列表视图切换，圈内 FAB 可跳转创作页并自动填充 circleId。
    status: pending
    tests: []
