  - id: P4
    title: deliver group files notices and node aggregation
    goal: 落地群资料、公告、节点内容归属与聚合逻辑
    depends_on:
      - P2
      - P3
    acceptance_refs:
      - A3
      - A6
    planned_evidence:
      - T2_module_interaction
      - T3_cross_service_integration
      - T4_user_journey
    done_when:
      - 群资料和公告绑定 `CircleGroup`
      - 节点内容可被父节点聚合
      - 相关链路满足协作场景要求
    status: pending
