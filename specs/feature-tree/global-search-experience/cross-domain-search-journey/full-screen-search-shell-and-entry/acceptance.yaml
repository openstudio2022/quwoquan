execution:
  local_gate: make gate
  full_gate: make gate-full

scope:
  summary: >
    冻结全局搜索首页初始态与输入后联想态的全屏壳层、统一入口、
    默认上下文与 route/surface/page context。
  journey_bindings:
    - J1
  in_scope:
    - 首页、聊天页、群组页、助手页统一进入全屏搜索首页
    - 搜索框、`最近在搜` 双列卡片、展开与记录管理态布局
    - 输入后联想页的四段结构布局
  out_of_scope:
    - 搜索结果分组逻辑
    - 最近搜索同步实现

scenario_acceptance:
  A1:
    title: 全屏搜索壳层与统一入口成立
    scenario: global search shell and entry
    journey_step: open search landing from root surfaces
    done_when:
      - 首页、聊天页、群组页、助手页进入同一全屏搜索首页
      - 搜索首页包含搜索框、`最近在搜` 双列卡片、展开与记录管理态
      - 输入后页面切换为 `最常使用 / 联系人 / 聊天记录 / 搜索网络结果` 四段联想布局
      - 返回与取消操作不会破坏原页面上下文
    edge_cases:
      - 深色模式下层级不混乱
      - 小屏与大屏断点下信息架构不跳变
      - 从不同页面进入时默认上下文可区分
    linked_plan_items:
      - P1
      - P2
    evidence:
      primary:
        - T2_module_interaction
        - T4_user_journey
      supporting:
        - T1_schema
    tests:
      planned:
        - global search shell widget test
        - root entry journey test
      recorded:
        - flutter test test/ui/search/pages/global_search_page_widget_test.dart
        - flutter test test/ui/discovery/home_page_widget_test.dart test/ui/chat/widgets/chat_page_widget_test.dart test/ui/circle/widgets/circles_page_widget_test.dart test/ui/assistant/pages/assistant_tab_page_widget_test.dart test/app/shell/main_app_shell_widget_test.dart
    status: pending

