  - id: P3
    title: integrate local chat hits into unified search journey
    goal: 让 Journey 通过 canonical `search(request)` 消费本地聊天命中并稳定跳转
    depends_on:
      - P2
    acceptance_refs:
      - A1
      - A2
    planned_evidence:
      - T2_module_interaction
      - T4_user_journey
    done_when:
      - 本地聊天命中可进入统一结果模型
      - 点击后稳定进入单聊或群聊上下文
