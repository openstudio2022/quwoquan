    title: 综合结果按域分组并可稳定导航
    scenario: grouped result composition
    journey_step: input query and browse grouped results
    done_when:
      - 综合结果按内容、社交关系、消息、圈子与频道 facet 分组展示
      - 点击任一结果可进入对应详情页或列表页
      - 问小趣不出现在综合结果分组中
    edge_cases:
      - 某一域结果为空
      - 某一域查询失败
      - 只有单一域有结果
