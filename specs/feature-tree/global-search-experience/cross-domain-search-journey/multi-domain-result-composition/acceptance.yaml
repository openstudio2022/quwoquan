scenario_acceptance:
  A1:
    title: 联想页与网络结果页可稳定编排并导航
    scenario: grouped result composition
    journey_step: input query and browse suggestions / network results
    done_when:
      - 联想页按“最常使用 / 联系人 / 聊天记录 / 搜索网络结果”四段展示
      - 点击联系人/聊天记录可进入对应会话，点击“搜索网络结果”可进入独立网络结果页
      - 小趣搜不出现在联想页分段中，而作为网络结果页左侧 tab 出现
      - 用户面向的结果类型统一显示为群组，分类仍由 circle facet 提供
    edge_cases:
      - 某一域结果为空
      - 某一域查询失败
      - 只有单一域有结果
