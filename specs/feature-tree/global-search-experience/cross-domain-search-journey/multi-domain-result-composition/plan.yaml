      - `SearchCoordinator` 成为内部唯一编排中心
      - 各域结果可并发汇总并分组展示
      - 单域失败只降级该 section
    status: planned

  - id: P3
    title: verify navigation and degrade behavior
    goal: 验证结果点击跳转、空态与降级态
    depends_on:
      - P2
    acceptance_refs:
      - A1
      - S1
    planned_evidence:
      - T2_module_interaction
      - T4_user_journey
    done_when:
      - 结果点击稳定进入详情或列表
      - 空态与 degraded state 可被用户理解
      - 不存在 assistant 混排和 channel 主域误建
    status: planned
