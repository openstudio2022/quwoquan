slices:
  - id: P1
    title: freeze domain search contracts and unified result model
    goal: 收口统一 `Search` 接口、四域 `Search*` contract、DTO 与统一 `SearchSection / SearchResultItem` 模型
    depends_on: []
    acceptance_refs:
      - A1
      - S1
    planned_evidence:
      - T1_schema
    done_when:
      - content/user/messages/circle 的搜索 DTO 明确
      - unified result model 不再依赖松散 `Map`
    status: planned

  - id: P2
    title: land search coordinator and section composition
    goal: 建立统一 `Search` 接口、query debounce、parallel fan-out、section composition 与局部降级
    depends_on:
      - P1
    acceptance_refs:
      - A1
    planned_evidence:
      - T2_module_interaction
      - T3_cross_service_integration
