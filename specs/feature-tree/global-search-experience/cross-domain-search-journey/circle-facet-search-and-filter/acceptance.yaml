    title: 频道仅作为圈子分类投影出现在搜索结果中
    scenario: circle facet search and filter
    journey_step: search circles and refine with facets
    done_when:
      - 搜索结果中可展示圈子结果与频道 facet
      - 频道 facet 只作为筛选或分组信息出现，不作为独立业务对象
