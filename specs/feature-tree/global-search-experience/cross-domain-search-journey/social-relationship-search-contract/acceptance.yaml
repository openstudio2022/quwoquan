execution:
  local_gate: make gate
  full_gate: make gate-full

scope:
  summary: >
    冻结搜索中的“联系人”对象边界、会话绑定信息与结果跳转语义。
  journey_bindings:
    - J2
  in_scope:
    - “联系人”命名与展示
    - 联系人结果的会话绑定 contract
    - 联系人结果跳转
  out_of_scope:
    - follow 写侧行为
    - 私密账号能力本身

scenario_acceptance:
  A1:
    title: 搜索中的“人”统一收口为联系人并直达会话
    scenario: social relationship search contract
    journey_step: display and navigate contact suggestions
    done_when:
      - 搜索结果中不再混用“朋友 / 联系人 / 社交关系”作为当前入口定义，而统一为“联系人”
      - 联系人结果携带稳定的会话绑定信息，而不是依赖额外中间页推导
      - 用户可从联系人结果稳定进入对应单聊或群聊
    edge_cases:
      - 查询结果为空
      - 仅存在联系人身份信息但缺少首选单聊时需要回退已有会话
      - 当前登录主体切换为子账号
    linked_plan_items:
      - P1
      - P2
    evidence:
      primary:
        - T1_schema
        - T3_cross_service_integration
      supporting:
        - T2_module_interaction
    tests:
      planned:
        - social relationship search contract test
        - profile navigation regression test
      recorded:
        - make verify-metadata
        - flutter test test/ui/search/pages/global_search_page_widget_test.dart
    status: implemented

story_readiness:
