version: 1
feature: "one-click-config-rollback"
level: "L5_leaf"
template: "A1-A8"
level_acceptance:
  focus_groups: [A1_functional, A3_service_governance, A4_observability, A8_test_automation]
  notes: "配置发布故障时的一键回滚能力。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "灰度阶段指标越界"
        when: "触发回滚流程"
        then: "服务恢复到稳定配置版本"
  A3_service_governance:
    - "回滚操作可授权且可审计"
  A4_observability:
    - "回滚过程可追踪（开始/完成/失败）"
  A8_test_automation:
    - "回滚流程演练自动化测试通过"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
