version: 1
feature: "slo-error-budget-governance"
level: "L3_component"
template: "A1-A8"
level_acceptance:
  focus_groups: [A1_functional, A4_observability, A8_test_automation]
  notes: "灰度发布的 SLO 预算门禁能力。"
global_acceptance:
  A1_functional:
    scenarios:
      - given: "配置灰度阶段开始"
        when: "门禁系统计算预算消耗"
        then: "返回 continue/pause/rollback 判定"
  A4_observability:
    - "门禁判定与关键指标可追踪"
  A8_test_automation:
    - "预算判定器单测和演练测试通过"
execution:
  local_gate: "make gate"
  full_gate: "make gate-full"
