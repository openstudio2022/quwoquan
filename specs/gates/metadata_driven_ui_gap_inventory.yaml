# 元数据驱动 UI 缺口清单（客户端）
# 说明：status = compliant | partial | legacy_map | exempt
#   partial：含已用 DTO 但尚未满足 policy.post_projection_spec 中「完成定义」的页面（矩阵 P2 记 ○）
# 扫描基线对齐：specs/feature-tree/runtime/runtime-client-foundation/page-horizontal-quality-matrix.md
#   （ui/**/pages/*_page.dart、welcome_screen、components/**/*_page.dart、app/shell）
# 双向校验：scripts/verify_page_matrix_scan_complete.py（矩阵路径 ⊆ 本清单 ui_pages）
version: 1
updated: "2026-03-30"
policy:
  mock_remote_same_return_types: true
  ui_domain_rows_should_be_codegen_dto: true
  allow_temporary_map_only_inside_repository_parse: true
  p2_open_work_item_id: PHQ-P2-TBD
  # 帖子/内容全链路 P2：在 ReadPresentation（按 Surface）+ 编辑 Draft→Payload + 显式 Wire/存储 映射完成前，相关行 status=partial（矩阵 P2=○）
  post_projection_spec: specs/feature-tree/runtime/runtime-client-foundation/page-horizontal-quality/post-projection-pipeline-inventory.md
  p2_rolling_convergence_order:
    - chat
    - content
    - discovery
    - user
    - circle
    - entity
    - search
    - rtc
    - assistant

