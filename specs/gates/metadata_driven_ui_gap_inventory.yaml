        status: compliant
        note: 趣聊 ChatInboxDto；联系人 Tab FutureProvider + ChatContactsRow；listContacts 用 Prototype 对齐 ChatContactRowDto
        target_dto: ChatInboxDto
      - path: quwoquan_app/lib/ui/chat/pages/chat_detail_page.dart
