    notes: |
      discovery*Data 为 List<FeedItemDto>；lookupDiscoveryFeedWireRow 经 aggregateDiscoveryWireSlices 产出 wire Map。
      discoveryPostsAsDtos 使用 toDiscoveryWireMap + postBaseDtoFromMap。

out_of_scope_non_post_mainline:
