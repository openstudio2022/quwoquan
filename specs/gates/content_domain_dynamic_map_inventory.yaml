# 内容域 Map<String,dynamic> / dynamic 使用盘点（与「无遗漏」审视一致）。
# 归类：intentional（HTTP/JSON 或诚实边界）| migrate（应收口到 DTO/WireKeys/ReadPresentation）
#      | adjacent（邻域 UI）| out_of_scope（非帖子主链，仅列明排除）
#
# 辅助：python3 quwoquan_app/scripts/content/scan_content_dynamic_surfaces.py
# 门禁：python3 quwoquan_app/scripts/content/verify_post_view_projection_wire_keys.py
#        python3 quwoquan_app/scripts/content/verify_ui_content_no_dynamic_parameters.py
#        python3 quwoquan_app/scripts/content/verify_content_wire_dto_fields.py
version: 1
updated: "2026-04-11"

repository_content:
  - path: quwoquan_app/lib/cloud/services/content/content_repository.dart
    category: mixed
    notes: |
      读模型已 PostBaseDto / CommentDto / PostSearchItemView / ContentPostDetailPayload；
      写模型已 *RequestWire。getAppConfig → ContentAppConfigWire；`content` 子树由
      ContentAppConfigClientParsed（metadata SSOT：content_app_config_client.yaml + Go 模板生成）解析。
      initMediaUpload / completeMediaUpload / getMediaAsset / 封面与摘要 / getRecommendation 等为生成 DTO；
      getMediaAsset 的 derivatives 在投影中为 List<Map<String,dynamic>> 上限类型（对齐 OpenAPI additionalProperties）。
      reportBehaviors(events) 为行为埋点非 Post 实体，仍为 intentional Map/契约 DTO 批次。

wire_dual_load:
  - path: quwoquan_app/lib/cloud/runtime/models/content_post_detail_payload.dart
    category: intentional
    notes: post + ContentPostDetailWireDto + 全量 wire；UI 优先 readPresentation，详情/沉浸保留 wireForArticleProjection。
  - path: quwoquan_app/lib/core/models/media_viewer_extra.dart
    category: migrate_done_partially
    notes: |
      MediaViewerPostWireRow 内聚 FeedItemDto（feedItem）+ toDynamicMap/toObjectMap；
      已移除对外 operator []；沉浸器仍可用 toObjectMap 过渡。

projection_ui:
  - path: quwoquan_app/lib/ui/content/post_view_projection.dart
    category: migrate_done_partially
    notes: |
      顶层键已 ArticleDetailWireKeys；cards[] / blocks[] 子键已 ArticleCardWireKeys / ArticleBlockWireKeys。
      projectPostMap 入参仍为 Map（JSON 边界）。
  - path: quwoquan_app/lib/ui/content/post_summary_view.dart
    category: migrate_guidance
    notes: |
      沉浸/详情消费强类型 Summary；与 PostReadPresentation 分工见类文档。
      新只读面优先 PostReadPresentation + DTO，不在 Summary 上堆字段。

read_presentation:
  - path: quwoquan_service/contracts/metadata/content/post/projections/post_read_presentation.yaml
    category: ssot
    notes: codegen PostReadPresentation；与 PostSummaryView 关系见 App 侧 dartdoc。

create_editor:
