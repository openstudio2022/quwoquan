    category: migrate_done_partially
    notes: |
      字面量经 _withCircleContext → FeedItemDto.fromMap；对外 discovery*Data 为 List<FeedItemDto>；
      边界还原见 feed_item_discovery_wire_map.toDiscoveryWireMap。

discovery_adjacent:
  - path: quwoquan_app/lib/ui/discovery/widgets/works_immersive_viewer.dart
    category: migrate_done_partially
    notes: 并行 raw 路径已 ArticleDetailWireKeys + ContentPostImmersiveWireKeys；标题/计数等通用键可继续收口。
  - path: quwoquan_app/lib/ui/discovery/widgets/moment_social_feed.dart
