version: "3.9"

services:
  postgres:
    image: "${LOCAL_GAMMA_POSTGRES_IMAGE:-docker.io/library/postgres:16-alpine}"
    environment:
      POSTGRES_USER: quwoquan
      POSTGRES_PASSWORD: quwoquan
      POSTGRES_DB: quwoquan
    ports:
      - "${LOCAL_GAMMA_POSTGRES_PORT:-55432}:5432"
    volumes:
      - local-gamma-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quwoquan"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: "${LOCAL_GAMMA_MONGO_IMAGE:-docker.io/library/mongo:7-jammy}"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "${LOCAL_GAMMA_MONGO_PORT:-37017}:27017"
    volumes:
      - local-gamma-mongo:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 3s
      retries: 20

  mongo-init:
    image: "${LOCAL_GAMMA_MONGO_IMAGE:-docker.io/library/mongo:7-jammy}"
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint:
      - bash
      - -lc
      - |
        mongosh --host mongodb:27017 --quiet --eval '
          try {
            rs.status().ok
          } catch (e) {
            rs.initiate({_id: "rs0", members: [{_id: 0, host: "mongodb:27017"}]})
          }
        '
    restart: "no"

  redis:
    image: "${LOCAL_GAMMA_REDIS_IMAGE:-docker.io/library/redis:7.2-alpine}"
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${LOCAL_GAMMA_REDIS_PORT:-36379}:6379"
    volumes:
      - local-gamma-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rec-model-service:
    build:
      context: ./services/rec-model-service
      dockerfile: Dockerfile
      args:
        PYTHON_BASE_IMAGE: "${LOCAL_GAMMA_PYTHON_BASE_IMAGE:-python:3.11-slim}"
    environment:
      SERVICE_NAME: recommendation-service
      APP_ENV: gamma
      CONFIG_ROOT: /etc/qwq-config
      CONFIG_VERSION: "${LOCAL_GAMMA_CONFIG_VERSION:-local-gamma-v1}"
      IMAGE_VERSION: "${LOCAL_GAMMA_IMAGE_VERSION:-0.0.1}"
      PYTHONUNBUFFERED: "1"
    ports:
      - "${LOCAL_GAMMA_REC_MODEL_PORT:-18090}:8000"
    volumes:
      - ../artifacts/local-gamma/config-root:/etc/qwq-config:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 5

  content-service:
    build:
      context: .
      dockerfile: ../deploy/service/content-service/Dockerfile
      args:
        GO_BASE_IMAGE: "${LOCAL_GAMMA_GO_ALPINE_BASE_IMAGE:-golang:1.24.3-alpine}"
        ALPINE_BASE_IMAGE: "${LOCAL_GAMMA_ALPINE_BASE_IMAGE:-alpine:3.19}"
    environment:
      SERVICE_NAME: content-service
      APP_ENV: gamma
      CONFIG_ROOT: /etc/qwq-config
      CONFIG_VERSION: "${LOCAL_GAMMA_CONFIG_VERSION:-local-gamma-v1}"
      IMAGE_VERSION: "${LOCAL_GAMMA_IMAGE_VERSION:-0.0.1}"
      MONGO_URI: mongodb://mongodb:27017
      CONTENT_REDIS_REC_ADDR: redis:6379
      CONTENT_REDIS_GENERAL_ADDR: redis:6379
      REC_MODEL_SERVICE_ENABLED: "true"
      REC_MODEL_SERVICE_URL: http://rec-model-service:8000
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      rec-model-service:
        condition: service_healthy
    ports:
      - "${LOCAL_GAMMA_CONTENT_PORT:-18083}:18080"
    volumes:
      - ../artifacts/local-gamma/config-root:/etc/qwq-config:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18080/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 10

  chat-service:
    build:
      context: .
      dockerfile: ../deploy/service/chat-service/Dockerfile
      args:
        GO_BASE_IMAGE: "${LOCAL_GAMMA_GO_ALPINE_BASE_IMAGE:-golang:1.24.3-alpine}"
        ALPINE_BASE_IMAGE: "${LOCAL_GAMMA_ALPINE_BASE_IMAGE:-alpine:3.19}"
    environment:
      SERVICE_NAME: chat-service
      MODULE_PACKAGE: chat-service
      APP_ENV: gamma
      CONFIG_ROOT: /etc/qwq-config
      CONFIG_VERSION: "${LOCAL_GAMMA_CONFIG_VERSION:-local-gamma-v1}"
      IMAGE_VERSION: "${LOCAL_GAMMA_IMAGE_VERSION:-0.0.1}"
      CHAT_SERVICE_ADDR: ":18081"
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DATABASE: quwoquan_chat
      CHAT_REDIS_REALTIME_ADDR: redis:6379
      CHAT_REDIS_GENERAL_ADDR: redis:6379
      CHAT_REDIS_RELIABLE_TASK_ADDR: redis:6379
      RELIABLE_TASK_READY_INDEX_ENABLED: "true"
      RELIABLE_TASK_READY_INDEX_STREAM: reliabletask:chat:avatar:ready:local-gamma
      RELIABLE_TASK_READY_INDEX_GROUP: chat.group_avatar_worker.local-gamma
      RELIABLE_TASK_READY_INDEX_QUEUE: reliabletask.chat.avatar
      CHAT_GROUP_AVATAR_CDN_BASE_URL: "${LOCAL_GAMMA_MEDIA_PUBLIC_BASE_URL:-${LOCAL_GAMMA_MEDIA_BASE_URL:-http://127.0.0.1:18080}}"
      CHAT_GROUP_AVATAR_LOCAL_MEDIA_ROOT: /var/lib/quwoquan/chat-media
      RUNTIME_SYNC_PATCH_TTL_HOURS: "720"
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "${LOCAL_GAMMA_CHAT_PORT:-18081}:18081"
    volumes:
      - ../artifacts/local-gamma/config-root:/etc/qwq-config:ro
      - ../artifacts/local-gamma/media:/var/lib/quwoquan/chat-media
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18081/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 10

  user-service:
    image: "${LOCAL_GAMMA_GO_BOOKWORM_IMAGE:-docker.io/library/golang:1.24-bookworm}"
    working_dir: /workspace/services/user-service
    command: ["sh", "-lc", "/usr/local/go/bin/go run ./cmd/api"]
    environment:
      PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      GOPROXY: "${LOCAL_GAMMA_GOPROXY:-https://goproxy.cn,direct}"
      GOSUMDB: "${LOCAL_GAMMA_GOSUMDB:-sum.golang.google.cn}"
      SERVICE_NAME: user-service
      APP_ENV: gamma
      CONFIG_ROOT: /etc/qwq-config
      CONFIG_VERSION: "${LOCAL_GAMMA_CONFIG_VERSION:-local-gamma-v1}"
      IMAGE_VERSION: "${LOCAL_GAMMA_IMAGE_VERSION:-0.0.1}"
      USER_SERVICE_ADDR: ":18082"
      POSTGRES_DSN: postgres://quwoquan:quwoquan@postgres:5432/quwoquan?sslmode=disable
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: quwoquan_user
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "${LOCAL_GAMMA_USER_PORT:-18082}:18082"
    volumes:
      - .:/workspace
      - ../artifacts/local-gamma/config-root:/etc/qwq-config:ro
      - local-gamma-go-cache:/go
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18082/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 10

  assistant-service:
    image: "${LOCAL_GAMMA_GO_BOOKWORM_IMAGE:-docker.io/library/golang:1.24-bookworm}"
    working_dir: /workspace
    command: ["sh", "-lc", "cd services/assistant-service/cmd/api && /usr/local/go/bin/go run ."]
    environment:
      PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      GOPROXY: "${LOCAL_GAMMA_GOPROXY:-https://goproxy.cn,direct}"
      GOSUMDB: "${LOCAL_GAMMA_GOSUMDB:-sum.golang.google.cn}"
      SERVICE_NAME: assistant-service
      APP_ENV: gamma
      CONFIG_ROOT: /etc/qwq-config
      CONFIG_VERSION: "${LOCAL_GAMMA_CONFIG_VERSION:-local-gamma-v1}"
      IMAGE_VERSION: "${LOCAL_GAMMA_IMAGE_VERSION:-0.0.1}"
      ASSISTANT_SERVICE_ADDR: ":18087"
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: quwoquan_assistant
      REDIS_GENERAL_ADDR: redis:6379
      REDIS_REC_ADDR: redis:6379
      ASSISTANT_MODEL_PROVIDER: "${ASSISTANT_MODEL_PROVIDER:-deterministic}"
      ALLOW_DETERMINISTIC_BETA: "${ALLOW_DETERMINISTIC_BETA:-1}"
      ASSISTANT_SCENARIO_SEED_REFS: "${ASSISTANT_SCENARIO_SEED_REFS:-assistant_p0_core}"
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - .:/workspace
      - ../artifacts/local-gamma/config-root:/etc/qwq-config:ro
      - local-gamma-go-cache:/go
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18087/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 10

  product-ops-service:
    image: "${LOCAL_GAMMA_GO_BOOKWORM_IMAGE:-docker.io/library/golang:1.24-bookworm}"
    working_dir: /workspace
    command: ["sh", "-lc", "cd services/product-ops-service/cmd/api && /usr/local/go/bin/go run ."]
    environment:
      PATH: /go/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      GOPROXY: "${LOCAL_GAMMA_GOPROXY:-https://goproxy.cn,direct}"
      GOSUMDB: "${LOCAL_GAMMA_GOSUMDB:-sum.golang.google.cn}"
      SERVICE_NAME: product-ops-service
      APP_ENV: gamma
      CONFIG_ROOT: /etc/qwq-config
      CONFIG_VERSION: "${LOCAL_GAMMA_CONFIG_VERSION:-local-gamma-v1}"
      IMAGE_VERSION: "${LOCAL_GAMMA_IMAGE_VERSION:-0.0.1}"
      PRODUCT_OPS_SERVICE_ADDR: ":18086"
      MONGO_URI: mongodb://mongodb:27017
      PRODUCT_OPS_REDIS_REC_ADDR: redis:6379
      PRODUCT_OPS_REDIS_GENERAL_ADDR: redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "${LOCAL_GAMMA_PRODUCT_OPS_PORT:-18086}:18086"
    volumes:
      - .:/workspace
      - ../artifacts/local-gamma/config-root:/etc/qwq-config:ro
      - local-gamma-go-cache:/go
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:18086/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      start_period: 10s
      retries: 10

  gamma-proxy:
    image: "${LOCAL_GAMMA_CADDY_IMAGE:-docker.io/library/caddy:2.8-alpine}"
    depends_on:
      content-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      assistant-service:
        condition: service_healthy
      product-ops-service:
        condition: service_healthy
    environment:
      LOCAL_GAMMA_TLS_MODE: "${LOCAL_GAMMA_TLS_MODE:-internal}"
    ports:
      - "${LOCAL_GAMMA_HTTP_PORT:-18080}:80"
      - "${LOCAL_GAMMA_HTTPS_PORT:-443}:443"
      - "${LOCAL_GAMMA_ADMIN_PORT:-2019}:2019"
    volumes:
      - ../artifacts/local-gamma/Caddyfile:/etc/caddy/Caddyfile:ro
      - ../artifacts/local-gamma/media:/srv/media:ro
      - local-gamma-caddy-data:/data
      - local-gamma-caddy-config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 10

volumes:
  local-gamma-postgres:
  local-gamma-mongo:
  local-gamma-redis:
  local-gamma-go-cache:
  local-gamma-caddy-data:
  local-gamma-caddy-config:
