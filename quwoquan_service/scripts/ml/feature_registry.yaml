# feature_registry: shared with rec-model-service inference.
# Align field names and types with ModelScoreRequest / CandidateInput.
version: 5
scenarios:
  content_feed:
    user_features:
      - name: tagAffinities
        type: map_float
        source: rm_recommend_feature.userFeatures.tagInteraction
        description: "tag -> affinity score, decayed"
      - name: authorAffinities
        type: map_float
        source: rm_recommend_feature.userFeatures.authorInteraction
        description: "authorId -> affinity score"
      - name: engagementRate
        type: float
        source: rm_recommend_feature.userFeatures.engagementRate
      - name: totalLikes
        type: int
        source: rm_recommend_feature.userFeatures.totalLikes
      - name: totalFavorites
        type: int
        source: rm_recommend_feature.userFeatures.totalFavorites
      - name: totalShares
        type: int
        source: rm_recommend_feature.userFeatures.totalShares
      - name: totalEvents
        type: int
        source: rm_recommend_feature.userFeatures.totalEvents
      - name: topicAffinities
        type: map_float
        source: rm_recommend_feature.userFeatures.topicAffinities
        description: "Topic dimension tag -> weighted affinity"
      - name: audienceAffinities
        type: map_float
        source: rm_recommend_feature.userFeatures.audienceAffinities
        description: "Audience dimension tag -> weighted affinity"
      - name: formatAffinities
        type: map_float
        source: rm_recommend_feature.userFeatures.formatAffinities
        description: "Format dimension tag -> weighted affinity"
      - name: entityAffinities
        type: map_float
        source: rm_recommend_feature.userFeatures.entityAffinities
        description: "Entity dimension tag -> weighted affinity"
      - name: entityInstanceAffinities
        type: map_float
        source: rm_recommend_feature.userFeatures.entityInstanceAffinities
        description: "Specific entity instance -> weighted affinity (e.g. places, brands)"
      - name: avgEngagementDepth
        type: float
        source: rm_recommend_feature.userFeatures.avgEngagementDepth
        description: "Running average of engagement depth level (0-4)"
      - name: depthDistribution
        type: map_int
        source: rm_recommend_feature.userFeatures.depthDistribution
        description: "L0-L4 -> count histogram of engagement depth levels"
      - name: sourceDistribution
        type: map_int
        source: rm_recommend_feature.userFeatures.sourceDistribution
        description: "referralSource -> count histogram"
      - name: circleTagAffinities
        type: map_float
        source: rm_recommend_feature.userFeatures.circleTagAffinities
        description: "Tags propagated from user's circles (0.3x decay)"
      - name: socialInterestScore
        type: float
        source: rm_recommend_feature.userFeatures.socialInterestScore
        description: "Combined social interest density"
      - name: typeENER
        type: map_float
        source: rm_recommend_feature.userFeatures.typeENER
        description: "Exposure-Normalized Engagement Rate per content type"
        nullable: true
      - name: userEmbedding
        type: vector_float64
        source: dual_tower_model.user_embed
        description: "64-dim user tower embedding (Phase 5+)"
        nullable: true
    item_features:
      - name: contentId
        type: string
      - name: contentType
        type: categorical
      - name: authorId
        type: string
      - name: tags
        type: list_string
      - name: entityRefs
        type: list_string
      - name: geoTagRef
        type: string
      - name: ageHours
        type: float
        derived: "hours_since(publishedAt)"
      - name: viewCount
        type: int
      - name: likeCount
        type: int
      - name: commentCount
        type: int
      - name: shareCount
        type: int
      - name: bodyLength
        type: int
        source: rm_discovery_feed.bodyLength
      - name: hasCover
        type: bool
        source: rm_discovery_feed.hasCover
      - name: aspectRatio
        type: float
        source: rm_discovery_feed.aspectRatio
        nullable: true
      - name: tagCount
        type: int
        derived: "len(tags)"
      - name: qualityScore
        type: float
        source: rm_discovery_feed.qualityScore
      - name: publishHour
        type: int
        derived: "publishedAt.hour"
      - name: recallPath
        type: categorical
      - name: itemEmbedding
        type: vector_float64
        source: atlas_vector_search.embedding
        description: "1536-dim content embedding (Phase 5+)"
        nullable: true
    context_features:
      - name: requestHour
        type: int
      - name: requestDayOfWeek
        type: int
      - name: surfaceId
        type: categorical
      - name: sessionDuration
        type: float
        description: "seconds since session start"
    labels:
      - name: click
        type: binary
        description: "user clicked on the item"
      - name: dwell_s
        type: float
        description: "seconds spent viewing the item"
      - name: like
        type: binary
      - name: favorite
        type: binary
      - name: share
        type: binary
      - name: comment
        type: binary
      - name: follow
        type: binary
        description: "user followed the author after viewing"
      - name: dislike
        type: binary
      - name: engaged
        type: binary
        derived: "click OR dwell_s>10 OR like OR favorite OR share OR comment OR follow"
        description: "composite positive signal for primary ranking objective"
