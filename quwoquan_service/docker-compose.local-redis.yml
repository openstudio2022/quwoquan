services:
  mongo:
    image: mongo:7-jammy
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    ports:
      - "27017:27017"
    volumes:
      - quwoquan-local-mongo:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 3s
      timeout: 3s
      retries: 30

  mongo-init:
    image: mongo:7-jammy
    depends_on:
      mongo:
        condition: service_healthy
    entrypoint:
      - bash
      - -lc
      - |
        mongosh --host mongo:27017 --quiet --eval '
          try {
            rs.status().ok
          } catch (e) {
            rs.initiate({_id: "rs0", members: [{_id: 0, host: "localhost:27017"}]})
          }
        '

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - quwoquan-local-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 20

volumes:
  quwoquan-local-mongo:
  quwoquan-local-redis:
