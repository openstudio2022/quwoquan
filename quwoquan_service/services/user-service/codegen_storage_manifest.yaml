service: user-service
output_dir: services/user-service/internal
module_path: quwoquan_service/services/user-service/internal

sources:
  - metadata: user/user_profile
    domain_pkg: user
    tables:
      - user_profiles
      - personas
      - user_auth
      - user_devices
      - user_settings
      - profile_update_proposals
      - credential_bindings
    name_overrides:
      UserProfile: Profile
      UserSetting: Setting
    type_overrides:
      UserSetting:
        contentLanguage: "*string"
        feedPreference: "*string"
    cache_overrides:
      "cache:user_profile:{userId}":
        entity: FullSnapshot
        name: Profile
      "cache:user_setting:{userId}":
        name: Setting

  - metadata: user/follow_edge
    domain_pkg: follow
    name_overrides:
      FollowEdge: Follow

  - metadata: user/block_edge
    domain_pkg: block
    name_overrides:
      BlockEdge: Block

  - metadata: user/contact_discovery
    domain_pkg: user
    name_overrides:
      ContactDiscoveryRecord: ContactDiscovery

  - metadata: user/invite_record
    domain_pkg: user
    name_overrides:
      InviteRecord: Invite

  - metadata: user/user_life_item
    domain_pkg: user
    name_overrides:
      UserLifeItem: LifeItem

  - metadata: user/user_work
    domain_pkg: user
    name_overrides:
      UserWork: Work

  - metadata: user/greeting_request
    domain_pkg: user
    name_overrides:
      GreetingRequest: Greeting
