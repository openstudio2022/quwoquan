service:
  name: integration-service
  http:
    addr: ":18080"

integration:
  location:
    provider: "baidu"
    primary_provider: "baidu"
    backup_provider: "amap"
    timeout_ms: 1200
    nearby_default_radius_meters: 3000
    nearby_default_limit: 20
    search_default_limit: 20
    default_latitude: 30.6586
    default_longitude: 104.0648
    baidu_base_url: "https://api.map.baidu.com"
    amap_base_url: "https://restapi.amap.com"
    # placeholder keys, injected by secret/config center in real env
    baidu_ak: ""
    amap_key: ""

config:
  # Config release contract
  # CONFIG_VERSION must be injected by deployment pipeline in prod.
  version: "v0.0.1"
  min_image_version: "0.0.1"
  max_image_version: "9.9.9"

# Redis scenes (defaults)
redis:
  rec:
    mode: standalone
    addr: ""
    addrs: []
    password: ""
    db: 0
    tls: false
    pool:
      size: 0
      min_idle: 0
      read_timeout_ms: 100
      write_timeout_ms: 100
      dial_timeout_ms: 500
  general:
    mode: standalone
    addr: ""
    addrs: []
    password: ""
    db: 1
    tls: false
    pool:
      size: 0
      min_idle: 0
      read_timeout_ms: 200
      write_timeout_ms: 200
      dial_timeout_ms: 500