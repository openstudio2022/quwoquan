service:
  name: content-service
  http:
    addr: ":18080"

config:
  # Config release contract
  # CONFIG_VERSION must be injected by deployment pipeline in prod.
  version: "v0.0.1"
  min_image_version: "0.0.1"
  max_image_version: "9.9.9"

# MongoDB — empty uri falls back to in-memory PostStore (local dev)
mongo:
  uri: ""
  database: "quwoquan_content"
  collection: "posts"

# Redis scenes (defaults)
redis:
  rec:
    mode: standalone
    addr: ""
    addrs: []
    password: ""
    db: 0
    tls: false
    pool:
      size: 0
      min_idle: 0
      read_timeout_ms: 100
      write_timeout_ms: 100
      dial_timeout_ms: 500
  general:
    mode: standalone
    addr: ""
    addrs: []
    password: ""
    db: 1
    tls: false
    pool:
      size: 0
      min_idle: 0
      read_timeout_ms: 200
      write_timeout_ms: 200
      dial_timeout_ms: 500

# rec-model-service (default: disabled; gamma/prod enable via env override)
rec_model_service:
  url: ""
  timeout_ms: 50
  enabled: false

# Embedding service (default: disabled)
embedding:
  endpoint: ""
  api_key: ""
  model: "text-embedding-3-small"
  enabled: false

# Object storage (default: local MinIO)
oss:
  endpoint: "127.0.0.1:9000"
  bucket: "quwoquan-media"
  region: "us-east-1"
  access_key_id: ""
  access_key_secret: ""
  cdn_domain: ""
  cdn_sign_key: ""
  presign_ttl_minutes: 15
  cdn_ttl_minutes: 60
  use_ssl: false

metadata:
  dir: "../../../contracts/metadata"