# Field Policy — root aggregator (canonical per-entity definitions are in domain subdirs)
# New location: contracts/metadata/{domain}/{entity}/privacy.yaml
policies:
  - entity: Post
    field: authorId
    classification: internal
    log_policy: hash
    description: Author user ID; hash in logs

  - entity: Post
    field: contentType
    classification: public
    log_policy: plain
    description: Content type identifier

  - entity: Post
    field: likeCount
    classification: public
    log_policy: plain
    description: Aggregate like counter

  - entity: Comment
    field: authorId
    classification: internal
    log_policy: hash
    description: Commenter user ID; hash in logs

  - entity: Comment
    field: content
    classification: user_content
    log_policy: omit
    description: Comment text; never log

  - entity: LocationPoi
    field: name
    classification: public
    log_policy: plain
    description: Normalized poi name

  - entity: LocationPoi
    field: address
    classification: public
    log_policy: plain
    description: Normalized poi address

  - entity: LocationPoi
    field: latitude
    classification: public
    log_policy: plain
    description: Latitude of poi

  - entity: LocationPoi
    field: longitude
    classification: public
    log_policy: plain
    description: Longitude of poi
