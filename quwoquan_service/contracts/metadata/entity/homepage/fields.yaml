        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: averageRating
        type: float64
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: ratingCount
        type: int
