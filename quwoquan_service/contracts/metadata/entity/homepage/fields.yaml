  HomepageClaimRequest:
    description: 共享主页认领申请
    fields:
      - name: _id
        type: ObjectId
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: homepageId
        type: ObjectId
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: requesterUserId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: claimTier
        type: enum
        enum_ref: HomepageClaimTier
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: businessLicenseUrl
        type: string
        constraints: [NULLABLE]
        classification: SENSITIVE
        log_policy: mask
        api_exposure: read_write
        ops_exposure: read

      - name: contactPhone
        type: string
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: read_write
        ops_exposure: read

      - name: identityCardFrontUrl
        type: string
        constraints: [NULLABLE]
        classification: SENSITIVE
        log_policy: drop
        api_exposure: read_write
        ops_exposure: read

      - name: identityCardBackUrl
        type: string
        constraints: [NULLABLE]
        classification: SENSITIVE
        log_policy: drop
        api_exposure: read_write
        ops_exposure: read

      - name: note
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: status
        type: enum
        enum_ref: HomepageClaimReviewStatus
        constraints: [NOT_NULL, DEFAULT_PENDING_REVIEW]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write

      - name: reviewNote
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: reviewedAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

