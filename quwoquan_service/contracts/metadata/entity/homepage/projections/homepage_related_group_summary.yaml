version: 1
read_model: HomepageRelatedGroupSummary

description: |
  主页壳层关联圈子摘要 wire（circleId 与记录 id 键兼容）。

source_entities:
  - Homepage

consumers:
  - app

client_projection:
  dart_class: HomepageRelatedGroupSummary
  base_class: ""
  output_path: cloud/runtime/generated/entity/homepage_related_group_summary.g.dart
  fields:
    - name: circleId
      dart_type: String
      nullable: false
      source: circleId
      aliases: [circleId, id]
      default: "''"

    - name: name
      dart_type: String
      nullable: false
      source: name
      aliases: [name]
      default: "''"

    - name: memberCount
      dart_type: int
      nullable: false
      source: memberCount
      aliases: [memberCount]
      default: "0"

    - name: linkedHomepageId
      dart_type: String
      nullable: true
      source: linkedHomepageId
      aliases: [linkedHomepageId]

    - name: linkedHomepageTitle
      dart_type: String
      nullable: true
      source: linkedHomepageTitle
      aliases: [linkedHomepageTitle]
