openapi: 3.0.3
info:
  title: Integration Service API
  version: v1
paths:
  /v1/integration/location/nearby:
    get:
      summary: Get nearby locations
      parameters:
        - in: query
          name: lat
          required: true
          schema: { type: number }
        - in: query
          name: lng
          required: true
          schema: { type: number }
        - in: query
          name: radiusMeters
          required: false
          schema: { type: integer, default: 3000 }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: ok
  /v1/integration/location/search:
    get:
      summary: Search locations by keyword
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: cityCode
          required: false
          schema: { type: string }
        - in: query
          name: lat
          required: false
          schema: { type: number }
        - in: query
          name: lng
          required: false
          schema: { type: number }
        - in: query
          name: limit
          required: false
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: ok
