openapi: 3.0.3
info:
  title: quwoquan rec-model-service API
  version: "v1"
  description: 推荐模型工程服务，多场景打分（content_feed / circle_discovery / friend_suggestion），与 runtime/recommendation/scorer.go ModelPredictRequest/ModelPredictResponse 对齐。
servers:
  - url: http://localhost
paths:
  /v1/score:
    post:
      summary: 多场景推荐打分
      operationId: Score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelScoreRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelScoreResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: ../_shared/openapi_common.yaml#/components/schemas/ErrorResponse
        "504":
          description: Gateway Timeout（调用方 CascadeScorer 回退 RuleScorer）
          content:
            application/json:
              schema:
                $ref: ../_shared/openapi_common.yaml#/components/schemas/ErrorResponse
  /health:
    get:
      summary: 健康检查
      operationId: Health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
components:
  schemas:
    ModelScoreRequest:
      type: object
      required: [scenario, userId, sessionId, candidates]
      properties:
        scenario:
          type: string
          enum: [content_feed, circle_discovery, friend_suggestion]
          description: 场景标识
        userId:
          type: string
        sessionId:
          type: string
        userFeatures:
          type: object
          description: 用户侧特征（UserFeatureVector）
        sessionSignals:
          type: object
          description: 会话内实时信号（SessionState）
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/CandidateInput"
        context:
          type: object
          description: 可选上下文（设备/位置等）
    CandidateInput:
      type: object
      properties:
        contentId: { type: string }
        contentType: { type: string }
        authorId: { type: string }
        tags: { type: array, items: { type: string } }
        ageHours: { type: number }
        viewCount: { type: integer }
        likeCount: { type: integer }
        commentCount: { type: integer }
        shareCount: { type: integer }
        recallPath: { type: string }
    ModelScoreResponse:
      type: object
      required: [scores]
      properties:
        scores:
          type: array
          items:
            $ref: "#/components/schemas/CandidateScore"
    CandidateScore:
      type: object
      required: [contentId, score]
      properties:
        contentId: { type: string }
        score: { type: number }
        detail:
          type: object
          additionalProperties: { type: number }
          description: 可解释性字段贡献
