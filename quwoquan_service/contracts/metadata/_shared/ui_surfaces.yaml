version: 1

surfaces:
  - id: chatList
    owner: chat
    route_id: chat
    path_template: /chat
    description: 趣信列表与会话入口
    operation_ids:
      - ListInbox
      - ListConversations
      - ListConversationTimestamps
      - BatchGetConversations
      - ListContacts
      - SearchContacts

  - id: startGroupChat
    owner: chat
    route_id: startGroupChat
    path_template: /chat/start-group
    description: 全局添加入口的发起群聊页
    operation_ids:
      - CreateConversation
      - ListConversations
      - SearchSocialRelations
      - ListUserCircles

  - id: chatDetail
    owner: chat
    route_id: chatDetail
    path_template: /chat/{id}
    description: IM 会话详情
    operation_ids:
      - GetConversation
      - ListMessages
      - SendMessage
      - RecallMessage
      - SyncMessages
      - MarkAsRead
      - GetReceipts

  - id: chatSettings
    owner: chat
    route_id: chatSettings
    path_template: /chat/{id}/settings
    description: 会话设置页
    operation_ids:
      - GetConversation
      - UpdateConversationSettings
      - ListMembers

  - id: chatManage
    owner: chat
    route_id: chatManage
    path_template: /chat/{id}/manage
    description: 群聊管理页
    operation_ids:
      - GetConversation
      - ListMembers
      - UpdateConversationSettings
      - DissolveConversation

  - id: chatAddMembers
    owner: chat
    route_id: chatAddMembers
    path_template: /chat/{id}/add-members
    description: 会话加成员页
    operation_ids:
      - ListMembers
      - AddMembers
      - ListContacts
      - SearchContacts

  - id: chatTransferOwnership
    owner: chat
    route_id: chatTransferOwnership
    path_template: /chat/{id}/transfer-ownership
    description: 群主转让页
    operation_ids:
      - GetConversation
      - ListMembers
      - TransferOwnership

  - id: chatAdmins
    owner: chat
    route_id: chatAdmins
    path_template: /chat/{id}/admins
    description: 群管理员页
    operation_ids:
      - GetConversation
      - ListMembers
      - UpdateGroupAdmins

  - id: chatMemberSearch
    owner: chat
    route_id: chatMemberSearch
    path_template: /chat/{id}/member-search
    description: 群成员搜索页（端侧过滤）
    operation_ids:
      - GetConversation
      - ListMembers

  - id: assistantDialog
    owner: assistant
    route_id: chatDetail
    path_template: /chat/{id}
    description: 私助完整对话页
    operation_ids:
      - CreateRun
      - CreateRunStream
      - ReportInteractionEvent
      - ReportScorecard
      - ReportPageContext
      - GetSuggestedActions
      - GetPolicy
      - ListSkills
      - ListAssistantTasks
      - ListAssistantMemories
      - ListConsents
      - GrantSkillConsent
      - RevokeSkillConsent

  - id: assistantHalfSheet
    owner: assistant
    route_id: chatDetail
    path_template: /chat/{id}
    description: 私助半弹层入口
    operation_ids:
      - ReportPageContext
      - GetSuggestedActions

  - id: personalAssistantDialog
    owner: assistant
    route_id: assistantPersonal
    path_template: /assistant/personal
    description: 找私助云端优先对话入口
    operation_ids:
      - CreateAssistantConversation
      - CreateAssistantTurn
      - StreamAssistantTurn
      - ListSkills
      - ListAppMessages
      - GetAppMessageUnreadCount

  - id: assistantSettings
    owner: assistant
    route_id: chatDetail
    path_template: /chat/{id}
    description: 私助会话设置
    operation_ids:
      - GetPolicy
      - ListSkills
      - ListAssistantTasks
      - ListAssistantMemories
      - ListConsents
      - GrantSkillConsent
      - RevokeSkillConsent

  - id: assistantHistory
    owner: assistant
    route_id: chatDetail
    path_template: /chat/{id}
    description: 私助记录抽屉与分页
    operation_ids: []

  - id: assistantFeedback
    owner: assistant
    route_id: chatDetail
    path_template: /chat/{id}
    description: 私助反馈与纠错
    operation_ids:
      - ReportInteractionEvent
      - ReportScorecard

  - id: globalSearchLanding
    owner: search
    route_id: globalSearch
    path_template: /search
    description: 全局搜索记录页与记录管理态
    operation_ids:
      - ListRecentSearches
      - UpsertRecentSearch
      - DeleteRecentSearch
      - ClearRecentSearches

  - id: globalSearchSuggestions
    owner: search
    route_id: globalSearch
    path_template: /search
    description: 输入后的实时联想页（最常使用、联系人、聊天记录、搜索网络结果）
    operation_ids:
      - SearchContacts
      - SearchSocialRelations
      - SearchConversations
      - SearchMessages
      - SearchCircles
      - UpsertRecentSearch

  - id: globalSearchNetworkResults
    owner: search
    route_id: globalSearchNetworkResults
    path_template: /search/network
    description: 网络结果页（小趣搜 assistant 结果 tab + 圈子频道分类内容结果）
    operation_ids:
      - SearchPosts
      - SearchCircles
      - SearchXiaoquResults
      - UpsertRecentSearch
      - CreateRun
      - CreateRunStream

  - id: homepagePicker
    owner: entity
    route_id: homepagePicker
    path_template: /homepages/picker
    description: 共享主页搜索与选择器
    operation_ids:
      - SearchHomepages
      - SuggestHomepageCandidate

  - id: suggestHomepage
    owner: entity
    route_id: suggestHomepage
    path_template: /homepages/suggest
    description: 补充缺失共享主页
    operation_ids:
      - SuggestHomepageCandidate

  - id: homepageDetail
    owner: entity
    route_id: homepageDetail
    path_template: /homepages/{id}
    description: 共享主页详情与阅读壳层
    operation_ids:
      - GetHomepageDetail
      - GetHomepageShell
      - GetHomepageReviewSummary
      - GetHomepageRelatedGroups

  - id: homepageClaim
    owner: entity
    route_id: homepageClaim
    path_template: /homepages/{id}/claim
    description: 共享主页认领申请页
    operation_ids:
      - GetHomepageDetail
      - CreateHomepageClaimRequest

  - id: homepageMaintenance
    owner: entity
    route_id: homepageMaintenance
    path_template: /homepages/{id}/manage
    description: 已认领共享主页基础维护页
    operation_ids:
      - GetHomepageDetail
      - UpdateClaimedHomepageBasics

  - id: homepageStatusReport
    owner: entity
    route_id: homepageStatusReport
    path_template: /homepages/{id}/status-report
    description: 共享主页下线与纠错上报页
    operation_ids:
      - GetHomepageDetail
      - CreateHomepageStatusReport
