version: 1

surfaces:
  - id: chatList
    owner: chat
    route_id: chat
    path_template: /chat
    description: 趣信列表与会话入口
    operation_ids:
      - ListInbox
      - ListConversations
      - ListConversationTimestamps
      - BatchGetConversations
      - ListContacts
      - SearchContacts

  - id: chatDetail
    owner: chat
    route_id: chatDetail
    path_template: /chat/{id}
    description: IM 会话详情
    operation_ids:
      - GetConversation
      - ListMessages
      - SendMessage
      - RecallMessage
      - SyncMessages
      - MarkAsRead
      - GetReceipts

  - id: chatSettings
    owner: chat
    route_id: chatSettings
    path_template: /chat/{id}/settings
    description: 会话设置页
    operation_ids:
      - GetConversation
      - UpdateConversationSettings
      - ListMembers

  - id: chatManage
    owner: chat
    route_id: chatManage
    path_template: /chat/{id}/manage
    description: 群聊管理页
    operation_ids:
      - GetConversation
      - ListMembers
      - UpdateConversationSettings
      - DissolveConversation

  - id: chatAddMembers
    owner: chat
    route_id: chatAddMembers
    path_template: /chat/{id}/add-members
    description: 会话加成员页
    operation_ids:
      - ListMembers
      - AddMembers
      - ListContacts
      - SearchContacts

  - id: chatTransferOwnership
    owner: chat
    route_id: chatTransferOwnership
    path_template: /chat/{id}/transfer-ownership
    description: 群主转让页
    operation_ids:
      - GetConversation
      - ListMembers
      - TransferOwnership

  - id: chatAdmins
    owner: chat
    route_id: chatAdmins
    path_template: /chat/{id}/admins
    description: 群管理员页
    operation_ids:
      - GetConversation
      - ListMembers
      - UpdateGroupAdmins

  - id: assistantDialog
    owner: assistant
    route_id: chatDetail
    path_template: /chat/{id}
    description: 私助完整对话页
    operation_ids:
      - CreateRun
      - CreateRunStream
      - ReportInteractionEvent
      - ReportScorecard
      - ReportPageContext
      - GetSuggestedActions
      - GetPolicy
      - ListSkills
      - ListConsents
      - GrantSkillConsent
      - RevokeSkillConsent

  - id: assistantHalfSheet
    owner: assistant
    route_id: chatDetail
    path_template: /chat/{id}
    description: 私助半弹层入口
    operation_ids:
      - ReportPageContext
      - GetSuggestedActions

  - id: assistantSettings
    owner: assistant
    route_id: chatDetail
    path_template: /chat/{id}
    description: 私助会话设置
    operation_ids:
      - GetPolicy
      - ListSkills
      - ListConsents
      - GrantSkillConsent
      - RevokeSkillConsent

  - id: assistantHistory
    owner: assistant
    route_id: chatDetail
    path_template: /chat/{id}
    description: 私助历史抽屉与分页
    operation_ids: []

  - id: assistantFeedback
    owner: assistant
    route_id: chatDetail
    path_template: /chat/{id}
    description: 私助反馈与纠错
    operation_ids:
      - ReportInteractionEvent
      - ReportScorecard
