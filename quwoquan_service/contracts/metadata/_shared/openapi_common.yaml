openapi: 3.0.3
info:
  title: quwoquan common components
  version: "v1"
paths: {}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Create/ingest 幂等键。服务端需在 TTL 内去重。
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
      description: 请求 ID（建议分段：<SRC>.<PAGE>.<TS>.<RAND>，端侧/网关可注入）
    XTraceId:
      name: X-Trace-Id
      in: header
      required: false
      schema:
        type: string
      description: Trace ID（建议分段：<SRC>.<SESSION>.<PAGE>.<TS>.<RAND>，端侧/网关可注入）
    XParentTraceId:
      name: X-Parent-Trace-Id
      in: header
      required: false
      schema:
        type: string
      description: 异步链路父 traceId（MQ/定时任务等触发源头）
    XCausationId:
      name: X-Causation-Id
      in: header
      required: false
      schema:
        type: string
      description: 异步触发载体 ID（messageId/topicOffset 的安全编码/jobRunId 等）
    XClientUserId:
      name: X-Client-User-Id
      in: header
      required: false
      schema:
        type: string
      description: ownerID，上下游统一根账号标识
    XClientSubAccountId:
      name: X-Client-Sub-Account-Id
      in: header
      required: false
      schema:
        type: string
      description: subAccountID，对外可见主体标识
    XClientSubAccountContextVersion:
      name: X-Client-Sub-Account-Context-Version
      in: header
      required: false
      schema:
        type: string
      description: subAccount 上下文版本
    XClientPageId:
      name: X-Client-Page-Id
      in: header
      required: false
      schema:
        type: string
      description: 端侧来源标识（推荐三段式：模块.业务对象.页面名/动作，如 chat.conversation.list）
    XClientSessionId:
      name: X-Client-Session-Id
      in: header
      required: false
      schema:
        type: string
      description: 端侧一次启动会话 ID（稳定），用于日志关联与影响范围分析
    XClientSentAt:
      name: X-Client-Sent-At
      in: header
      required: false
      schema:
        type: string
      description: 端侧发送时间（ISO8601），用于端云时延分析
    XClientDevicePlatform:
      name: X-Client-Device-Platform
      in: header
      required: false
      schema:
        type: string
      description: 端侧平台（android/ios/web/desktop 等）
    XClientAppVersion:
      name: X-Client-App-Version
      in: header
      required: false
      schema:
        type: string
      description: 端侧版本标识（用于回归与影响范围定位）
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: 游标分页 cursor
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 分页大小
  schemas:
    ErrorResponse:
      type: object
      required: [code, origin, nature, userMessage, debugMessage, module, kind, reason, location, context]
      properties:
        code:
          type: string
          description: 统一错误码：<MODULE>.<KIND>.<REASON>
          pattern: '^[A-Z_]+\.(USER|SYSTEM|NETWORK|MIDDLEWARE)\.[a-z0-9_]+$'
        origin:
          type: string
          description: 运行时失败来源；由 runtime/errors 统一映射，业务逻辑不得从文案推断
          enum:
            - user
            - environment
            - remoteDependency
            - system
        nature:
          type: string
          description: 运行时失败性质；恢复行为由 RuntimeRecoveryPolicy 决定，不在错误事实中存放恢复判定
          enum:
            - permanent
            - transient
            - requiresPermission
            - bug
        userMessage:
          type: string
          description: 面向用户的友好提示语（可 i18n）
        debugMessage:
          type: string
          description: 面向定位的错误原因（需脱敏）
        module:
          type: string
          description: 错误源模块（如 CONTENT/USER/CHAT/DB/MQ/CACHE）
          enum:
            - GATEWAY
            - ORCH
            - CONTENT
            - CIRCLE
            - ENTITY
            - INTEGRATION
            - USER
            - CHAT
            - RTC
            - OPS
            - ASSISTANT
            - DB
            - MQ
            - CACHE
            - OSS
            - CDN
            - UNKNOWN
        kind:
          type: string
          description: 运行时失败类型；wire 层使用 runtime kind，不再暴露 current USER/SYSTEM/NETWORK/MIDDLEWARE 作为业务判定字段
          enum:
            - validation
            - auth
            - permission
            - notFound
            - rateLimited
            - timeout
            - network
            - unavailable
            - internal
        reason:
          type: string
          description: 稳定原因码（如 invalid_argument/timeout/connection_refused）
          pattern: '^[a-z0-9_]+$'
        message:
          type: string
          description: 兼容字段（记录），建议等同 debugMessage
        requestId:
          type: string
        traceId:
          type: string
        location:
          type: object
          required: [businessObject, functionModule]
          properties:
            businessObject:
              type: string
            functionModule:
              type: string
            sourceFilePath:
              type: string
            sourceLineNumber:
              type: integer
            sourceLineText:
              type: string
        context:
          type: object
          required: [attributes]
          properties:
            attributes:
              type: array
              items:
                type: object
                required: [key, value]
                properties:
                  key:
                    type: string
                  value:
                    type: string
    CursorPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: {}
        nextCursor:
          type: string
          nullable: true
