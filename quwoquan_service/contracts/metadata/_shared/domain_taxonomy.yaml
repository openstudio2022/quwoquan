version: 1

description: |
  统一领域标签体系。圈子频道、个人助理领域路由、推荐场景、内容标签
  共享同一套领域 ID。
  唯一真相：本文件。codegen 生成 Go DomainTag 枚举 + Dart DomainTaxonomy 类。

domains:
  - id: travel
    label: { zh: "旅行", en: "Travel" }
    description: 旅行攻略、景点推荐、行程规划、交通路线
    mode: content
    circle_channel_enabled: true
    circle_channel_priority: 10
    sub_categories: ["城市", "露营", "异域", "攻略", "徒步", "自驾"]
    assistant_domain_ids: [travel_planning, travel_transport]
    recommendation_scenario: circle_discovery
    user_tag_ref: interest_travel

  - id: local_life
    label: { zh: "美食", en: "Food & Local" }
    description: 餐厅美食推荐、本地服务、周边好去处、探店
