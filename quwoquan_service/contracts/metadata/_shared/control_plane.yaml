version: 1

planes:
  - id: user-plane
    description: 面向 App / Gateway / Orchestrator 的用户流量面
    traffic_profile: high_qps
    default_deploy_mode: service_container
    supports_independent_scaling: true

  - id: platform-control-plane
    description: 面向 platform-ops 的系统治理与配置管理面
    traffic_profile: low_qps_high_risk
    default_deploy_mode: seed_box
    supports_independent_scaling: true

  - id: product-control-plane
    description: 面向 product-ops 的业务治理与运营管理面
    traffic_profile: low_qps_workflow
    default_deploy_mode: seed_box
    supports_independent_scaling: true

danger_levels:
  - id: low
    requires_confirmation: false
  - id: medium
    requires_confirmation: true
  - id: high
    requires_confirmation: true
  - id: critical
    requires_confirmation: true

approval_modes:
  - id: none
    requires_distinct_approvers: false
  - id: review
    requires_distinct_approvers: false
  - id: single
    requires_distinct_approvers: false
  - id: dual
    requires_distinct_approvers: true

object_kinds:
  - id: snapshot
  - id: policy
  - id: workflow_case
  - id: release
  - id: audit
  - id: dashboard

dashboard_schema:
  required_fields:
    - primary_route
    - widgets
  widget_examples:
    - release_health
    - service_latency
    - error_budget
    - moderation_summary
    - recommendation_guardrail
    - sla_watch

object_type_schema:
  required_fields:
    - object_type
    - label
    - source_entity
    - view_model
    - risk_level
    - deployment_profile
    - operations
  optional_fields:
    - object_kind
    - primary_route
    - dashboard_widgets
    - supported_planes
    - audit_required

operation_schema:
  required_fields:
    - operation
    - method
    - path
    - scopes
  optional_fields:
    - route_id
    - danger_level
    - approval_mode
    - audit_required
    - rollback_supported
    - rollout_guard

http_methods:
  - GET
  - POST
  - PUT
  - PATCH
  - DELETE

scope_patterns:
  - ops.*
  - platform_ops.*
  - product_ops.*

deployment_profiles:
  - id: latency_sensitive
    co_locatable_with_user_plane: false
    preferred_container_mode: dedicated
  - id: audit_heavy
    co_locatable_with_user_plane: true
    preferred_container_mode: seed_box
  - id: batch_heavy
    co_locatable_with_user_plane: true
    preferred_container_mode: seed_box
