version: 1
plane: platform-control-plane
domain: platform
dashboard:
  primary_route: /platform/observability
  widgets:
    - release_health
    - service_latency
    - error_budget
    - rollback_readiness
object_types:
  - object_type: service_catalog_entry
    object_kind: snapshot
    label: 服务目录项
    source_entity: EntityRegistry
    view_model: ServiceCatalogEntry
    risk_level: low
    deployment_profile: audit_heavy
    operations:
      - operation: ListServiceCatalogEntries
        method: GET
        path: /v1/control-plane/platform/catalog/services
        scopes: [ops.platform.catalog.read]

  - object_type: plane_binding
    object_kind: snapshot
    label: Plane 绑定
    source_entity: DeploymentMapping
    view_model: PlaneBinding
    risk_level: high
    deployment_profile: audit_heavy
    operations:
      - operation: ListPlaneBindings
        method: GET
        path: /v1/control-plane/platform/topology/planes
        scopes: [ops.platform.catalog.read]
      - operation: UpdatePlaneBinding
        method: POST
        path: /v1/control-plane/platform/topology/planes/{bindingId}:update
        scopes: [ops.platform.catalog.write]
        danger_level: high
        approval_mode: dual

  - object_type: service_config
    object_kind: policy
    label: 服务配置
    source_entity: RuntimeConfig
    view_model: ServiceConfig
    risk_level: high
    deployment_profile: latency_sensitive
    operations:
      - operation: ListServiceConfigs
        method: GET
        path: /v1/control-plane/platform/configs
        scopes: [ops.platform.config.read]
      - operation: UpdateServiceConfig
        method: POST
        path: /v1/control-plane/platform/configs/{configKey}:update
        scopes: [ops.platform.config.write]
        danger_level: high
        approval_mode: single
    analytics_views:
      - view_id: config-risk-overview
        widget_types: [risk_distribution, rollout_backlog]
        drilldown_route_id: /platform/config

  - object_type: governance_policy_template
    object_kind: policy
    label: 治理策略模板
    source_entity: GovernancePolicy
    view_model: GovernancePolicyTemplate
    risk_level: medium
    deployment_profile: latency_sensitive
    operations:
      - operation: ListGovernancePolicyTemplates
        method: GET
        path: /v1/control-plane/platform/governance/templates
        scopes: [ops.platform.governance.read]

  - object_type: governance_policy_binding
    object_kind: policy
    label: 治理策略绑定
    source_entity: GovernancePolicyBinding
    view_model: GovernancePolicyBinding
    risk_level: high
    deployment_profile: latency_sensitive
    operations:
      - operation: ListGovernancePolicyBindings
        method: GET
        path: /v1/control-plane/platform/governance/bindings
        scopes: [ops.platform.governance.read]
      - operation: UpdateGovernancePolicyBinding
        method: POST
        path: /v1/control-plane/platform/governance/bindings/{bindingId}:update
        scopes: [ops.platform.governance.write]
        danger_level: high
        approval_mode: single

  - object_type: config_release
    object_kind: release
    label: 配置发布单
    source_entity: ConfigRelease
    view_model: ConfigRelease
    risk_level: critical
    deployment_profile: batch_heavy
    operations:
      - operation: ListConfigReleases
        method: GET
        path: /v1/control-plane/platform/releases
        scopes: [ops.platform.rollout.read]
      - operation: ApplyConfigRelease
        method: POST
        path: /v1/control-plane/platform/releases/{releaseId}:apply
        scopes: [ops.platform.rollout.write]
        danger_level: critical
        approval_mode: dual
      - operation: RollbackConfigRelease
        method: POST
        path: /v1/control-plane/platform/releases/{releaseId}:rollback
        scopes: [ops.platform.rollout.write]
        danger_level: critical
        approval_mode: dual
    analytics_views:
      - view_id: release-health
        widget_types: [success_rate, latency_p95, rollback_readiness]
        drilldown_route_id: /platform/rollout

  - object_type: environment_topology
    object_kind: snapshot
    label: 环境拓扑
    source_entity: RuntimeTopology
    view_model: EnvironmentTopology
    risk_level: medium
    deployment_profile: audit_heavy
    operations:
      - operation: ListEnvironmentTopologies
        method: GET
        path: /v1/control-plane/platform/topology/environments
        scopes: [ops.platform.dependency.read]

  - object_type: dependency_profile
    object_kind: snapshot
    label: 依赖画像
    source_entity: DependencyProfile
    view_model: DependencyProfile
    risk_level: medium
    deployment_profile: audit_heavy
    operations:
      - operation: ListDependencyProfiles
        method: GET
        path: /v1/control-plane/platform/topology/dependencies
        scopes: [ops.platform.dependency.read]

  - object_type: capacity_profile
    object_kind: snapshot
    label: 容量画像
    source_entity: CapacityProfile
    view_model: CapacityProfile
    risk_level: high
    deployment_profile: batch_heavy
    operations:
      - operation: ListCapacityProfiles
        method: GET
        path: /v1/control-plane/platform/topology/capacity
        scopes: [ops.platform.dependency.read]

  - object_type: slo_policy
    object_kind: policy
    label: SLO 策略
    source_entity: SLOPolicy
    view_model: SLOPolicy
    risk_level: medium
    deployment_profile: latency_sensitive
    operations:
      - operation: ListSLOPolicies
        method: GET
        path: /v1/control-plane/platform/observability/slos
        scopes: [ops.platform.observability.read]

  - object_type: alert_template
    object_kind: policy
    label: 告警模板
    source_entity: AlertTemplate
    view_model: AlertTemplate
    risk_level: medium
    deployment_profile: latency_sensitive
    operations:
      - operation: ListAlertTemplates
        method: GET
        path: /v1/control-plane/platform/observability/alerts
        scopes: [ops.platform.observability.read]

  - object_type: dashboard_card
    object_kind: dashboard
    label: 仪表盘卡片
    source_entity: DashboardCard
    view_model: DashboardCard
    risk_level: low
    deployment_profile: audit_heavy
    operations:
      - operation: ListDashboardCards
        method: GET
        path: /v1/control-plane/platform/observability/dashboards/cards
        scopes: [ops.platform.observability.read]

  - object_type: runbook
    object_kind: workflow_case
    label: Runbook
    source_entity: Runbook
    view_model: Runbook
    risk_level: medium
    deployment_profile: batch_heavy
    operations:
      - operation: ListRunbooks
        method: GET
        path: /v1/control-plane/platform/runbooks
        scopes: [ops.platform.runbook.read]
      - operation: RunDrill
        method: POST
        path: /v1/control-plane/platform/runbooks/{runbookId}:runDrill
        scopes: [ops.platform.runbook.write]
        danger_level: medium
        approval_mode: single

  - object_type: gate_rule
    object_kind: policy
    label: 门禁规则
    source_entity: GateRule
    view_model: GateRule
    risk_level: high
    deployment_profile: latency_sensitive
    operations:
      - operation: ListGateRules
        method: GET
        path: /v1/control-plane/platform/gates
        scopes: [ops.platform.gate.read]
      - operation: OverrideGateRule
        method: POST
        path: /v1/control-plane/platform/gates/{gateId}:override
        scopes: [ops.platform.gate.write]
        danger_level: high
        approval_mode: dual
