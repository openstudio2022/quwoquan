version: 1
schema:
  acceptance_statuses:
    - schema_frozen
    - metadata_ready
    - codegen_ready
    - gate_ready
    - minimum_test_ready
    - deploy_bound
    - integration_pass
    - integration_pass_with_gaps
  template_roles:
    - template_seed
    - replica_ready
    - backlog_candidate
  rollout_groups:
    - wave_0_template
    - wave_1_copy
    - wave_2_backfill
  required_sections:
    - domain
    - display_name
    - template_role
    - rollout_group
    - acceptance_status
    - metadata_paths
    - service_names
    - control_planes
    - minimum_package
    - deployment
    - replication
    - blocking_gaps
  required_control_plane_keys:
    - platform
    - product
  required_test_layers:
    - t1
    - t2
    - t3
    - t4
  required_codegen_targets:
    - go_runtime
    - python_runtime
    - ops_portal
  status_rules:
    minimum_test_ready:
      min_test_layers:
        - t1
        - t2
      require_all_codegen_targets: true
      require_plane_binding: false
      require_blocking_gaps_cleared: false
    deploy_bound:
      min_test_layers:
        - t1
        - t2
      require_all_codegen_targets: true
      require_plane_binding: true
      require_blocking_gaps_cleared: false
    integration_pass_with_gaps:
      min_test_layers:
        - t1
        - t2
        - t3
      require_all_codegen_targets: true
      require_plane_binding: true
      require_blocking_gaps_cleared: false
    integration_pass:
      min_test_layers:
        - t1
        - t2
        - t3
      require_all_codegen_targets: true
      require_plane_binding: true
      require_blocking_gaps_cleared: true
minimum_package:
  template_domain: content
  first_wave_replica_domains: [chat, circle, user]
  required_deploy_sources:
    legacy: deploy/shared/process_domain_mapping.yaml
    plane_aware: deploy/shared/process_domain_plane_mapping.yaml
