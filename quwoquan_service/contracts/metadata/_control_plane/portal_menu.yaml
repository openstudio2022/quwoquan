    object_types: [dashboard]

  - menu_id: platform-ops
    label: Platform Ops
    domain: platform-ops
    route_path: /platform
    icon: server-cog
    order: 20
    permission_scope: ops.platform.read
    object_types: [service_config, config_release]

  - menu_id: platform-config
    parent_menu_id: platform-ops
    label: 配置与可靠性
    domain: platform-ops
    route_path: /platform/config
    icon: settings-2
    order: 21
