version: 1
domain: ops
display_name: Ops
template_role: backlog_candidate
rollout_group: wave_2_backfill
acceptance_status: integration_pass
metadata_paths:
  - ops/experiment_bucket
  - ops/visit_record
service_names:
  - product-ops-service
control_planes:
  platform:
    enabled: true
    object_types: [service_catalog_entry, plane_binding, gate_rule]
    config_prefixes: [sys.ops.]
  product:
    enabled: true
    object_types: [experiment, segment, recommendation_policy]
    config_prefixes: [ops.product., ops.experiment.]
minimum_package:
  metadata_files:
    - contracts/metadata/ops/experiment_bucket/service.yaml
    - contracts/metadata/ops/visit_record/service.yaml
    - contracts/metadata/ops/experiment_bucket/tests/e2e.yaml
    - contracts/metadata/ops/visit_record/tests/e2e.yaml
  codegen_targets: [go_runtime, python_runtime, ops_portal]
  test_evidence:
    t1:
      - contracts/metadata/ops/experiment_bucket/service.yaml
      - contracts/metadata/ops/visit_record/service.yaml
    t2:
      - services/product-ops-service/cmd/api/main_test.go
    t3:
      - contracts/metadata/ops/experiment_bucket/tests/e2e.yaml
      - contracts/metadata/ops/visit_record/tests/e2e.yaml
    t4: []
deployment:
  plane_binding_domain: ops
  plane_binding_source: deploy/shared/process_domain_plane_mapping.yaml
  current_binding_source: deploy/shared/process_domain_mapping.yaml
replication:
  source_template: content
  next_copy_targets: []
  copy_notes:
    - Ops domain is already metadata-backed but still needs dedicated runtime acceptance evidence before promotion.
blocking_gaps: []
