version: 1
domain: realtime
display_name: Realtime
template_role: backlog_candidate
rollout_group: wave_2_backfill
acceptance_status: integration_pass
metadata_paths:
  - realtime/connection
service_names:
  - realtime-gateway
control_planes:
  platform:
    enabled: true
    object_types: [service_catalog_entry, plane_binding, slo_policy]
    config_prefixes: [sys.realtime.]
  product:
    enabled: true
    object_types: [transport_policy]
    config_prefixes: [ops.realtime.]
minimum_package:
  metadata_files:
    - contracts/metadata/realtime/connection/service.yaml
    - contracts/metadata/realtime/connection/tests/e2e.yaml
  codegen_targets: [go_runtime, python_runtime, ops_portal]
  test_evidence:
    t1:
      - contracts/metadata/realtime/connection/service.yaml
    t2:
      - ../quwoquan_app/test/cloud/realtime/realtime_transport_contract_test.dart
    t3:
      - contracts/metadata/realtime/connection/tests/e2e.yaml
    t4: []
deployment:
  plane_binding_domain: realtime
  plane_binding_source: deploy/shared/process_domain_plane_mapping.yaml
  current_binding_source: deploy/shared/process_domain_mapping.yaml
replication:
  source_template: content
  next_copy_targets: []
  copy_notes:
    - Realtime onboarding needs dedicated weak-network and reconnect acceptance before raising status beyond metadata_ready.
blocking_gaps: []
