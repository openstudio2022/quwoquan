version: 1

events:
  - audit_id: moderation_action_applied
    label: 治理动作执行
    object_type: moderation_case
    danger_level: high
    required_fields:
      - actor
      - environment
      - object_ref
      - action
      - before
      - after
      - request_id
      - trace_id
      - workflow_ref
      - evidence_refs

  - audit_id: recovery_decision_submitted
    label: 恢复结论提交
    object_type: recovery_case
    danger_level: critical
    required_fields:
      - actor
      - approver_chain
      - environment
      - object_ref
      - action
      - before
      - after
      - request_id
      - trace_id
      - workflow_ref
      - evidence_refs

  - audit_id: appeal_decision_submitted
    label: 申诉结论提交
    object_type: appeal_case
    danger_level: high
    required_fields:
      - actor
      - environment
      - object_ref
      - action
      - before
      - after
      - request_id
      - trace_id
      - workflow_ref
      - evidence_refs

  - audit_id: experiment_rollout_changed
    label: 实验放量变更
    object_type: experiment
    danger_level: high
    required_fields:
      - actor
      - environment
      - object_ref
      - action
      - before
      - after
      - request_id
      - trace_id
      - rollback_token
      - guardrail_snapshot

  - audit_id: recommendation_policy_activated
    label: 推荐策略启用
    object_type: recommendation_policy
    danger_level: high
    required_fields:
      - actor
      - environment
      - object_ref
      - action
      - before
      - after
      - request_id
      - trace_id
      - rollback_token
      - guardrail_snapshot
      - rollout_scope
