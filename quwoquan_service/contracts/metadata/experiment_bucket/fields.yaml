version: 1
entity: ExperimentBucket

fields:
  - name: id
    type: string
    constraints: [PK]
    classification: PUBLIC
    log_policy: allow
    api_exposure: read
    ops_exposure: read

  - name: experimentId
    type: string
    constraints: [NOT_NULL]
    classification: PUBLIC
    log_policy: allow
    api_exposure: read
    ops_exposure: read

  - name: userId
    type: string
    constraints: [NOT_NULL]
    classification: PUBLIC
    log_policy: allow
    api_exposure: read
    ops_exposure: read

  - name: variant
    type: string
    constraints: [NOT_NULL]
    classification: PUBLIC
    log_policy: allow
    api_exposure: read
    ops_exposure: read

  - name: assignedAt
    type: timestamp
    constraints: [NOT_NULL]
    classification: PUBLIC
    log_policy: allow
    api_exposure: read
    ops_exposure: read

unique_constraints:
  - columns: [experimentId, userId]
    description: 分桶确定性
