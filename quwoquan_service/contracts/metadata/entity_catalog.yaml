# Entity Catalog — root aggregator (canonical per-entity definitions are in domain subdirs)
# New location: contracts/metadata/{domain}/{entity}/aggregate.yaml
entities:
  - name: Post
    domain: content
    canonical: contracts/metadata/content/post/aggregate.yaml
    storage: mongodb
    description: UGC post (image/video/article/moment)

  - name: Comment
    domain: content
    canonical: contracts/metadata/content/post/aggregate.yaml
    storage: mongodb
    description: Comment on a Post

  - name: Conversation
    domain: messages
    canonical: contracts/metadata/messages/conversation/
    storage: mongodb
    description: Chat conversation between users

  - name: AssistantRun
    domain: assistant
    canonical: contracts/metadata/assistant/assistant_run/aggregate.yaml
    storage: mongodb
    description: AI assistant session run

  - name: RecModel
    domain: recommendation
    canonical: contracts/metadata/recommendation/rec_model/
    storage: mongodb
    description: Recommendation model entity

  - name: LocationPoi
    domain: integration
    canonical: contracts/metadata/integration/location/aggregate.yaml
    storage: mongodb
    description: External location provider normalized poi
