dart_class: AssistantTurnOutput
library_path: assistant/contracts/assistant_turn_contract.dart
output_path: assistant/generated/contracts/assistant_turn.g.dart
contract: assistant_turn
version: assistant_turn
kind: output_contract
imports:
  - package:quwoquan_app/assistant/contracts/assistant_journey.dart
  - package:quwoquan_app/assistant/contracts/aggregation_state.dart
  - package:quwoquan_app/assistant/contracts/skill_run.dart
  - package:quwoquan_app/assistant/contracts/run_artifacts.dart
fields:
  - name: contractId
    type: string
    required: true
  - name: decision
    type: object
    ref: decision
    default: {}
  - name: messageKind
    type: enum
    enum_ref: AssistantMessageKind
    required: true
  - name: userMarkdown
    type: string
    required: true
  - name: result
    type: object
    ref: result
    default: {}
  - name: displayState
    type: object
    ref: AssistantDisplayState
    default: {}
  - name: evidence
    type: list<object>
    ref: evidence_item
    default: []
  - name: reasoningBasis
    type: list<object>
    ref: reasoning_basis_item
    default: []
  - name: selfCheck
    type: object
    ref: self_check
    default: {}
  - name: diagnostics
    type: object
    ref: diagnostics
    default: {}
  - name: modelSelfScore
    type: object
    ref: model_self_score
    default: {}
  - name: askUser
    type: object
    ref: ask_user
    default: {}
  - name: toolCalls
    type: list<object>
    ref: tool_call
    default: []
  - name: slotState
    type: object
    ref: SlotStateSnapshot
    default: {}
  - name: subagentPlan
    type: list<object>
    ref: SubagentPlan
    default: []
  - name: intentGraph
    type: object
    ref: IntentGraph
  - name: skillRuns
    type: list<object>
    ref: SkillRun
    default: []
  - name: aggregationState
    type: object
    ref: AggregationState
  - name: journey
    type: object
    ref: AssistantJourney
    default: {}
  - name: toolPlan
    type: list<object>
    ref: tool_call
    default: []
  - name: missingContextSlots
    type: list<string>
    default: []
  - name: fillGuidance
    type: list<object>
    ref: fill_guidance_item
    default: []
  - name: followupPrompt
    type: string
    default: ''
  - name: phaseId
    type: enum
    enum_ref: PlannerPhaseId
    default: ''
  - name: actionCode
    type: enum
    enum_ref: PlannerActionCode
    default: ''
  - name: reasonCode
    type: enum
    enum_ref: PlannerReasonCode
    default: ''
  - name: reasonShort
    type: string
    default: ''
  - name: understandingSnapshot
    type: object
    ref: understanding_snapshot
    default: {}
  - name: answerProcessing
    type: object
    ref: answer_processing
    default: {}
  - name: historicalThinkingSnapshot
    type: object
    ref: historical_thinking_snapshot
    default: {}
  - name: sessionPreferenceFacts
    type: list<object>
    ref: PreferenceFact
    default: []
  - name: longTermPreferenceFacts
    type: list<object>
    ref: PreferenceFact
    default: []
subcontracts:
  decision:
    class_name: AssistantTurnDecisionPayload
    fields:
      - { name: nextAction, type: enum, enum_ref: AssistantNextAction, default: '' }
      - { name: confidence, type: double, default: 0.0 }
      - { name: reasoning, type: string, default: '' }
  result:
    class_name: AssistantTurnResult
    fields:
      - { name: text, type: string, default: '' }
      - { name: summary, type: string, default: '' }
      - { name: interpretation, type: string, default: '' }
      - { name: actionHints, type: list<string>, default: [] }
  ask_user:
    class_name: AssistantTurnAskUser
    fields:
      - { name: slotId, type: string, default: '' }
      - { name: prompt, type: string, default: '' }
      - { name: required, type: bool, default: false }
      - { name: suggestions, type: list<string>, default: [] }
  tool_call:
    class_name: AssistantTurnToolCall
    fields:
      - { name: toolName, type: string, default: '' }
      - { name: name, type: string, default: '' }
      - { name: toolCallId, type: string, default: '' }
      - { name: arguments, type: map, default: {} }
  evidence_item:
    class_name: AssistantTurnEvidenceItem
    fields:
      - { name: text, type: string, default: '' }
      - { name: claim, type: string, default: '' }
      - { name: url, type: string, default: '' }
      - { name: title, type: string, default: '' }
      - { name: source, type: string, default: '' }
      - { name: snippet, type: string, default: '' }
      - { name: evidenceId, type: string, default: '' }
  reasoning_basis_item:
    class_name: AssistantTurnReasoningBasisItem
    fields:
      - { name: text, type: string, default: '' }
      - { name: claim, type: string, default: '' }
      - { name: evidenceId, type: string, default: '' }
      - { name: confidence, type: double, default: 0.0 }
  diagnostics:
    class_name: AssistantTurnDiagnostics
    fields:
      - { name: emergedTags, type: list<map>, default: [] }
      - { name: failedChecks, type: list<string>, default: [] }
      - { name: parseStatus, type: string, default: '' }
      - { name: notes, type: list<string>, default: [] }
  self_check:
    class_name: AssistantTurnSelfCheck
    fields:
      - { name: goalSatisfied, type: bool, default: false }
      - { name: constraintSatisfied, type: bool, default: false }
      - { name: safetyBoundarySatisfied, type: bool, default: false }
      - { name: failedItems, type: list<string>, default: [] }
  model_self_score:
    class_name: AssistantTurnModelSelfScore
    fields:
      - { name: score, type: double, default: 0.0 }
      - { name: reason, type: string, default: '' }
  fill_guidance_item:
    class_name: AssistantTurnFillGuidanceItem
    fields:
      - { name: slotId, type: string, default: '' }
      - { name: reason, type: string, default: '' }
      - { name: guidance, type: string, default: '' }
  understanding_snapshot:
    class_name: AssistantTurnUnderstandingSnapshot
    fields:
      - { name: intentSummary, type: string, default: '' }
      - { name: userFacingSummary, type: string, default: '' }
      - { name: concernPoints, type: list<string>, default: [] }
      - { name: emotionSignal, type: string, default: '' }
      - { name: queryDesignSummary, type: string, default: '' }
      - { name: queryGroups, type: list<object>, ref: understanding_query_group, default: [] }
      - { name: assumptions, type: list<string>, default: [] }
      - { name: mismatchSignal, type: string, default: '' }
      - { name: carryForwardFacts, type: list<string>, default: [] }
      - { name: discardedAssumptions, type: list<string>, default: [] }
  understanding_query_group:
    class_name: AssistantTurnUnderstandingQueryGroup
    fields:
      - { name: dimension, type: string, default: '' }
      - { name: queries, type: list<string>, default: [] }
      - { name: why, type: string, default: '' }
  answer_processing:
    class_name: AssistantTurnAnswerProcessing
    fields:
      - { name: readinessSummary, type: string, default: '' }
      - { name: keyFacts, type: list<string>, default: [] }
      - { name: missingDimensions, type: list<string>, default: [] }
      - { name: retrieveMoreReason, type: string, default: '' }
  historical_thinking_snapshot:
    class_name: AssistantTurnHistoricalThinkingSnapshot
    fields:
      - { name: continuityMode, type: string, default: '' }
      - { name: mismatchSignal, type: string, default: '' }
      - { name: carryForwardFacts, type: list<string>, default: [] }
      - { name: needsRecheckFacts, type: list<string>, default: [] }
      - { name: discardedAssumptions, type: list<string>, default: [] }
