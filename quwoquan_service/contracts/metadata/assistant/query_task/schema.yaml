dart_class: QueryTask
library_path: assistant/contracts/query_task_contract.dart
output_path: assistant/generated/contracts/query_task.g.dart
dimension_enum:
  name: QueryTaskDimension
  values:
    - name: currentState
      wire: current_state
      label: 当前状态
      aliases: [当前状态]
    - name: decisionImpact
      wire: decision_impact
      label: 决策影响
      aliases: [决策影响]
    - name: candidateSpace
      wire: candidate_space
      label: 候选范围
      aliases: [候选范围, 候选方案]
    - name: tradeoffs
      wire: tradeoffs
      label: 关键取舍
      aliases: [关键取舍]
    - name: fitConstraints
      wire: fit_constraints
      label: 适配条件
      aliases: [适配条件]
    - name: fitScenarios
      wire: fit_scenarios
      label: 适用场景
      aliases: [适用场景]
    - name: riskBoundaries
      wire: risk_boundaries
      label: 风险边界
      aliases: [风险边界]
    - name: keyFacts
      wire: key_facts
      label: 关键事实
      aliases: [关键事实]
    - name: decisionThreshold
      wire: decision_threshold
      label: 判断条件
      aliases: [判断条件]
    - name: coreObject
      wire: core_object
      label: 核心对象
      aliases: [核心对象]
    - name: supportingEvidence
      wire: supporting_evidence
      label: 支撑依据
      aliases: [支撑依据]
    - name: latestSignal
      wire: latest_signal
      label: 最新变化
      aliases: [最新变化]
    - name: unknown
      wire: ''
      label: ''
fields:
  - name: id
    dart_type: String
    json_key: id
  - name: query
    dart_type: String
    json_key: query
  - name: label
    dart_type: String
    json_key: label
    default: ''
  - name: entityAnchors
    dart_type: List<String>
    json_key: entityAnchors
    default: const <String>[]
  - name: negativeKeywords
    dart_type: List<String>
    json_key: negativeKeywords
    default: const <String>[]
  - name: authorityDomains
    dart_type: List<String>
    json_key: authorityDomains
    default: const <String>[]
  - name: freshnessHoursMax
    dart_type: int
    json_key: freshnessHoursMax
    default: 0
  - name: timeScope
    dart_type: String
    json_key: timeScope
    default: ''
  - name: timeRangeStart
    dart_type: String
    json_key: timeRangeStart
    default: ''
  - name: timeRangeEnd
    dart_type: String
    json_key: timeRangeEnd
    default: ''
  - name: timePoint
    dart_type: String
    json_key: timePoint
    default: ''
  - name: timezone
    dart_type: String
    json_key: timezone
    default: ''
