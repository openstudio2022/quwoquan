version: 1
aggregate: AssistantRun

events:
  - name: AssistantRunStarted
    description: 助手执行开始
    producer: assistant-service
    consumers: []
    channel: event_store
    payload_entity: AssistantRun
    payload_fields: [_id, userId, profileSubjectId, personaContextVersion, sessionId, skillId, triggerType, pageType]

  - name: AssistantRunCompleted
    description: 助手执行完成
    producer: assistant-service
    consumers: [recommendation-engine]
    channel: event_store
    payload_entity: AssistantRun
    payload_fields: [_id, userId, profileSubjectId, personaContextVersion, status, toolsCalled, llmModel, llmTokensUsed, latencyMs, satisfactionScore]
    recommend_impact: assistant_quality_signal

  - name: AssistantFeedbackReceived
    description: 用户对助手的反馈
    producer: assistant-service
    consumers: [recommendation-engine, platform-ops]
    channel: event_store
    payload_entity: InteractionEvent
    payload_fields: [eventId, runId, userId, pageType, feedbackType, feedbackScore, feedbackText, explicitReasonCodes, eventType]
    recommend_impact: learning_signal

  - name: AssistantInteractionRecorded
    description: 助手交互事件已记录
    producer: assistant-service
    consumers: [platform-ops]
    channel: event_store
    payload_entity: InteractionEvent
    payload_fields: [eventId, runId, userId, pageType, eventType, feedbackType, feedbackScore, createdAt]

  - name: AssistantScorecardReported
    description: 助手评分卡已上报
    producer: assistant-service
    consumers: [recommendation-engine, platform-ops]
    channel: event_store
    payload_entity: Scorecard
    payload_fields: [scoreId, eventId, runId, userId, metricId, scoreValue, scoreSource, createdAt]
    recommend_impact: learning_signal

  - name: SkillTriggered
    description: Skill 被触发
    producer: assistant-service
    consumers: []
    channel: event_store
    payload_fields: [runId, userId, skillId, pageType, pageObjectId]

  - name: ToolCalled
    description: Tool 被调用
    producer: assistant-service
    consumers: []
    channel: event_store
    payload_fields: [runId, userId, toolName, latencyMs, success]

  - name: SuggestedActionClicked
    description: 用户点击建议操作
    producer: assistant-service
    consumers: [recommendation-engine]
    channel: direct
    payload_fields: [runId, userId, actionId, pageType, pageObjectId]
    recommend_impact: engagement_signal
