version: 1
aggregate: AssistantRun

entities:
  AssistantRun:
    description: 一次助手会话执行（聚合根）
    fields:
      - name: _id
        type: ObjectId
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: userId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: profileSubjectId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 触发本次助手执行时的稳定公开主体 ID

      - name: subAccountId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 触发本次助手执行时的子账号 ID（兼容 legacy persona 语义）

      - name: personaContextVersion
        type: int
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 助手会话读取到的 persona 上下文版本，用于 drift 检测与回放恢复

      - name: sessionId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: skillId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: pageType
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 触发时的页面类型

      - name: pageObjectId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 触发时的业务对象 ID

      - name: triggerType
        type: enum
        enum_ref: RunTriggerType
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: userQuery
        type: string
        constraints: [NULLABLE]
        classification: SENSITIVE
        log_policy: mask
        api_exposure: read
        ops_exposure: mask

      - name: contextSnapshot
        type: object
        constraints: [NULLABLE]
        classification: SENSITIVE
        log_policy: drop
        api_exposure: drop
        ops_exposure: drop
        description: 三层上下文快照

      - name: responseType
        type: enum
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: text/structured/action_card/stream

      - name: responseText
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: responsePayload
        type: object
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: responseMarkdown
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 助手统一 Markdown 输出正文（专业级结构化排版主载体）

      - name: responseBlocks
        type: "[]object"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: Markdown 结构块（compare/trend/diagram 等）解析后的标准块数组

      - name: responseFormatVersion
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: Markdown 输出协议版本（例如 md.v1）

      - name: decision
        type: object
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 当前回合的结构化决策通道（nextAction/slotState/askUser 等）

      - name: toolObservations
        type: "[]object"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 工具观测标准化数组（tool_observation_v1）

      - name: subagentRuns
        type: "[]object"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 子代理任务计划与结果摘要

      - name: subagentPlan
        type: "[]object"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 多 skill 正式子任务计划（含 domainId/problemClass/stopPolicy/searchIntensity 等）

      - name: problemShape
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 问题形态（single_skill/multi_skill）

      - name: primarySkill
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 首轮导引识别出的主 skill

      - name: secondarySkills
        type: "[]string"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 首轮导引识别出的次级 skill 列表

      - name: intentGraph
        type: object
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 首轮导引产出的结构化意图图

      - name: skillRuns
        type: "[]object"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 正式编排的 skillRun 列表

      - name: aggregationState
        type: object
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 全局聚合出口状态

      - name: journey
        type: object
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 用户可见的 canonical 助理旅程（阶段轨道 + 流式条目 + readiness）

      - name: renderMode
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 展示模式（markdown_only/md_json_dual/fallback_text）

      - name: contractVersion
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 回合协议标识或版本标签

      - name: sessionPreferenceFacts
        type: "[]object"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 本会话即时生效的偏好事实快照

      - name: longTermPreferenceFacts
        type: "[]object"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 长期偏好事实快照（可见、可撤销）

      - name: toolsCalled
        type: "[]string"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: llmModel
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
        observe_metric: llm_model_usage

      - name: llmTokensUsed
        type: int
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
        observe_metric: llm_token_counter

      - name: latencyMs
        type: int
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
        observe_metric: assistant_latency_histogram

      - name: status
        type: enum
        enum_ref: RunStatus
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        observe_metric: run_status_gauge

      - name: satisfactionScore
        type: float
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: contextEmbedding
        type: "[]float32"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: drop
        api_exposure: drop
        ops_exposure: drop
        description: 上下文向量（RAG 检索用，1536维）

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: completedAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

  InteractionEvent:
    description: 交互事件与反馈
    fields:
      - name: _id
        type: ObjectId
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: runId
        type: ObjectId
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: userId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: eventType
        type: enum
        enum_ref: InteractionEventType
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: payload
        type: object
        constraints: [NULLABLE]
        classification: SENSITIVE
        log_policy: mask
        api_exposure: read
        ops_exposure: mask

      - name: feedbackType
        type: enum
        enum_ref: FeedbackType
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: feedbackScore
        type: float
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: feedbackText
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: traceId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
        description: OTEL trace 关联

      - name: timestamp
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
