version: 1
domain: ASSISTANT
aggregate: AssistantRun

description: |
  assistant_run 域结构化错误码声明。格式：MODULE.KIND.REASON。
  覆盖流式执行、Markdown 结构块解析、技能授权与推荐动作链路。

errors:
  - code: ASSISTANT.USER.skill_consent_required
    kind: USER
    reason: forbidden
    http_status: 403
    recovery_action: surface
    dart_const: skillConsentRequired
    go_const: ErrSkillConsentRequired
    l10n_key: assistant.error.skill_consent_required
    user_message:
      zh: "该能力需要先授权后使用"
      en: "This capability requires consent before use"

  - code: ASSISTANT.USER.invalid_action_payload
    kind: USER
    reason: invalid_argument
    http_status: 400
    recovery_action: surface
    dart_const: invalidActionPayload
    go_const: ErrInvalidActionPayload
    l10n_key: assistant.error.invalid_action_payload
    user_message:
      zh: "建议动作数据格式有误，请重试"
      en: "Suggested action payload is invalid, please retry"

  - code: ASSISTANT.SYSTEM.stream_unavailable
    kind: SYSTEM
    reason: unavailable
    http_status: 503
    recovery_action: retry
    recovery_after_seconds: 3
    dart_const: streamUnavailable
    go_const: ErrStreamUnavailable
    l10n_key: assistant.error.stream_unavailable
    user_message:
      zh: "流式服务暂不可用，已切换为普通回复"
      en: "Streaming is temporarily unavailable; switched to standard response"

  - code: ASSISTANT.SYSTEM.markdown_block_parse_failed
    kind: SYSTEM
    reason: internal_error
    http_status: 500
    recovery_action: retry
    recovery_after_seconds: 1
    dart_const: markdownBlockParseFailed
    go_const: ErrMarkdownBlockParseFailed
    l10n_key: assistant.error.markdown_block_parse_failed
    user_message:
      zh: "格式化卡片渲染失败，已回退为文本展示"
      en: "Formatted card rendering failed; fallback to text display"

  - code: ASSISTANT.MIDDLEWARE.upstream_timeout
    kind: MIDDLEWARE
    reason: timeout
    http_status: 504
    recovery_action: retry
    recovery_after_seconds: 8
    dart_const: upstreamTimeout
    go_const: ErrUpstreamTimeout
    l10n_key: assistant.error.upstream_timeout
    user_message:
      zh: "请求超时，请稍后重试"
      en: "Request timed out, please try again later"

  - code: ASSISTANT.SYSTEM.tool_observation_invalid
    kind: SYSTEM
    reason: internal_error
    http_status: 500
    recovery_action: retry
    recovery_after_seconds: 1
    dart_const: toolObservationInvalid
    go_const: ErrToolObservationInvalid
    l10n_key: assistant.error.tool_observation_invalid
    user_message:
      zh: "工具结果解析失败，已切换到安全回退路径"
      en: "Tool observation parsing failed; switched to safe fallback"

  - code: ASSISTANT.SYSTEM.decision_parse_failed
    kind: SYSTEM
    reason: internal_error
    http_status: 500
    recovery_action: retry
    recovery_after_seconds: 1
    dart_const: decisionParseFailed
    go_const: ErrDecisionParseFailed
    l10n_key: assistant.error.decision_parse_failed
    user_message:
      zh: "回复结构解析失败，已回退为文本输出"
      en: "Decision parsing failed; fallback to plain text response"

  - code: ASSISTANT.SYSTEM.subagent_timeout
    kind: SYSTEM
    reason: timeout
    http_status: 504
    recovery_action: retry
    recovery_after_seconds: 3
    dart_const: subagentTimeout
    go_const: ErrSubagentTimeout
    l10n_key: assistant.error.subagent_timeout
    user_message:
      zh: "子任务执行超时，已返回当前可用结果"
      en: "Subagent execution timed out; returned best-effort result"

  - code: ASSISTANT.SYSTEM.subagent_contract_invalid
    kind: SYSTEM
    reason: internal_error
    http_status: 500
    recovery_action: surface
    dart_const: subagentContractInvalid
    go_const: ErrSubagentContractInvalid
    l10n_key: assistant.error.subagent_contract_invalid
    user_message:
      zh: "子任务结果格式异常，已忽略并继续主流程"
      en: "Subagent result contract invalid; ignored and continued main flow"
