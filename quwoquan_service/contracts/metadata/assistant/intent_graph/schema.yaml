dart_class: IntentGraph
library_path: assistant/contracts/intent_graph.dart
output_path: assistant/generated/contracts/intent_graph.g.dart
contract: intent_graph
version: v1
kind: planner_contract
imports:
  - package:quwoquan_app/assistant/contracts/runtime_enums.dart
fields:
  - { name: userGoal, type: string, required: true }
  - { name: problemShape, type: enum, enum_ref: ProblemShape, required: true }
  - { name: primarySkill, type: string, required: true }
  - { name: problemClass, type: enum, enum_ref: ProblemClass, default: general }
  - { name: inferredMotive, type: string, default: '' }
  - { name: secondarySkills, type: list<string>, default: [] }
  - { name: targetObject, type: string, default: '' }
  - { name: userJobToBeDone, type: string, default: '' }
  - { name: hardConstraints, type: list<string>, default: [] }
  - { name: softConstraints, type: list<string>, default: [] }
  - { name: excludedScopes, type: list<string>, default: [] }
  - { name: freshnessNeed, type: enum, enum_ref: FreshnessNeed, default: '' }
  - { name: answerShape, type: enum, enum_ref: AnswerShape, default: '' }
  - { name: mustVerifyClaims, type: bool, default: false }
  - { name: requiresExternalEvidence, type: bool, default: false }
  - { name: entityAnchors, type: list<string>, default: [] }
  - { name: negativeKeywords, type: list<string>, default: [] }
  - { name: queryNormalization, type: object, ref: query_normalization, default: {} }
  - { name: queryTasks, type: list<object>, ref: QueryTask, default: [] }
  - { name: searchIterationState, type: object, ref: search_iteration_state, default: {} }
  - { name: contextSlots, type: map, default: {} }
  - { name: globalConstraints, type: map, default: {} }
  - { name: clarificationNeeded, type: bool, default: false }
  - { name: recallResult, type: object, ref: RecallResult }
  - { name: authorityDomains, type: list<string>, default: [] }
  - { name: freshnessHoursMax, type: int, default: 0 }
  - { name: resolvedGeoScope, type: object, ref: resolved_geo_scope, default: {} }
subcontracts:
  resolved_geo_scope:
    class_name: ResolvedGeoScope
    fields:
      - { name: geoKind, type: string, default: 'none' }
      - { name: countryCode, type: string, default: '' }
      - { name: countryLabel, type: string, default: '' }
      - { name: regionLabel, type: string, default: '' }
      - { name: cityLabel, type: string, default: '' }
      - { name: marketCode, type: string, default: '' }
      - { name: marketLabel, type: string, default: '' }
      - { name: resolvedText, type: string, default: '' }
      - { name: source, type: string, default: '' }
      - { name: defaultApplied, type: bool, default: false }
      - { name: reason, type: string, default: '' }
  query_normalization:
    class_name: QueryNormalization
    fields:
      - { name: normalizedQuery, type: string, default: '' }
      - { name: rewrittenQuery, type: string, default: '' }
      - { name: issues, type: list<string>, default: [] }
      - { name: language, type: string, default: '' }
      - { name: hints, type: list<string>, default: [] }
      - { name: referenceNowIso, type: string, default: '' }
      - { name: timezone, type: string, default: '' }
      - { name: resolvedTemporalHints, type: list<string>, default: [] }
      - { name: timeScope, type: string, default: '' }
      - { name: timeRangeStart, type: string, default: '' }
      - { name: timeRangeEnd, type: string, default: '' }
      - { name: timePoint, type: string, default: '' }
  search_iteration_state:
    class_name: SearchIterationState
    fields:
      - { name: maxIterations, type: int, default: 0 }
      - { name: currentIteration, type: int, default: 0 }
      - { name: rounds, type: list<object>, ref: search_iteration_round, default: [] }
  search_iteration_round:
    class_name: SearchIterationRound
    fields:
      - { name: iteration, type: int, default: 0 }
      - { name: triggerReason, type: string, default: '' }
      - { name: plannerInputSummary, type: string, default: '' }
      - { name: plannerOutputSummary, type: string, default: '' }
      - { name: queryTasks, type: list<object>, ref: QueryTask, default: [] }
      - { name: acceptedEvidenceCount, type: int, default: 0 }
      - { name: missingDimensions, type: list<string>, default: [] }
      - {
          name: convergenceStatus,
          type: enum,
          enum_ref: SearchIterationConvergenceStatus,
          default: '',
        }
