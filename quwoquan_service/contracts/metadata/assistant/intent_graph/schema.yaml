dart_class: IntentGraph
library_path: assistant/contracts/intent_graph.dart
output_path: assistant/generated/contracts/intent_graph.g.dart
contract: intent_graph
version: v1
kind: planner_contract
imports:
  - package:quwoquan_app/personal_assistant/contracts/runtime_enums.dart
fields:
  - { name: userGoal, type: string, required: true }
  - { name: problemShape, type: enum, enum_ref: ProblemShape, required: true }
  - { name: primarySkill, type: string, required: true }
  - { name: problemClass, type: enum, enum_ref: ProblemClass, default: general }
  - { name: inferredMotive, type: string, default: '' }
  - { name: secondarySkills, type: list<string>, default: [] }
  - { name: targetObject, type: string, default: '' }
  - { name: userJobToBeDone, type: string, default: '' }
  - { name: hardConstraints, type: list<string>, default: [] }
  - { name: softConstraints, type: list<string>, default: [] }
  - { name: excludedScopes, type: list<string>, default: [] }
  - { name: freshnessNeed, type: enum, enum_ref: FreshnessNeed, default: '' }
  - { name: answerShape, type: enum, enum_ref: AnswerShape, default: '' }
  - { name: mustVerifyClaims, type: bool, default: false }
  - { name: requiresExternalEvidence, type: bool, default: false }
  - { name: entityAnchors, type: list<string>, default: [] }
  - { name: negativeKeywords, type: list<string>, default: [] }
  - { name: queryNormalization, type: object, ref: query_normalization, default: {} }
  - { name: queryTasks, type: list<object>, ref: QueryTask, default: [] }
  - { name: contextSlots, type: map, default: {} }
  - { name: globalConstraints, type: map, default: {} }
  - { name: clarificationNeeded, type: bool, default: false }
  - { name: recallResult, type: object, ref: RecallResult }
subcontracts:
  query_normalization:
    class_name: QueryNormalization
    fields:
      - { name: normalizedQuery, type: string, default: '' }
      - { name: rewrittenQuery, type: string, default: '' }
      - { name: issues, type: list<string>, default: [] }
      - { name: language, type: string, default: '' }
      - { name: hints, type: list<string>, default: [] }
