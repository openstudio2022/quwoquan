version: 1
aggregate: Connection

entities:
  Connection:
    description: WebSocket/Long-polling 连接实体（内存态，不持久化）
    fields:
      - name: connId
        type: string
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
        description: 连接唯一标识（UUID）

      - name: userId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: transport
        type: enum
        enum_ref: TransportType
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
        description: websocket/long_poll

      - name: topics
        type: "[]string"
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
        description: 已订阅的 topic 列表

      - name: nodeId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
        description: 所在网关节点 ID

      - name: connectedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: lastActiveAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

  PresenceEntry:
    description: 用户在线状态（Redis Hash，多节点共享）
    fields:
      - name: userId
        type: string
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: connId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: nodeId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: transport
        type: enum
        enum_ref: TransportType
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: lastHeartbeatAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
