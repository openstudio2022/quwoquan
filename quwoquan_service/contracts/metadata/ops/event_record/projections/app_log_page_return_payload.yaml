version: 1
read_model: AppLogPageReturnPayload

description: |
  page_access 事件 event=return 的完整 payload。

source_entities: []

consumers:
  - app (page_access_log_util)

client_projection:
  dart_class: AppLogPageReturnPayload
  base_class: ""
  output_path: cloud/runtime/generated/ops/app_log_page_return_payload.g.dart
  fields:
    - name: event
      dart_type: String
      nullable: false
      source: event
      aliases: [event]
      default: "'return'"
    - name: route
      dart_type: String
      nullable: false
      source: route
      aliases: [route]
      default: "''"
    - name: pageName
      dart_type: String
      nullable: false
      source: pageName
      aliases: [pageName]
      default: "''"
    - name: durationMs
      dart_type: int
      nullable: false
      source: durationMs
      aliases: [durationMs]
      default: "0"
