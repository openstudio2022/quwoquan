version: 1
read_model: AppLogSkillCenterRestoreDefaultPayload

description: |
  Skill Center restore_default_all 的 page_access payload。

source_entities: []

consumers:
  - app (assistant_skill_center_page)

client_projection:
  dart_class: AppLogSkillCenterRestoreDefaultPayload
  base_class: ""
  output_path: cloud/runtime/generated/ops/app_log_skill_center_restore_default_payload.g.dart
  fields:
    - name: event
      dart_type: String
      nullable: false
      source: event
      aliases: [event]
      default: "'skill_center_action'"
    - name: action
      dart_type: String
      nullable: false
      source: action
      aliases: [action]
      default: "'restore_default_all'"
    - name: skillCount
      dart_type: int
      nullable: false
      source: skillCount
      aliases: [skillCount]
      default: "0"
