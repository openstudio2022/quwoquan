version: 1
read_model: CircleStatsWire

description: |
  圈子统计接口返回体：当前为松散 JSON，键集合随版本演进。
  Flutter：`CircleStatsWireDto` 保留 raw Map（见 circle_stats_wire_dto.dart），展示层用 CircleStatsViewData.fromStatsWire 解析。

