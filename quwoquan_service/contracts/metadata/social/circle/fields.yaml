        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: name
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: description
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: coverUrl
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: categoryId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: subCategory
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: domainId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: kind
        type: enum
        enum_ref: CircleKind
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: displaySubjectType
        type: enum
        enum_ref: CircleDisplaySubjectType
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: memberCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: postCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: highlightText
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: matchedField
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: linkedHomepageId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: linkedHomepageType
        type: enum
        enum_ref: HomepageType
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: linkedHomepageTitle
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

  CircleFacetBucketView:
    description: 群组搜索 facet bucket，用于频道/分类投影视图
    fields:
      - name: facetKey
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: label
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: categoryId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: subCategory
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: facetCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

  CircleSearchResultView:
    description: 群组搜索结果视图，包含群组项与 facet buckets
    fields:
      - name: items
        type: "[]CircleSearchItemView"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: facetBuckets
        type: "[]CircleFacetBucketView"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: cursor
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

  CircleBehaviorReport:
    description: POST /v1/circles/behaviors 行为上报请求体
    fields:
      - name: userId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: write
        ops_exposure: read

      - name: circleId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: write
        ops_exposure: read

      - name: eventType
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: write
        ops_exposure: read
        description: 主事件类型（如 impression）；兼容字段 type 由客户端任选其一

      - name: sessionId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: write
        ops_exposure: read
