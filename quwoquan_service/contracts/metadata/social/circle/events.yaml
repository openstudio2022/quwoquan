version: 1
aggregate: Circle

events:
  - name: CircleCreated
    description: 圈子创建
    producer: circle-service
    consumers: [recommendation-engine, notification-service, chat-service]
    channel: event_store
    payload_entity: Circle
    payload_fields: [_id, name, ownerId, category, tags]
    recommend_impact: circle_index_refresh

  - name: CircleUpdated
    description: 圈子信息更新
    producer: circle-service
    consumers: [recommendation-engine]
    channel: event_store
    payload_entity: Circle
    payload_fields: [_id, name, description, tags, category]

  - name: CircleMemberJoined
    description: 成员加入圈子
    producer: circle-service
    consumers: [recommendation-engine, notification-service, chat-service]
    channel: event_store
    payload_fields: [circleId, userId, role]
    recommend_impact: social_signal

  - name: CircleMemberLeft
    description: 成员退出圈子
    producer: circle-service
    consumers: [recommendation-engine, chat-service]
    channel: event_store
    payload_fields: [circleId, userId]

  - name: CircleGroupCreated
    description: 群组 / 组织节点创建
    producer: circle-service
    consumers: [chat-service, notification-service]
    channel: event_store
    payload_entity: CircleGroup
    payload_fields: [_id, circleId, groupType, nodeType, name, visibility, joinPolicy, isDefaultPublicGroup]

  - name: CircleGroupUpdated
    description: 群组 / 组织节点更新
    producer: circle-service
    consumers: [notification-service]
    channel: event_store
    payload_entity: CircleGroup
    payload_fields: [_id, circleId, name, description, visibility, joinPolicy, managerIds, updatedAt]

  - name: CircleGroupMemberJoined
    description: 成员加入群组
    producer: circle-service
    consumers: [chat-service, notification-service]
    channel: event_store
    payload_fields: [circleId, groupId, userId, role]

  - name: CircleGroupMemberLeft
    description: 成员退出群组
    producer: circle-service
    consumers: [chat-service]
    channel: event_store
    payload_fields: [circleId, groupId, userId]

  - name: CircleArchived
    description: 圈子归档
    producer: circle-service
    consumers: [recommendation-engine, notification-service]
    channel: event_store
    payload_fields: [_id, status]

  - name: CircleBehaviorReported
    description: 圈子行为上报
    producer: circle-service
    consumers: [recommendation-engine]
    channel: direct
    payload_fields: [userId, circleId, eventType, sessionId]
    recommend_impact: hot_path_signal

  - name: CircleConversationLinked
    description: 兼容字段回写：圈子默认公共群关联的 Conversation
    producer: chat-service
    consumers: [circle-service]
    channel: event_store
    payload_fields: [circleId, conversationId]

  - name: CircleGroupConversationLinked
    description: 群组关联群聊（chat-service 创建 Conversation 后回写）
    producer: chat-service
    consumers: [circle-service]
    channel: event_store
    payload_fields: [circleId, groupId, conversationId]

  - name: CircleFileUploaded
    description: 文件上传完成
    producer: circle-service
    consumers: [notification-service]
    channel: event_store
    payload_fields: [circleId, fileId, name, uploaderId, sizeBytes]

  - name: CircleFileDeleted
    description: 文件删除
    producer: circle-service
    consumers: []
    channel: event_store
    payload_fields: [circleId, fileId, name, uploaderId]

  - name: CircleSectionsUpdated
    description: 圈子板块配置更新
    producer: circle-service
    consumers: []
    channel: event_store
    payload_fields: [circleId, sectionConfig]
