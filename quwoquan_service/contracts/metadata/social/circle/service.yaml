version: 1
aggregate: Circle

service:
  name: circle-service
  domain: circle
  owner: backend-team
  description: 群组入口、圈子主页、组织主页、成员治理与群组协作

api_routes:
  - method: GET
    path: /v1/circles
    operation: ListCircles
    description: 群组 / 主页列表（分类 + 推荐）
    query_params: [category, domainId, recommendFor, cursor, limit, sort]
    response_entity: Circle

  - method: GET
    path: /v1/circles/search
    operation: SearchCircles
    description: 全局搜索群组结果与 facet buckets
    query_params: [query, categoryId, subCategory, cursor, limit]
    response_entity: CircleSearchResultView
    auth: required

  - method: POST
    path: /v1/circles
    operation: CreateCircle
    description: 创建圈子 / 组织主页
    request_entity: Circle
    writable_fields: [name, description, coverUrl, category, subCategory, tags, visibility, joinPolicy, kind, displaySubjectType, followEnabled, linkedHomepageId, linkedHomepageType, linkedHomepageTitle]

  - method: GET
    path: /v1/circles/{circleId}
    operation: GetCircle
    description: 群组主页详情
    response_entity: Circle

  - method: PATCH
    path: /v1/circles/{circleId}
    operation: UpdateCircle
    description: 更新圈子 / 组织主页
    writable_fields: [name, description, coverUrl, category, subCategory, tags, visibility, joinPolicy, kind, displaySubjectType, followEnabled, linkedHomepageId, linkedHomepageType, linkedHomepageTitle]

  - method: DELETE
    path: /v1/circles/{circleId}
    operation: ArchiveCircle
    description: 归档圈子

  - method: GET
    path: /v1/users/{userId}/circles
    operation: ListUserCircles
    description: 查询用户已加入的圈子列表
    query_params: [cursor, limit]
    response_entity: Circle

  - method: POST
    path: /v1/circles/{circleId}/join
    operation: JoinCircle
    description: 加入圈子

  - method: POST
    path: /v1/circles/{circleId}/leave
    operation: LeaveCircle
    description: 退出圈子

  - method: GET
    path: /v1/circles/{circleId}/members
    operation: ListCircleMembers
    description: 成员列表
    response_entity: CircleMember

  - method: PATCH
    path: /v1/circles/{circleId}/members/{userId}/role
    operation: UpdateMemberRole
    description: 更新成员角色

  # --- 群组 / 组织节点 ---
  - method: GET
    path: /v1/circles/{circleId}/groups
    operation: ListCircleGroups
    description: 列出圈内群组与组织节点
    query_params: [groupType, visibility, parentGroupId, nodeType, cursor, limit]
    response_entity: CircleGroup

  - method: GET
    path: /v1/circles/{circleId}/groups/search
    operation: SearchCircleGroups
    description: 圈内搜索群组与组织节点（私有群仅圈成员可命中）
    query_params: [query, visibility, groupType, cursor, limit]
    response_entity: CircleGroup
    auth: required

  - method: POST
    path: /v1/circles/{circleId}/groups
    operation: CreateCircleGroup
    description: 创建公共群 / 自建群 / 组织节点
    request_entity: CircleGroup
    writable_fields: [parentGroupId, groupType, nodeType, name, description, visibility, joinPolicy, managerIds, storageEnabled, noticeEnabled]
    auth: required

  - method: GET
    path: /v1/circles/{circleId}/groups/{groupId}
    operation: GetCircleGroup
    description: 群组 / 组织节点详情
    response_entity: CircleGroup

  - method: PATCH
    path: /v1/circles/{circleId}/groups/{groupId}
    operation: UpdateCircleGroup
    description: 更新群组 / 组织节点
    writable_fields: [parentGroupId, nodeType, name, description, visibility, joinPolicy, managerIds, storageEnabled, noticeEnabled, status]
    auth: required

  - method: POST
    path: /v1/circles/{circleId}/groups/{groupId}/join-requests
    operation: ApplyJoinCircleGroup
    description: 申请加入公共群 / 公开自建群
    auth: required

  - method: GET
    path: /v1/circles/{circleId}/groups/{groupId}/members
    operation: ListCircleGroupMembers
    description: 群组成员与申请列表
    query_params: [status, cursor, limit]
    response_entity: CircleGroupMember
    auth: required

  - method: POST
    path: /v1/circles/{circleId}/groups/{groupId}/join-requests/{userId}:approve
    operation: ApproveCircleGroupMember
    description: 通过入群申请
    auth: required

  - method: POST
    path: /v1/circles/{circleId}/groups/{groupId}/join-requests/{userId}:reject
    operation: RejectCircleGroupMember
    description: 拒绝入群申请
    auth: required

  - method: GET
    path: /v1/circles/{circleId}/feed
    operation: GetCircleFeed
    description: 圈子动态流
    query_params: [identity, type, cursor, limit, sort]

  - method: GET
    path: /v1/circles/{circleId}/stats
    operation: GetCircleStats
    description: 圈子统计

  - method: POST
    path: /v1/circles/behaviors
    operation: ReportCircleBehavior
    description: 圈子行为上报

  # --- 板块配置 ---
  - method: PATCH
    path: /v1/circles/{circleId}/sections
    operation: UpdateCircleSections
    description: 更新圈子主页板块配置（顺序+可见性）
    request_entity: CircleSectionConfig

  # --- 存储空间 ---
  - method: GET
    path: /v1/circles/{circleId}/files
    operation: ListCircleFiles
    description: 文件列表
    query_params: [parentId, sort, cursor, limit]
    response_entity: CircleFile

  - method: POST
    path: /v1/circles/{circleId}/files
    operation: CreateCircleFile
    description: 创建文件夹 / 获取上传预签名 URL
    request_entity: CircleFile
    writable_fields: [parentFolderId, name, fileType, mimeType, sizeBytes]

  - method: GET
    path: /v1/circles/{circleId}/files/{fileId}
    operation: GetCircleFile
    description: 文件详情 / 获取下载预签名 URL
    response_entity: CircleFile

  - method: PATCH
    path: /v1/circles/{circleId}/files/{fileId}
    operation: UpdateCircleFile
    description: 重命名文件/文件夹 / 确认上传完成
    writable_fields: [name, status]

  - method: DELETE
    path: /v1/circles/{circleId}/files/{fileId}
    operation: DeleteCircleFile
    description: 删除文件/文件夹

  # --- Feed 管理 ---
  - method: PATCH
    path: /v1/circles/{circleId}/feed/{postId}/pin
    operation: PinCirclePost
    description: 置顶/取消置顶圈子内帖子

  - method: PATCH
    path: /v1/circles/{circleId}/feed/{postId}/feature
    operation: FeatureCirclePost
    description: 精选/取消精选圈子内帖子

consumers:
  - name: app
    capabilities: [list_circles, create_circle, join, leave, read_feed, read_members, list_groups, search_groups, create_group, manage_group_members, report_behavior, manage_files, manage_sections, pin_post, feature_post]
  - name: platform-ops
    capabilities: [read_circle, update_circle, manage_members, manage_groups, read_stats]
  - name: recommendation-engine
    capabilities: [read_circle, read_members, search]
  - name: assistant-service
    capabilities: [read_circle, read_groups, search]
  - name: chat-service
    capabilities: [read_circle, read_groups, create_conversation_for_circle, create_conversation_for_circle_group]
  - name: content-service
    capabilities: [read_circle, read_groups, read_feed]

contract_test:
  mock_strategy:
    app_side:
      mock_target: circle-service API
      data_source: fields.yaml
      scenarios:
        - name: circle_discovery
          route: GET /v1/circles
          query_params: [category=interest]
          assertions: [status_200, items_match_schema, sorted_by_member_count]

        - name: create_and_join_circle
          routes:
            - POST /v1/circles
            - POST /v1/circles/{id}/join
          assertions: [circle_created, member_added, member_count_incremented]

        - name: circle_feed
          route: GET /v1/circles/{id}/feed
          assertions: [status_200, posts_within_circle]

        - name: visibility_and_join_policy
          variants: [public_open, private_approval, invite_only]
          assertions: [policy_enforced]

    service_side:
      description: 使用真实测试数据库，不 mock 存储层
      real_engines:
        mongodb: testcontainers (mongo:7)
        redis: miniredis/v2
      spy_targets: [event_publisher]
      mock_targets: [chat_service_client, cross_service_clients]
      data_management:
        seed: fixture 工厂预制到真实 MongoDB
        cleanup: "DeleteMany for circles, circle_members"
        redis_cleanup: miniredis.FlushAll()
      scenarios:
        - name: create_circle_with_owner
          command: CreateCircle
          seed: []
          assertions:
            - "db.circles.FindOne({_id}) → document exists with correct name/tags"
            - "db.circle_members.FindOne({circleId, userId: ownerId}) → role='owner'"
            - "db.circles.FindOne({_id}).memberCount → 1"
            - "eventSpy.AssertPublished('CircleCreated', {name, ownerId, tags})"

        - name: join_open_circle
          command: JoinCircle (joinPolicy=open)
          seed: [fixture.NewCircle(joinPolicy='open')]
          assertions:
            - "db.circle_members.FindOne({circleId, userId}) → role='member'"
            - "db.circles.FindOne({_id}).memberCount → incremented"
            - "eventSpy.AssertPublished('CircleMemberJoined')"
            - "miniredis.Exists('cache:circle:{id}') → false (invalidated)"

        - name: join_duplicate_idempotent
          command: JoinCircle x2
          seed: [fixture.NewCircle(), fixture.NewCircleMember()]
          assertions:
            - "db.circle_members.CountDocuments({circleId, userId}) → exactly 1"

        - name: member_count_consistency
          command: JoinCircle → LeaveCircle
          seed: [fixture.NewCircle(memberCount=1)]
          assertions:
            - "db.circles.FindOne({_id}).memberCount → 2 after join"
            - "db.circles.FindOne({_id}).memberCount → 1 after leave"
            - "db.circle_members.CountDocuments({circleId}) → matches memberCount"

        - name: storage_upload_flow
          routes:
            - POST /v1/circles/{id}/files
            - PATCH /v1/circles/{id}/files/{fileId}
          assertions: [presigned_url_returned, file_status_active_after_confirm, storage_used_updated]

        - name: storage_quota_exceeded
          route: POST /v1/circles/{id}/files
          precondition: storageUsedBytes >= storageQuotaBytes
          assertions: [status_413, error_code_storage_quota_exceeded]

        - name: section_config_update
          route: PATCH /v1/circles/{id}/sections
          assertions: [section_config_persisted, event_published]

        - name: feed_pin_and_feature
          routes:
            - PATCH /v1/circles/{id}/feed/{postId}/pin
            - PATCH /v1/circles/{id}/feed/{postId}/feature
          assertions: [pinned_state_toggled, featured_state_toggled]

        - name: recommended_circles
          route: GET /v1/circles?recommendFor={userId}
          assertions: [status_200, sorted_by_relevance, domain_id_present]

  coverage_requirements:
    - all visibility/joinPolicy combinations covered
    - member role transitions (member → admin → owner) tested
    - circle default public group compatibility link tested
    - circle-group kernel and application flow tested
    - storage CRUD + quota enforcement tested
    - section config CRUD + event tested
    - feed pin/feature operations tested
    - recommended circles API tested
