version: 1
domain: content
aggregate_root: Post

description: |
  内容聚合。图片/视频/微趣/文章四种内容类型统一建模。
  全部实体 MongoDB 存储，支撑高并发读写和水平扩展。
  热数据 + 互动状态走 Redis 缓存，热点计数 Redis 原子递增后异步回写。

storage_backend: mongodb
cache_layer: redis
cache_ttl_seconds: 300

capabilities:
  - queryable
  - searchable
  - aggregatable
  - vector_searchable

taggable: true
vector_enabled: true

members:
  - entity: Comment
    relation: 1:N
    cascade_delete: true
    description: 评论与回复（楼中楼）

  - entity: MediaAsset
    relation: 1:N
    cascade_delete: true
    description: 媒体资源（异步处理管线）

  - entity: ContentReaction
    relation: 1:N
    cascade_delete: true
    description: 用户互动状态（点赞/收藏/转发/举报）

ddd_layer_mapping:
  domain_model: internal/domain/content/model
  repository: internal/domain/content/repository
  application: internal/application/content
  adapter_rest: internal/adapter/rest/content
  adapter_event: internal/adapter/event/content

counter_strategy:
  description: |
    热点 Post 计数使用 Redis 原子递增 + 异步批量回写 MongoDB。
    避免热点文档高频更新导致 MongoDB 写锁竞争。
  redis_key: "counter:{postId}:{type}"
  types: [like, comment, favorite, share, view]
  flush_interval_seconds: 10
  flush_batch_size: 100
