version: 1
aggregate: Post

service:
  name: content-service
  domain: content
  owner: backend-team
  description: 内容发布、浏览、互动、评论与媒体管理

api_routes:
  - method: GET
    path: /v1/content/feed
    operation: GetFeed
    description: 发现流（推荐排序 + cursor 分页）
    query_params: [type, cursor, limit, subCategory]
    response_entity: Post

  - method: POST
    path: /v1/content/posts
    operation: CreatePost
    description: 发布内容
    request_entity: Post
    writable_fields: [contentType, title, body, tags, mediaUrls, coverUrl, videoUrl, location, locationName, visibility, circleId]

  - method: GET
    path: /v1/content/posts/{postId}
    operation: GetPost
    description: 内容详情
    response_entity: Post

  - method: PATCH
    path: /v1/content/posts/{postId}
    operation: UpdatePost
    description: 更新内容

  - method: DELETE
    path: /v1/content/posts/{postId}
    operation: DeletePost
    description: 删除内容

  - method: GET
    path: /v1/content/posts/{postId}/comments
    operation: ListComments
    description: 评论列表
    response_entity: Comment

  - method: POST
    path: /v1/content/posts/{postId}/comments
    operation: CreateComment
    description: 发表评论
    request_entity: Comment
    writable_fields: [content, replyToCommentId]

  - method: DELETE
    path: /v1/content/posts/{postId}/comments/{commentId}
    operation: DeleteComment
    description: 删除评论

  - method: GET
    path: /v1/content/posts/{postId}/reactions
    operation: GetReactionState
    description: 当前用户互动状态
    response_entity: ContentReaction

  - method: GET
    path: /v1/content/posts/{postId}/counters
    operation: GetCounters
    description: 聚合计数

  - method: POST
    path: /v1/content/behaviors
    operation: ReportBehaviors
    description: 行为批量上报（impression/click/dwell/like/favorite/dislike/report/share）

  - method: GET
    path: /v1/content/media/{mediaId}
    operation: GetMediaAsset
    description: 媒体资产状态
    response_entity: MediaAsset

  - method: GET
    path: /v1/content/helper-read/{contentId}
    operation: GetHelperRead
    description: 帮读摘要

  - method: POST
    path: /v1/content/recommend
    operation: GetRecommendation
    description: 推荐请求

consumers:
  - name: app
    capabilities: [read_feed, create_post, read_post, create_comment, react, report_behavior]
  - name: platform-ops
    capabilities: [read_post, moderate_post, moderate_media, read_stats]
  - name: recommendation-engine
    capabilities: [read_post, read_reactions, read_behaviors, search, vector_search]
  - name: assistant-service
    capabilities: [read_post, read_comments, helper_read, search, vector_search]
  - name: circle-service
    capabilities: [read_post]

contract_test:
  description: |
    基于接口契约的隔离测试。元数据驱动 mock 数据生成和断言。

  mock_strategy:
    app_side:
      description: App 自身不依赖云端的测试
      mock_target: content-service API
      data_source: fields.yaml
      scenarios:
        - name: get_feed_pagination
          route: GET /v1/content/feed
          mock_response: auto_from_fields
          assertions: [status_200, cursor_pagination_works, items_match_schema]

        - name: create_post_all_types
          route: POST /v1/content/posts
          variants: [image, video, micro, article]
          assertions: [status_201, response_id_returned, writable_fields_only]

        - name: comment_thread
          routes:
            - POST /v1/content/posts/{postId}/comments
            - GET /v1/content/posts/{postId}/comments
          assertions: [comment_created, reply_to_links_valid]

        - name: reaction_toggle
          route: POST /v1/content/behaviors
          events: [like, unlike, favorite, unfavorite]
          assertions: [reaction_state_toggled, counter_updated]

        - name: behavior_batch_report
          route: POST /v1/content/behaviors
          assertions: [status_200, batch_accepted]

    service_side:
      description: 服务只依赖自身，使用真实测试数据库，不 mock 存储层
      real_engines:
        mongodb: testcontainers (mongo:7)
        redis: miniredis/v2
      spy_targets: [event_publisher]
      mock_targets: [embedding_client, cross_service_clients]
      data_management:
        seed: 从 fields.yaml 生成 fixture 工厂预制到真实 MongoDB
        cleanup: "collection.DeleteMany(ctx, bson.D{}) for posts, comments, media_assets, content_reactions"
        redis_cleanup: miniredis.FlushAll()
      scenarios:
        - name: create_post_aggregate
          command: CreatePost
          seed: []
          assertions:
            - "db.posts.FindOne({_id: result.id}) → document exists with correct fields"
            - "db.media_assets.Find({postId: result.id}) → assets created"
            - "eventSpy.AssertPublished('PostCreated', {_id, authorId, contentType, tags})"
            - "embedding mock called with correct input fields"

        - name: react_with_counter_strategy
          command: ReactToContent (like)
          seed: [fixture.NewPost()]
          assertions:
            - "db.content_reactions.FindOne({postId, userId}) → liked=true (upsert verified)"
            - "miniredis.Get('counter:{postId}:like') → '1' (INCR verified)"
            - "eventSpy.AssertPublished('ContentReacted', {postId, userId, liked: true})"
            - "miniredis.Exists('cache:post:{postId}') → false (invalidated)"

        - name: react_idempotent
          command: ReactToContent (like) x2 on same post
          seed: [fixture.NewPost()]
          assertions:
            - "db.content_reactions.CountDocuments({postId, userId}) → exactly 1"
            - "miniredis.Get('counter:{postId}:like') → '1' (not double counted)"

        - name: comment_with_notification
          command: CreateComment
          seed: [fixture.NewPost()]
          assertions:
            - "db.comments.FindOne({_id: result.id}) → document with correct postId + authorId"
            - "db.posts.FindOne({_id: postId}).commentCount → incremented by 1"
            - "eventSpy.AssertPublished('CommentCreated', {postId, authorId, content})"

        - name: post_moderation_flow
          command: ModeratePost (approve → reject)
          seed: [fixture.NewPost(moderationStatus='pending')]
          assertions:
            - "db.posts.FindOne({_id}).moderationStatus → 'approved' after approve"
            - "db.posts.FindOne({_id}).moderationStatus → 'rejected' after reject"
            - "eventSpy.AssertPublished('ContentModerated') for each transition"

        - name: counter_flush
          command: FlushCounters (timer)
          seed: [fixture.NewPost()]
          setup: "miniredis.Set('counter:{postId}:like', '42')"
          assertions:
            - "db.posts.FindOne({_id}).likeCount → 42 (flushed from Redis)"
            - "miniredis.Exists('counter:{postId}:like') → false or reset"

        - name: text_search
          command: SearchPosts(query="旅行")
          seed: [fixture.NewPost(title="旅行日记"), fixture.NewPost(title="编程教程")]
          assertions:
            - "result contains post with title '旅行日记'"
            - "result does NOT contain '编程教程'"

  coverage_requirements:
    - all api_routes have at least one scenario
    - all content_types (image/video/micro/article) covered
    - counter_strategy flush verified
    - search_indexes queried in at least one test
    - vector_search tested with mock embedding
    - all events verified with correct payload_fields
