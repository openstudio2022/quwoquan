version: 1
entity: VisitRecord

service:
  name: product-ops
  domain: ops

api_routes:
  - method: POST
    path: /v1/ops/visits
    operation: RecordVisit
    description: 记录访问

  - method: GET
    path: /v1/ops/visits/stats
    operation: GetVisitStats
    description: 访问统计（运营）

consumers:
  - name: app
    capabilities: [record_visit]
  - name: platform-ops
    capabilities: [read_stats]
  - name: recommendation-engine
    capabilities: [read_visits]

contract_test:
  mock_strategy:
    app_side:
      scenarios:
        - name: record_visit
          route: POST /v1/ops/visits
          assertions: [status_200]

    service_side:
      description: 使用真实测试数据库，不 mock 存储层
      real_engines:
        mongodb: testcontainers (mongo:7)
      spy_targets: [event_publisher]
      data_management:
        seed: fixture 工厂预制到真实 MongoDB
        cleanup: "db.visit_records.DeleteMany(ctx, bson.D{})"
      scenarios:
        - name: visit_recorded
          command: RecordVisit
          seed: []
          assertions:
            - "db.visit_records.FindOne({userId, targetType, targetKey}) → document exists"
            - "eventSpy.AssertPublished('VisitRecorded', {userId, targetType, targetKey})"

        - name: visit_count_increment
          command: RecordVisit x3 (same target)
          seed: []
          assertions:
            - "db.visit_records.FindOne({userId, targetKey}).visitCount → 3"
            - "db.visit_records.FindOne({...}).lastSeenAt → latest timestamp"
