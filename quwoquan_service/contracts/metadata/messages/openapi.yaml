openapi: 3.0.3
info:
  title: quwoquan chat-service API
  version: "v2"
  description: "v2: seq 有序 + clientMsgId 幂等 + 成员/设置外置 + 离线同步 + 已读回执 + 小趣助手会话内参与"
servers:
  - url: http://localhost
security:
  - bearerAuth: []
paths:
  /v1/chat/conversations:
    get:
      summary: List conversations (by ConversationUserState, includes maxSeq)
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Cursor
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Limit
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConversationPage" }
    post:
      summary: Create conversation (direct/group/circle)
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/IdempotencyKey
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateConversationRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateConversationResponse" }
  /v1/chat/conversations/{conversationId}:
    get:
      summary: Get conversation detail (includes maxSeq, memberCount)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
  /v1/chat/conversations/{conversationId}/messages:
    get:
      summary: List messages (afterSeq/beforeSeq pagination)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
        - name: afterSeq
          in: query
          required: false
          schema: { type: integer, format: int64 }
        - name: beforeSeq
          in: query
          required: false
          schema: { type: integer, format: int64 }
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Limit
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessagePage" }
    post:
      summary: Send message (clientMsgId idempotent, returns seq)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendMessageRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SendMessageResponse" }
  /v1/chat/conversations/{conversationId}/messages/{messageId}/recall:
    post:
      summary: Recall message (within 2 minutes)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
        - name: messageId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
  /v1/chat/conversations/{conversationId}/sync:
    post:
      summary: Sync messages (gap fill by lastSeq)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lastSeq]
              properties:
                lastSeq: { type: integer, format: int64 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SyncResponse" }
  /v1/chat/conversations/{conversationId}/messages/{messageId}/read:
    post:
      summary: Mark as read (updates readSeq + unreadCount)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
        - name: messageId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }
  /v1/chat/conversations/{conversationId}/messages/{messageId}/receipts:
    get:
      summary: Get message receipts (only if receiptEnabled)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
        - name: messageId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/MessageReceipt" }
  /v1/chat/conversations/{conversationId}/members:
    get:
      summary: List members (paginated)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
        - name: role
          in: query
          required: false
          schema: { type: string, enum: [owner, admin, member] }
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Cursor
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Limit
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MemberPage" }
    post:
      summary: Add members (batch, checks maxGroupSize)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddMembersRequest" }
      responses:
        "204": { description: No Content }
  /v1/chat/conversations/{conversationId}/members/{userId}:
    delete:
      summary: Remove member
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }
  /v1/chat/conversations/{conversationId}/assistant:
    post:
      summary: Invite assistant (小趣) into conversation
      description: 创建 memberType=assistant 的成员，可指定 skillId
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                skillId: { type: string, description: "可选，绑定特定 Skill" }
      responses:
        "201": { description: Created }
        "409": { description: Conflict (assistant already in conversation) }
    delete:
      summary: Remove assistant from conversation
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }

  /v1/chat/conversations/{conversationId}/settings:
    patch:
      summary: Update user-level settings (mute/pin → ConversationUserState)
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConversationSettingsPatch" }
      responses:
        "200":
          description: OK
  /v1/chat/contacts:
    get:
      summary: List contacts
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Cursor
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Limit
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContactPage" }
  /v1/chat/contacts/search:
    get:
      summary: Search contacts
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContactPage" }
  /v1/chat/inbox:
    get:
      summary: List inbox (ChatInbox per-user projection)
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Cursor
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Limit
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatInboxPage" }
components:
  securitySchemes:
    bearerAuth:
      $ref: ../_shared/openapi_common.yaml#/components/securitySchemes/bearerAuth
  schemas:
    ChatInboxPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ChatInboxItem" }
        nextCursor:
          type: string
          nullable: true
    ChatInboxItem:
      type: object
      required:
        [
          conversationId,
          type,
          title,
          lastSeq,
          unreadCount,
          mentionUnreadCount,
          muted,
          pinned,
        ]
      properties:
        conversationId: { type: string }
        type: { type: string, enum: [direct, group, circle, encrypted] }
        title: { type: string }
        avatarUrl: { type: string, nullable: true }
        avatarCompositeUrls:
          type: array
          items: { type: string }
        lastMessagePreview: { type: string }
        lastMessageType: { type: string }
        lastMessageTime: { type: string, format: date-time }
        lastSeq: { type: integer, format: int64 }
        unreadCount: { type: integer }
        mentionUnreadCount: { type: integer }
        muted: { type: boolean }
        pinned: { type: boolean }
    ConversationPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Conversation" }
        nextCursor:
          type: string
          nullable: true
    Conversation:
      type: object
      required: [id, type, maxSeq, memberCount]
      properties:
        id: { type: string }
        type: { type: string, enum: [direct, group, circle, encrypted] }
        title: { type: string }
        avatarUrl: { type: string }
        maxSeq: { type: integer, format: int64 }
        memberCount: { type: integer }
        maxGroupSize: { type: integer }
        receiptEnabled: { type: boolean }
        lastMessagePreview: { type: string }
        lastMessageTime: { type: string, format: date-time }
        messageCount: { type: integer }
        status: { type: string, enum: [active, archived, deleted] }
    ConversationMember:
      type: object
      required: [userId, memberType, role, joinedAt]
      properties:
        userId: { type: string }
        memberType: { type: string, enum: [user, assistant] }
        displayName: { type: string }
        avatarUrl: { type: string }
        role: { type: string, enum: [owner, admin, member] }
        assistantSkillId: { type: string, description: "仅 memberType=assistant 时有效" }
        invitedBy: { type: string }
        joinedAt: { type: string, format: date-time }
    ConversationSettingsPatch:
      type: object
      properties:
        muted: { type: boolean }
        pinned: { type: boolean }
    CreateConversationRequest:
      type: object
      required: [type, memberUserIds]
      properties:
        type: { type: string, enum: [direct, group, circle, encrypted] }
        memberUserIds:
          type: array
          items: { type: string }
        title: { type: string }
        circleId: { type: string }
        maxGroupSize: { type: integer, default: 1000 }
    CreateConversationResponse:
      type: object
      required: [conversationId]
      properties:
        conversationId: { type: string }
    MemberPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/ConversationMember" }
        nextCursor:
          type: string
          nullable: true
    MessagePage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Message" }
        nextCursor:
          type: string
          nullable: true
    Message:
      type: object
      required: [id, conversationId, seq, clientMsgId, type, senderId, timestamp]
      properties:
        id: { type: string }
        conversationId: { type: string }
        seq: { type: integer, format: int64 }
        clientMsgId: { type: string }
        type: { type: string, enum: [text, image, video, card] }
        content: { type: string }
        senderId: { type: string }
        mediaUrl: { type: string }
        replyToMessageId: { type: string }
        mentions:
          type: array
          items: { type: string }
        status: { type: string, enum: [sent, recalled, deleted] }
        recalledAt: { type: string, format: date-time }
        timestamp: { type: string, format: date-time }
    SendMessageRequest:
      type: object
      required: [type, clientMsgId]
      properties:
        type: { type: string, enum: [text, image, video, card] }
        clientMsgId: { type: string, format: uuid }
        content: { type: string }
        mediaUrl: { type: string }
        cardPayload: { type: object }
        replyToMessageId: { type: string }
        mentions:
          type: array
          items: { type: string }
    SendMessageResponse:
      type: object
      required: [messageId, seq, timestamp]
      properties:
        messageId: { type: string }
        seq: { type: integer, format: int64 }
        timestamp: { type: string, format: date-time }
    SyncResponse:
      type: object
      required: [messages, hasMore]
      properties:
        messages:
          type: array
          items: { $ref: "#/components/schemas/Message" }
        hasMore: { type: boolean }
    MessageReceipt:
      type: object
      required: [userId, readAt]
      properties:
        userId: { type: string }
        readAt: { type: string, format: date-time }
    AddMembersRequest:
      type: object
      required: [userIds]
      properties:
        userIds:
          type: array
          items: { type: string }
    ContactPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Contact" }
        nextCursor:
          type: string
          nullable: true
    Contact:
      type: object
      required: [id, displayName]
      properties:
        id: { type: string }
        displayName: { type: string }
        avatarUrl: { type: string }
        bio: { type: string }
