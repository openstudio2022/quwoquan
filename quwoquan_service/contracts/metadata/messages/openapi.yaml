openapi: 3.0.3
info:
  title: quwoquan chat-service API
  version: "v1"
servers:
  - url: http://localhost
security:
  - bearerAuth: []
paths:
  /v1/chat/conversations:
    get:
      summary: List conversations
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Cursor
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Limit
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConversationPage" }
    post:
      summary: Create conversation (direct/group)
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/IdempotencyKey
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateConversationRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateConversationResponse" }
  /v1/chat/conversations/{conversationId}:
    get:
      summary: Get conversation detail
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
  /v1/chat/conversations/{conversationId}/messages:
    get:
      summary: List messages
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
        - name: before
          in: query
          required: false
          schema: { type: string }
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Limit
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessagePage" }
    post:
      summary: Send message
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/IdempotencyKey
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SendMessageRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SendMessageResponse" }
  /v1/chat/conversations/{conversationId}/members:
    post:
      summary: Add members
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddMembersRequest" }
      responses:
        "204": { description: No Content }
  /v1/chat/conversations/{conversationId}/members/{memberId}:
    delete:
      summary: Remove member
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
        - name: memberId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }
  /v1/chat/conversations/{conversationId}/settings:
    patch:
      summary: Update conversation settings
      parameters:
        - name: conversationId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ConversationSettingsPatch" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ConversationSettings" }
  /v1/chat/contacts:
    get:
      summary: List contacts
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Cursor
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Limit
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContactPage" }
  /v1/chat/contacts/search:
    get:
      summary: Search contacts
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContactPage" }
components:
  securitySchemes:
    bearerAuth:
      $ref: ../_shared/openapi_common.yaml#/components/securitySchemes/bearerAuth
  schemas:
    ConversationPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Conversation" }
        nextCursor:
          type: string
          nullable: true
    Conversation:
      type: object
      required: [id, type]
      properties:
        id: { type: string }
        type: { type: string, enum: [direct, group, circle, encrypted, assistant] }
        title: { type: string }
        avatarUrl: { type: string }
        unreadCount: { type: integer }
        lastMessage: { type: string }
        lastMessageTime: { type: string }
        members:
          type: array
          items: { $ref: "#/components/schemas/ConversationMember" }
        settings:
          $ref: "#/components/schemas/ConversationSettings"
    ConversationMember:
      type: object
      properties:
        userId: { type: string }
        displayName: { type: string }
        avatarUrl: { type: string }
        role: { type: string }
    ConversationSettings:
      type: object
      properties:
        muted: { type: boolean }
        pinned: { type: boolean }
    ConversationSettingsPatch:
      type: object
      additionalProperties: true
    CreateConversationRequest:
      type: object
      required: [type, memberIds]
      properties:
        type: { type: string, enum: [direct, group] }
        memberIds:
          type: array
          items: { type: string }
        title: { type: string }
    CreateConversationResponse:
      type: object
      required: [conversationId]
      properties:
        conversationId: { type: string }
    MessagePage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Message" }
        nextCursor:
          type: string
          nullable: true
    Message:
      type: object
      required: [id, conversationId, type, senderId, timestamp]
      properties:
        id: { type: string }
        conversationId: { type: string }
        type: { type: string, enum: [text, image, video, card] }
        content: { type: string }
        senderId: { type: string }
        timestamp: { type: string }
        metadata:
          type: object
          additionalProperties: true
    SendMessageRequest:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [text, image, video] }
        content: { type: string }
        mediaUrl: { type: string }
        metadata:
          type: object
          additionalProperties: true
    SendMessageResponse:
      type: object
      required: [messageId]
      properties:
        messageId: { type: string }
    AddMembersRequest:
      type: object
      required: [memberIds]
      properties:
        memberIds:
          type: array
          items: { type: string }
    ContactPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Contact" }
        nextCursor:
          type: string
          nullable: true
    Contact:
      type: object
      required: [id, displayName]
      properties:
        id: { type: string }
        displayName: { type: string }
        avatarUrl: { type: string }
        bio: { type: string }
