version: 2
aggregate: Conversation

events:
  - name: ConversationCreated
    description: 会话创建
    producer: chat-service
    consumers: [notification-service]
    channel: event_store
    payload_entity: Conversation
    payload_fields: [_id, type, creatorId, circleId, circleGroupId, maxGroupSize, receiptEnabled, createdAt]

  - name: MessageSent
    description: 消息发送（v2 新增 seq + clientMsgId）
    producer: chat-service
    consumers: [realtime-gateway, notification-service, assistant-service, recommendation-engine]
    channel: event_store
    payload_entity: Message
    payload_fields: [_id, conversationId, seq, clientMsgId, senderId, type, content, mediaUrl, media, mentions, timestamp]
    recommend_impact: social_signal
    realtime_channel: "rt:conversation:{conversationId}"

  - name: MessageRecalled
    description: 消息撤回
    producer: chat-service
    consumers: [realtime-gateway, notification-service]
    channel: event_store
    payload_entity: Message
    payload_fields: [_id, conversationId, seq, senderId, recalledAt]
    realtime_channel: "rt:conversation:{conversationId}"

  - name: MemberJoined
    description: |
      成员加入（内部域事件；持久化/审计用）。
      面向客户端的实时下发应优先使用合并后的 ConversationRosterUpdated，避免多人同时加入时推送风暴。
    producer: chat-service
    consumers: [realtime-gateway, notification-service]
    channel: event_store
    payload_fields: [conversationId, userId, role, invitedBy, memberCount]
    realtime_channel: "rt:conversation:{conversationId}"

  - name: ConversationRosterUpdated
    description: |
      群 roster/设置聚合变更（成员、名称、规则等）后的对外通知事件，单次事务或合并窗口只发一条。
      负载须含 membersRosterRevision 与 updatedAt（与 Conversation 文档一致），供端上增量拉取与去重。
    producer: chat-service
    consumers: [realtime-gateway, notification-service]
    channel: event_store
    payload_fields:
      - conversationId
      - membersRosterRevision
      - updatedAt
      - aspects
    realtime_channel: "rt:conversation:{conversationId}"

  - name: ConversationAvatarUpdated
    description: |
      群头像预合成结果更新。
      用于统一 sync patch `conversation.avatar.updated` 的上游事件输入。
    producer: chat-service
    consumers: [realtime-gateway, notification-service]
    channel: event_store
    payload_fields:
      - conversationId
      - groupAvatarAssetId
      - groupAvatarVersion
      - groupAvatarSourceHash
      - updatedAt
    realtime_channel: "rt:conversation:{conversationId}"

  - name: MemberLeft
    description: 成员退出（v2 触发 ConversationMember 删除 + memberCount 更新）
    producer: chat-service
    consumers: [realtime-gateway, notification-service]
    channel: event_store
    payload_fields: [conversationId, userId, memberCount]
    realtime_channel: "rt:conversation:{conversationId}"

  - name: ConversationSettingsUpdated
    description: 用户级会话设置变更（mute/pin，v2 新增）
    producer: chat-service
    consumers: []
    channel: event_store
    payload_fields: [conversationId, userId, muted, pinned]

  - name: ReadReceiptSent
    description: 已读回执（v2 新增）
    producer: chat-service
    consumers: [realtime-gateway]
    channel: event_store
    payload_fields: [conversationId, messageId, userId, readAt]
    realtime_channel: "rt:conversation:{conversationId}"

  - name: AssistantInvited
    description: 小趣助手被邀请加入会话（memberType=assistant 的成员加入）
    producer: chat-service
    consumers: [assistant-service, realtime-gateway]
    channel: event_store
    payload_fields: [conversationId, assistantMemberId, assistantSkillId, invitedBy]
    realtime_channel: "rt:conversation:{conversationId}"

  - name: AssistantMentioned
    description: 在消息中 @小趣，触发助手处理（assistant-service 消费后生成回复）
    producer: chat-service
    consumers: [assistant-service]
    channel: event_store
    payload_fields: [conversationId, messageId, seq, senderId, content, assistantMemberId]

  - name: ConversationArchived
    description: 会话归档
    producer: chat-service
    consumers: []
    channel: event_store
    payload_fields: [_id, status]
