version: 1
aggregate: Conversation
layer: app_side

description: |
  端侧独立测试场景。执行：flutter test test/cloud/chat/

scenarios:
  - name: chat_inbox_dto_parse
    description: ChatInboxDto 解析（含 mention/unread、群头像主字段、头像拼图兼容与最近消息类型）
    assertions:
      - required_fields_non_empty
      - group_avatar_url_optional
      - avatar_composite_urls_preserved
      - mention_unread_count_non_negative
      - last_message_truncated_at_100chars

  - name: inbox_badge_decrement
    description: 已读后 unreadCount / mentionUnreadCount 递减
    assertions:
      - unread_count_decremented_after_mark_read
      - mention_unread_count_decremented_after_mark_read

  - name: error_code_mapping
    cases:
      - http_status: 429, code: CHAT.USER.rate_limited
        expected_dart_const: rateLimited
      - http_status: 400, code: CHAT.USER.message_too_long
        expected_dart_const: messageTooLong
