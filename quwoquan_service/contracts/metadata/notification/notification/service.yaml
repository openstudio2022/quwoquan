version: 1
entity: Notification

service:
  name: notification-service
  domain: notification

api_routes:
  - method: POST
    path: /v1/app-messages
    operation: CreateAppMessage
    description: 创建统一应用消息。M3 仅开放服务端/内部调用，业务真相源仍落 notification 域。
    request_fields: [userId, messageType, source, sourceId, destination, title, summary, target]

  - method: GET
    path: /v1/app-messages
    operation: ListAppMessages
    description: 统一应用消息列表，兼容现有通知 inbox。
    query_params: [type, read, cursor, limit]

  - method: GET
    path: /v1/app-messages/{messageId}
    operation: GetAppMessage
    description: 统一应用消息详情。

  - method: POST
    path: /v1/app-messages/{messageId}/ack
    operation: AckAppMessage
    description: 标记端侧已收到消息，不等价于已读。

  - method: POST
    path: /v1/app-messages/{messageId}/read
    operation: ReadAppMessage
    description: 标记单条统一应用消息已读。

  - method: GET
    path: /v1/app-messages/unread-count
    operation: GetAppMessageUnreadCount
    description: 统一应用消息未读计数。

  - method: GET
    path: /v1/app-messages/stream
    operation: StreamAppMessages
    description: M3 typed stream 入口，可由 realtime gateway 或 fake transport 承接。
    query_params: [lastSeq]

  - method: GET
    path: /v1/notifications
    operation: ListNotifications
    description: 通知列表
    query_params: [type, read, cursor, limit]

  - method: POST
    path: /v1/notifications/read
    operation: MarkAsRead
    description: 批量标记已读
    request_fields: [notificationIds]

  - method: POST
    path: /v1/notifications/read-all
    operation: MarkAllAsRead
    description: 全部标记已读

  - method: GET
    path: /v1/notifications/unread-count
    operation: GetUnreadCount
    description: 未读计数

consumers:
  - name: app
    capabilities: [list, mark_read, mark_all_read, unread_count, app_message_list, app_message_ack, app_message_stream]
  - name: platform-ops
    capabilities: [send_system_notification]
  - name: assistant-service
    capabilities: [create_app_message]
    description: 只通过 AppMessage adapter 写入 assistant 类型消息，不拥有消息真相源。

contract_test:
  mock_strategy:
    app_side:
      mock_target: notification-service API
      scenarios:
        - name: notification_list_tabs
          route: GET /v1/notifications
          variants: [all, social, content, circle, system]
          assertions: [status_200, items_match_schema, sorted_by_created_at_desc]

        - name: mark_read
          route: POST /v1/notifications/read
          assertions: [status_200, read_status_updated]

        - name: unread_count
          route: GET /v1/notifications/unread-count
          assertions: [status_200, count_matches]

    service_side:
      description: 使用真实测试数据库，不 mock 存储层
      real_engines:
        mongodb: testcontainers (mongo:7)
      spy_targets: [event_publisher]
      mock_targets: [push_service_client]
      data_management:
        seed: fixture 工厂预制到真实 MongoDB
        cleanup: "db.notifications.DeleteMany(ctx, bson.D{})"
      scenarios:
        - name: create_notification_from_event
          trigger: inject UserFollowed event
          seed: []
          assertions:
            - "db.notifications.FindOne({userId, type: 'social'}) → document exists"
            - "push mock called if user settings enablePush=true"

        - name: batch_mark_read
          command: MarkAsRead([id1, id2, id3])
          seed: [fixture.NewNotification() x3]
          assertions:
            - "db.notifications.Find({_id: {$in: [id1,id2,id3]}}).read → all true"
            - "db.notifications.Find({...}).readAt → all NOT NULL"

        - name: ttl_expiry
          description: 验证 90 天 TTL 索引
          seed: [fixture.NewNotification(createdAt=91_days_ago)]
          assertions:
            - "after MongoDB TTL monitor runs → document auto-deleted"

  coverage_requirements:
    - all notification types tested
    - TTL cleanup verified
    - push integration tested
