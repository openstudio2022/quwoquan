openapi: 3.0.3
info:
  title: quwoquan notification-service API
  version: "v1"
servers:
  - url: http://localhost
security:
  - bearerAuth: []
paths:
  /v1/notifications:
    get:
      summary: List notifications for current user
      parameters:
        - $ref: ./../_shared/openapi_common.yaml#/components/parameters/Cursor
        - $ref: ./../_shared/openapi_common.yaml#/components/parameters/Limit
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [social, content, circle, system, assistant]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPage"
        "401":
          $ref: ./../_shared/openapi_common.yaml#/components/responses/Unauthorized

  /v1/notifications/read:
    post:
      summary: Mark notifications as read (batch)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: Notification IDs to mark read; empty = mark all read
      responses:
        "204":
          description: No Content

  /v1/notifications/unread-count:
    get:
      summary: Unread notification count
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer

components:
  securitySchemes:
    bearerAuth:
      $ref: ./../_shared/openapi_common.yaml#/components/securitySchemes/bearerAuth
  schemas:
    NotificationPage:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
        nextCursor:
          type: string
          nullable: true
        unreadCount:
          type: integer
