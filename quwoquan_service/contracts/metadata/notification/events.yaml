version: 1
entity: Notification

events:
  - name: NotificationCreated
    description: 通知创建（内部事件，由其他域事件触发）
    producer: notification-service
    consumers: []
    channel: internal
    payload_fields: [_id, userId, type, title, targetType, targetId]

  - name: NotificationRead
    description: 通知已读
    producer: notification-service
    consumers: []
    channel: internal
    payload_fields: [_id, userId]

  - name: PushSent
    description: 推送已发送
    producer: notification-service
    consumers: []
    channel: internal
    payload_fields: [_id, userId, pushSent]
