version: 1
aggregate: Post
backend: mongodb

collections:
  posts:
    entity: Post
    indexes:
      - { name: idx_posts_author_status, keys: { authorId: 1, status: 1, publishedAt: -1 } }
      - { name: idx_posts_content_type, keys: { contentType: 1, publishedAt: -1 } }
      - { name: idx_posts_visibility, keys: { visibility: 1, publishedAt: -1 } }
      - { name: idx_posts_status_published, keys: { status: 1, publishedAt: -1 } }
      - { name: idx_posts_group_published, keys: { groupId: 1, publishedAt: -1 }, sparse: true }
      - { name: idx_posts_node_published, keys: { nodeId: 1, publishedAt: -1 }, sparse: true }
      - { name: idx_posts_last_active, keys: { lastActiveAt: -1 }, sparse: true }
      - { name: idx_posts_tags, keys: { tags: 1 } }
      - { name: idx_posts_location, keys: { location: "2dsphere" }, sparse: true }
      - { name: idx_posts_moderation, keys: { moderationStatus: 1, createdAt: -1 } }
      - { name: idx_posts_source, keys: { sourceType: 1, sourcePostId: 1 }, sparse: true }
    search_indexes:
      - name: search_posts_text
        type: text
        fields: [title, body, locationName, tags]
        weights: { title: 10, tags: 5, locationName: 3, body: 1 }
    vector_indexes:
      - name: vector_posts_embedding
        field: embedding
        dimensions: 1536
        similarity: cosine
    change_streams:
      - pipeline: [{ "$match": { "operationType": { "$in": ["insert", "update"] } } }]
        consumers: [recommendation-projector, search-indexer]
    sharding:
      key: { _id: "hashed" }
      description: 按 _id 哈希分片，均匀分布

  comments:
    entity: Comment
    indexes:
      - { name: idx_comments_post_created, keys: { postId: 1, createdAt: -1 } }
      - { name: idx_comments_author, keys: { authorId: 1, createdAt: -1 } }
      - { name: idx_comments_reply, keys: { replyToCommentId: 1 }, sparse: true }
      - { name: idx_comments_hot, keys: { postId: 1, likeCount: -1, createdAt: -1 }, description: "热评排序索引" }
    search_indexes:
      - name: search_comments_text
        type: text
        fields: [content]

  media_assets:
    entity: MediaAsset
    indexes:
      - { name: idx_media_post, keys: { postId: 1 } }
      - { name: idx_media_status, keys: { status: 1, createdAt: -1 } }

  content_reactions:
    entity: ContentReaction
    indexes:
      - { name: idx_reactions_post_user, keys: { postId: 1, userId: 1 }, unique: true }
      - { name: idx_reactions_user_liked, keys: { userId: 1, liked: 1, likedAt: -1 }, sparse: true }
      - { name: idx_reactions_user_favorited, keys: { userId: 1, favorited: 1, favoritedAt: -1 }, sparse: true }
    write_pattern: upsert

  post_circle_distribution:
    entity: PostCircleDistribution
    indexes:
      - { name: idx_dist_post_circle, keys: { postId: 1, circleId: 1 }, unique: true }
      - { name: idx_dist_circle_active, keys: { circleId: 1, state: 1, updatedAt: -1 } }
      - { name: idx_dist_circle_last_active, keys: { circleId: 1, state: 1, lastActiveAt: -1 }, sparse: true }
      - { name: idx_dist_group_last_active, keys: { groupId: 1, state: 1, lastActiveAt: -1 }, sparse: true }
      - { name: idx_dist_node_last_active, keys: { nodeId: 1, state: 1, lastActiveAt: -1 }, sparse: true }
      - { name: idx_dist_owner, keys: { ownerAuthorId: 1, updatedAt: -1 } }

  post_circle_reshare:
    entity: PostCircleReshare
    indexes:
      - { name: idx_reshare_post_circle_user, keys: { postId: 1, circleId: 1, resharerUserId: 1 }, unique: true }
      - { name: idx_reshare_circle_active, keys: { circleId: 1, state: 1, updatedAt: -1 } }
      - { name: idx_reshare_user, keys: { resharerUserId: 1, updatedAt: -1 } }

  deleted_post_tombstones:
    entity: DeletedPostTombstone
    indexes:
      - { name: idx_tombstone_post, keys: { postId: 1 }, unique: true }
      - { name: idx_tombstone_deleted_at, keys: { deletedAt: -1 } }
      - { name: idx_tombstone_expire, keys: { expireAt: 1 }, sparse: true }

redis_cache:
  - key: "cache:post:{postId}"
    ttl_seconds: 300
    entity: Post
    invalidate_on: [PostUpdated, PostDeleted]

  - key: "reaction:{userId}:{postId}"
    ttl_seconds: 300
    entity: ContentReaction
    invalidate_on: [ContentReacted]

  - key: "counter:{postId}:{type}"
    ttl_seconds: null
    type: string
    description: 热点内容计数缓冲（INCR + 异步回写）

  - key: "content_analysis:{postId}"
    ttl_seconds: 86400
    type: hash
    description: 内容多模态分析缓存

  - key: "comment_summary:{postId}"
    ttl_seconds: 3600
    type: hash
    description: 评论总结缓存

  - key: "comment_hot:{postId}"
    ttl_seconds: 300
    type: sorted_set
    description: 热帖热评 Top-N 缓存（score = hotScore，member = commentId）
    invalidate_on: [CommentCreated, CommentLiked]

  - key: "comment_like:{commentId}"
    ttl_seconds: null
    type: set
    description: 评论点赞用户集（SISMEMBER 去重）

  - key: "counter:comment:{commentId}:like"
    ttl_seconds: null
    type: string
    description: 评论赞数计数器（INCR + 异步刷盘）
