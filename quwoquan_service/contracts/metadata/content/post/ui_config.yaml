version: 1
aggregate: Post

description: |
  Post 实体端侧 UI 可配置项声明。
  codegen 从本文件生成 Dart ContentUIConfig（DO NOT EDIT），
  端侧 UI 代码通过 ContentUIConfig 消费配置，消除硬编码。
  label_key 引用 UITextConstants，icon 引用 Material Icons name（字符串）。
  feature_flags 为编译期常量（修改需发版）；
  预留 runtime_overridable: true 标记，便于未来接入 Remote Config 覆盖。

# ── 一、发现页 Tab 配置 ─────────────────────────────────────────────────
discovery_tabs:
  - id: photo
    label_key: tab_photo
    icon: photo_camera_outlined
    content_type: image                 # 对应 fields.yaml ContentType 枚举
    layout: waterfall_grid
    columns: 2
    card_aspect_ratio: from_metadata    # 从 width/height 字段动态计算
    preload_count: 4
    order: 0

  - id: video
    label_key: tab_video
    icon: play_circle_outline
    content_type: video
    layout: full_width_vertical_pager
    card_aspect_ratio: "9:16"
    autoplay: true
    mute_by_default: true
    preload_count: 2
    order: 1

  - id: moment
    label_key: tab_moment
    icon: chat_bubble_outline
    content_type: micro
    layout: list_with_optional_media
    card_aspect_ratio: dynamic
    preload_count: 8
    order: 2

  - id: article
    label_key: tab_article
    icon: article_outlined
    content_type: article
    layout: list_with_cover
    show_reading_time: true
    preload_count: 6
    order: 3

# ── 1.2、发现页 identity rails（新 IA）─────────────────────────────────────
discovery_rails:
  - id: moment
    label_key: discovery_rail_moment
    identity: moment
    default: true
    order: 0

  - id: work
    label_key: discovery_rail_work
    identity: work
    default: false
    order: 1

# ── 1.3、主页/圈子统一 identity filter ─────────────────────────────────────
creation_identity_filters:
  - id: all
    label_key: creation_filter_all
    identity: null
    order: 0

  - id: moment
    label_key: creation_filter_moment
    identity: moment
    order: 1

  - id: work
    label_key: creation_filter_work
    identity: work
    order: 2

# ── 1.4、作品格式筛选 ──────────────────────────────────────────────────────
work_format_filters:
  - id: all
    label_key: work_format_all
    content_type: null
    order: 0

  - id: image
    label_key: work_format_image
    content_type: image
    order: 1

  - id: video
    label_key: work_format_video
    content_type: video
    order: 2

  - id: note
    label_key: work_format_note
    content_type: article
    order: 3

# ── 1.45、分享模板 profile ─────────────────────────────────────────────────
share_template_profiles:
  - id: moment
    title_key: share_template_moment_title
    subtitle_key: share_template_moment_subtitle
    layout: moment_card
    cover_strategy: first_media_or_gradient
    include_author: true
    include_time_context: true
    include_circle_context: true
    include_tags: false

  - id: work
    title_key: share_template_work_title
    subtitle_key: share_template_work_subtitle
    layout: work_card
    cover_strategy: cover_or_first_media
    include_author: true
    include_time_context: false
    include_circle_context: false
    include_tags: true

# ── 1.46、article 分发 / 阅读 / 模板配置 ────────────────────────────────────
article_distribution_profiles:
  - id: follow_list_with_optional_cover
    surface: following_feed
    layout: cover_leading_title_summary
    cover_mode: optional_cover
    summary_line_limit: 2

  - id: circle_dual_column_with_optional_cover
    surface: circle_dual_column
    layout: cover_top_title_summary_or_text_card
    cover_mode: optional_cover
    summary_line_limit: 3

article_reader_profiles:
  - id: full_screen_book_stage
    stage_layout: full_bleed_book
    page_indicator_anchor: top_after_back
    edge_treatment: stitched_spine
    supports_page_curl: true

  - id: top_nav_with_page_fraction
    stage_layout: top_nav_page_fraction
    page_indicator_anchor: top_after_back
    edge_treatment: clean
    supports_page_curl: false

article_template_configs:
  - id: gentle
    default_font_preset: clean
    paper_texture: cotton_fiber
    decoration_style: pressed_flower
    chrome_style: soft_album

  - id: ritual
    default_font_preset: classic
    paper_texture: xuan_paper
    decoration_style: seal_ribbon
    chrome_style: stitched_ledger

  - id: diffuse
    default_font_preset: clean
    paper_texture: mist_canvas
    decoration_style: translucent_sticker
    chrome_style: floating_album

  - id: journal
    default_font_preset: handwritten
    paper_texture: scrapbook_paper
    decoration_style: tape_sticker
    chrome_style: handmade_notebook

  - id: tech
    default_font_preset: mono
    paper_texture: blueprint_grid
    decoration_style: data_label
    chrome_style: precision_manual

article_template_recommendations:
  - category_id: humanity
    recommended_article_templates: [journal, ritual]

  - category_id: tech
    recommended_article_templates: [tech, diffuse]

  - category_id: travel
    recommended_article_templates: [journal, gentle]

  - category_id: food
    recommended_article_templates: [gentle, journal]

  - category_id: life
    recommended_article_templates: [gentle, diffuse]

# ── 二、内容卡片展示配置 ────────────────────────────────────────────────
card_config:
  photo:
    show_author_avatar: true
    show_author_name: true
    show_like_count: true
    show_comment_count: false           # 列表态不展示评论数
    show_favorite_count: false
    action_bar_position: overlay        # 覆盖在图片上
    action_bar_items: [like, favorite, share]

  video:
    show_author_avatar: true
    show_author_name: true
    show_duration: true
    show_like_count: true
    show_comment_count: false
    action_bar_position: right_side
    action_bar_items: [like, comment, favorite, share]
    progress_bar: true

  moment:
    show_author_avatar: true
    show_author_name: true
    show_like_count: true
    show_comment_count: true
    action_bar_position: bottom
    action_bar_items: [like, comment, share]
    max_image_grid_count: 9

  article:
    show_author_avatar: true
    show_author_name: true
    show_reading_time: true
    show_like_count: true
    show_comment_count: true
    show_cover: true
    action_bar_position: bottom
    action_bar_items: [like, comment, favorite, share]

# ── 三、互动操作 UI 配置 ─────────────────────────────────────────────────
interaction_config:
  like:
    optimistic_update: true
    animation: heart_burst
    active_icon: favorite
    inactive_icon: favorite_border
    error_rollback: true
    error_message_key: error_like_failed

  favorite:
    optimistic_update: true
    animation: star_collect
    active_icon: bookmark
    inactive_icon: bookmark_border
    error_rollback: true
    error_message_key: error_favorite_failed

  share:
    optimistic_update: false            # 分享操作不做乐观更新
    icon: share_outlined
    sheet_title_key: share_post_title

  comment:
    icon: chat_bubble_outline
    navigate_to_detail: true

# ── 四、Feature Flags（编译期常量）─────────────────────────────────────
feature_flags:
  - flag: enable_create_action_entry
    default: false
    runtime_overridable: true
    description: "动作优先创作入口（相册 / 写点什么 / 拍一下）"

  - flag: enable_unified_create_editor
    default: false
    runtime_overridable: true
    description: "统一创作编辑器壳层"

  - flag: enable_identity_based_surfaces
    default: false
    runtime_overridable: true
    description: "发现 / 主页 / 圈子切换到点滴 / 作品统一 IA"

  - flag: enable_identity_share_template
    default: false
    runtime_overridable: true
    description: "按点滴 / 作品生成差异化分享模板"

  - flag: enable_article_distribution_profiles
    default: false
    runtime_overridable: true
    description: "启用文章关注流 / 圈子分发 profile 真相源"

  - flag: enable_article_book_reader
    default: false
    runtime_overridable: true
    description: "启用文章全屏书本阅读器舞台"

  - flag: enable_article_page_curl
    default: false
    runtime_overridable: true
    description: "启用文章翻页卷角动效"

  - flag: enable_assistant_content_identity_index
    default: false
    runtime_overridable: true
    description: "小趣按内容身份写入 context / knowledge index"

  - flag: enable_helper_read
    default: false
    runtime_overridable: true
    description: "AI 帮读摘要功能（content-service /helper-read 就绪后开启）"

  - flag: enable_share_to_circle
    default: true
    runtime_overridable: false
    description: "分享到圈子"

  - flag: show_view_count
    default: false
    runtime_overridable: true
    description: "展示浏览数（A/B 测试后决定是否常开）"

  - flag: enable_behavior_tracking
    default: true
    runtime_overridable: false
    description: "用户行为采集开关（隐私法规要求时可关闭）"

  - flag: enable_photo_waterfall
    default: true
    runtime_overridable: false
    description: "美图页瀑布流布局（关闭则降级为等比网格）"

# ── 五、空状态 / 错误状态配置 ────────────────────────────────────────────
empty_states:
  feed_empty:
    illustration: content_discover_empty
    title_key: feed_empty_title
    subtitle_key: feed_empty_subtitle
    cta_label_key: explore_more
    cta_action: scroll_to_recommendation

  feed_error:
    illustration: network_error
    title_key: feed_load_error_title
    subtitle_key: feed_load_error_subtitle
    retry: true
    retry_label_key: retry_load

  feed_rate_limited:
    illustration: slow_down
    title_key: feed_rate_limited_title
    subtitle_key: feed_rate_limited_subtitle
    show_countdown: true                # 展示倒计时（recovery_after_seconds 来自 errors.yaml）

  post_not_found:
    illustration: post_deleted
    title_key: post_not_found_title
    subtitle_key: post_not_found_subtitle
    cta_label_key: back_to_feed
    cta_action: navigate_back
