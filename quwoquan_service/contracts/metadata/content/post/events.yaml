version: 1
aggregate: Post

events:
  - name: PostCreated
    description: 内容发布
    producer: content-service
    consumers: [recommendation-engine, notification-service, assistant-service]
    channel: event_store
    payload_entity: Post
    payload_fields: [_id, authorId, contentType, contentIdentity, title, tags, location, primaryHomepageId, circleIds, groupId, nodeId, createdAt]
    recommend_impact: content_index_refresh

  - name: PostPublished
    description: 内容通过审核后发布
    producer: content-service
    consumers: [recommendation-engine, notification-service]
    channel: event_store
    payload_entity: Post
    payload_fields: [_id, authorId, contentType, contentIdentity, status, primaryHomepageId, groupId, nodeId, publishedAt, lastActiveAt]

  - name: PostUpdated
    description: 内容更新
    producer: content-service
    consumers: [recommendation-engine]
    channel: event_store
    payload_entity: Post
    payload_fields: [_id, contentIdentity, title, body, tags, primaryHomepageId, groupId, nodeId, updatedAt]

  - name: PostSettingsUpdated
    description: 发布后可变设置更新（可见性 / 圈子分发 / 小趣排除）
    producer: content-service
    consumers: [recommendation-engine, assistant-service, circle-service]
    channel: event_store
    payload_entity: Post
    payload_fields: [_id, authorId, contentIdentity, visibility, primaryHomepageId, circleIds, groupId, nodeId, assistantUsePolicy, updatedAt]

  - name: PostPromotedToWork
    description: 点滴原地升级为作品
    producer: content-service
    consumers: [recommendation-engine, notification-service, assistant-service, circle-service]
    channel: event_store
    payload_fields: [postId, authorId, fromIdentity, toIdentity, previousContentType, contentType, title, summary, tags, visibility, primaryHomepageId, circleIds, groupId, nodeId, assistantUsePolicy, promotedAt]

  - name: PostDeleted
    description: 内容删除
    producer: content-service
    consumers: [recommendation-engine, notification-service]
    channel: event_store
    payload_entity: Post
    payload_fields: [_id, authorId, status]

  - name: PostCircleDistributionUpdated
    description: 作者主动分发圈子关系变更（add/remove）
    producer: content-service
    consumers: [recommendation-engine, circle-service]
    channel: event_store
    payload_fields: [postId, ownerAuthorId, groupId, nodeId, addedCircleIds, removedCircleIds, lastActiveAt, updatedAt]

  - name: PostReshared
    description: 用户转发到圈子
    producer: content-service
    consumers: [notification-service, recommendation-engine, circle-service]
    channel: event_store
    payload_fields: [postId, resharerUserId, circleId, createdAt]

  - name: PostQuoted
    description: 用户引用后发布（按 moment 落库）
    producer: content-service
    consumers: [notification-service, recommendation-engine, circle-service]
    channel: event_store
    payload_fields: [postId, sourcePostId, resharerUserId, circleId, createdAt]

  - name: CommentCreated
    description: 新评论
    producer: content-service
    consumers: [notification-service, recommendation-engine, assistant-service]
    channel: event_store
    payload_entity: Comment
    payload_fields: [_id, postId, authorId, content, replyToUserId]
    recommend_impact: engagement_signal

  - name: CommentLiked
    description: 评论被点赞
    producer: content-service
    consumers: [notification-service]
    channel: event_store
    payload_entity: Comment
    payload_fields: [_id, postId, authorId, likeCount]
    recommend_impact: engagement_signal

  - name: ContentReacted
    description: 互动状态变更（点赞/收藏/分享/举报）
    producer: content-service
    consumers: [recommendation-engine, notification-service]
    channel: direct
    payload_entity: ContentReaction
    payload_fields: [postId, userId, liked, favorited, shared, reported]
    recommend_impact: hot_path_signal
    description_detail: |
      写入 Redis 推荐热路径（direct channel），同时写入 Event Store。
      点赞/收藏等显式喜好信号 → 实时影响下一批推荐。

  - name: ContentViewed
    description: 内容浏览
    producer: content-service
    consumers: [recommendation-engine]
    channel: direct
    payload_fields: [postId, userId, dwellMs, sessionId]
    recommend_impact: hot_path_signal

  - name: ContentShared
    description: 内容分享
    producer: content-service
    consumers: [recommendation-engine, notification-service]
    channel: event_store
    payload_fields: [postId, userId, target]
    recommend_impact: engagement_signal

  - name: MediaProcessed
    description: 媒体处理完成
    producer: content-service
    consumers: []
    channel: event_store
    payload_entity: MediaAsset
    payload_fields: [_id, postId, status, cdnUrl, thumbnailUrl]

  - name: MediaMetaExtracted
    description: 媒体元数据提取完成（分辨率/大小/时长）
    producer: content-service
    consumers: []
    channel: event_store
    payload_entity: MediaAsset
    payload_fields: [_id, postId, width, height, durationMs, fileSizeBytes, updatedAt]

  - name: ContentModerated
    description: 内容审核完成
    producer: content-service
    consumers: [notification-service]
    channel: event_store
    payload_entity: Post
    payload_fields: [_id, moderationStatus]

  - name: BehaviorBatchReported
    description: 行为批量上报（impression/click/dwell 等）
    producer: content-service
    consumers: [recommendation-engine]
    channel: direct
    payload_fields: [userId, events]
    recommend_impact: hot_path_signal

  - name: PostDeletedCascadeApplied
    description: 删除内容后级联下架分发与转发关系
    producer: content-service
    consumers: [circle-service, recommendation-engine]
    channel: event_store
    payload_fields: [postId, affectedDistributionCount, affectedReshareCount, deletedAt]

  - name: PostTombstoned
    description: 内容墓碑写入完成
    producer: content-service
    consumers: []
    channel: event_store
    payload_fields: [postId, deletedAt, reason]
