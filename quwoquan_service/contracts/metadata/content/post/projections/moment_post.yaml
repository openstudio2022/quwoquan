version: 1
read_model: MomentPost

description: |
  微趣类帖子 ReadModel（微趣频道）。
  从 Post（contentType=micro）投影，供发现页微趣 Tab 消费。
  支持纯文字、图文混排、短视频三种子形态，imageUrls/videoUrl 均可选。

storage_backend: mongodb
collection: rm_discovery_feed

source_entities:
  - Post

consumers:
  - app (discovery/moment tab)

fields:
  - { name: postId,         type: ObjectId }
  - { name: contentType,    type: enum,   description: "固定为 micro（客户端展示为 moment）" }
  - { name: authorId,              type: string }
  - { name: authorNickname,        type: string, description: 作者昵称（反范式） }
  - { name: authorAvatarUrl,       type: string, description: 作者头像（反范式） }
  - { name: authorBackgroundUrl,   type: string, nullable: true, description: 作者主页背景图（反范式，null 表示未配置） }
  - { name: body,                  type: string, description: 正文内容 }
  - { name: mediaUrls,      type: "[]string", description: 图片列表（可选，图文帖使用） }
  - { name: videoUrl,       type: string, description: 短视频 URL（可选，视频帖使用） }
  - { name: durationMs,     type: int,    description: 短视频时长毫秒（可选） }
  - { name: likeCount,      type: int }
  - { name: commentCount,   type: int }
  - { name: favoriteCount,  type: int }
  - { name: shareCount,     type: int }
  - { name: publishedAt,    type: timestamp }

# App 端契约（client_projection）
# 由 codegen_app_metadata 读取，生成 MomentPostDto（DO NOT EDIT 产物）
# base_class: PostBaseDto（手写抽象基类，见 post_base_dto.dart）
client_projection:
  dart_class: MomentPostDto
  base_class: PostBaseDto
  output_path: cloud/runtime/generated/content/moment_post_dto.g.dart
  computed_getters:
    - name: hasImages
      dart_return_type: "bool"
      nullable: false
      description: "是否包含图片（图文帖）。"
      body: "return imageUrls.isNotEmpty;"
    - name: hasVideo
      dart_return_type: "bool"
      nullable: false
      description: "是否包含视频（视频帖）。"
      body: "return videoUrl != null;"
  fields:
    - name: id
      dart_type: String
      nullable: false
      source: postId
      aliases: [postId, _id]
      default: "''"

    - name: type
      dart_type: String
      nullable: false
      source: contentType
      aliases: [contentType, category]
      default: "'moment'"
      description: "服务侧 micro，客户端统一展示为 moment"

    - name: authorId
      dart_type: String
      nullable: false
      source: authorId
      aliases: [userId, author_id]
      default: "''"

    - name: displayName
      dart_type: String
      nullable: false
      source: authorNickname
      aliases: [authorNickname, nickname, username, displayName]
      default: "''"

    - name: avatarUrl
      dart_type: String
      nullable: false
      source: authorAvatarUrl
      aliases: [authorAvatarUrl, avatarUrl, avatar]
      default: "''"

    - name: authorBackgroundUrl
      dart_type: String
      nullable: true
      source: authorBackgroundUrl
      aliases: [authorBackgroundUrl]
      default: "null"
      description: "作者主页背景图（反范式）；null 时 UI 显示默认渐变背景"

    - name: body
      dart_type: String
      nullable: false
      source: body
      aliases: [body, content, text, caption]
      default: "''"
      description: "正文内容（必填，纯文字帖子此为唯一内容）"

    - name: imageUrls
      dart_type: List<String>
      nullable: false
      source: mediaUrls
      aliases: [mediaUrls, images, imageUrls, image_urls]
      default: "<String>[]"
      description: "图片列表（图文帖有值，纯文字/视频帖为空列表）"

    - name: videoUrl
      dart_type: String
      nullable: true
      source: videoUrl
      aliases: [videoUrl, video_url]
      default: "null"
      description: "短视频 URL（视频帖有值，其余为 null）"

    - name: durationMs
      dart_type: int
      nullable: true
      source: durationMs
      aliases: [durationMs, duration_ms, duration]
      default: "null"
      description: "短视频时长（毫秒），视频帖有值"

    - name: likeCount
      dart_type: int
      nullable: false
      source: likeCount
      aliases: [likeCount, likesCount, likes, like_count]
      default: "0"

    - name: commentCount
      dart_type: int
      nullable: false
      source: commentCount
      aliases: [commentCount, commentsCount, comments, comment_count]
      default: "0"

    - name: favoriteCount
      dart_type: int
      nullable: false
      source: favoriteCount
      aliases: [favoriteCount, savesCount, bookmarks, favorite_count]
      default: "0"

    - name: shareCount
      dart_type: int
      nullable: false
      source: shareCount
      aliases: [shareCount, shares, share_count]
      default: "0"

    - name: createdAt
      dart_type: DateTime
      nullable: false
      source: publishedAt
      aliases: [publishedAt, createdAt, created_at]
      default: "DateTime(0)"
