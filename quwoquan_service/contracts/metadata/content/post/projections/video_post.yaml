version: 1
read_model: VideoPost

description: |
  视频类帖子 ReadModel（视频频道）。
  从 Post（contentType=video）投影，供发现页视频 Tab 消费。
  width/height 存储视频分辨率，在上传时由处理管道写入。

storage_backend: mongodb
collection: rm_discovery_feed

source_entities:
  - Post

consumers:
  - app (discovery/video tab)

fields:
  - { name: postId,         type: ObjectId }
  - { name: contentType,    type: enum,   description: "固定为 video" }
  - { name: contentIdentity, type: enum,  description: "内容身份层。视频作品固定为 work" }
  - { name: authorId,              type: string }
  - { name: authorNickname,        type: string, description: 作者昵称（反范式） }
  - { name: authorAvatarUrl,       type: string, description: 作者头像（反范式） }
  - { name: authorBackgroundUrl,   type: string, nullable: true, description: 作者主页背景图（反范式，null 表示未配置） }
  - { name: body,                  type: string, description: 视频简介（可选） }
  - { name: videoUrl,       type: string, description: 视频流 URL }
  - { name: thumbnailUrl,   type: string, description: 封面图 URL }
  - { name: width,          type: int,    description: "视频分辨率宽（px），处理管道写入" }
  - { name: height,         type: int,    description: "视频分辨率高（px），处理管道写入" }
  - { name: durationMs,     type: int,    description: 视频时长（毫秒） }
  - { name: likeCount,      type: int }
  - { name: commentCount,   type: int }
  - { name: favoriteCount,  type: int }
  - { name: shareCount,     type: int }
  - { name: publishedAt,    type: timestamp }

# App 端契约（client_projection）
# 由 codegen_app_metadata 读取，生成 VideoPostDto（DO NOT EDIT 产物）
# base_class: PostBaseDto（手写抽象基类，见 post_base_dto.dart）
client_projection:
  dart_class: VideoPostDto
  base_class: PostBaseDto
  output_path: cloud/runtime/generated/content/video_post_dto.g.dart
  computed_getters:
    - name: displayFormat
      dart_return_type: String
      nullable: false
      description: "展示格式。视频作品固定为 video。"
      body: "return 'video';"
    - name: aspectRatio
      dart_return_type: "double?"
      nullable: true
      description: "视频宽高比（w/h）。未记录分辨率时返回 null。"
      body: |
        if (width == null || height == null || height! <= 0) return null;
        return width! / height!;
  fields:
    - name: id
      dart_type: String
      nullable: false
      source: postId
      aliases: [postId, _id]
      default: "''"

    - name: type
      dart_type: String
      nullable: false
      source: contentType
      aliases: [contentType, category]
      default: "'video'"

    - name: identity
      dart_type: String
      nullable: false
      source: contentIdentity
      aliases: [contentIdentity, identity]
      default: "'work'"

    - name: assistantUsePolicy
      dart_type: String
      nullable: false
      source: assistantUsePolicy
      aliases: [assistantUsePolicy]
      default: "'inherit'"

    - name: authorId
      dart_type: String
      nullable: false
      source: authorId
      aliases: [userId, author_id]
      default: "''"

    - name: displayName
      dart_type: String
      nullable: false
      source: authorNickname
      aliases: [authorNickname, nickname, username, displayName]
      default: "''"

    - name: avatarUrl
      dart_type: String
      nullable: false
      source: authorAvatarUrl
      aliases: [authorAvatarUrl, avatarUrl, avatar]
      default: "''"

    - name: authorBackgroundUrl
      dart_type: String
      nullable: true
      source: authorBackgroundUrl
      aliases: [authorBackgroundUrl]
      default: "null"
      description: "作者主页背景图（反范式）；null 时 UI 显示默认渐变背景"

    - name: body
      dart_type: String
      nullable: true
      source: body
      aliases: [body, description, content, caption]
      default: "null"
      description: "视频简介（可选）"

    - name: videoUrl
      dart_type: String
      nullable: false
      source: videoUrl
      aliases: [videoUrl, video_url, url]
      default: "''"
      description: "视频流 URL"

    - name: thumbnailUrl
      dart_type: String
      nullable: false
      source: thumbnailUrl
      aliases: [thumbnailUrl, thumbnail, coverUrl, cover]
      default: "''"
      description: "视频封面图"

    - name: width
      dart_type: int
      nullable: true
      source: width
      aliases: [width, videoWidth, video_width, w]
      default: "null"
      description: "视频分辨率宽（px）"

    - name: height
      dart_type: int
      nullable: true
      source: height
      aliases: [height, videoHeight, video_height, h]
      default: "null"
      description: "视频分辨率高（px）"

    - name: durationMs
      dart_type: int
      nullable: true
      source: durationMs
      aliases: [durationMs, duration_ms, duration]
      default: "null"
      description: "视频时长（毫秒）"

    - name: likeCount
      dart_type: int
      nullable: false
      source: likeCount
      aliases: [likeCount, likesCount, likes, like_count]
      default: "0"

    - name: commentCount
      dart_type: int
      nullable: false
      source: commentCount
      aliases: [commentCount, commentsCount, comments, comment_count]
      default: "0"

    - name: favoriteCount
      dart_type: int
      nullable: false
      source: favoriteCount
      aliases: [favoriteCount, savesCount, bookmarks, favorite_count]
      default: "0"

    - name: shareCount
      dart_type: int
      nullable: false
      source: shareCount
      aliases: [shareCount, shares, share_count]
      default: "0"

    - name: createdAt
      dart_type: DateTime
      nullable: false
      source: publishedAt
      aliases: [publishedAt, createdAt, created_at]
      default: "DateTime(0)"
