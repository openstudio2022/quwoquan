version: 1
read_model: ContentPostDetailCardWire

description: |
  GET post 响应中 cards[] 元素（文章详情 legacy 卡片行）。

source_entities:
  - Post

consumers:
  - app

client_projection:
  dart_class: ContentPostDetailCardWireDto
  base_class: ""
  output_path: cloud/runtime/generated/content/content_post_detail_card_wire_dto.g.dart
  fields:
    - name: title
      dart_type: String
      nullable: true
      source: title
      aliases: [title]
      default: "null"

    - name: body
      dart_type: String
      nullable: true
      source: body
      aliases: [body]
      default: "null"

    - name: layout
      dart_type: String
      nullable: true
      source: layout
      aliases: [layout]
      default: "null"

    - name: imageUrl
      dart_type: String
      nullable: true
      source: imageUrl
      aliases: [imageUrl]
      default: "null"

    - name: caption
      dart_type: String
      nullable: true
      source: caption
      aliases: [caption]
      default: "null"
