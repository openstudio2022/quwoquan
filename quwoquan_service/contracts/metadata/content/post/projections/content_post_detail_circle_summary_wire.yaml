version: 1
read_model: ContentPostDetailCircleSummaryWire

description: |
  GET post / Feed 中 circleSummaries[] 最小行（id + 展示名，可选封面）。

source_entities:
  - Post

consumers:
  - app

client_projection:
  dart_class: ContentPostDetailCircleSummaryWireDto
  base_class: ""
  output_path: cloud/runtime/generated/content/content_post_detail_circle_summary_wire_dto.g.dart
  fields:
    - name: id
      dart_type: String
      nullable: false
      source: id
      aliases: [id]
      default: "''"

    - name: name
      dart_type: String
      nullable: false
      source: name
      aliases: [name]
      default: "''"

    - name: coverUrl
      dart_type: String
      nullable: true
      source: coverUrl
      aliases: [coverUrl]
      default: "null"
