version: 1
read_model: ContentMediaAssetWire

description: |
  GET /v1/content/media/{mediaId} 响应 wire（与 openapi MediaAsset 及 Mock 对齐）。

source_entities:
  - MediaAsset

consumers:
  - app

client_projection:
  dart_class: ContentMediaAssetWireDto
  base_class: ""
  output_path: cloud/runtime/generated/content/content_media_asset_wire_dto.g.dart
  fields:
    - name: id
      dart_type: String
      nullable: false
      source: id
      aliases: [id, _id, mediaId]
      default: "''"

    - name: status
      dart_type: String
      nullable: false
      source: status
      aliases: [status]
      default: "''"

    - name: type
      dart_type: String
      nullable: true
      source: type
      aliases: [type]

    - name: cdnUrl
      dart_type: String
      nullable: true
      source: cdnUrl
      aliases: [cdnUrl]

    - name: originUrl
      dart_type: String
      nullable: true
      source: originUrl
      aliases: [originUrl]

    # OpenAPI MediaAsset：derivatives 为 object[] + additionalProperties；端侧上限类型为 Map 列表。
    - name: derivatives
      dart_type: List<Map<String, dynamic>>
      nullable: true
      source: derivatives
      aliases: [derivatives]

    - name: moderationStatus
      dart_type: String
      nullable: true
      source: moderationStatus
      aliases: [moderationStatus]

    - name: errorCode
      dart_type: String
      nullable: true
      source: errorCode
      aliases: [errorCode]
