version: 1
read_model: ArticlePost

description: |
  文章类帖子 ReadModel（文章频道）。
  从 Post（contentType=article）投影，供发现页文章 Tab 消费。

storage_backend: mongodb
collection: rm_discovery_feed

source_entities:
  - Post

consumers:
  - app (discovery/article tab)

fields:
  - { name: postId,         type: ObjectId }
  - { name: contentType,    type: enum,   description: "固定为 article" }
  - { name: authorId,              type: string }
  - { name: authorNickname,        type: string, description: 作者昵称（反范式） }
  - { name: authorAvatarUrl,       type: string, description: 作者头像（反范式） }
  - { name: authorBackgroundUrl,   type: string, nullable: true, description: 作者主页背景图（反范式，null 表示未配置） }
  - { name: title,                 type: string, description: 文章标题 }
  - { name: body,           type: string, description: 文章摘要或正文 }
  - { name: coverUrl,       type: string, description: 封面图 URL }
  - { name: likeCount,      type: int }
  - { name: commentCount,   type: int }
  - { name: favoriteCount,  type: int }
  - { name: shareCount,     type: int }
  - { name: publishedAt,    type: timestamp }

# App 端契约（client_projection）
# 由 codegen_app_metadata 读取，生成 ArticlePostDto（DO NOT EDIT 产物）
# base_class: PostBaseDto（手写抽象基类，见 post_base_dto.dart）
client_projection:
  dart_class: ArticlePostDto
  base_class: PostBaseDto
  output_path: cloud/runtime/generated/content/article_post_dto.g.dart
  fields:
    - name: id
      dart_type: String
      nullable: false
      source: postId
      aliases: [postId, _id]
      default: "''"

    - name: type
      dart_type: String
      nullable: false
      source: contentType
      aliases: [contentType, category]
      default: "'article'"

    - name: authorId
      dart_type: String
      nullable: false
      source: authorId
      aliases: [userId, author_id]
      default: "''"

    - name: displayName
      dart_type: String
      nullable: false
      source: authorNickname
      aliases: [authorNickname, nickname, username, displayName]
      default: "''"

    - name: avatarUrl
      dart_type: String
      nullable: false
      source: authorAvatarUrl
      aliases: [authorAvatarUrl, avatarUrl, avatar]
      default: "''"

    - name: authorBackgroundUrl
      dart_type: String
      nullable: true
      source: authorBackgroundUrl
      aliases: [authorBackgroundUrl]
      default: "null"
      description: "作者主页背景图（反范式）；null 时 UI 显示默认渐变背景"

    - name: title
      dart_type: String
      nullable: false
      source: title
      aliases: [title]
      default: "''"
      description: "文章标题"

    - name: body
      dart_type: String
      nullable: false
      source: body
      aliases: [body, description, content, summary]
      default: "''"
      description: "文章摘要或正文"

    - name: coverUrl
      dart_type: String
      nullable: false
      source: coverUrl
      aliases: [coverUrl, cover, thumbnail, thumbnailUrl]
      default: "''"
      description: "封面图 URL"

    - name: likeCount
      dart_type: int
      nullable: false
      source: likeCount
      aliases: [likeCount, likesCount, likes, like_count]
      default: "0"

    - name: commentCount
      dart_type: int
      nullable: false
      source: commentCount
      aliases: [commentCount, commentsCount, comments, comment_count]
      default: "0"

    - name: favoriteCount
      dart_type: int
      nullable: false
      source: favoriteCount
      aliases: [favoriteCount, savesCount, bookmarks, favorite_count]
      default: "0"

    - name: shareCount
      dart_type: int
      nullable: false
      source: shareCount
      aliases: [shareCount, shares, share_count]
      default: "0"

    - name: createdAt
      dart_type: DateTime
      nullable: false
      source: publishedAt
      aliases: [publishedAt, createdAt, created_at]
      default: "DateTime(0)"
