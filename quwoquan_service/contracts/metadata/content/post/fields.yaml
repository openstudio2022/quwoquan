version: 1
aggregate: Post

entities:
  Post:
    description: 内容主体（聚合根）
    fields:
      - name: _id
        type: ObjectId
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: authorId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: personaId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 发布时使用的分身

      - name: profileSubjectId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 稳定公开主体 ID；优先于 current personaId / authorId 作为作者身份主键

      - name: authorDisplayNameSnapshot
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 作者显示名快照，避免分身退役或改名后记录渲染漂移

      - name: authorAvatarUrlSnapshot
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 作者头像快照

      - name: personaContextVersion
        type: int
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 写入时绑定的 persona 上下文版本

      - name: contentType
        type: enum
        enum_ref: ContentType
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: contentIdentity
        type: enum
        enum_ref: ContentIdentity
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 内容身份层。moment=点滴，work=作品；记录数据允许为空，读路径按 contentType 推导

      - name: title
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        recommend_feature: true
        search_field: true
        description: 标题（文章必填，其他可选）

      - name: body
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        search_field: true

      - name: tags
        type: "[]string"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        recommend_feature: true
        tag_taxonomy_ref: content_tags

      - name: mediaUrls
        type: "[]string"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: coverUrl
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 作者显式设置的文章封面；分发卡与阅读器扉页共享同一真相源

      - name: articleDocument
        type: object
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: |
          文章最终显示快照 canonical payload。
          JSON 形状见同目录 article_document_schema.yaml（根：template/fontPreset/coverImageUrl/titleStyle/nodes[]）。

      - name: articleTemplate
        type: enum
        enum_ref: ArticleTemplatePreset
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 从 articleDocument.template 派生的文章模板只读快照

      - name: articleFontPreset
        type: enum
        enum_ref: ArticleFontPreset
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 从 articleDocument.fontPreset 派生的文章字体预设只读快照

      - name: videoUrl
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: location
        type: GeoPoint
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        recommend_feature: true

      - name: locationName
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        recommend_feature: true
        search_field: true

      - name: primaryHomepageId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 内容绑定的 canonical 共享主页 ID

      - name: primaryHomepageType
        type: enum
        enum_ref: HomepageType
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 绑定主页的类型快照

      - name: primaryHomepageSnapshot
        type: object
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 绑定主页的轻量快照（标题、副标题、封面）

      - name: status
        type: enum
        enum_ref: PostStatus
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write
        observe_metric: post_status_gauge

      - name: visibility
        type: enum
        enum_ref: Visibility
        constraints: [NOT_NULL, DEFAULT_PUBLIC]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: assistantUsePolicy
        type: enum
        enum_ref: AssistantUsePolicy
        constraints: [NOT_NULL, DEFAULT_INHERIT]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 小趣内容消费策略。inherit=遵循全局授权，exclude=排除当前内容

      - name: circleId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        recommend_feature: true
        description: 兼容字段（记录单圈子）。新写入请使用 circleIds + groupId/nodeId 与分发表

      - name: circleIds
        type: "[]string"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 作者主动分发圈子列表（发布后可增删，最终以分发表为准）

      - name: groupId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 发布归属的群组 ID（默认公共群 / 自建群 / 组织节点）

      - name: nodeId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 发布归属的组织节点 ID（父节点聚合时使用）

      - name: sourcePostId
        type: ObjectId
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 转发/引用来源 postId

      - name: sourceType
        type: enum
        enum_ref: PostSourceType
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: original/repost/quote（记录数据可为空，读取时按 original 处理）

      - name: summary
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 文章摘要（模型生成后可人工编辑）

      - name: illustrationAssetId
        type: ObjectId
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 文章插图媒体 ID（可选，最多 1 张）

      - name: publishLocation
        type: object
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: read
        ops_exposure: read
        description: 发布位置（国家/省/市，来自 IP 归属）

      - name: deviceInfo
        type: object
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: read
        ops_exposure: read
        description: 发布设备（manufacturer/brand/model/os/appVersion）

      - name: likeCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: commentCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: favoriteCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: shareCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: viewCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: embedding
        type: "[]float32"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: drop
        api_exposure: drop
        ops_exposure: drop
        description: 内容语义向量（1536维）

      - name: helperReadSummary
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 帮读摘要缓存

      - name: moderationStatus
        type: enum
        enum_ref: ModerationStatus
        constraints: [NOT_NULL, DEFAULT_PENDING]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: publishedAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: lastActiveAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true
        description: 最近活跃时间（发帖 / 评论 / 回复都会刷新）

      - name: deletedAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

  Comment:
    description: 评论与回复（楼中楼）
    fields:
      - name: _id
        type: ObjectId
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: postId
        type: ObjectId
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: authorId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: personaId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: profileSubjectId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 稳定公开主体 ID；优先于 current personaId 作为评论作者主键

      - name: authorDisplayNameSnapshot
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 评论作者显示名快照

      - name: authorAvatarUrlSnapshot
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 评论作者头像快照

      - name: personaContextVersion
        type: int
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 发表评论时绑定的 persona 上下文版本

      - name: content
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        search_field: true

      - name: replyToCommentId
        type: ObjectId
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 楼中楼

      - name: replyToUserId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: replyCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 回复数（用于回复折叠预览计数）

      - name: likeCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: status
        type: enum
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write
        description: visible/deleted/hidden

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

  MediaAsset:
    description: 媒体资源（异步处理管线）
    fields:
      - name: _id
        type: ObjectId
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: postId
        type: ObjectId
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: type
        type: enum
        enum_ref: MediaType
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: originUrl
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: cdnUrl
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: thumbnailUrl
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: width
        type: int
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: height
        type: int
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: durationMs
        type: int
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: fileSizeBytes
        type: int
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: mimeType
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: status
        type: enum
        enum_ref: MediaStatus
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: moderationStatus
        type: enum
        enum_ref: ModerationStatus
        constraints: [NOT_NULL, DEFAULT_PENDING]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write

      - name: derivatives
        type: "[]object"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 转码/缩略图衍生物

      - name: dominantColor
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: lqip
        type: object
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: contentProfile
        type: object
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: derivativePolicyVersion
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: accessPolicy
        type: object
        constraints: [NULLABLE]
        classification: INTERNAL
        log_policy: mask
        api_exposure: read
        ops_exposure: read_write

      - name: originalAccess
        type: object
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: coverStrategy
        type: enum
        enum_ref: MediaCoverStrategy
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 视频封面策略（first_frame/manual）

      - name: manualCoverAssetId
        type: ObjectId
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 手工指定封面引用的媒体 ID

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

  ContentReaction:
    description: 用户互动状态（幂等）
    fields:
      - name: _id
        type: ObjectId
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: drop

      - name: postId
        type: ObjectId
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: userId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: liked
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: favorited
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: shared
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: reported
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: likedAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: favoritedAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

    unique_constraints:
      - columns: [postId, userId]
        description: 幂等保证（MongoDB upsert）

  PostCircleDistribution:
    description: 作者主动分发到圈子的关系（可增删）
    fields:
      - name: _id
        type: ObjectId
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
      - name: postId
        type: ObjectId
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
      - name: ownerAuthorId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
      - name: circleId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
      - name: groupId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 命中的群组上下文（默认公共群 / 自建群 / 组织节点）
      - name: nodeId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 命中的组织节点上下文（可与 groupId 相同或为空）
      - name: state
        type: enum
        enum_ref: DistributionState
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write
      - name: pinned
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write
      - name: pinnedAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
      - name: featured
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write
      - name: featuredAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
      - name: lastActiveAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 节点 / 父节点聚合排序真相源
      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
    unique_constraints:
      - columns: [postId, circleId]
        description: 作者主动分发在同一圈子唯一

  PostCircleReshare:
    description: 用户转发/引用到圈子的关系
    fields:
      - name: _id
        type: ObjectId
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
