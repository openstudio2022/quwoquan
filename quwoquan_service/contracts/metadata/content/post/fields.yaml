      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

  ContentReaction:
    description: 用户互动状态（幂等）
    fields:
      - name: _id
        type: ObjectId
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: drop

      - name: postId
        type: ObjectId
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
