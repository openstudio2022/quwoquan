version: 1
aggregate: Post
layer: app_side

description: |
  端侧独立测试场景（不依赖云端）。
  data_source: fields.yaml constraints 派生 mock fixture（NOT_NULL/DEFAULT/NULLABLE）。
  覆盖：DTO解析 + 错误码映射 + 行为上报格式 + UI配置完整性 + Widget渲染 + Journey旅程。
  分层（与仓库实际目录对齐，非自动生成）：
    dto_scenarios      → L1a contract tests (quwoquan_app/test/cloud/content/**、test/ui/content/post/contract/*_contract_test.dart)
    error_scenarios    → L1a contract tests（同上 + content_errors 消费处）
    behavior_scenarios → L1a contract tests（如 test/cloud/content/content_behavior_tracker_test.dart）
    ui_config_scenarios→ L1a contract tests（test/ui/content/post/contract/post_ui_config_contract_test.dart）
    widget_scenarios   → L1b widget tests  (quwoquan_app/test/ui/content/**、test/ui/discovery/**)
    journey_scenarios  → L1c journey tests (quwoquan_app/test/ui/content/entry/journeys/**)
  执行抽样：flutter test quwoquan_app/test/ui/content/ quwoquan_app/test/cloud/content/ quwoquan_app/test/ui/discovery/

# ── DTO 解析场景 ─────────────────────────────────────────────────────
dto_scenarios:
  - name: dispatch_photo_by_content_type
    description: image contentType → PhotoPostDto
    input: { contentType: image }
    expected_type: PhotoPostDto

  - name: dispatch_video_by_content_type
    description: video contentType → VideoPostDto
    input: { contentType: video }
    expected_type: VideoPostDto

  - name: dispatch_article_by_content_type
    description: article contentType → ArticlePostDto
    input: { contentType: article }
    expected_type: ArticlePostDto

  - name: dispatch_moment_by_content_type
    description: micro contentType → MomentPostDto
    input: { contentType: micro }
    expected_type: MomentPostDto

  - name: photo_aspect_ratio_computed
    description: width/height 有效时 aspectRatio != null
    input: { contentType: image, width: 1200, height: 800 }
    assertions:
      - aspectRatio == 1.5

  - name: photo_aspect_ratio_null_when_missing
    description: 无尺寸信息时 aspectRatio == null
    input: { contentType: image }
    assertions:
      - aspectRatio == null

  - name: alias_resolution_postId
    description: postId 别名解析为 id
    input: { postId: "abc123", contentType: image }
    assertions:
      - id == "abc123"

  - name: alias_resolution_mongodb_id
    description: _id 别名解析为 id（MongoDB 原始字段）
    input: { _id: "abc123", contentType: image }
    assertions:
      - id == "abc123"

  - name: required_fields_non_empty_from_mock_data
    description: mock 数据中所有 NOT_NULL 字段非空
    data_source: ContentMockData.discoveryPhotoData
    assertions:
      - all items: id.isNotEmpty
      - all items: authorId.isNotEmpty
      - all items: displayName.isNotEmpty

# ── 错误码解析场景（全量 errors.yaml 覆盖）──────────────────────────
error_scenarios:
  - name: parse_post_not_found
    input_code: "CONTENT.USER.post_not_found"
    input_status: 404
    expected_dart_const: postNotFound
    expected_zh_message: "内容不存在或已删除"
    expected_recovery_action: surface

  - name: parse_rate_limited
    input_code: "CONTENT.USER.rate_limited"
    input_status: 429
    expected_dart_const: rateLimited
    expected_recovery_action: retry
    expected_recovery_after: 60

  - name: parse_forbidden_edit
    input_code: "CONTENT.USER.forbidden_edit"
    input_status: 403
    expected_dart_const: forbiddenEdit

  - name: parse_unauthorized
    input_code: "CONTENT.USER.unauthorized"
    input_status: 401
    expected_dart_const: unauthorized

  - name: parse_invalid_argument
    input_code: "CONTENT.USER.invalid_argument"
    input_status: 400
    expected_dart_const: invalidArgument

  - name: parse_storage_write_failed
    input_code: "CONTENT.SYSTEM.storage_write_failed"
    input_status: 500
    expected_dart_const: storageWriteFailed
    expected_recovery_action: retry

  - name: parse_upstream_timeout
    input_code: "CONTENT.MIDDLEWARE.upstream_timeout"
    input_status: 504
    expected_dart_const: upstreamTimeout
    expected_recovery_action: retry

  - name: parse_comment_not_found
    input_code: "CONTENT.USER.comment_not_found"
    input_status: 404
    expected_dart_const: commentNotFound
    expected_recovery_action: surface

  - name: parse_comment_too_long
    input_code: "CONTENT.USER.comment_too_long"
    input_status: 400
    expected_dart_const: commentTooLong
    expected_recovery_action: surface

  - name: parse_comment_rate_limited
    input_code: "CONTENT.USER.comment_rate_limited"
    input_status: 429
    expected_dart_const: commentRateLimited
    expected_recovery_action: retry
    expected_recovery_after: 60

  - name: parse_comment_like_duplicate
    input_code: "CONTENT.USER.comment_like_duplicate"
    input_status: 409
    expected_dart_const: commentLikeDuplicate
    expected_recovery_action: surface

  - name: parse_comment_forbidden_delete
    input_code: "CONTENT.USER.comment_forbidden_delete"
    input_status: 403
    expected_dart_const: commentForbiddenDelete
    expected_recovery_action: surface

  - name: parse_forbidden_delete
    input_code: "CONTENT.USER.forbidden_delete"
    input_status: 403
    expected_dart_const: forbiddenDelete
    expected_recovery_action: surface

  - name: parse_invalid_content_type
    input_code: "CONTENT.USER.invalid_content_type"
    input_status: 400
    expected_dart_const: invalidContentType
    expected_recovery_action: surface

  - name: parse_content_too_long
    input_code: "CONTENT.USER.content_too_long"
    input_status: 422
    expected_dart_const: contentTooLong
    expected_recovery_action: surface

  - name: parse_media_not_ready
    input_code: "CONTENT.USER.media_not_ready"
    input_status: 202
    expected_dart_const: mediaNotReady
    expected_recovery_action: retry

  - name: parse_internal_error
    input_code: "CONTENT.SYSTEM.internal_error"
    input_status: 500
    expected_dart_const: internalError
    expected_recovery_action: surface

  - name: fallback_unknown_code
    description: 未知错误码 → 返回 internalError 而非崩溃
    input_code: "UNKNOWN.UNKNOWN.random"
    input_status: 500
    expected_dart_const: internalError

  - name: parse_post_immutable_after_publish
    input_code: "CONTENT.USER.post_immutable_after_publish"
    expected_dart_const: postImmutableAfterPublish
  - name: parse_public_required_for_circle_distribution
    input_code: "CONTENT.USER.public_required_for_circle_distribution"
    expected_dart_const: publicRequiredForCircleDistribution
  - name: parse_invalid_moment_payload
    input_code: "CONTENT.USER.invalid_moment_payload"
    expected_dart_const: invalidMomentPayload
  - name: parse_content_deleted
    input_code: "CONTENT.USER.content_deleted"
    expected_dart_const: contentDeleted
  - name: parse_circle_distribution_forbidden
    input_code: "CONTENT.USER.circle_distribution_forbidden"
    expected_dart_const: circleDistributionForbidden

# ── 行为上报格式场景 ─────────────────────────────────────────────────
behavior_scenarios:
  - name: impression_goes_to_batch
    description: trackImpression 写入批量缓冲，不立即发网络请求
    action: ContentBehaviorTracker.trackImpression("post1")
    assertions:
      - no HTTP request fired immediately
      - "buffer contains { type: impression, postId: post1 }"

  - name: click_fires_immediately
    description: trackClick batch=false，立即 flush
    action: ContentBehaviorTracker.trackClick("post1")
    assertions:
      - HTTP request fired immediately
      - payload.events[0].type == click

  - name: dwell_includes_ms
    description: trackDwell 包含 dwellMs 字段
    action: ContentBehaviorTracker.trackDwell("post1", 15000)
    assertions:
      - "buffer contains { type: dwell, postId: post1, dwellMs: 15000 }"

  - name: like_not_in_behavior_tracker
    description: 点赞不通过 BehaviorTracker（dedicated route）
    assertions:
      - ContentBehaviorTracker has no trackLike method

  - name: batch_route_matches_service_yaml
    description: 批量路由 == POST /v1/content/behaviors
    assertions:
      - ContentBehaviorTracker.batchRoute == "/v1/content/behaviors"

# ── UI 配置完整性场景 ─────────────────────────────────────────────────
ui_config_scenarios:
  - name: discovery_tabs_count
    description: 发现页 tab 数量 == ui_config.yaml discovery_tabs 数量
    assertions:
      - ContentUIConfig.discoveryTabs.length == 4

  - name: feature_flags_complete
    description: 全部 feature flags 有默认值
    assertions:
      - ContentUIConfig.featureFlags.containsKey("enable_helper_read")
      - ContentUIConfig.featureFlags.containsKey("enable_behavior_tracking")

  - name: card_config_all_types
    description: 四种内容类型都有卡片配置
    assertions:
      - ContentUIConfig.cardConfigs.containsKey("photo")
      - ContentUIConfig.cardConfigs.containsKey("video")
      - ContentUIConfig.cardConfigs.containsKey("moment")
      - ContentUIConfig.cardConfigs.containsKey("article")

# ── L1b Widget 测试场景 ───────────────────────────────────────────────
# dart_func: 对应 quwoquan_app/test/ui/content/** 等下的测试函数名（见 description 分层）
# fixture: MockContentRepository 返回的 post 数据
widget_scenarios:
  - name: photo_card_author_avatar_visibility
    dart_func: testPhotoCardAuthorAvatarVisibility
    description: ui_config.card_config.show_author_avatar=true → 头像 Widget 可见
    fixture: { contentType: image, likeCount: 42, authorId: "u1", authorAvatarUrl: "https://cdn/a.jpg" }
    assertions:
      - find.byKey(TestKeys.authorAvatar) finds one widget when show_author_avatar=true
      - find.byKey(TestKeys.authorAvatar) finds nothing when show_author_avatar=false

  - name: photo_card_like_button_optimistic
    dart_func: testPhotoCardLikeButtonOptimistic
    description: tap likeButton → likeCount+1（乐观），MockRepo.likePost 被调用 1 次
    fixture: { contentType: image, likeCount: 10, id: "p1" }
    assertions:
      - after tap: find.text("11") findsOneWidget
      - mockRepo.likePostCallCount == 1

  - name: video_card_duration_format
    dart_func: testVideoCardDurationFormat
    description: durationMs=125000 → "2:05" 显示正确
    fixture: { contentType: video, durationMs: 125000, coverUrl: "https://cdn/cover.jpg" }
    assertions:
      - find.text("2:05") findsOneWidget

  - name: comment_input_bar_submit_disabled_empty
    dart_func: testCommentInputBarSubmitDisabledWhenEmpty
    description: 无输入时 submit 按钮 disabled
    fixture: {}
    assertions:
      - find.byKey(TestKeys.submitCommentButton).evaluate().first.widget is ElevatedButton
      - (widget as ElevatedButton).onPressed == null

  - name: comment_input_bar_submit_enabled_after_input
    dart_func: testCommentInputBarSubmitEnabledAfterInput
    description: enterText 后 submit 按钮变为 enabled
    fixture: {}
    steps:
      - enterText(find.byKey(TestKeys.commentInputBar), "好内容")
    assertions:
      - (widget as ElevatedButton).onPressed != null

# ── L1c Journey 测试场景 ──────────────────────────────────────────────
# dart_func: 对应 quwoquan_app/test/ui/content/entry/journeys/** 等下的测试函数名
# mock_config: MockContentRepository 的特殊配置（异常注入等）
journey_scenarios:
  - name: discovery_to_detail_route_params
    dart_func: testDiscoveryToDetailRouteParams
    description: DiscoveryPage → tap PhotoCard → PhotoDetailPage，GoRouter extra 传参正确
    mock_config: {}
    fixture_seed: { contentType: image, id: "post_001", likeCount: 5 }
    steps:
      - pumpWidget(DiscoveryPage with ProviderScope)
      - tap(find.byKey(TestKeys.photoPostCard).first)
      - pumpAndSettle()
    assertions:
      - find.byType(PhotoDetailPage) findsOneWidget
      - current route extra.postId == "post_001"

  - name: like_optimistic_rollback_on_rate_limit
    dart_func: testLikeOptimisticRollbackOnRateLimit
    description: 点赞 → 乐观+1 → 429 → 回滚 + Toast 错误文本
    mock_config:
      throwOnLike: RateLimitException()
    fixture_seed: { contentType: image, id: "post_001", likeCount: 10 }
    steps:
      - navigate to PhotoDetailPage
      - tap(find.byKey(TestKeys.likeButton))
      - pump() # 乐观更新可见
      - pumpAndSettle() # 异常处理完成
    assertions:
      - after pump: find.text("11") findsOneWidget (乐观 +1)
      - after pumpAndSettle: find.text("10") findsOneWidget (回滚)
      - find.text(ContentErrorMessages.zh[ContentErrorCode.rateLimited]) findsOneWidget

  - name: comment_post_journey
    dart_func: testCommentPostJourney
    description: 进入详情 → 输入评论 → 提交 → Mock 调用 + 评论数 +1
    mock_config: {}
    fixture_seed: { contentType: image, id: "post_001", commentCount: 3 }
    steps:
      - navigate to PhotoDetailPage
      - tap(find.byKey(TestKeys.commentInputBar))
      - enterText("这张图真漂亮")
      - tap(find.byKey(TestKeys.submitCommentButton))
      - pumpAndSettle()
    assertions:
      - mockRepo.createCommentCallCount == 1
      - mockRepo.lastCommentText == "这张图真漂亮"
      - find.text("4") findsOneWidget (commentCount +1)
