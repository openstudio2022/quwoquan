version: 1
aggregate: Post
layer: e2e

description: |
  端云集成测试场景。app → gateway → content-service → MongoDB/Redis 全链路。
  执行环境：staging。
  CI 策略：advisory（不阻塞 PR 合入，但发布前必须全绿）。

  # 分层说明
  # test_type: api_contract  — 无 UI driver，HTTP 直接断言，快（~10s/场景）
  # test_type: ui_journey    — 需 UI driver（Patrol + Flutter integration_test），慢（~30s/场景）
  # 两类场景在同一文件声明，由 CI pipeline 按 test_type 路由到不同执行器。

execution:
  environment: staging
  ci_strategy: advisory
  trigger: daily + pre-release
  runners:
    api_contract: gamma HTTP client（Go/Dart http）
    ui_journey:   Patrol on Firebase Test Lab（iOS + Android real devices）

# ── 核心用户旅程 ──────────────────────────────────────────────────────
scenarios:
  - name: discovery_feed_load_and_render
    description: 发现页加载 → 渲染内容卡片（全链路）
    test_type: ui_journey
    patrol_flow: test/patrol/discovery/feed_load_test.dart
    actors:
      app: lib/ui/discovery/pages/discovery_page.dart
      gateway: /v1/orch/discovery/feed
      service: content-service GET /v1/content/feed
      storage: MongoDB rm_discovery_feed collection
    steps:
      - app opens discovery photo tab
      - app calls discovery feed API (type=image)
      - gateway routes to content-service
      - content-service queries MongoDB and returns posts
      - app parses response → PhotoPostDto list
      - app renders waterfall grid
    assertions:
      - response_items match photo_post.yaml projection schema
      - all items: aspectRatio computed correctly from width/height
      - app renders cards within 300ms of response
      - no hardcoded contentType strings in request path
      - ContentUIConfig.discoveryTabs[0].contentType used for request

  - name: like_post_realtime
    description: 点赞 → 计数实时更新 → 错误 UI 正确展示
    test_type: ui_journey
    patrol_flow: test/patrol/content/like_post_test.dart
    actors:
      app: post card like button
      service: content-service POST /v1/content/posts/{postId}/like
      storage: MongoDB content_reactions + Redis counter
    steps:
      - user taps like button
      - app optimistically increments like count (ContentUIConfig.interaction_config.like.optimistic_update=true)
      - app calls POST /v1/content/posts/{postId}/like
      - service upserts ContentReaction + INCR Redis counter
      - service returns updated likeCount
      - app reconciles optimistic state with server response
    assertions:
      - likeCount incremented by 1 in UI within 50ms (optimistic)
      - server likeCount matches after response received
      - second like tap: idempotent, no double increment
      - on 429 response: UI shows ContentErrorMessages.zh[rateLimited]
      - on 429 response: optimistic update rolled back

  - name: behavior_batch_report_reaches_service
    description: 行为事件批量上报从端侧到达服务
    test_type: api_contract
    actors:
      app: ContentBehaviorTracker
      service: content-service POST /v1/content/behaviors
    steps:
      - user scrolls feed → impression events buffered
      - user dwells on photo > 10s → dwell event buffered
      - user clicks post → click event fires immediately (batch=false)
      - batch flush triggered on scroll stop
      - POST /v1/content/behaviors with events array
    assertions:
      - click event reaches service within 200ms
      - batch payload type field matches behaviors.yaml behavior_events types
      - like event NOT present in batch (dedicated route)
      - service returns 204

  - name: error_state_displayed_correctly
    description: 服务返回错误码 → 端侧显示正确 i18n 提示
    test_type: api_contract
    # 协议层/语义层由 L3 api_contract 覆盖；UI 渲染层（empty_state）由对应 ui_journey 覆盖
    steps:
      - service returns { code: "CONTENT.USER.post_not_found", userMessage: "..." }
      - app receives 404 response
    assertions:
      - CloudErrorMapper maps to ContentErrorCode.postNotFound
      - UI displays ContentErrorMessages.zh[postNotFound] == "内容不存在或已删除"
      - post_not_found empty state rendered (from ContentUIConfig.empty_states)  # → covered by error_empty_state_ui ui_journey

  - name: error_empty_state_ui
    description: 帖子不存在错误 → 端侧空状态 Widget 正确渲染
    test_type: ui_journey
    patrol_flow: test/patrol/content/error_empty_state_test.dart
    # 补充 L3 error_state_displayed_correctly 中无法通过 HTTP 验证的 UI 渲染层
    actors:
      app: lib/ui/content/pages/photo_detail_page.dart
      service: content-service GET /v1/content/posts/{nonExistentId}
    steps:
      - app navigates to photo detail with nonexistent postId
      - service returns 404 CONTENT.USER.post_not_found
      - app receives CloudException with errorCode=postNotFound
    assertions:
      - empty state Widget rendered (ContentUIConfig.empty_states.post_not_found)
      - error message displays ContentErrorMessages.zh[postNotFound]
      - retry button visible (or "back to discovery" CTA)
      - no crash, no infinite loading spinner

  - name: feed_cursor_pagination_end_to_end
    description: 游标分页端到端（翻页加载更多）
    test_type: api_contract
    steps:
      - app loads page 1 (limit=20)
      - response includes cursor
      - app loads page 2 with cursor
    assertions:
      - no item overlap between page 1 and page 2
      - cursor format stable across requests
      - total items loaded == seeded count

  - name: media_not_ready_graceful_error
    description: 媒体处理中发布 → 端侧友好提示 + 稍后重试
    test_type: api_contract
    # 注：UI 断言（toast 渲染）需配套 ui_journey 场景覆盖
    steps:
      - user uploads media
      - user immediately tries to publish before media is ready
      - service returns { code: "CONTENT.USER.media_not_ready" }
    assertions:
      - UI shows ContentErrorMessages.zh[mediaNotReady] == "媒体文件正在处理中，请稍后发布"
      - recovery_action: retry → UI shows retry option

  - name: comment_on_post_journey
    description: 评论内容旅程：发表评论 → 评论数更新 → 行为信号到达推荐服务
    test_type: ui_journey
    patrol_flow: test/patrol/content/comment_post_test.dart
    actors:
      app: lib/ui/content/pages/photo_detail_page.dart
      service: content-service POST /v1/content/posts/{postId}/comments
      storage: MongoDB comments collection + posts.commentCount
    steps:
      - user opens post detail (photo)
      - user taps comment input bar
      - user types comment text
      - user submits comment
      - app calls POST /v1/content/posts/{postId}/comments
      - service creates comment + increments commentCount
      - app receives response → updates comment list + counter
    assertions:
      - comment appears in thread within 500ms
      - commentCount in post header incremented by 1
      - event CommentCreated published with correct payload
      - behavior signal NOT in batch queue (dedicated route)
      - on CONTENT.USER.rate_limited: error toast shown + input re-enabled
