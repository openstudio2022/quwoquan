version: 1
aggregate: Post

service:
  name: content-service
  domain: content
  owner: backend-team
  description: 内容发布、浏览、互动、评论与媒体管理

api_routes:
  - method: GET
    path: /v1/content/feed
    operation: GetFeed
    description: 发现流（推荐排序 + cursor 分页；cursor 为 opaque token，仅用于 future window）
    query_params: [identity, type, sort, cursor, limit, subCategory]
    response_entity: Post

  - method: GET
    path: /v1/content/posts/search
    operation: SearchPosts
    description: 网络结果页内容搜索结果（返回内容搜索项视图，可按群组频道分类过滤）
    query_params: [query, identity, type, categoryId, subCategory, cursor, limit]
    response_entity: PostSearchItemView
    auth: required

  - method: POST
    path: /v1/content/posts
    operation: CreatePost
    description: 创建内容（可草稿或直发）
    request_entity: Post
    writable_fields: [contentType, contentIdentity, title, body, summary, tags, mediaUrls, coverUrl, articleMarkdown, articleMarkdownVersion, articleAssetManifest, articleRenderProfile, videoUrl, illustrationAssetId, location, locationName, primaryHomepageId, primaryHomepageType, primaryHomepageSnapshot, visibility, circleIds, groupId, nodeId, assistantUsePolicy, sourcePostId, sourceType, deviceInfo, publishLocation, authorDisplayNameSnapshot, authorAvatarUrlSnapshot, personaContextVersion]

  - method: GET
    path: /v1/content/sub-accounts/{subAccountId}/posts
    operation: ListUserPosts
    description: 公开主体发布的帖子列表（个人主页-创作 Tab）
    query_params: [identity, type, visibility, cursor, limit]
    response_entity: Post

  - method: GET
    path: /v1/content/posts/{postId}
    operation: GetPost
    description: 内容详情
    response_entity: Post

  - method: PATCH
    path: /v1/content/posts/{postId}
    operation: UpdatePost
    description: 更新内容（仅 draft 可改；published 后不可变）
    writable_fields: [contentType, contentIdentity, title, body, summary, tags, mediaUrls, coverUrl, articleMarkdown, articleMarkdownVersion, articleAssetManifest, articleRenderProfile, videoUrl, illustrationAssetId, location, locationName, primaryHomepageId, primaryHomepageType, primaryHomepageSnapshot, visibility, circleIds, groupId, nodeId, assistantUsePolicy]

  - method: POST
    path: /v1/content/posts/{postId}/publish
    operation: PublishPost
    description: 发布草稿（发布后内容本体不可修改）
    writable_fields: [contentIdentity, primaryHomepageId, primaryHomepageType, primaryHomepageSnapshot, visibility, circleIds, groupId, nodeId, assistantUsePolicy]

  - method: DELETE
    path: /v1/content/posts/{postId}
    operation: DeletePost
    description: 删除内容（级联下架作者分发与用户转发并写入墓碑）

  - method: PATCH
    path: /v1/content/posts/{postId}/circles
    operation: UpdatePostCircles
    description: 更新作者主动分发圈子关系（支持 add/remove，发布后允许）
    auth: required

  - method: PATCH
    path: /v1/content/posts/{postId}/settings
    operation: UpdatePostSettings
    description: 更新发布后仍可调整的外围设置（visibility / circleIds / assistantUsePolicy / homepage）
    writable_fields: [visibility, primaryHomepageId, primaryHomepageType, primaryHomepageSnapshot, circleIds, groupId, nodeId, assistantUsePolicy]
    auth: required

  - method: POST
    path: /v1/content/posts/{postId}:promoteToWork
    operation: PromotePostToWork
    description: 点滴升级为作品（原地升级，保持 postId 与 deeplink 不变）
    writable_fields: [contentType, title, summary, tags, coverUrl, articleMarkdown, articleMarkdownVersion, articleAssetManifest, articleRenderProfile, primaryHomepageId, primaryHomepageType, primaryHomepageSnapshot, visibility, circleIds, groupId, nodeId, assistantUsePolicy]
    auth: required

  - method: GET
    path: /v1/content/posts/{postId}/comments
    operation: ListComments
    description: 评论列表（支持 hot/latest 排序）
    query_params: [sort, cursor, limit]
    response_entity: Comment

  - method: POST
    path: /v1/content/posts/{postId}/comments
    operation: CreateComment
    description: 发表评论
    request_entity: Comment
    writable_fields: [content, replyToCommentId, authorDisplayNameSnapshot, authorAvatarUrlSnapshot, personaContextVersion]

  - method: DELETE
    path: /v1/content/posts/{postId}/comments/{commentId}
    operation: DeleteComment
    description: 删除评论

  - method: POST
    path: /v1/content/comments/{commentId}/like
    operation: LikeComment
    description: 评论点赞（幂等，Redis SISMEMBER 去重 + INCR 计数 → 异步刷盘）
    auth: required

  - method: DELETE
    path: /v1/content/comments/{commentId}/like
    operation: UnlikeComment
    description: 取消评论点赞（幂等）
    auth: required

  - method: GET
    path: /v1/content/users/me/comments
    operation: ListCommentsByAuthor
    description: 我发出的评论（个人主页，按时间倒序，附带原帖摘要）
    query_params: [cursor, limit]
    response_entity: Comment
    auth: required

  - method: GET
    path: /v1/content/users/me/received-comments
    operation: ListCommentsForPostAuthor
    description: 我收到的评论（个人主页，按时间倒序，附带原帖摘要）
    query_params: [cursor, limit]
    response_entity: Comment
    auth: required

  - method: GET
    path: /v1/content/sub-accounts/{subAccountId}/interactions/received
    operation: ListProfileInteractionActivitiesReceived
    description: 个人主页收到的互动活动（赞/评论/转发）
    query_params: [cursor, limit]
    response_entity: ProfileInteractionActivityView
    auth: required

  - method: GET
    path: /v1/content/sub-accounts/{subAccountId}/interactions/sent
    operation: ListProfileInteractionActivitiesSent
    description: 个人主页发出的互动活动（赞/评论/转发）
    query_params: [cursor, limit]
    response_entity: ProfileInteractionActivityView
    auth: required

  - method: GET
    path: /v1/config/app
    operation: GetAppConfig
    description: 端侧业务规则配置（评论字数限制、折叠参数等），启动时拉取一次

  - method: GET
    path: /v1/content/posts/{postId}/reactions
    operation: GetReactionState
    description: 当前用户互动状态（liked/favorited/shared；shared 来自权威分享记录）
    response_entity: ContentReaction

  - method: POST
    path: /v1/content/posts/{postId}/like
    operation: LikePost
    description: 点赞（幂等 upsert，立即更新 ContentReaction.liked + likeCount）
    auth: required

  - method: DELETE
    path: /v1/content/posts/{postId}/like
    operation: UnlikePost
    description: 取消点赞（幂等，立即更新 ContentReaction.liked + likeCount）
    auth: required

  - method: POST
    path: /v1/content/posts/{postId}/favorite
    operation: FavoritePost
    description: 收藏（幂等 upsert，立即更新 ContentReaction.favorited + favoriteCount）
    auth: required

  - method: DELETE
    path: /v1/content/posts/{postId}/favorite
    operation: UnfavoritePost
    description: 取消收藏（幂等，立即更新 ContentReaction.favorited + favoriteCount）
    auth: required

  - method: POST
    path: /v1/content/posts/{postId}/share
    operation: SharePost
    description: 成功分享记录写入（幂等；更新 ContentReaction.shared + shareCount；用于通用分享成功落库，不等同于 telemetry）
    auth: required

  - method: DELETE
    path: /v1/content/posts/{postId}/share
    operation: UnsharePost
    description: 取消分享记录（幂等；对称更新 ContentReaction.shared + shareCount）
    auth: required

  - method: GET
    path: /v1/content/posts/{postId}/counters
    operation: GetCounters
    description: 聚合计数

  - method: POST
    path: /v1/content/behaviors
    operation: ReportBehaviors
    description: 行为批量上报（impression/click/dwell/dislike/report/shareIntent/shareClick；like/favorite/shareCount 用专用路由，不驱动 post.shareCount）

  - method: POST
    path: /v1/content/posts/{postId}/repost
    operation: RepostToCircle
    description: 转发内容到圈子（独立于作者主动分发关系；成功后同步写入权威分享记录并更新 shareCount）
    auth: required

  - method: POST
    path: /v1/content/posts/{postId}/quote
    operation: QuoteToCircle
    description: 引用内容后重新发布（按 moment 落库；成功后同步写入权威分享记录并更新 shareCount）
    auth: required

  - method: POST
    path: /v1/content/media/uploads:init
    operation: InitMediaUpload
    description: 初始化媒体上传会话（返回上传凭证与 mediaId）
    auth: required

  - method: POST
    path: /v1/content/media/uploads/{sessionId}:complete
    operation: CompleteMediaUpload
    description: 上传完成回调，触发媒体处理管线
    auth: required

  - method: POST
    path: /v1/content/media/uploads/{sessionId}:abort
    operation: AbortMediaUpload
    description: 取消上传会话
    auth: required

  - method: GET
    path: /v1/content/media/{mediaId}
    operation: GetMediaAsset
    description: 媒体资产状态
    response_entity: MediaAsset

  - method: POST
    path: /v1/content/media/{mediaId}/original:access
    operation: RequestOriginalImageAccess
    description: 显式申请查看或保存原图/原视频授权
    auth: required

  - method: POST
    path: /v1/content/posts/{postId}/media:bind
    operation: BindMediaAssetsToPost
    description: 将 draft/cold_start 素材绑定到帖子，供 Markdown 长文发布和回读使用
    auth: required

  - method: POST
    path: /v1/content/media/{mediaId}/cover:auto
    operation: SelectAutoVideoCover
    description: 视频封面默认策略（首帧）
    auth: required

  - method: POST
    path: /v1/content/media/{mediaId}/cover:manual
    operation: SelectManualVideoCover
    description: 手工指定视频封面
    auth: required

  - method: POST
    path: /v1/content/articles/summary:generate
    operation: GenerateArticleSummary
    description: 为文章生成摘要草案（用户可编辑）
    auth: required

  - method: GET
    path: /v1/content/helper-read/{contentId}
    operation: GetHelperRead
    description: 帮读摘要

  - method: POST
    path: /v1/content/recommend
    operation: GetRecommendation
    description: 推荐请求

consumers:
  - name: app
    capabilities: [read_feed, create_post, read_post, create_comment, react, report_behavior]
  - name: platform-ops
    capabilities: [read_post, moderate_post, moderate_media, read_stats]
  - name: recommendation-engine
    capabilities: [read_post, read_reactions, read_behaviors, search, vector_search]
  - name: assistant-service
    capabilities: [read_post, read_comments, helper_read, search, vector_search]
  - name: circle-service
    capabilities: [read_post]

# 测试场景已迁移至 tests/contract.yaml（云侧）和 tests/mock.yaml（端侧）。
