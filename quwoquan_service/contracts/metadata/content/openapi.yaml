openapi: 3.0.3
info:
  title: quwoquan content-service API
  version: "v1"
servers:
  - url: http://localhost
security:
  - bearerAuth: []
paths:
  /v1/content/feed:
    get:
      summary: List content feed
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [moment, photo, video, article]
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Cursor
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Limit
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/XPersonaId
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedPage"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: ../_shared/openapi_common.yaml#/components/schemas/ErrorResponse
  /v1/content/behaviors:
    post:
      summary: Ingest content behavior events (batch)
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/IdempotencyKey
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/XPersonaId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [events]
              properties:
                events:
                  type: array
                  items:
                    $ref: "#/components/schemas/BehaviorEvent"
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: ../_shared/openapi_common.yaml#/components/schemas/ErrorResponse
  /v1/content/posts/{postId}/comments:
    get:
      summary: List comments of a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Cursor
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Limit
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentPage"
    post:
      summary: Create comment (or reply)
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/IdempotencyKey
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/XPersonaId
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCommentRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCommentResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: ../_shared/openapi_common.yaml#/components/schemas/ErrorResponse
  /v1/content/posts/{postId}/comments/{commentId}:
    delete:
      summary: Delete comment
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: ../_shared/openapi_common.yaml#/components/schemas/ErrorResponse
  /v1/content/comments/{commentId}/like:
    post:
      summary: Like a comment
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "409":
          description: Already liked
          content:
            application/json:
              schema:
                $ref: ../_shared/openapi_common.yaml#/components/schemas/ErrorResponse
    delete:
      summary: Unlike a comment
      parameters:
        - name: commentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: No Content
  /v1/content/users/me/comments:
    get:
      summary: List comments authored by current user
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Cursor
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Limit
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentPage"
  /v1/content/users/me/received-comments:
    get:
      summary: List comments received on current user's posts
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Cursor
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/Limit
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentPage"
  /v1/config/app:
    get:
      summary: App configuration for client-side business rules
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppConfig"
  /v1/content/posts/{postId}/reactions:
    get:
      summary: Get reaction state for a user on a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: query
          required: false
          schema:
            type: string
          description: 可选。若网关已注入 user 上下文，可省略。
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReactionState"
  /v1/content/posts/{postId}/counters:
    get:
      summary: Get aggregated counters of a post
      parameters:
        - name: postId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Counters"
  /v1/content/media/{mediaId}:
    get:
      summary: Get media asset status
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaAsset"
components:
  securitySchemes:
    bearerAuth:
      $ref: ../_shared/openapi_common.yaml#/components/securitySchemes/bearerAuth
  schemas:
    FeedPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FeedItem"
        nextCursor:
          type: string
          nullable: true
    FeedItem:
      type: object
      required: [id, type]
      properties:
        id: { type: string }
        type:
          type: string
          enum: [moment, image, video, article]
        authorId: { type: string }
        caption: { type: string }
        images:
          type: array
          items: { type: string }
        videoUrl: { type: string }
        createdAt: { type: string }
        counters:
          $ref: "#/components/schemas/Counters"
        width:
          type: integer
          nullable: true
          description: |
            主媒体宽度（px）。与 App `FeedItemDto` / `discovery_feed.yaml` client_projection 可选字段对齐。
        height:
          type: integer
          nullable: true
          description: |
            主媒体高度（px）。与 App `FeedItemDto` / `discovery_feed.yaml` client_projection 可选字段对齐。
        metadata:
          type: object
          additionalProperties: true
          description: |
            圈子/tags/visibility/articleDocument 等扩展可放此对象；亦允许与扁平 FeedItemDto 字段并存（见 discovery_feed projection）。
    BehaviorEvent:
      type: object
      required: [contentId, eventType, timestamp]
      properties:
        contentId: { type: string }
        eventType:
          type: string
          enum: [impression, click, dwell, like, favorite, dislike, report, share]
        timestamp: { type: string }
        durationMs: { type: integer }
        metadata:
          type: object
          additionalProperties: true
    CommentPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Comment" }
        nextCursor:
          type: string
          nullable: true
    Comment:
      type: object
      required: [id, postId, content, createdAt]
      properties:
        id: { type: string }
        postId: { type: string }
        authorId: { type: string }
        displayName: { type: string }
        avatarUrl: { type: string }
        content: { type: string }
        replyToCommentId: { type: string, nullable: true }
        replyToUserId: { type: string, nullable: true }
        replyToDisplayName: { type: string, nullable: true }
        replyCount: { type: integer }
        likeCount: { type: integer }
        status: { type: string, enum: [visible, hidden, deleted] }
        isAuthor: { type: boolean, description: "是否帖主" }
        createdAt: { type: string }
        postSummary:
          $ref: "#/components/schemas/PostSummary"
          nullable: true
          description: "仅在 ListCommentsByAuthor/ListCommentsForPostAuthor 时附带"
    PostSummary:
      type: object
      properties:
        id: { type: string }
        contentType: { type: string }
        title: { type: string, nullable: true }
        coverUrl: { type: string, nullable: true }
        authorDisplayName: { type: string }
    CreateCommentRequest:
      type: object
      required: [content]
      properties:
        content: { type: string, maxLength: 500 }
        replyToCommentId: { type: string }
    CreateCommentResponse:
      type: object
      required: [id]
      properties:
        id: { type: string }
        postId: { type: string }
        authorId: { type: string }
        displayName: { type: string }
        avatarUrl: { type: string }
        content: { type: string }
        replyToCommentId: { type: string, nullable: true }
        replyToUserId: { type: string, nullable: true }
        replyCount: { type: integer }
        likeCount: { type: integer }
        status: { type: string }
        isAuthor: { type: boolean }
        createdAt: { type: string }
    AppConfig:
      type: object
      properties:
        content:
          type: object
          description: |
            内容域远程配置。除 comment 外，App 运行时消费（SSOT：post/projections/content_app_config_client.yaml）：
            feature_flags 或 featureFlags（bool 映射，与本地 ContentUIConfig 合并）；
            gray_release 或 grayRelease（experiment_bucket/current_stage/canary_matrix）；
            client_state_sync 或 clientStateSync（JSON 对象，由 ClientStateSyncConfig 解析）。
          properties:
            comment:
              type: object
              properties:
                max_length: { type: integer }
                reply_preview_count: { type: integer }
                fold_line_count: { type: integer }
            feature_flags:
              type: object
              additionalProperties: { type: boolean }
            featureFlags:
              type: object
              additionalProperties: { type: boolean }
            gray_release:
              $ref: "#/components/schemas/AppConfigGrayRelease"
            grayRelease:
              $ref: "#/components/schemas/AppConfigGrayRelease"
            client_state_sync:
              type: object
              additionalProperties: true
            clientStateSync:
              type: object
              additionalProperties: true
    AppConfigGrayRelease:
      type: object
      description: 灰度桶与阶段矩阵（snake_case 与 camelCase 别名并存）。
      properties:
        experiment_bucket: { type: string }
        experimentBucket: { type: string }
        current_stage: { type: string }
        currentStage: { type: string }
        canary_matrix:
          type: array
          items:
            type: object
            properties:
              stage: { type: string }
              rolloutPercent: { type: integer }
        canaryMatrix:
          type: array
          items:
            type: object
            additionalProperties: true
    ReactionState:
      type: object
      properties:
        liked: { type: boolean }
        favorited: { type: boolean }
        reported: { type: boolean }
    Counters:
      type: object
      properties:
        likeCount: { type: integer }
        commentCount: { type: integer }
        favoriteCount: { type: integer }
        shareCount: { type: integer }
    MediaAsset:
      type: object
      required: [id, status]
      properties:
        id: { type: string }
        status:
          type: string
          enum: [uploaded, processing, ready, failed]
        originUrl: { type: string }
        cdnUrl: { type: string }
        derivatives:
          type: array
          items:
            type: object
            additionalProperties: true
        moderationStatus:
          type: string
          enum: [pending, approved, rejected]
        errorCode: { type: string }
