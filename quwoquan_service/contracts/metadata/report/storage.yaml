version: 1
entity: Report
backend: postgres

tables:
  reports:
    entity: Report
    pk: id
    columns:
      - { name: id, type: VARCHAR(36), constraints: [PK] }
      - { name: reporter_id, type: VARCHAR(36), constraints: [NOT_NULL] }
      - { name: target_type, type: VARCHAR(16), constraints: [NOT_NULL] }
      - { name: target_id, type: VARCHAR(64), constraints: [NOT_NULL] }
      - { name: reason, type: VARCHAR(32), constraints: [NOT_NULL] }
      - { name: description, type: TEXT }
      - { name: status, type: VARCHAR(16), constraints: [NOT_NULL], default: "'pending'" }
      - { name: reviewer_id, type: VARCHAR(36) }
      - { name: resolution, type: VARCHAR(32) }
      - { name: created_at, type: TIMESTAMPTZ, constraints: [NOT_NULL], default: NOW() }
      - { name: resolved_at, type: TIMESTAMPTZ }
    indexes:
      - { name: idx_reports_target, columns: [target_type, target_id] }
      - { name: idx_reports_status, columns: [status, created_at] }
      - { name: idx_reports_reporter, columns: [reporter_id] }
