version: 1
entity: FollowEdge

service:
  name: user-service
  domain: user

api_routes:
  - method: POST
    path: /v1/user/sub-accounts/{targetSubAccountId}/follow
    operation: FollowUser
    description: 关注公开主体（subAccount 级别）
    request_entity: FollowCommandRequest
    request_fields: [actorSubAccountId, source, clientRequestId]
    response_entity: FollowCommandResult
    response_fields: [actorSubAccountId, targetSubAccountId, relationState, idempotentReplay, updatedAt]

  - method: DELETE
    path: /v1/user/sub-accounts/{targetSubAccountId}/follow
    operation: UnfollowUser
    description: 取消关注公开主体（subAccount 级别）

  - method: GET
    path: /v1/user/sub-accounts/{subAccountId}/following
    operation: ListFollowing
    description: 关注列表（按 subAccount 读取）
    query_params: [cursor, limit]
    response_entity: FollowingListItemView
    response_fields: [subAccountId, username, displayName, avatarUrl, profileVisibility, relationState, followedAt]

  - method: GET
    path: /v1/user/sub-accounts/{subAccountId}/followers
    operation: ListFollowers
    description: 粉丝列表（按 subAccount 读取）
    query_params: [cursor, limit]
    response_entity: FollowerListItemView
    response_fields: [subAccountId, username, displayName, avatarUrl, profileVisibility, relationState, followedAt]

  - method: GET
    path: /v1/user/sub-accounts/{subAccountId}/relationship
    operation: GetRelationship
    description: 关系查询（subAccount 级别的基础关系态）
    response_entity: RelationshipView
    response_fields: [viewerSubAccountId, targetSubAccountId, relationState, isBlocked, isBlockedBy]

  - method: GET
    path: /v1/user/sub-accounts/{subAccountId}/relationship/capability
    operation: GetRelationshipCapability
    description: "关系能力位投影（统一真相源）。基于 FollowEdge + BlockEdge + ProfileSubject 计算 relationState 与消息/通话能力。端侧用户主页按钮矩阵和 RTC 门禁直接消费。"
    response_entity: RelationshipCapabilityView
    response_fields: [viewerSubAccountId, targetSubAccountId, relationState, canFollow, canUnfollow, canMessage, canFollowBack, canStartVoiceCall, canStartVideoCall, isBlocked, isBlockedBy]

consumers:
  - name: app
    capabilities: [follow, unfollow, list_following, list_followers, check_relationship]
  - name: recommendation-engine
    capabilities: [read_graph]
  - name: notification-service
    capabilities: [read_follow]

contract_test:
  mock_strategy:
    app_side:
      mock_target: user-service API (follow)
      data_source: fields.yaml
      scenarios:
        - name: follow_unfollow_toggle
          routes:
            - POST /v1/user/sub-accounts/{targetSubAccountId}/follow
            - DELETE /v1/user/sub-accounts/{targetSubAccountId}/follow
          assertions: [follow_created, follow_removed, idempotent]

        - name: mutual_follow_detection
          route: GET /v1/user/sub-accounts/{subAccountId}/relationship
          assertions: [status_200, mutual_flag_correct]

        - name: follower_list_pagination
          route: GET /v1/user/sub-accounts/{subAccountId}/followers
          assertions: [status_200, cursor_pagination_works]

    service_side:
      description: 使用真实测试数据库，不 mock 存储层
      real_engines:
        mongodb: testcontainers (mongo:7)
      spy_targets: [event_publisher]
      mock_targets: [user_service_client]
      data_management:
        seed: fixture 工厂预制到真实 MongoDB
        cleanup: "db.follow_edges.DeleteMany(ctx, bson.D{})"
      scenarios:
        - name: follow_with_counter_sync
          command: FollowUser
          seed: []
          assertions:
            - "db.follow_edges.FindOne({followerId, followeeId}) → document exists"
            - "eventSpy.AssertPublished('UserFollowed', {followerId, followeeId, source})"

        - name: unfollow
          command: UnfollowUser
          seed: [fixture.NewFollowEdge()]
          assertions:
            - "db.follow_edges.FindOne({followerId, followeeId}) → not found"
            - "eventSpy.AssertPublished('UserUnfollowed')"

        - name: duplicate_follow_idempotent
          command: FollowUser x2 (same pair)
          seed: []
          assertions:
            - "db.follow_edges.CountDocuments({followerId, followeeId}) → exactly 1"
            - "no error on second call"

  coverage_requirements:
    - idempotency tested
    - counter sync verified
    - mutual follow scenario covered
