version: 1
entity: ContactDiscoveryRecord
backend: postgres

tables:
  contact_discovery_records:
    entity: ContactDiscoveryRecord
    pk: id
    fk: { column: owner_account_id, references: user_profiles.user_id, on_delete: CASCADE }
    columns:
      - { name: id, type: VARCHAR(64), constraints: [PK] }
      - { name: owner_account_id, type: VARCHAR(96), constraints: [NOT_NULL] }
      - { name: hashed_phones, type: "TEXT[]", constraints: [NOT_NULL] }
      - { name: matched_sub_account_ids, type: "TEXT[]" }
      - { name: status, type: VARCHAR(16), constraints: [NOT_NULL], default: "'pending'" }
      - { name: match_count, type: INTEGER, constraints: [NOT_NULL], default: 0 }
      - { name: expire_at, type: TIMESTAMPTZ, constraints: [NOT_NULL] }
      - { name: created_at, type: TIMESTAMPTZ, constraints: [NOT_NULL], default: NOW() }
      - { name: completed_at, type: TIMESTAMPTZ }
    indexes:
      - { name: idx_contact_discovery_owner, columns: [owner_account_id] }
      - { name: idx_contact_discovery_expire, columns: [expire_at] }
      - { name: idx_contact_discovery_status, columns: [status] }
