version: 1
domain: USER
entity: ContactDiscoveryRecord

errors:
  - code: USER.CONTACT.rate_limited
    kind: CONTACT
    reason: rate_limited
    http_status: 429
    recovery_action: retry
    recovery_after_seconds: 86400
    dart_const: contactDiscoveryRateLimited
    go_const: ErrContactDiscoveryRateLimited
    user_message:
      zh: "今日通讯录发现次数已达上限，请明日再试"
      en: "Daily contact discovery limit reached, please try again tomorrow"

  - code: USER.CONTACT.too_many_contacts
    kind: CONTACT
    reason: payload_too_large
    http_status: 400
    recovery_action: retry
    dart_const: tooManyContacts
    go_const: ErrTooManyContacts
    user_message:
      zh: "通讯录条目过多，单次最多支持 5000 条"
      en: "Too many contacts, maximum 5000 per request"

  - code: USER.CONTACT.not_found
    kind: CONTACT
    reason: not_found
    http_status: 404
    recovery_action: surface
    dart_const: contactDiscoveryNotFound
    go_const: ErrContactDiscoveryNotFound
    user_message:
      zh: "发现记录不存在或已过期"
      en: "Discovery record not found or expired"
