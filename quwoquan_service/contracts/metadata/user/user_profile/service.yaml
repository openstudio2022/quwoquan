version: 1
aggregate: UserProfile

service:
  name: user-service
  domain: user
  owner: backend-team
  description: 用户档案、认证、设备、设置与分身管理

api_routes:
  # ── 认证（OwnerAccount 主控） ──────────────────────────────────────────────

  - method: POST
    path: /v1/auth/login/phone
    operation: LoginWithPhone
    description: 手机号 + OTP 登录，创建或恢复 OwnerAccount
    auth_required: false
    request_fields: [phone, otpCode, deviceId, platform]
    response_fields: [accessToken, refreshToken, ownerId, activeSub, subAccountCount]

  - method: POST
    path: /v1/auth/login/wechat
    operation: LoginWithWechat
    description: 微信授权码登录
    auth_required: false
    request_fields: [wechatCode, deviceId, platform]
    response_fields: [accessToken, refreshToken, ownerId, activeSub, subAccountCount]

  - method: POST
    path: /v1/auth/login/apple
    operation: LoginWithApple
    description: Apple ID token 登录
    auth_required: false
    request_fields: [appleIdToken, deviceId, platform]
    response_fields: [accessToken, refreshToken, ownerId, activeSub, subAccountCount]

  - method: POST
    path: /v1/auth/token/refresh
    operation: RefreshToken
    description: 刷新 access token（滑动延期）
    auth_required: false
    request_fields: [refreshToken]
    response_fields: [accessToken, refreshToken]

  - method: POST
    path: /v1/auth/logout
    operation: Logout
    description: 登出（吊销 refresh token）
    request_fields: [deviceId]

  # ── 凭证管理（OwnerAccount 视图，需登录） ────────────────────────────────

  - method: GET
    path: /v1/owner/credentials
    operation: ListCredentials
    description: 查看已绑定的凭证列表（脱敏展示）
    response_entity: CredentialBinding
    response_fields: [id, credentialType, displayLabel, isActive, boundAt]

  - method: POST
    path: /v1/owner/credentials/bind
    operation: BindCredential
    description: 绑定新凭证（phone/wechat/apple）
    request_fields: [credentialType, verificationPayload]

  - method: DELETE
    path: /v1/owner/credentials/{credentialType}
    operation: UnbindCredential
    description: 解绑凭证（不能解绑最后一个）

  # ── 子账号管理（OwnerAccount 视图，需登录） ──────────────────────────────

  - method: GET
    path: /v1/owner/sub-accounts
    operation: ListSubAccounts
    description: 查看自己所有子账号列表
    response_entity: PersonaManagementItemView
    response_fields: [profileSubjectId, subAccountId, displayName, avatarUrl, backgroundUrl, bio, isolationLevel, isActive, isPrimary, inheritsFromOwner, profileVisibility, purposeHint, hasAttributedHistory, updatedAt]

  - method: GET
    path: /v1/owner/sub-accounts/summary
    operation: GetPersonaManagementSummary
    description: 获取分身管理台摘要（数量、配额、主分身与当前激活分身）
    response_entity: PersonaManagementQuotaView
    response_fields: [ownerUserId, totalCount, quotaLimit, remainingCount, activeProfileSubjectId, primaryProfileSubjectId]

  - method: GET
    path: /v1/owner/sub-accounts/active
    operation: GetActivePersonaContext
    description: 获取当前激活分身上下文快照（供跨域动作主体透传）
    response_entity: ActivePersonaContextView
    response_fields: [ownerUserId, profileSubjectId, subAccountId, isolationLevel, profileVisibility, contextVersion, switchedAt]

  - method: POST
    path: /v1/owner/sub-accounts
    operation: CreateSubAccount
    description: 创建新子账号
    request_entity: Persona
    request_fields: [displayName, avatarUrl, backgroundUrl, bio, isolationLevel, purposeHint]
    response_entity: PersonaManagementItemView
    response_fields: [profileSubjectId, subAccountId, displayName, avatarUrl, backgroundUrl, bio, isolationLevel, isActive, isPrimary, inheritsFromOwner, profileVisibility, purposeHint, hasAttributedHistory, updatedAt]

  - method: PATCH
    path: /v1/owner/sub-accounts/{subAccountId}
    operation: UpdateSubAccount
    description: 更新子账号资料或隔离等级
    request_entity: ProfileSubjectMutation
    request_fields: [displayName, avatarUrl, backgroundUrl, bio, callerRingtoneId, isolationLevel, purposeHint, profileVisibility, applyScope, syncTargetIds, fieldsMask]
    response_entity: PersonaManagementItemView
    response_fields: [profileSubjectId, subAccountId, displayName, avatarUrl, backgroundUrl, bio, isolationLevel, isActive, isPrimary, inheritsFromOwner, profileVisibility, purposeHint, hasAttributedHistory, updatedAt]

  - method: GET
    path: /v1/owner/sub-accounts/{subAccountId}/lifecycle-guard
    operation: GetSubAccountLifecycleGuard
    description: 获取该分身当前可否删除/退役的保护状态
    response_entity: PersonaLifecycleGuardView
    response_fields: [profileSubjectId, requestedAction, allowed, reason, hasAttributedHistory, requiresSuccessor]

  - method: DELETE
    path: /v1/owner/sub-accounts/{subAccountId}
    operation: DeleteSubAccount
    description: 删除子账号（兼容入口；空白分身可删，有历史归因的分身应使用退役契约）

  - method: POST
    path: /v1/owner/sub-accounts/{subAccountId}:retire
    operation: RetireSubAccount
    description: 退役已有历史归因的分身，保留历史对象作者归因
    response_entity: PersonaLifecycleGuardView
    response_fields: [profileSubjectId, requestedAction, allowed, reason, hasAttributedHistory, requiresSuccessor]

  - method: POST
    path: /v1/owner/sub-accounts/{subAccountId}:delete-empty
    operation: DeleteEmptySubAccount
    description: 删除无历史归因的空白分身

  - method: POST
    path: /v1/owner/sub-accounts/{subAccountId}/activate
    operation: ActivateSubAccount
    description: 切换激活子账号（强一致，排他写）
    response_entity: ActivePersonaContextView
    response_fields: [ownerUserId, profileSubjectId, subAccountId, isolationLevel, profileVisibility, contextVersion, switchedAt]

  # ── 用户主页（SubAccount 公开视图） ──────────────────────────────────────

  - method: GET
    path: /v1/user/{subAccountId}
    operation: GetSubAccountProfile
    description: 公开用户主页（按 subAccountId 读取）
    response_entity: ProfileSubjectView
    response_fields: [profileSubjectId, ownerUserId, subjectType, subAccountId, username, displayName, avatarUrl, backgroundUrl, bio, followerCount, followingCount, postCount, circleCount, likeCount, profileVisibility, inheritsFromOwner, overriddenFields, updatedAt]
    note: 不暴露 ownerId / userId，isolationLevel=strict 时返回 404

  - method: GET
    path: /v1/me
    operation: GetMeProfile
    description: 当前激活子账号快捷视图（等同于 GetSubAccountProfile(activeSub)）
    response_entity: ProfileSubjectView
    response_fields: [profileSubjectId, ownerUserId, subjectType, subAccountId, username, displayName, avatarUrl, backgroundUrl, bio, followerCount, followingCount, postCount, circleCount, likeCount, profileVisibility, inheritsFromOwner, overriddenFields, updatedAt]

  # ── 原有 API（保持兼容，逐步迁移到上方路径） ──────────────────────────────

  - method: GET
    path: /v1/user/profile/{userId}
    operation: GetUserProfile
    description: "[已有] 主控账号档案读取（内部使用，ownerAccount 视角）"
    response_entity: UserProfile
    join_path: owner_full_snapshot
    deprecated: false

  - method: PATCH
    path: /v1/user/profile
    operation: UpdateUserProfile
    description: "[已有] 更新主控账号资料"
    request_entity: ProfileSubjectMutation
    request_fields: [nickname, displayName, avatarUrl, backgroundUrl, bio, gender, birthDate, region, profileVisibility, applyScope, syncTargetIds, fieldsMask]

  - method: GET
    path: /v1/user/personas
    operation: ListPersonas
    description: "[已有] 子账号列表（向后兼容，等同于 ListSubAccounts）"
    response_entity: Persona
    response_fields: [id, subAccountId, displayName, avatarUrl, backgroundUrl, bio, isolationLevel, isActive, isPrimary, inheritsProfileFromOwner]

  - method: POST
    path: /v1/user/personas
    operation: CreatePersona
    description: "[已有] 创建子账号（向后兼容）"
    request_entity: Persona
    request_fields: [displayName, avatarUrl, backgroundUrl, bio, isolationLevel, purposeHint]

  - method: PATCH
    path: /v1/user/personas/{personaId}
    operation: UpdatePersona
    description: "[已有] 更新子账号（向后兼容）"
    request_entity: ProfileSubjectMutation
    request_fields: [displayName, avatarUrl, backgroundUrl, bio, callerRingtoneId, isolationLevel, purposeHint, profileVisibility, applyScope, syncTargetIds, fieldsMask]

  - method: DELETE
    path: /v1/user/personas/{personaId}
    operation: DeletePersona
    description: "[已有] 删除子账号（向后兼容）"

  - method: POST
    path: /v1/user/personas/{personaId}/activate
    operation: ActivatePersona
    description: "[已有] 激活子账号（向后兼容）"

  - method: GET
    path: /v1/user/settings/notifications
    operation: GetNotificationSettings
    response_entity: UserSetting

  - method: PATCH
    path: /v1/user/settings/notifications
    operation: UpdateNotificationSettings
    request_entity: UserSetting

  - method: GET
    path: /v1/user/settings/privacy
    operation: GetPrivacySettings
    response_entity: UserSetting

  - method: PATCH
    path: /v1/user/settings/privacy
    operation: UpdatePrivacySettings
    request_entity: UserSetting

  - method: GET
    path: /v1/user/settings/calls
    operation: GetCallSettings
    description: 获取来电与铃声设置
    response_entity: UserSetting
    response_fields: [defaultIncomingCallRingtoneId, allowCallerRingtoneOverride, enableCallVibration, enableGroupCallRing]

  - method: PATCH
    path: /v1/user/settings/calls
    operation: UpdateCallSettings
    description: 更新来电与铃声设置（仅支持官方铃声库 ID）
    request_entity: UserSetting
    request_fields: [defaultIncomingCallRingtoneId, allowCallerRingtoneOverride, enableCallVibration, enableGroupCallRing]

  - method: GET
    path: /v1/user/settings/appearance
    operation: GetAppearanceSettings
    description: 获取 owner 默认值与当前子账号 override 聚合后的外观与字号设置
    response_entity: AppearanceSettingsView
    response_fields: [themeMode, fontSizePreset, source, ownerDefaultThemeMode, ownerDefaultFontSizePreset, hasSubAccountOverride, version, updatedAt]

  - method: PATCH
    path: /v1/user/settings/appearance
    operation: UpdateAppearanceSettings
    description: 更新外观与字号设置；支持全账号同步、当前子账号覆盖、恢复继承 owner 默认
    request_entity: AppearanceSettingsMutation
    request_fields: [themeMode, fontSizePreset, applyScope]
    response_entity: AppearanceSettingsView
    response_fields: [themeMode, fontSizePreset, source, ownerDefaultThemeMode, ownerDefaultFontSizePreset, hasSubAccountOverride, version, updatedAt]

  - method: GET
    path: /v1/users/{userId}/works
    operation: ListUserWorks
    description: 用户作品集列表（用户主页-创作 Tab 作品子分类）
    query_params: [cursor, limit]
    response_entity: UserWork

  - method: GET
    path: /v1/users/{userId}/life-items
    operation: ListUserLifeItems
    description: 用户生活记录列表（用户主页-生活 Tab）
    query_params: [category, cursor, limit]
    response_entity: UserLifeItem

  - method: GET
    path: /v1/users/{userId}/likes
    operation: ListUserLikes
    description: 用户获赞列表（用户主页-统计-获赞）
    query_params: [cursor, limit]

  - method: POST
    path: /v1/user/devices/push-tokens
    operation: RegisterDevice
    request_entity: UserDevice

  - method: POST
    path: /v1/user/profile/proposals/{id}/confirm
    operation: ConfirmProposal
    description: 确认资料修改提案

  - method: POST
    path: /v1/user/profile/proposals/{id}/apply
    operation: ApplyProposal
    description: 应用资料修改提案

  - method: POST
    path: /v1/user/profile/proposals/{id}/reject
    operation: RejectProposal
    description: 拒绝资料修改提案

consumers:
  - name: app
    capabilities: [read_profile, write_profile, manage_persona, manage_settings, manage_device]
  - name: platform-ops
    capabilities: [read_profile, write_status, review_proposals]
  - name: recommendation-engine
    capabilities: [read_profile, read_tags]
  - name: assistant-service
    capabilities: [read_profile, read_settings, create_proposals]
  - name: notification-service
    capabilities: [read_device, read_settings]

contract_test:
  description: |
    基于接口契约的隔离测试：端侧 mock 云端、服务侧 mock 外部依赖。
    元数据驱动：从 fields.yaml + service.yaml 自动生成 mock 数据和断言。

  mock_strategy:
    app_side:
      description: App 自身不依赖云端的测试
      mock_target: user-service API
      data_source: fields.yaml
      generation: 从 fields.yaml 生成符合 constraints/classification 的 mock JSON
      scenarios:
        - name: get_profile_success
          route: GET /v1/user/profile/{userId}
          mock_response: auto_from_fields
          assertions: [status_200, response_matches_schema, pii_fields_filtered]

        - name: update_profile_success
          route: PATCH /v1/user/profile
          mock_request: auto_from_writable_fields
          assertions: [status_200, updated_fields_reflected]

        - name: persona_activate
          route: POST /v1/user/personas/{personaId}/activate
          assertions: [status_200, only_one_active]

        - name: login_flow
          route: POST /v1/user/auth/login
          assertions: [status_200, tokens_returned]

        - name: proposal_state_machine
          routes:
            - POST /v1/user/profile/proposals/{id}/confirm
            - POST /v1/user/profile/proposals/{id}/apply
          assertions: [status_transitions_valid]

        - name: get_appearance_settings
          route: GET /v1/user/settings/appearance
          mock_response: auto_from_fields
          assertions: [status_200, response_matches_schema]

        - name: update_appearance_settings
          route: PATCH /v1/user/settings/appearance
          mock_request: auto_from_writable_fields
          assertions: [status_200, updated_fields_reflected]

    service_side:
      description: 服务只依赖自身，使用真实测试数据库，不 mock 存储层
      real_engines:
        postgres: embedded-postgres
        redis: miniredis/v2
      spy_targets: [event_publisher]
      mock_targets: [cross_service_clients]
      data_management:
        seed: 从 fields.yaml 生成 fixture 工厂预制到真实 PG
        cleanup: TRUNCATE user_profiles, personas, user_auth, user_devices, user_settings, profile_update_proposals CASCADE
        redis_cleanup: miniredis.FlushAll()
      scenarios:
        - name: create_user_aggregate
          command: RegisterUser
          seed: [fixture.NewUserAuth()]
          assertions:
            - "SELECT * FROM user_profiles WHERE user_id = ? → row exists"
            - "SELECT * FROM user_auth WHERE user_id = ? → row exists"
            - "SELECT * FROM user_settings WHERE user_id = ? → defaults correct"
            - "eventSpy.AssertPublished('UserRegistered', {userId, nickname})"

        - name: update_profile_version
          command: UpdateUserProfile
          seed: [fixture.NewUserProfile()]
          assertions:
            - "SELECT profile_version FROM user_profiles → incremented by 1"
            - "miniredis.Get('cache:user_profile:{id}') → key deleted (invalidated)"
            - "eventSpy.AssertPublished('UserProfileUpdated', {userId, profileVersion})"

        - name: persona_activation_exclusivity
          command: ActivatePersona
          seed: [fixture.NewUserProfile(), fixture.NewPersona(active=true), fixture.NewPersona(active=false)]
          assertions:
            - "SELECT COUNT(*) FROM personas WHERE user_id=? AND is_active=true → exactly 1"
            - "SELECT id FROM personas WHERE is_active=true → matches new persona ID"
            - "eventSpy.AssertPublished('PersonaActivated', {userId, id})"

        - name: proposal_state_machine
          command: ConfirmProposal → ApplyProposal
          seed: [fixture.NewUserProfile(), fixture.NewProfileUpdateProposal(status='created')]
          assertions:
            - "SELECT status FROM profile_update_proposals → 'confirmed' after confirm"
            - "SELECT version FROM profile_update_proposals → incremented"
            - "SELECT status FROM profile_update_proposals → 'applied' after apply"
            - "SELECT nickname FROM user_profiles → matches proposedChanges"
            - "eventSpy.AssertPublished('ProfileProposalResolved')"

        - name: update_appearance_all_accounts
          command: UpdateAppearanceSettings(applyScope='all_accounts')
          seed: [fixture.NewUserProfile(), fixture.NewUserSetting(), fixture.NewPersona(active=true), fixture.NewPersona(active=false)]
          assertions:
            - "SELECT default_theme_mode, default_font_size_preset FROM user_settings WHERE user_id=? → updated to requested values"
            - "SELECT theme_mode_override, font_size_preset_override FROM personas WHERE user_id=? → all NULL"
            - "SELECT appearance_version FROM user_settings WHERE user_id=? → incremented by 1"
            - "eventSpy.AssertPublished('UserAppearanceSettingsChanged', {userId, version})"

        - name: update_appearance_current_sub_account
          command: UpdateAppearanceSettings(applyScope='current_sub_account')
          seed: [fixture.NewUserProfile(), fixture.NewUserSetting(), fixture.NewPersona(active=true)]
          assertions:
            - "SELECT theme_mode_override, font_size_preset_override FROM personas WHERE user_id=? AND is_active=true → updated to requested values"
            - "SELECT default_theme_mode, default_font_size_preset FROM user_settings WHERE user_id=? → unchanged"
            - "GET /v1/user/settings/appearance → source='sub_override'"

        - name: login_fail_lockout
          command: Login (5x wrong password)
          seed: [fixture.NewUserProfile(), fixture.NewUserAuth()]
          assertions:
            - "SELECT login_fail_count FROM user_auth → 5"
            - "SELECT locked_until FROM user_auth → NOT NULL, future timestamp"
            - "miniredis.Get('login_fail:{userId}') → count exists"

  coverage_requirements:
    - all api_routes have at least one scenario
    - all state_machine transitions covered
    - all unique_constraints have violation test
    - all SECRET fields verified not exposed in API responses
    - all events verified published with correct payload_fields
