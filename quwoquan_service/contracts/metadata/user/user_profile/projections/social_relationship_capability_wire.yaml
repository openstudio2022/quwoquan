version: 1
read_model: SocialRelationshipCapabilityWire

description: |
  社交关系能力位 wire（搜索结果嵌套 capability、关系接口归一化子结构）。

source_entities:
  - UserProfile

consumers:
  - app

client_projection:
  dart_class: SocialRelationshipCapabilityWireDto
  base_class: ""
  output_path: cloud/runtime/generated/user/social_relationship_capability_wire_dto.g.dart
  fields:
    - name: relationState
      dart_type: String
      nullable: false
      source: relationState
      aliases: [relationState, relationshipState]
      default: "'not_following'"

    - name: canFollow
      dart_type: bool
      nullable: false
      source: canFollow
      aliases: [canFollow]
      default: "false"

    - name: canUnfollow
      dart_type: bool
      nullable: false
      source: canUnfollow
      aliases: [canUnfollow]
      default: "false"

    - name: canOpenConversation
      dart_type: bool
      nullable: false
      source: canOpenConversation
      aliases: [canOpenConversation]
      default: "false"

    - name: canStartVoiceCall
      dart_type: bool
      nullable: false
      source: canStartVoiceCall
      aliases: [canStartVoiceCall]
      default: "false"

    - name: canStartVideoCall
      dart_type: bool
      nullable: false
      source: canStartVideoCall
      aliases: [canStartVideoCall]
      default: "false"
