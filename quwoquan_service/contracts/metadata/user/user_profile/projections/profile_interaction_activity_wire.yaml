version: 1
read_model: ProfileInteractionActivityWire

description: |
  互动列表（收到/发出）行 wire，与 ProfileInteractionActivityViewData 对齐。

source_entities:
  - UserProfile

consumers:
  - app

client_projection:
  dart_class: ProfileInteractionActivityWireDto
  base_class: ""
  output_path: cloud/runtime/generated/user/profile_interaction_activity_wire_dto.g.dart
  fields:
    - name: activityId
      dart_type: String
      nullable: false
      source: activityId
      aliases: [activityId, id]
      default: "''"

    - name: activityType
      dart_type: String
      nullable: false
      source: activityType
      aliases: [activityType, contentType]
      default: "''"

    - name: direction
      dart_type: String
      nullable: false
      source: direction
      aliases: [direction]
      default: "'received'"

    - name: actorProfileSubjectId
      dart_type: String
      nullable: false
      source: actorProfileSubjectId
      aliases: [actorProfileSubjectId, userId]
      default: "''"

    - name: actorDisplayName
      dart_type: String
      nullable: false
      source: actorDisplayName
      aliases: [actorDisplayName, nickname, displayName]
      default: "''"

    - name: actorAvatarUrl
      dart_type: String
      nullable: false
      source: actorAvatarUrl
      aliases: [actorAvatarUrl, avatarUrl]
      default: "''"

    - name: targetProfileSubjectId
      dart_type: String
      nullable: false
      source: targetProfileSubjectId
      aliases: [targetProfileSubjectId, targetUserId]
      default: "''"

    - name: targetContentId
      dart_type: String
      nullable: false
      source: targetContentId
      aliases: [targetContentId, postId]
      default: "''"

    - name: targetContentType
      dart_type: String
      nullable: false
      source: targetContentType
      aliases: [targetContentType, contentType]
      default: "''"

    - name: targetContentSummary
      dart_type: String
      nullable: false
      source: targetContentSummary
      aliases: [targetContentSummary, targetTitle]
      default: "''"

    - name: createdAt
      dart_type: DateTime
      nullable: true
      source: createdAt
      aliases: [createdAt]
      default: "null"
