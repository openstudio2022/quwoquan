version: 1
read_model: PersonaLifecycleGuardWire

description: |
  子账号生命周期守卫 wire（getSubAccountLifecycleGuard）。

source_entities:
  - UserProfile

consumers:
  - app

client_projection:
  dart_class: PersonaLifecycleGuardWireDto
  base_class: ""
  output_path: cloud/runtime/generated/user/persona_lifecycle_guard_wire_dto.g.dart
  fields:
    - name: subAccountId
      dart_type: String
      nullable: false
      source: subAccountId
      aliases: [subAccountId, personaId, id]
      default: "''"
    - name: canDelete
      dart_type: bool
      nullable: false
      source: canDelete
      aliases: [canDelete]
      default: "false"
    - name: canRetire
      dart_type: bool
      nullable: false
      source: canRetire
      aliases: [canRetire]
      default: "false"
    - name: requiredAction
      dart_type: String
      nullable: false
      source: requiredAction
      aliases: [requiredAction, lifecycleAction]
      default: "''"
    - name: reasonCode
      dart_type: String
      nullable: false
      source: reasonCode
      aliases: [reasonCode, guardReason]
      default: "''"
    - name: message
      dart_type: String
      nullable: false
      source: message
      aliases: [message, userMessage, reasonMessage]
      default: "''"
