version: 1
read_model: OwnerCredentialRow

description: |
  GET /v1/owner/credentials 列表行 wire，与 user_profile/service.yaml
  ListCredentials 的 response_fields 对齐。

source_entities:
  - CredentialBinding

consumers:
  - app

client_projection:
  dart_class: OwnerCredentialRowDto
  base_class: ""
  output_path: cloud/runtime/generated/user/owner_credential_row_dto.g.dart
  fields:
    - name: id
      dart_type: String
      nullable: false
      source: id
      aliases: [id]
      default: "''"

    - name: credentialType
      dart_type: String
      nullable: false
      source: credentialType
      aliases: [credentialType]
      default: "''"

    - name: displayLabel
      dart_type: String
      nullable: false
      source: displayLabel
      aliases: [displayLabel]
      default: "''"

    - name: isActive
      dart_type: bool
      nullable: false
      source: isActive
      aliases: [isActive]
      default: "false"

    - name: boundAt
      dart_type: DateTime
      nullable: false
      source: boundAt
      aliases: [boundAt]
      default: "DateTime(0)"
