version: 1
read_model: ProfileSubjectWire

description: |
  GET /me/profile 与分身档案 GET 响应体 wire，与 App ProfileSubjectViewData 字段对齐。
  解码后由 ProfileSubjectViewData.fromProfileSubjectWire 做展示名回退（nickname / subjectId）。

source_entities:
  - UserProfile

consumers:
  - app

client_projection:
  dart_class: ProfileSubjectWireDto
  base_class: ""
  output_path: cloud/runtime/generated/user/profile_subject_wire_dto.g.dart
  fields:
    - name: profileSubjectId
      dart_type: String
      nullable: false
      source: profileSubjectId
      aliases: [subAccountId, userId]
      default: "''"
      skip_empty_string_aliases: true

    - name: ownerUserId
      dart_type: String
      nullable: false
      source: ownerUserId
      aliases: [userId]
      default: "''"
      skip_empty_string_aliases: true

    - name: subAccountId
      dart_type: String
      nullable: false
      source: subAccountId
      aliases: [subAccountId]
      default: "''"

    - name: nickname
      dart_type: String
      nullable: false
      source: nickname
      aliases: [nickname]
      default: "''"

    - name: displayName
      dart_type: String
      nullable: false
      source: displayName
      aliases: [displayName, nickname]
      default: "''"

    - name: username
      dart_type: String
      nullable: false
      source: username
      aliases: [username, nickname]
      default: "''"

    - name: subjectType
      dart_type: String
      nullable: false
      source: subjectType
      aliases: [subjectType]
      default: "''"

    - name: avatarUrl
      dart_type: String
      nullable: false
      source: avatarUrl
      aliases: [avatarUrl]
      default: "''"

    - name: backgroundUrl
      dart_type: String
      nullable: false
      source: backgroundUrl
      aliases: [backgroundUrl, backgroundImage]
      default: "''"

    - name: bio
      dart_type: String
      nullable: false
      source: bio
      aliases: [bio]
      default: "''"

    - name: followerCount
      dart_type: int
      nullable: false
      source: followerCount
      aliases: [followerCount]
      default: "0"

    - name: followingCount
      dart_type: int
      nullable: false
      source: followingCount
      aliases: [followingCount]
      default: "0"

    - name: postCount
      dart_type: int
      nullable: false
      source: postCount
      aliases: [postCount]
      default: "0"

    - name: circleCount
      dart_type: int
      nullable: false
      source: circleCount
      aliases: [circleCount]
      default: "0"

    - name: likeCount
      dart_type: int
      nullable: false
      source: likeCount
      aliases: [likeCount]
      default: "0"

    - name: profileVisibility
      dart_type: String
      nullable: false
      source: profileVisibility
      aliases: [profileVisibility]
      default: "'public'"

    - name: inheritsFromOwner
      dart_type: bool
      nullable: false
      source: inheritsFromOwner
      aliases: [inheritsFromOwner]
      default: "false"

    - name: overriddenFields
      dart_type: List<String>
      nullable: true
      source: overriddenFields
      aliases: [overriddenFields]
      default: "null"

    - name: updatedAt
      dart_type: DateTime
      nullable: true
      source: updatedAt
      aliases: [updatedAt]
      default: "null"
