version: 1
read_model: PersonaManagementItemWire

description: |
  分身/子账号列表行 wire，与 PersonaManagementItemViewData 对齐。

source_entities:
  - UserProfile

consumers:
  - app

client_projection:
  dart_class: PersonaManagementItemWireDto
  base_class: ""
  output_path: cloud/runtime/generated/user/persona_management_item_wire_dto.g.dart
  fields:
    - name: subAccountId
      dart_type: String
      nullable: false
      source: subAccountId
      aliases: [subAccountId, personaId, id]
      default: "''"

    - name: profileSubjectId
      dart_type: String
      nullable: false
      source: profileSubjectId
      aliases: [profileSubjectId, subAccountId]
      default: "''"

    - name: displayName
      dart_type: String
      nullable: false
      source: displayName
      aliases: [displayName, nickname]
      default: "''"

    - name: avatarUrl
      dart_type: String
      nullable: false
      source: avatarUrl
      aliases: [avatarUrl, avatar]
      default: "''"

    - name: isolationLevel
      dart_type: String
      nullable: false
      source: isolationLevel
      aliases: [isolationLevel]
      default: "'open'"

    - name: profileVisibility
      dart_type: String
      nullable: false
      source: profileVisibility
      aliases: [profileVisibility]
      default: "'public'"

    - name: isPrimary
      dart_type: bool
      nullable: false
      source: isPrimary
      aliases: [isPrimary]
      default: "false"

    - name: isActive
      dart_type: bool
      nullable: false
      source: isActive
      aliases: [isActive]
      default: "false"

    - name: hasAttributedHistory
      dart_type: bool
      nullable: false
      source: hasAttributedHistory
      aliases: [hasAttributedHistory]
      default: "false"

    - name: hasPublishedContent
      dart_type: bool
      nullable: false
      source: hasPublishedContent
      aliases: [hasPublishedContent]
      default: "false"

    - name: subjectType
      dart_type: String
      nullable: false
      source: subjectType
      aliases: [subjectType]
      default: "'sub_account'"
