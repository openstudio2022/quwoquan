version: 1
aggregate: UserProfile

# 语义说明：
#   UserProfile = OwnerAccount（主控账号，管理平面）
#   Persona     = SubAccount（子账号，应用平面，强隔离）

entities:
  UserProfile:
    description: 主控账号（OwnerAccount）——登录凭证、设备、恢复、子账号的管理容器
    fields:
      - name: userId
        type: string
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        description: 全局唯一用户 ID

      - name: phone
        type: string
        constraints: [UK, NOT_NULL]
        classification: PII
        log_policy: mask
        api_exposure: drop
        ops_exposure: mask
        recommend_feature: false
        description: 手机号（登录凭证）

      - name: nickname
        type: string
        constraints: [UK, NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        search_field: true
        description: 昵称

      - name: avatarUrl
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        recommend_feature: false

      - name: bio
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        recommend_feature: true
        search_field: true
        description: 个人签名

      - name: gender
        type: enum
        enum_ref: Gender
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: read_write
        ops_exposure: mask
        recommend_feature: true

      - name: birthDate
        type: date
        constraints: [NULLABLE]
        classification: PII
        log_policy: drop
        api_exposure: read_write
        ops_exposure: drop
        recommend_feature: false

      - name: region
        type: string
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: read
        ops_exposure: read
        recommend_feature: true
        description: 地区（ipResidenceProfile 落库）

      - name: status
        type: enum
        enum_ref: UserStatus
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write
        recommend_feature: false
        observe_metric: user_status_gauge

      - name: profileVersion
        type: int
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        description: 画像快照版本号（端侧增量校验）

      - name: followerCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: followingCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: postCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: circleCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        description: 已加入圈子数（由 circle-service 成员变更事件驱动更新）

      - name: likeCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true
        description: 获赞总数（由 content-service 点赞事件驱动更新）

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: ownerDisplayName
        type: string
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: drop
        ops_exposure: read
        recommend_feature: false
        description: 主控账号管理视角名称（仅自己控制台可见，不对外展示）

      - name: subAccountCount
        type: int
        constraints: [NOT_NULL, DEFAULT_1]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        description: 当前持有子账号数量（冗余计数）

      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false

  Persona:
    description: 子账号（SubAccount）——应用内真实身份主体，强隔离，外部不可关联到同一 OwnerAccount
    fields:
      - name: id
        type: string
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: userId
        type: string
        constraints: [FK_user_profiles_CASCADE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: displayName
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: avatarUrl
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: callerRingtoneId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 发起实时通话时对外使用的官方呼叫铃声 ID；为空时回退平台默认铃声

      - name: themeModeOverride
        type: enum
        enum_ref: ThemeModeSetting
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 子账号对 owner 默认主题模式的覆盖；为空表示继承 owner 默认值

      - name: fontSizePresetOverride
        type: enum
        enum_ref: FontSizePreset
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 子账号对 owner 默认字号预设的覆盖；为空表示继承 owner 默认值

      - name: appearanceOverrideUpdatedAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 子账号 appearance override 最后更新时间

      - name: isPrimary
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: isPrivate
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: isActive
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: subAccountId
        type: string
        constraints: [NOT_NULL, UK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 全局唯一子账号 ID（跨域上下文引用标识，区别于 personas.id）

      - name: isolationLevel
        type: enum
        enum_ref: IsolationLevel
        constraints: [NOT_NULL]
        default_value: open
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: "隔离等级：open（公开可发现）/ semi（半隔离）/ strict（不对外暴露）"

      - name: purposeHint
        type: string
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: drop
        ops_exposure: read
        description: 用户自定义用途备注（仅主控账号视角可见）

      - name: inviteCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 该子账号发起的邀请转化数（冗余计数）

      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

    unique_constraints:
      - columns: [userId, isPrimary]
        condition: "isPrimary = true"
        description: 每主控账号恰好一个主子账号
      - columns: [userId, isActive]
        condition: "isActive = true"
        description: 每主控账号同时恰好一个激活子账号
      - columns: [subAccountId]
        description: 子账号 ID 全局唯一

    enums:
      IsolationLevel:
        values: [open, semi, strict]
        description: >
          open: 可被通讯录发现，可关注；
          semi: 可关注但不被通讯录推荐；
          strict: 完全不被外部发现，仅受邀可见

  CredentialBinding:
    description: 第三方凭证绑定（phone/wechat/apple 并行，各最多 1 个绑定到同一 OwnerAccount）
    cache_excluded: true
    fields:
      - name: id
        type: string
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: ownerId
        type: string
        constraints: [FK_user_profiles_CASCADE, NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
        description: 归属的主控账号 ID

      - name: credentialType
        type: enum
        enum_ref: CredentialType
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: "凭证类型：phone / wechat / apple"

      - name: credentialKey
        type: string
        constraints: [NOT_NULL]
        classification: SECRET
        log_policy: drop
        api_exposure: drop
        ops_exposure: drop
        description: 凭证唯一标识（手机号哈希/微信UnionID/Apple SubjectID）

      - name: displayLabel
        type: string
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: read
        ops_exposure: mask
        description: 用户可见的凭证标签（手机号脱敏显示，如 138****8888）

      - name: isActive
        type: bool
        constraints: [NOT_NULL, DEFAULT_TRUE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: boundAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: lastUsedAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

    unique_constraints:
      - columns: [credentialType, credentialKey]
        description: 同一凭证不能绑定两个 OwnerAccount（全局唯一）
      - columns: [ownerId, credentialType]
        description: 同一 OwnerAccount 每种凭证最多一个

    enums:
      CredentialType:
        values: [phone, wechat, apple]
        description: 支持的第三方凭证类型

    business_rules:
      - id: last_credential_protection
        description: OwnerAccount 至少保留 1 个 isActive=true 的凭证，不能全部解绑

  UserAuth:
    description: 认证凭证（安全隔离，不缓存到 Redis）
    cache_excluded: true
    fields:
      - name: userId
        type: string
        constraints: [PK, FK_user_profiles_CASCADE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: drop
        description: 1:1 关联

      - name: passwordHash
        type: string
        constraints: [NOT_NULL]
        classification: SECRET
        log_policy: drop
        api_exposure: drop
        ops_exposure: drop

      - name: otpSecret
        type: string
        constraints: [NULLABLE]
        classification: SECRET
        log_policy: drop
        api_exposure: drop
        ops_exposure: drop

      - name: refreshToken
        type: string
        constraints: [NULLABLE]
        classification: SECRET
        log_policy: drop
        api_exposure: drop
        ops_exposure: drop

      - name: refreshTokenExpiresAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: drop

      - name: lastLoginAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: lastLoginIp
        type: string
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: drop
        ops_exposure: mask

      - name: loginFailCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
        observe_metric: login_fail_counter

      - name: lockedUntil
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: drop

      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: drop

  UserDevice:
    description: 设备绑定与推送 token
    fields:
      - name: id
        type: string
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: userId
        type: string
        constraints: [FK_user_profiles_CASCADE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: deviceId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: write
        ops_exposure: read

      - name: platform
        type: enum
        enum_ref: Platform
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: write
        ops_exposure: read

      - name: pushToken
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: write
        ops_exposure: drop

      - name: appVersion
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: write
        ops_exposure: read

      - name: lastActiveAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

    unique_constraints:
      - columns: [userId, deviceId]
        description: 同用户同设备不重复注册

  UserSetting:
    description: 通知 + 隐私 + 来电设置
    fields:
      - name: userId
        type: string
        constraints: [PK, FK_user_profiles_CASCADE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 1:1 关联

      - name: enablePush
        type: bool
        constraints: [NOT_NULL, DEFAULT_TRUE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: enableMarketing
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: quietHoursStart
        type: time
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: quietHoursEnd
        type: time
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: defaultIncomingCallRingtoneId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 默认来电铃声 ID（仅支持官方铃声库）

      - name: allowCallerRingtoneOverride
        type: bool
        constraints: [NOT_NULL, DEFAULT_TRUE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 是否允许使用发起方配置的专属呼叫铃声替换默认铃声

      - name: enableCallVibration
        type: bool
        constraints: [NOT_NULL, DEFAULT_TRUE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 来电时是否振动

      - name: enableGroupCallRing
        type: bool
        constraints: [NOT_NULL, DEFAULT_TRUE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 群语音/视频邀请是否按来电方式响铃提醒

      - name: allowStrangerMsg
        type: bool
        constraints: [NOT_NULL, DEFAULT_TRUE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: profileVisibility
        type: enum
        enum_ref: ProfileVisibility
        constraints: [NOT_NULL, DEFAULT_PUBLIC]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: contentLanguage
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 内容语言偏好（超前）

      - name: feedPreference
        type: enum
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: recommend/chronological（超前）

      - name: assistantEnabled
        type: bool
        constraints: [NOT_NULL, DEFAULT_TRUE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 小趣助手开关

      - name: defaultThemeMode
        type: enum
        enum_ref: ThemeModeSetting
        constraints: [NOT_NULL]
        default_value: system
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: owner 默认主题模式

      - name: defaultFontSizePreset
        type: enum
        enum_ref: FontSizePreset
        constraints: [NOT_NULL]
        default_value: md
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: owner 默认字号预设

      - name: appearanceVersion
        type: int
        constraints: [NOT_NULL, DEFAULT_1]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: appearance 设置版本号（LWW 最终一致性判定基线）

      - name: appearanceUpdatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: owner 默认 appearance 最后更新时间

      - name: blockedKeywords
        type: "string[]"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 用户级内容屏蔽词（命中过滤，不参与公开画像）

      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

  AppearanceSettingsView:
    description: 聚合 owner 默认值与当前子账号 override 后的 appearance 快照
    fields:
      - name: themeMode
        type: enum
        enum_ref: ThemeModeSetting
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: fontSizePreset
        type: enum
        enum_ref: FontSizePreset
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: source
        type: enum
        enum_ref: AppearanceSource
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: ownerDefaultThemeMode
        type: enum
        enum_ref: ThemeModeSetting
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: ownerDefaultFontSizePreset
        type: enum
        enum_ref: FontSizePreset
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: hasSubAccountOverride
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: version
        type: int
        constraints: [NOT_NULL, DEFAULT_1]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

  AppearanceSettingsMutation:
    description: 写入外观与字号偏好的统一 mutation
    fields:
      - name: themeMode
        type: enum
        enum_ref: ThemeModeSetting
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: fontSizePreset
        type: enum
        enum_ref: FontSizePreset
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: applyScope
        type: enum
        enum_ref: AppearanceApplyScope
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 当前子账号 / 全部账号 / 恢复继承

  ProfileUpdateProposal:
    description: 资料修改提案（状态机 + 乐观锁）
    fields:
      - name: id
        type: string
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: userId
        type: string
        constraints: [FK_user_profiles_CASCADE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: source
        type: enum
        enum_ref: ProposalSource
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: proposedChanges
        type: jsonb
        constraints: [NOT_NULL]
        classification: SENSITIVE
        log_policy: mask
        api_exposure: read
        ops_exposure: read

      - name: status
        type: enum
        enum_ref: ProposalStatus
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write

      - name: reviewedBy
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: version
        type: int
        constraints: [NOT_NULL, DEFAULT_1]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: drop
        description: 乐观锁版本号

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: resolvedAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

    indexes:
      - columns: [userId, status]
        condition: "status IN ('created', 'confirmed')"
        description: 活跃提案快速查询

    state_machine:
      field: status
      transitions:
        - from: created
          to: [confirmed, rejected]
        - from: confirmed
          to: [applied, rejected]
      concurrency: optimistic_lock
      lock_field: version
