version: 1
aggregate: UserProfile

# 语义说明：
#   UserProfile = 用户根实体（owner）
#   Persona     = 子账号主体容器（内部实现仍沿用 Persona 命名，但只保留 subAccountId 作为主体 ID）

entities:
  UserProfile:
    description: 用户根实体——登录凭证、设备、恢复、审计与多分身管理容器
    fields:
      - name: userId
        type: string
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        description: 全局唯一 owner ID；匿名与注册账号都使用同一稳定主键规则

      - name: accountState
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write
        recommend_feature: false
        description: 账号生命周期状态：anonymous | active | suspended | deleted

      - name: identityOrigin
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        description: 首次创建来源：anonymous_device | phone | wechat | apple | migrated_seed

      - name: logicalShard
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        description: 固定逻辑槽位；由结构化 ownerId 生成并长期稳定

      - name: anonymousRetentionPolicy
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write
        recommend_feature: false
        description: 匿名痕迹保留策略；当前固定为 preserve

      - name: phone
        type: string
        constraints: [UK, NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: drop
        ops_exposure: mask
        recommend_feature: false
        description: 手机号（登录凭证）；匿名账号允许为空

      - name: nickname
        type: string
        constraints: [UK, NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        search_field: true
        description: 昵称

      - name: avatarUrl
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        recommend_feature: false

      - name: avatarAssetId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        description: 用户头像资产主键；作为头像真相源的稳定引用

      - name: avatarVersion
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        description: 用户头像版本号；用于群头像重算与 patch 幂等

      - name: backgroundUrl
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        recommend_feature: false
        description: owner 基线主页头图 URL

      - name: bio
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        recommend_feature: true
        search_field: true
        description: 个人签名

      - name: gender
        type: enum
        enum_ref: Gender
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: read_write
        ops_exposure: mask
        recommend_feature: true

      - name: birthDate
        type: date
        constraints: [NULLABLE]
        classification: PII
        log_policy: drop
        api_exposure: read_write
        ops_exposure: drop
        recommend_feature: false

      - name: region
        type: string
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: read
        ops_exposure: read
        recommend_feature: true
        description: 地区（ipResidenceProfile 落库）

      - name: status
        type: enum
        enum_ref: UserStatus
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read_write
        recommend_feature: false
        observe_metric: user_status_gauge

      - name: profileVersion
        type: int
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        description: 画像快照版本号（端侧增量校验）

      - name: followerCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: followingCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: postCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: circleCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        description: 已加入圈子数（由 circle-service 成员变更事件驱动更新）

      - name: likeCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true
        description: 获赞总数（由 content-service 点赞事件驱动更新）

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: true

      - name: ownerDisplayName
        type: string
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: drop
        ops_exposure: read
        recommend_feature: false
        description: 主控账号管理视角名称（仅自己控制台可见，不对外展示）

      - name: subAccountCount
        type: int
        constraints: [NOT_NULL, DEFAULT_1]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false
        description: 当前持有子账号数量（冗余计数）

      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        recommend_feature: false

  Persona:
    description: 用户子账号——应用内真实身份主体；只保留 subAccountId 作为主体 ID
    fields:
      - name: userId
        type: string
        constraints: [FK_user_profiles_CASCADE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: displayName
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: userHandle
        type: string
        constraints: [NULLABLE, UK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 分身用户号；全局唯一、用户可修改、用于公开标识

      - name: phone
        type: string
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: read_write
        ops_exposure: mask
        description: 当前分身绑定手机号；默认继承主分身，可单独改写

      - name: email
        type: string
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: read_write
        ops_exposure: mask
        description: 当前分身绑定邮箱；默认继承主分身，可单独改写

      - name: avatarUrl
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: backgroundUrl
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 子账号主页头图 URL；为空时继承 owner 基线

      - name: bio
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 子账号简介；为空时继承 owner 基线

      - name: callerRingtoneId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 发起实时通话时对外使用的官方呼叫铃声 ID；为空时回退平台默认铃声

      - name: themeModeOverride
        type: enum
        enum_ref: ThemeModeSetting
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 子账号对 owner 默认主题模式的覆盖；为空表示继承 owner 默认值

      - name: fontSizePresetOverride
        type: enum
        enum_ref: FontSizePreset
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 子账号对 owner 默认字号预设的覆盖；为空表示继承 owner 默认值

      - name: appearanceOverrideUpdatedAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 子账号 appearance override 最后更新时间

      - name: isPrimary
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: isPrivate
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: isActive
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: status
        type: enum
        enum_ref: PersonaStatus
        constraints: [NOT_NULL]
        default_value: active
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 分身生命周期状态；retired 后不可再作为新动作主体

      - name: retiredAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 分身退役时间；为空表示仍可作为活跃主体

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: subAccountId
        type: string
        constraints: [PK, NOT_NULL, UK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 全局唯一子账号 ID；也是跨域上下文唯一主体 ID

      - name: isolationLevel
        type: enum
        enum_ref: IsolationLevel
        constraints: [NOT_NULL]
        default_value: open
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: "隔离等级：open（公开可发现）/ semi（半隔离）/ strict（不对外暴露）"

      - name: purposeHint
        type: string
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: drop
        ops_exposure: read
        description: 用户自定义用途备注（仅主控账号视角可见）

      - name: inheritsProfileFromOwner
        type: bool
        constraints: [NOT_NULL, DEFAULT_TRUE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 是否默认继承 owner 资料基线

      - name: overriddenProfileFields
        type: "[]string"
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 当前子账号已覆写的资料字段列表

      - name: lastProfileSyncAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 最近一次资料同步时间

      - name: lastProfileSyncSource
        type: enum
        enum_ref: ProfileSyncSource
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 最近一次资料同步来源

      - name: inviteCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 该子账号发起的邀请转化数（冗余计数）

      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

    unique_constraints:
      - columns: [userId, isPrimary]
        condition: "isPrimary = true"
        description: 每主控账号恰好一个主子账号
      - columns: [userId, isActive]
        condition: "isActive = true"
        description: 每主控账号同时恰好一个激活子账号
      - columns: [subAccountId]
        description: 子账号 ID 全局唯一

    enums:
      IsolationLevel:
        values: [open, semi, strict]
        description: >
          open: 可被通讯录发现，可关注；
          semi: 可关注但不被通讯录推荐；
          strict: 完全不被外部发现，仅受邀可见

  CredentialBinding:
    description: 第三方凭证绑定（phone/wechat/apple 并行，各最多 1 个绑定到同一 OwnerAccount）
    cache_excluded: true
    fields:
      - name: id
        type: string
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: ownerId
        type: string
        constraints: [FK_user_profiles_CASCADE, NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
        description: 归属的主控账号 ID

      - name: credentialType
        type: enum
        enum_ref: CredentialType
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: "凭证类型：phone / wechat / apple"

      - name: credentialKey
        type: string
        constraints: [NOT_NULL]
        classification: SECRET
        log_policy: drop
        api_exposure: drop
        ops_exposure: drop
        description: 凭证唯一标识（手机号哈希/微信UnionID/Apple SubjectID）

      - name: displayLabel
        type: string
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: read
        ops_exposure: mask
        description: 用户可见的凭证标签（手机号脱敏显示，如 138****8888）

      - name: isActive
        type: bool
        constraints: [NOT_NULL, DEFAULT_TRUE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: boundAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: lastUsedAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

    unique_constraints:
      - columns: [credentialType, credentialKey]
        description: 同一凭证不能绑定两个 OwnerAccount（全局唯一）
      - columns: [ownerId, credentialType]
        description: 同一 OwnerAccount 每种凭证最多一个

    enums:
      CredentialType:
        values: [phone, wechat, apple, anonymous_device]
        description: 支持的第三方凭证类型

    business_rules:
      - id: last_credential_protection
        description: OwnerAccount 至少保留 1 个 isActive=true 的凭证，不能全部解绑

  AnonymousDeviceBinding:
    description: 匿名设备到 owner 账号的稳定绑定，不直接暴露或依赖原始设备标识
    cache_excluded: true
    fields:
      - name: id
        type: string
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: ownerId
        type: string
        constraints: [FK_user_profiles_CASCADE, NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
        description: 绑定到的匿名或已升级 owner ID

      - name: installIdHash
        type: string
        constraints: [NOT_NULL]
        classification: SECRET
        log_policy: drop
        api_exposure: drop
        ops_exposure: drop
        description: 安装实例标识的哈希值，仅用于审计和定位

      - name: deviceFingerprintHash
        type: string
        constraints: [NOT_NULL]
        classification: SECRET
        log_policy: drop
        api_exposure: drop
        ops_exposure: drop
        description: 设备指纹摘要；同设备稳定命中同一匿名 owner

      - name: platform
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: appVersion
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: lastSeenAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

    unique_constraints:
      - columns: [deviceFingerprintHash]
        description: 同一设备指纹只能绑定到一个 owner

  UserAuth:
    description: 认证凭证（安全隔离，不缓存到 Redis）
    cache_excluded: true
    fields:
      - name: userId
        type: string
        constraints: [PK, FK_user_profiles_CASCADE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: drop
        description: 1:1 关联

      - name: passwordHash
        type: string
        constraints: [NOT_NULL]
        classification: SECRET
        log_policy: drop
        api_exposure: drop
        ops_exposure: drop

      - name: otpSecret
        type: string
        constraints: [NULLABLE]
        classification: SECRET
        log_policy: drop
        api_exposure: drop
        ops_exposure: drop

      - name: refreshToken
        type: string
        constraints: [NULLABLE]
        classification: SECRET
        log_policy: drop
        api_exposure: drop
        ops_exposure: drop

      - name: refreshTokenExpiresAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: drop

      - name: lastLoginAt
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: lastLoginIp
        type: string
        constraints: [NULLABLE]
        classification: PII
        log_policy: mask
        api_exposure: drop
        ops_exposure: mask

      - name: loginFailCount
        type: int
        constraints: [NOT_NULL, DEFAULT_0]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read
        observe_metric: login_fail_counter

      - name: lockedUntil
        type: timestamp
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: drop

      - name: updatedAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: drop

  UserDevice:
    description: 设备绑定与推送 token
    fields:
      - name: id
        type: string
        constraints: [PK]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: userId
        type: string
        constraints: [FK_user_profiles_CASCADE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read

      - name: deviceId
        type: string
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: write
        ops_exposure: read

      - name: platform
        type: enum
        enum_ref: Platform
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: write
        ops_exposure: read

      - name: pushToken
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: write
        ops_exposure: drop

      - name: appVersion
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: write
        ops_exposure: read

      - name: lastActiveAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

      - name: createdAt
        type: timestamp
        constraints: [NOT_NULL]
        classification: PUBLIC
        log_policy: allow
        api_exposure: drop
        ops_exposure: read

    unique_constraints:
      - columns: [userId, deviceId]
        description: 同用户同设备不重复注册

  UserSetting:
    description: 通知 + 隐私 + 来电设置
    fields:
      - name: userId
        type: string
        constraints: [PK, FK_user_profiles_CASCADE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read
        ops_exposure: read
        description: 1:1 关联

      - name: enablePush
        type: bool
        constraints: [NOT_NULL, DEFAULT_TRUE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: enableMarketing
        type: bool
        constraints: [NOT_NULL, DEFAULT_FALSE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: quietHoursStart
        type: time
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: quietHoursEnd
        type: time
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read

      - name: defaultIncomingCallRingtoneId
        type: string
        constraints: [NULLABLE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
        ops_exposure: read
        description: 默认来电铃声 ID（仅支持官方铃声库）

      - name: allowCallerRingtoneOverride
        type: bool
        constraints: [NOT_NULL, DEFAULT_TRUE]
        classification: PUBLIC
        log_policy: allow
        api_exposure: read_write
