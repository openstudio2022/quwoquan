version: 1
domain: USER
aggregate: UserProfile

description: |
  user 域结构化错误码声明。格式：MODULE.KIND.REASON。
  codegen 从本文件生成 Dart UserErrorCode enum + UserErrorMessages，
  以及 Go errors.go 常量（绑定 runtime/errors.AppError）。

errors:
  - code: USER.USER.not_found
    kind: USER
    reason: not_found
    http_status: 404
    recovery_action: surface
    dart_const: userNotFound
    go_const: ErrUserNotFound
    user_message:
      zh: "用户不存在"
      en: "User not found"

  - code: USER.USER.unauthorized
    kind: USER
    reason: unauthorized
    http_status: 401
    recovery_action: surface
    dart_const: unauthorized
    go_const: ErrUnauthorized
    user_message:
      zh: "请先登录"
      en: "Please sign in to continue"

  - code: USER.USER.forbidden
    kind: USER
    reason: forbidden
    http_status: 403
    recovery_action: surface
    dart_const: forbidden
    go_const: ErrForbidden
    user_message:
      zh: "无权访问该资源"
      en: "Access denied"

  - code: USER.USER.nickname_taken
    kind: USER
    reason: conflict
    http_status: 409
    recovery_action: surface
    dart_const: nicknameTaken
    go_const: ErrNicknameTaken
    user_message:
      zh: "该昵称已被使用，请换一个"
      en: "Nickname already taken, please choose another"

  - code: USER.USER.invalid_argument
    kind: USER
    reason: invalid_argument
    http_status: 400
    recovery_action: surface
    dart_const: invalidArgument
    go_const: ErrInvalidArgument
    user_message:
      zh: "请求参数有误"
      en: "Invalid request parameters"

  - code: USER.USER.rate_limited
    kind: USER
    reason: rate_limited
    http_status: 429
    recovery_action: retry
    recovery_after_seconds: 60
    dart_const: rateLimited
    go_const: ErrRateLimited
    user_message:
      zh: "操作太频繁，请稍后重试"
      en: "Too many requests, please retry later"

  - code: USER.SETTING.invalid_call_ringtone
    kind: SETTING
    reason: invalid_argument
    http_status: 400
    recovery_action: surface
    dart_const: invalidCallRingtone
    go_const: ErrInvalidCallRingtone
    user_message:
      zh: "所选铃声不可用，请从官方铃声库中重新选择"
      en: "Selected ringtone is unavailable, please choose from the official library"

  - code: USER.SETTING.invalid_appearance_scope
    kind: SETTING
    reason: invalid_argument
    http_status: 400
    recovery_action: surface
    dart_const: invalidAppearanceScope
    go_const: ErrInvalidAppearanceScope
    user_message:
      zh: "外观设置作用范围无效，请重试"
      en: "Appearance settings scope is invalid, please try again"

  - code: USER.SYSTEM.internal_error
    kind: SYSTEM
    reason: internal_error
    http_status: 500
    recovery_action: surface
    dart_const: internalError
    go_const: ErrInternalError
    user_message:
      zh: "服务异常，请稍后重试"
      en: "Service error, please try again later"

  # ── 认证与凭证错误 ─────────────────────────────────────────────────────────

  - code: USER.AUTH.otp_expired
    kind: AUTH
    reason: otp_expired
    http_status: 400
    recovery_action: retry
    dart_const: otpExpired
    go_const: ErrOtpExpired
    user_message:
      zh: "验证码已过期，请重新获取"
      en: "Verification code expired, please request a new one"

  - code: USER.AUTH.otp_mismatch
    kind: AUTH
    reason: otp_mismatch
    http_status: 400
    recovery_action: retry
    dart_const: otpMismatch
    go_const: ErrOtpMismatch
    user_message:
      zh: "验证码错误，请重新输入"
      en: "Incorrect verification code, please try again"

  - code: USER.AUTH.credential_conflict
    kind: AUTH
    reason: conflict
    http_status: 409
    recovery_action: surface
    dart_const: credentialConflict
    go_const: ErrCredentialConflict
    user_message:
      zh: "该账号已被其他用户绑定"
      en: "This account is already linked to another user"

  - code: USER.AUTH.last_credential
    kind: AUTH
    reason: constraint_violation
    http_status: 400
    recovery_action: surface
    dart_const: lastCredential
    go_const: ErrLastCredential
    user_message:
      zh: "无法解绑，这是您唯一的登录方式"
      en: "Cannot unlink the only login method"

  - code: USER.AUTH.login_locked
    kind: AUTH
    reason: locked
    http_status: 423
    recovery_action: retry
    recovery_after_seconds: 1800
    dart_const: loginLocked
    go_const: ErrLoginLocked
    user_message:
      zh: "账号因多次失败已暂时锁定，请30分钟后重试"
      en: "Account temporarily locked due to multiple failed attempts, please retry in 30 minutes"

  - code: USER.AUTH.wechat_auth_failed
    kind: AUTH
    reason: third_party_failure
    http_status: 502
    recovery_action: retry
    dart_const: wechatAuthFailed
    go_const: ErrWechatAuthFailed
    user_message:
      zh: "微信授权失败，请重试"
      en: "WeChat authorization failed, please try again"

  - code: USER.AUTH.apple_auth_failed
    kind: AUTH
    reason: third_party_failure
    http_status: 502
    recovery_action: retry
    dart_const: appleAuthFailed
    go_const: ErrAppleAuthFailed
    user_message:
      zh: "Apple 登录失败，请重试"
      en: "Apple sign-in failed, please try again"

  - code: USER.AUTH.token_expired
    kind: AUTH
    reason: token_expired
    http_status: 401
    recovery_action: retry
    dart_const: tokenExpired
    go_const: ErrTokenExpired
    user_message:
      zh: "登录已过期，请重新登录"
      en: "Session expired, please sign in again"

  # ── 子账号错误 ─────────────────────────────────────────────────────────────

  - code: USER.SUB_ACCOUNT.not_found
    kind: SUB_ACCOUNT
    reason: not_found
    http_status: 404
    recovery_action: surface
    dart_const: subAccountNotFound
    go_const: ErrSubAccountNotFound
    user_message:
      zh: "子账号不存在"
      en: "Sub-account not found"

  - code: USER.SUB_ACCOUNT.last_sub_account
    kind: SUB_ACCOUNT
    reason: constraint_violation
    http_status: 400
    recovery_action: surface
    dart_const: lastSubAccount
    go_const: ErrLastSubAccount
    user_message:
      zh: "无法删除，这是您的最后一个账号"
      en: "Cannot delete the last sub-account"

  - code: USER.SUB_ACCOUNT.strict_isolation
    kind: SUB_ACCOUNT
    reason: not_found
    http_status: 404
    recovery_action: surface
    dart_const: subAccountStrictIsolation
    go_const: ErrSubAccountStrictIsolation
    user_message:
      zh: "该用户不存在"
      en: "User not found"

  - code: USER.SUB_ACCOUNT.quota_reached
    kind: SUB_ACCOUNT
    reason: constraint_violation
    http_status: 400
    recovery_action: surface
    dart_const: subAccountQuotaReached
    go_const: ErrSubAccountQuotaReached
    user_message:
      zh: "分身数量已达上限，请先整理现有分身"
      en: "Persona limit reached, please manage existing personas first"

  - code: USER.SUB_ACCOUNT.primary_guard
    kind: SUB_ACCOUNT
    reason: constraint_violation
    http_status: 400
    recovery_action: surface
    dart_const: primarySubAccountGuard
    go_const: ErrPrimarySubAccountGuard
    user_message:
      zh: "主分身不能直接删除或退役"
      en: "Primary persona cannot be deleted or retired directly"

  - code: USER.SUB_ACCOUNT.active_guard
    kind: SUB_ACCOUNT
    reason: constraint_violation
    http_status: 400
    recovery_action: surface
    dart_const: activeSubAccountGuard
    go_const: ErrActiveSubAccountGuard
    user_message:
      zh: "请先切换到其他分身后再继续"
      en: "Please switch to another persona before continuing"

  - code: USER.SUB_ACCOUNT.retire_required
    kind: SUB_ACCOUNT
    reason: constraint_violation
    http_status: 409
    recovery_action: surface
    dart_const: subAccountRetireRequired
    go_const: ErrSubAccountRetireRequired
    user_message:
      zh: "该分身已有历史数据，请使用退役而不是删除"
      en: "This persona has history and must be retired instead of deleted"
