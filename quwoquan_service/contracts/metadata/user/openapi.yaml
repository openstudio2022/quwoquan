openapi: 3.0.3
info:
  title: quwoquan user-service API
  version: "v1"
servers:
  - url: http://localhost
security:
  - bearerAuth: []
paths:
  /v1/user/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /v1/user/profile/{userId}:
    get:
      summary: Get user profile + snapshot
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
  /v1/user/personas:
    get:
      summary: List personas
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Persona" }
    post:
      summary: Create persona
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/IdempotencyKey
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePersonaRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreatePersonaResponse" }
  /v1/user/personas/{personaId}:
    patch:
      summary: Update persona
      parameters:
        - name: personaId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePersonaRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Persona" }
    delete:
      summary: Delete persona
      parameters:
        - name: personaId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }
  /v1/user/personas/{personaId}/activate:
    post:
      summary: Activate persona
      parameters:
        - name: personaId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }
  /v1/user/follow/{targetUserId}:
    post:
      summary: Follow user
      parameters:
        - name: targetUserId
          in: path
          required: true
          schema: { type: string }
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/IdempotencyKey
      responses:
        "204": { description: No Content }
    delete:
      summary: Unfollow user
      parameters:
        - name: targetUserId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }
  /v1/user/settings/notifications:
    get:
      summary: Get notification settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationSettings" }
    patch:
      summary: Update notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationSettingsPatch" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationSettings" }
  /v1/user/settings/privacy:
    get:
      summary: Get privacy settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrivacySettings" }
    patch:
      summary: Update privacy settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PrivacySettingsPatch" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrivacySettings" }
  /v1/user/settings/appearance:
    get:
      summary: Get appearance settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppearanceSettings" }
    patch:
      summary: Update appearance settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AppearanceSettingsPatch" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppearanceSettings" }
  /v1/user/settings/calls:
    get:
      summary: Get call settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CallSettings" }
    patch:
      summary: Update call settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CallSettingsPatch" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CallSettings" }
  /v1/user/profile-subjects/{profileSubjectId}/relationship/capability:
    get:
      summary: Get relationship capability for target profile subject
      parameters:
        - name: profileSubjectId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RelationshipCapability" }
  /v1/owner/sub-accounts/summary:
    get:
      summary: Persona management summary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PersonaManagementSummary" }
  /v1/user/devices/push-tokens:
    post:
      summary: Register push token
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/IdempotencyKey
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterPushTokenRequest" }
      responses:
        "204": { description: No Content }
components:
  securitySchemes:
    bearerAuth:
      $ref: ../_shared/openapi_common.yaml#/components/securitySchemes/bearerAuth
  schemas:
    LoginRequest:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
        otp: { type: string }
    LoginResponse:
      type: object
      required: [accessToken, refreshToken, userId]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        userId: { type: string }
    UserProfile:
      type: object
      required: [userId, profileVersion]
      properties:
        userId: { type: string }
        profileVersion: { type: string }
        basicIdentity:
          type: object
          additionalProperties: true
        snapshot:
          type: object
          additionalProperties: true
    Persona:
      type: object
      required: [id, displayName]
      properties:
        id: { type: string }
        displayName: { type: string }
        avatarUrl: { type: string }
        isPrimary: { type: boolean }
        isPrivate: { type: boolean }
        isActive: { type: boolean }
    CreatePersonaRequest:
      type: object
      required: [displayName]
      properties:
        displayName: { type: string }
        avatarUrl: { type: string }
        isPrivate: { type: boolean }
    CreatePersonaResponse:
      type: object
      required: [personaId]
      properties:
        personaId: { type: string }
    UpdatePersonaRequest:
      type: object
      properties:
        displayName: { type: string }
        avatarUrl: { type: string }
        isPrivate: { type: boolean }
    NotificationSettings:
      type: object
      properties:
        enablePush: { type: boolean }
        enableMarketing: { type: boolean }
        quietHours:
          type: object
          additionalProperties: true
    NotificationSettingsPatch:
      type: object
      additionalProperties: true
    PrivacySettings:
      type: object
      properties:
        allowStrangerMessage: { type: boolean }
        profileVisibility:
          type: string
          enum: [public, friends, private]
        blockedKeywords:
          type: array
          items: { type: string }
    PrivacySettingsPatch:
      type: object
      additionalProperties: true
    AppearanceSettings:
      type: object
      required:
        [
          themeMode,
          fontSizePreset,
          source,
          ownerDefaultThemeMode,
          ownerDefaultFontSizePreset,
          hasSubAccountOverride,
          version,
          updatedAt,
        ]
      properties:
        themeMode:
          type: string
          enum: [system, light, dark]
        fontSizePreset:
          type: string
          enum: [xs, sm, md, lg, xl]
        source:
          type: string
          enum: [owner_default, sub_override, system_default]
        ownerDefaultThemeMode:
          type: string
          enum: [system, light, dark]
        ownerDefaultFontSizePreset:
          type: string
          enum: [xs, sm, md, lg, xl]
        hasSubAccountOverride:
          type: boolean
        version:
          type: integer
        updatedAt:
          type: string
          format: date-time
    AppearanceSettingsPatch:
      type: object
      required: [themeMode, fontSizePreset, applyScope]
      properties:
        themeMode:
          type: string
          enum: [system, light, dark]
        fontSizePreset:
          type: string
          enum: [xs, sm, md, lg, xl]
        applyScope:
          type: string
          enum: [all_accounts, current_sub_account, inherit_owner_default]
    CallSettings:
      type: object
      properties:
        defaultIncomingCallRingtoneId: { type: string, nullable: true }
        allowCallerRingtoneOverride: { type: boolean }
        enableCallVibration: { type: boolean }
        enableGroupCallRing: { type: boolean }
    CallSettingsPatch:
      type: object
      additionalProperties: true
    RelationshipCapability:
      type: object
      required:
        [
          viewerProfileSubjectId,
          targetProfileSubjectId,
          relationState,
          canFollow,
          canUnfollow,
          canMessage,
          canFollowBack,
          canStartVoiceCall,
          canStartVideoCall,
          isBlocked,
          isBlockedBy,
        ]
      properties:
        viewerProfileSubjectId: { type: string }
        targetProfileSubjectId: { type: string }
        relationState: { type: string }
        relationTier: { type: string, nullable: true }
        canFollow: { type: boolean }
        canUnfollow: { type: boolean }
        canMessage: { type: boolean }
        canFollowBack: { type: boolean }
        canGreet: { type: boolean }
        canOpenConversation: { type: boolean }
        canAddSameInterest: { type: boolean }
        canSetCloseFriend: { type: boolean }
        canStartVoiceCall: { type: boolean }
        canStartVideoCall: { type: boolean }
        isBlocked: { type: boolean }
        isBlockedBy: { type: boolean }
    PersonaManagementSummary:
      type: object
      properties:
        items:
          type: array
          items: { type: object, additionalProperties: true }
        subAccounts:
          type: array
          items: { type: object, additionalProperties: true }
        personas:
          type: array
          items: { type: object, additionalProperties: true }
        quota:
          type: object
          additionalProperties: true
        activeContext:
          type: object
          additionalProperties: true
        activePersonaContext:
          type: object
          additionalProperties: true
    RegisterPushTokenRequest:
      type: object
      required: [platform, token, deviceId]
      properties:
        platform:
          type: string
          enum: [ios, android]
        token: { type: string }
        deviceId: { type: string }
