openapi: 3.0.3
info:
  title: quwoquan user-service API
  version: "v1"
servers:
  - url: http://localhost
security:
  - bearerAuth: []
paths:
  /v1/user/auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /v1/user/profile/{userId}:
    get:
      summary: Get user profile + snapshot
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
  /v1/user/personas:
    get:
      summary: List personas
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Persona" }
    post:
      summary: Create persona
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/IdempotencyKey
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreatePersonaRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreatePersonaResponse" }
  /v1/user/personas/{personaId}:
    patch:
      summary: Update persona
      parameters:
        - name: personaId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePersonaRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Persona" }
    delete:
      summary: Delete persona
      parameters:
        - name: personaId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }
  /v1/user/personas/{personaId}/activate:
    post:
      summary: Activate persona
      parameters:
        - name: personaId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }
  /v1/user/follow/{targetUserId}:
    post:
      summary: Follow user
      parameters:
        - name: targetUserId
          in: path
          required: true
          schema: { type: string }
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/IdempotencyKey
      responses:
        "204": { description: No Content }
    delete:
      summary: Unfollow user
      parameters:
        - name: targetUserId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204": { description: No Content }
  /v1/user/settings/notifications:
    get:
      summary: Get notification settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationSettings" }
    patch:
      summary: Update notification settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/NotificationSettingsPatch" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NotificationSettings" }
  /v1/user/settings/privacy:
    get:
      summary: Get privacy settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrivacySettings" }
    patch:
      summary: Update privacy settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PrivacySettingsPatch" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PrivacySettings" }
  /v1/user/devices/push-tokens:
    post:
      summary: Register push token
      parameters:
        - $ref: ../_shared/openapi_common.yaml#/components/parameters/IdempotencyKey
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterPushTokenRequest" }
      responses:
        "204": { description: No Content }
components:
  securitySchemes:
    bearerAuth:
      $ref: ../_shared/openapi_common.yaml#/components/securitySchemes/bearerAuth
  schemas:
    LoginRequest:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
        otp: { type: string }
    LoginResponse:
      type: object
      required: [accessToken, refreshToken, userId]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        userId: { type: string }
    UserProfile:
      type: object
      required: [userId, profileVersion]
      properties:
        userId: { type: string }
        profileVersion: { type: string }
        basicIdentity:
          type: object
          additionalProperties: true
        snapshot:
          type: object
          additionalProperties: true
    Persona:
      type: object
      required: [id, displayName]
      properties:
        id: { type: string }
        displayName: { type: string }
        avatarUrl: { type: string }
        isPrimary: { type: boolean }
        isPrivate: { type: boolean }
        isActive: { type: boolean }
    CreatePersonaRequest:
      type: object
      required: [displayName]
      properties:
        displayName: { type: string }
        avatarUrl: { type: string }
        isPrivate: { type: boolean }
    CreatePersonaResponse:
      type: object
      required: [personaId]
      properties:
        personaId: { type: string }
    UpdatePersonaRequest:
      type: object
      properties:
        displayName: { type: string }
        avatarUrl: { type: string }
        isPrivate: { type: boolean }
    NotificationSettings:
      type: object
      properties:
        enablePush: { type: boolean }
        enableMarketing: { type: boolean }
        quietHours:
          type: object
          additionalProperties: true
    NotificationSettingsPatch:
      type: object
      additionalProperties: true
    PrivacySettings:
      type: object
      properties:
        allowStrangerMessage: { type: boolean }
        profileVisibility:
          type: string
          enum: [public, friends, private]
    PrivacySettingsPatch:
      type: object
      additionalProperties: true
    RegisterPushTokenRequest:
      type: object
      required: [platform, token, deviceId]
      properties:
        platform:
          type: string
          enum: [ios, android]
        token: { type: string }
        deviceId: { type: string }
