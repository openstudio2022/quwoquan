version: 1
domain: USER
entity: InviteRecord

errors:
  - code: USER.INVITE.expired
    kind: INVITE
    reason: expired
    http_status: 410
    retryable: false
    dart_const: inviteExpired
    go_const: ErrInviteExpired
    user_message:
      zh: "邀请已过期"
      en: "This invitation has expired"

  - code: USER.INVITE.already_accepted
    kind: INVITE
    reason: conflict
    http_status: 409
    retryable: false
    dart_const: inviteAlreadyAccepted
    go_const: ErrInviteAlreadyAccepted
    user_message:
      zh: "邀请已被接受"
      en: "This invitation has already been accepted"

  - code: USER.INVITE.not_found
    kind: INVITE
    reason: not_found
    http_status: 404
    retryable: false
    dart_const: inviteNotFound
    go_const: ErrInviteNotFound
    user_message:
      zh: "邀请不存在或已失效"
      en: "Invitation not found or no longer valid"

  - code: USER.INVITE.daily_limit_exceeded
    kind: INVITE
    reason: rate_limited
    http_status: 429
    retryable: true
    retry_after_seconds: 86400
    dart_const: inviteDailyLimitExceeded
    go_const: ErrInviteDailyLimitExceeded
    user_message:
      zh: "今日邀请次数已达上限"
      en: "Daily invite limit reached"

  - code: USER.INVITE.invalid_code
    kind: INVITE
    reason: invalid_argument
    http_status: 400
    retryable: false
    dart_const: inviteInvalidCode
    go_const: ErrInviteInvalidCode
    user_message:
      zh: "邀请码无效"
      en: "Invalid invitation code"
