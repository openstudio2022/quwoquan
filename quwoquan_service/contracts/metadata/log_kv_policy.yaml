# Log KV Policy — root aggregator for cross-cutting log field strategies
policies:
  - model: content-service
    operation: POST /v1/content/posts
    input:
      - key: contentType
        strategy: plain
      - key: authorId
        strategy: hash
    output:
      - key: _id
        strategy: plain
      - key: contentType
        strategy: plain

  - model: content-service
    operation: GET /v1/content/feed
    input:
      - key: type
        strategy: plain
      - key: limit
        strategy: plain
    output:
      - key: items.length
        strategy: plain

  - model: messages-service
    operation: POST /v1/chat/messages
    input:
      - key: conversationId
        strategy: plain
      - key: senderId
        strategy: hash
    output:
      - key: _id
        strategy: plain

  - model: integration-service
    operation: GET /v1/integration/location/nearby
    input:
      - key: lat
        strategy: plain
      - key: lng
        strategy: plain
      - key: radiusMeters
        strategy: plain
    output:
      - key: items.length
        strategy: plain

  - model: integration-service
    operation: GET /v1/integration/location/search
    input:
      - key: q
        strategy: plain
      - key: cityCode
        strategy: plain
      - key: limit
        strategy: plain
    output:
      - key: items.length
        strategy: plain
